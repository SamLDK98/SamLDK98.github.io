  <script>
    (function () {
      var svg = document.getElementById('trig-motif');
      if (!svg) return;

      var radius = document.getElementById('motif-radius');
      var circleDot = document.getElementById('motif-circle-dot');
      var connector = document.getElementById('motif-connector');
      var wave = document.getElementById('motif-wave');
      var waveDot = document.getElementById('motif-wave-dot');
      var arc = document.getElementById('motif-arc');

      var cx = 90, cy = 92, r = 64;
      var waveX0 = 192, waveX1 = 884;
      var amp = 64;
      var k = (2 * Math.PI) / 150;

      function polar(t) {
        return { x: cx + r * Math.cos(t), y: cy - r * Math.sin(t) };
      }

      function draw(t) {
        var p = polar(t);
        radius.setAttribute('x2', p.x.toFixed(2));
        radius.setAttribute('y2', p.y.toFixed(2));
        circleDot.setAttribute('cx', p.x.toFixed(2));
        circleDot.setAttribute('cy', p.y.toFixed(2));

        var ta = t % (2 * Math.PI);
        var arcR = 20;
        var ax = cx + arcR, ay = cy;
        var ex = cx + arcR * Math.cos(ta), ey = cy - arcR * Math.sin(ta);
        var large = ta > Math.PI ? 1 : 0;
        arc.setAttribute('d', 'M ' + ax + ' ' + ay + ' A ' + arcR + ' ' + arcR + ' 0 ' + large + ' 0 ' + ex.toFixed(2) + ' ' + ey.toFixed(2));

        var d = '';
        for (var x = waveX0; x <= waveX1; x += 6) {
          var phase = t - (x - waveX0) * k;
          var y = cy - amp * Math.sin(phase);
          d += (x === waveX0 ? 'M ' : 'L ') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
        }
        wave.setAttribute('d', d.trim());

        var leadY = cy - amp * Math.sin(t);
        connector.setAttribute('x1', p.x.toFixed(2));
        connector.setAttribute('y1', p.y.toFixed(2));
        connector.setAttribute('x2', waveX0);
        connector.setAttribute('y2', leadY.toFixed(2));
        waveDot.setAttribute('cx', waveX0);
        waveDot.setAttribute('cy', leadY.toFixed(2));
      }

      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduce) {
        draw(Math.PI / 5);
        return;
      }

      var theta = 0;
      var last = null;
      var running = true;

      function frame(ts) {
        if (!running) return;
        if (last === null) last = ts;
        var dt = (ts - last) / 1000;
        last = ts;
        theta += dt * 0.78;
        draw(theta);
        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);

      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          running = false;
        } else if (!running) {
          running = true;
          last = null;
          requestAnimationFrame(frame);
        }
      });
    })();
  </script>
