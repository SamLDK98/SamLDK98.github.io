<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available moves and entropy</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #2c2c2a;
    padding: 16px;
    box-sizing: border-box;
  }
  .am-widget { max-width: 600px; margin: 0 auto; }
  .am-header { text-align: center; margin-bottom: 12px; }
  .am-macrostate { font-size: 13px; color: #5f5e5a; }
  .am-macrostate strong { font-size: 16px; color: #2c2c2a; font-weight: 600; }
  .am-grid-wrap { display: flex; justify-content: center; margin-bottom: 14px; }
  .am-grid { width: 100%; max-width: 340px; aspect-ratio: 1; }
  .am-heat { transition: fill 400ms ease; }
  .am-cell { fill: rgba(0,0,0,0.04); stroke: rgba(0,0,0,0.12); stroke-width: 0.5; }
  .am-midline { stroke: rgba(0,0,0,0.3); stroke-width: 1; stroke-dasharray: 3 3; }
  .am-dot { fill: #2c2c2a; }
  .am-arrow-group { cursor: pointer; }
  .am-arrow-group:hover .am-arrow-visible { stroke-width: 4; }
  .am-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .am-stat { padding: 10px 8px; border-radius: 6px; text-align: center; }
  .am-stat-increase { background: rgba(92, 166, 114, 0.16); }
  .am-stat-same { background: rgba(138, 134, 130, 0.16); }
  .am-stat-decrease { background: rgba(196, 78, 78, 0.16); }
  .am-stat-count { font-size: 24px; font-weight: 600; line-height: 1.1; }
  .am-stat-count.increase { color: #3a7549; }
  .am-stat-count.same { color: #6a6660; }
  .am-stat-count.decrease { color: #983e3e; }
  .am-stat-label { font-size: 11px; color: #5f5e5a; margin-top: 4px; line-height: 1.3; }
  .am-controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 12px; }
  .am-btn {
    font: inherit; font-size: 12px; padding: 6px 12px;
    border: 0.5px solid rgba(0,0,0,0.25); background: transparent;
    color: inherit; border-radius: 6px; cursor: pointer; transition: background 150ms;
  }
  .am-btn:hover { background: rgba(0,0,0,0.04); }
  .am-btn:active { transform: scale(0.98); }
  .am-caption { text-align: center; font-size: 12px; color: #5f5e5a; font-style: italic; line-height: 1.55; }
</style>
</head>
<body>
<div class="am-widget">
  <div class="am-header">
    <div class="am-macrostate">
      Macrostate: <strong id="am-macrostate">8 / 0</strong>
      · <span id="am-mult">1 microstate compatible</span>
    </div>
  </div>
  <div class="am-grid-wrap">
    <svg class="am-grid" viewBox="0 0 280 280" id="am-grid" role="img" aria-label="A 4 by 4 grid with 8 dots. Arrows show every possible next move, color-coded by whether the move increases, preserves, or decreases entropy.">
      <defs>
        <marker id="am-arr-increase" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5ca672"/></marker>
        <marker id="am-arr-same" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8682"/></marker>
        <marker id="am-arr-decrease" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#c44e4e"/></marker>
      </defs>
      <rect class="am-heat" id="am-heat-left" x="0" y="0" width="140" height="280" fill="#702018" fill-opacity="0.32"/>
      <rect class="am-heat" id="am-heat-right" x="140" y="0" width="140" height="280" fill="#1e3a5f" fill-opacity="0.32"/>
      <g id="am-cells"></g>
      <line class="am-midline" x1="140" y1="0" x2="140" y2="280"/>
      <g id="am-dots"></g>
      <g id="am-arrows"></g>
    </svg>
  </div>
  <div class="am-stats">
    <div class="am-stat am-stat-increase">
      <div class="am-stat-count increase" id="am-up-count">4</div>
      <div class="am-stat-label">moves increase entropy</div>
    </div>
    <div class="am-stat am-stat-same">
      <div class="am-stat-count same" id="am-same-count">0</div>
      <div class="am-stat-label">moves keep same macrostate</div>
    </div>
    <div class="am-stat am-stat-decrease">
      <div class="am-stat-count decrease" id="am-down-count">0</div>
      <div class="am-stat-label">moves decrease entropy</div>
    </div>
  </div>
  <div class="am-controls">
    <button class="am-btn" id="am-reset-allleft">All on left (8/0)</button>
    <button class="am-btn" id="am-reset-near">One off (7/1)</button>
    <button class="am-btn" id="am-reset-equilibrium">Equilibrium (4/4)</button>
    <button class="am-btn" id="am-random">Random move</button>
  </div>
  <p class="am-caption">
    Each arrow on the grid is a possible next move. Click any arrow to execute that move.
  </p>
</div>
<script>
(function() {
  const CELL = 70, DOT_R = 18;
  const heat = ['#1e3a5f','#2d5a8a','#4a7eb6','#82a8c8','#b8a088','#d99868','#c46838','#a04028','#702018'];
  const moveColor = { increase: '#5ca672', same: '#8a8682', decrease: '#c44e4e' };
  const mults = [1, 64, 784, 3136, 4900, 3136, 784, 64, 1];
  let dots = [], validMoves = [];

  function getLeftCount() { return dots.filter(d => d.col < 2).length; }
  function computeMoves() {
    const moves = [];
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (let i = 0; i < dots.length; i++) {
      const dot = dots[i];
      for (const [dr, dc] of dirs) {
        const nr = dot.row + dr, nc = dot.col + dc;
        if (nr < 0 || nr >= 4 || nc < 0 || nc >= 4) continue;
        if (dots.some((o, j) => j !== i && o.row === nr && o.col === nc)) continue;
        moves.push({dotIdx: i, nr, nc});
      }
    }
    return moves;
  }
  function classifyMove(move) {
    const oldDot = dots[move.dotIdx];
    const wasLeft = oldDot.col < 2 ? 1 : 0;
    const nowLeft = move.nc < 2 ? 1 : 0;
    const leftCount = getLeftCount();
    const newLeftCount = leftCount - wasLeft + nowLeft;
    const oldMult = mults[leftCount], newMult = mults[newLeftCount];
    if (newMult > oldMult) return 'increase';
    if (newMult < oldMult) return 'decrease';
    return 'same';
  }
  function setupCells() {
    let html = '';
    for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) html += `<rect class="am-cell" x="${c*CELL}" y="${r*CELL}" width="${CELL}" height="${CELL}"/>`;
    document.getElementById('am-cells').innerHTML = html;
  }
  function render() {
    const left = getLeftCount();
    const right = 8 - left;
    validMoves = computeMoves();
    document.getElementById('am-heat-left').setAttribute('fill', heat[left]);
    document.getElementById('am-heat-right').setAttribute('fill', heat[right]);
    document.getElementById('am-macrostate').textContent = `${left} / ${right}`;
    const multCount = mults[left];
    document.getElementById('am-mult').textContent = multCount.toLocaleString() + ' microstate' + (multCount !== 1 ? 's' : '') + ' compatible';
    let dotsHtml = '';
    for (let i = 0; i < dots.length; i++) {
      const cx = dots[i].col * CELL + CELL/2, cy = dots[i].row * CELL + CELL/2;
      dotsHtml += `<circle class="am-dot" cx="${cx}" cy="${cy}" r="${DOT_R}"/>`;
    }
    document.getElementById('am-dots').innerHTML = dotsHtml;
    let arrowsHtml = '';
    const counts = { increase: 0, same: 0, decrease: 0 };
    validMoves.forEach((move, idx) => {
      const dot = dots[move.dotIdx];
      const sx = dot.col * CELL + CELL/2, sy = dot.row * CELL + CELL/2;
      const tx = move.nc * CELL + CELL/2, ty = move.nr * CELL + CELL/2;
      const dx = tx - sx, dy = ty - sy;
      const len = Math.sqrt(dx*dx + dy*dy);
      const ux = dx/len, uy = dy/len;
      const x1 = sx + ux * (DOT_R + 5);
      const y1 = sy + uy * (DOT_R + 5);
      const x2 = tx - ux * 12;
      const y2 = ty - uy * 12;
      const type = classifyMove(move);
      counts[type]++;
      const color = moveColor[type];
      arrowsHtml += `<g class="am-arrow-group" data-idx="${idx}"><line class="am-arrow-visible" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2.5" marker-end="url(#am-arr-${type})" pointer-events="stroke"/><line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="transparent" stroke-width="16" pointer-events="stroke"/></g>`;
    });
    document.getElementById('am-arrows').innerHTML = arrowsHtml;
    document.getElementById('am-up-count').textContent = counts.increase;
    document.getElementById('am-same-count').textContent = counts.same;
    document.getElementById('am-down-count').textContent = counts.decrease;
    document.querySelectorAll('.am-arrow-group').forEach(g => {
      g.addEventListener('click', () => { executeMove(validMoves[parseInt(g.dataset.idx)]); });
    });
  }
  function executeMove(move) {
    dots[move.dotIdx] = {row: move.nr, col: move.nc};
    render();
  }
  function resetAllLeft() {
    dots = [];
    for (let r = 0; r < 4; r++) for (let c = 0; c < 2; c++) dots.push({row: r, col: c});
    render();
  }
  function resetNear() {
    // 7 on left (col 0,1 mostly filled, but (0,1) is empty), 1 dot at (0,2) on the right
    // This setup includes a decreasing move: the right-side dot can move left into (0,1)
    dots = [
      {row: 0, col: 0},
      {row: 1, col: 0}, {row: 1, col: 1},
      {row: 2, col: 0}, {row: 2, col: 1},
      {row: 3, col: 0}, {row: 3, col: 1},
      {row: 0, col: 2}
    ];
    render();
  }
  function resetEquilibrium() {
    dots = [
      {row: 0, col: 0}, {row: 1, col: 1}, {row: 2, col: 0}, {row: 3, col: 1},
      {row: 0, col: 2}, {row: 1, col: 3}, {row: 2, col: 2}, {row: 3, col: 3}
    ];
    render();
  }
  function randomMove() {
    if (validMoves.length === 0) return;
    executeMove(validMoves[Math.floor(Math.random() * validMoves.length)]);
  }
  setupCells();
  resetAllLeft();
  document.getElementById('am-reset-allleft').onclick = resetAllLeft;
  document.getElementById('am-reset-near').onclick = resetNear;
  document.getElementById('am-reset-equilibrium').onclick = resetEquilibrium;
  document.getElementById('am-random').onclick = randomMove;
})();
</script>
</body>
</html>
