<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>An Infinite Sum Becomes a Function</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311;
    --bg-elev: #1e1a17;
    --bg-card: #221d1a;
    --text: #ece2d1;
    --text-dim: #a89c87;
    --text-faint: #6f6557;
    --rule: rgba(214, 196, 168, 0.12);
    --rule-strong: rgba(214, 196, 168, 0.22);
    --accent: #d4b888;
    --accent-glow: rgba(212, 184, 136, 0.4);
    --sin: #6dd3c4;
    --sin-glow: rgba(109, 211, 196, 0.4);
    --cos: #e8a13b;
    --point: #ef7398;
    --point-glow: rgba(239, 115, 152, 0.45);
    --axis: rgba(236, 226, 209, 0.4);
    --grid: rgba(236, 226, 209, 0.045);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 1.5rem 1rem;
    background-image: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.04), transparent 55%);
  }
  .widget {
    max-width: 1080px;
    margin: 0 auto;
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .widget::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 3px);
    pointer-events: none;
  }
  .equation-bar {
    padding: 0.95rem 1.6rem 0.75rem;
    border-bottom: 1px solid var(--rule);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.02rem;
    color: var(--text-dim);
  }
  .equation-bar .sum-part { color: var(--sin); }
  .equation-bar .frac-part { color: var(--cos); }
  .viz-wrap {
    padding: 1.2rem 1.25rem 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg#canvas {
    width: 100%;
    max-width: 1020px;
    height: auto;
    display: block;
  }
  .readout-bar {
    display: flex;
    justify-content: center;
    gap: 2.4rem;
    padding: 0.2rem 1.6rem 0.9rem;
    flex-wrap: wrap;
  }
  .readout { display: flex; align-items: baseline; gap: 0.55rem; }
  .readout .name {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.95rem;
  }
  .readout .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.02rem;
    font-variant-numeric: tabular-nums;
  }
  .readout .value.partial { color: var(--sin); }
  .readout .value.target { color: var(--cos); }
  .controls {
    padding: 1.05rem 1.6rem;
    border-top: 1px solid var(--rule);
    background: var(--bg-card);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.4rem;
    align-items: center;
  }
  @media (max-width: 760px) {
    .controls { grid-template-columns: 1fr; gap: 0.9rem; }
  }
  .slider-block { display: flex; flex-direction: column; gap: 0.4rem; }
  .slider-head { display: flex; justify-content: space-between; align-items: baseline; }
  .slider-head .lbl {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text);
    font-size: 0.95rem;
  }
  .slider-head .val {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"]:focus { outline: none; }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-moz-range-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    background: var(--sin);
    border-radius: 50%;
    margin-top: -7px;
    box-shadow: 0 0 10px var(--sin-glow);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--sin); border: none; border-radius: 50%;
    box-shadow: 0 0 10px var(--sin-glow);
  }
  input[type="range"].probe-slider::-webkit-slider-thumb { background: var(--point); box-shadow: 0 0 10px var(--point-glow); }
  input[type="range"].probe-slider::-moz-range-thumb { background: var(--point); box-shadow: 0 0 10px var(--point-glow); }
  .footer {
    padding: 0.85rem 1.6rem;
    border-top: 1px solid var(--rule);
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.84rem;
    color: var(--text-faint);
    text-align: center;
  }

  .axis { stroke: var(--axis); stroke-width: 1.4; }
  .grid-line { stroke: var(--grid); stroke-width: 1; }
  .graph-tick {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .danger-zone { fill: rgba(239, 115, 152, 0.05); }
  .danger-border { stroke: rgba(239, 115, 152, 0.35); stroke-width: 1.2; stroke-dasharray: 4 5; }
  .danger-label {
    fill: rgba(239, 115, 152, 0.6);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .target-path {
    fill: none;
    stroke: var(--cos);
    stroke-width: 2.6;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px rgba(232, 161, 59, 0.4));
  }
  .partial-path {
    fill: none;
    stroke: var(--sin);
    stroke-width: 2.4;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px var(--sin-glow));
  }
  .probe-line {
    stroke: var(--point);
    stroke-width: 1.3;
    stroke-dasharray: 4 4;
    opacity: 0.7;
  }
  .probe-dot-partial {
    fill: var(--sin);
    stroke: var(--text);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 6px var(--sin-glow));
  }
  .probe-dot-target {
    fill: var(--cos);
    stroke: var(--text);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 6px rgba(232, 161, 59, 0.45));
  }
  .panel-label {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="equation-bar">
    <span class="sum-part" id="sum-display">1 + x + x²</span> &nbsp;<span style="color:var(--text-faint)">vs</span>&nbsp; <span class="frac-part">1 / (1 − x)</span>
  </div>

  <div class="viz-wrap">
    <svg id="canvas" viewBox="0 0 1020 440" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="Partial sums of the geometric series compared with the function one over one minus x; they agree between minus one and one and disagree outside">
      <defs>
        <marker id="ax-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill="rgba(236,226,209,0.4)" />
        </marker>
        <clipPath id="plot-clip">
          <rect x="60" y="40" width="900" height="360" />
        </clipPath>
      </defs>

      <!-- danger zones |x| >= 1 -->
      <rect id="zone-left" class="danger-zone" />
      <rect id="zone-right" class="danger-zone" />
      <line id="border-left" class="danger-border" />
      <line id="border-right" class="danger-border" />
      <text id="danger-text-left" class="danger-label" text-anchor="middle">no agreement</text>
      <text id="danger-text-right" class="danger-label" text-anchor="middle">no agreement</text>

      <g id="grid"></g>
      <line id="x-axis" class="axis" marker-end="url(#ax-arrow)" />
      <line id="y-axis" class="axis" marker-end="url(#ax-arrow)" />
      <g id="ticks"></g>

      <g clip-path="url(#plot-clip)">
        <path id="target-left" class="target-path" />
        <path id="target-right" class="target-path" style="opacity:0.45" />
        <path id="partial-path" class="partial-path" />
      </g>

      <line id="probe-line" class="probe-line" />
      <circle id="probe-dot-target" class="probe-dot-target" r="5.5" />
      <circle id="probe-dot-partial" class="probe-dot-partial" r="5.5" />
    </svg>
  </div>

  <div class="readout-bar">
    <div class="readout"><span class="name">sum of first <span id="terms-count">3</span> terms at x₀</span><span class="value partial" id="partial-display">—</span></div>
    <div class="readout"><span class="name">1 / (1 − x₀)</span><span class="value target" id="target-display">—</span></div>
  </div>

  <div class="controls">
    <div class="slider-block">
      <div class="slider-head">
        <span class="lbl">number of terms</span>
        <span class="val" id="n-val">3</span>
      </div>
      <input id="n-slider" type="range" min="1" max="25" value="3" step="1">
    </div>
    <div class="slider-block">
      <div class="slider-head">
        <span class="lbl">probe point x₀</span>
        <span class="val" id="x-val">0.50</span>
      </div>
      <input id="x-slider" class="probe-slider" type="range" min="-1.4" max="1.4" value="0.5" step="0.05">
    </div>
  </div>

  <div class="footer">
    Between −1 and 1, more terms pull the green curve onto the orange one. Outside that window, no number of terms will ever help.
  </div>
</div>

<script>
(function () {
  const $ = (s) => document.querySelector(s);
  const NS = 'http://www.w3.org/2000/svg';

  // ——— Layout: x in [-1.6, 1.6], y in [-3, 6] ———
  const G = { x0: 60, x1: 960, yTop: 40, yBot: 400 };
  const XMIN = -1.6, XMAX = 1.6, YMIN = -3, YMAX = 6;

  const px = (x) => G.x0 + ((x - XMIN) / (XMAX - XMIN)) * (G.x1 - G.x0);
  const py = (y) => G.yBot - ((y - YMIN) / (YMAX - YMIN)) * (G.yBot - G.yTop);

  // ——— Static decoration ———
  // axes through origin
  const xAxis = $('#x-axis');
  xAxis.setAttribute('x1', G.x0); xAxis.setAttribute('x2', G.x1 + 25);
  xAxis.setAttribute('y1', py(0)); xAxis.setAttribute('y2', py(0));
  const yAxis = $('#y-axis');
  yAxis.setAttribute('x1', px(0)); yAxis.setAttribute('x2', px(0));
  yAxis.setAttribute('y1', G.yBot); yAxis.setAttribute('y2', G.yTop - 5);

  const grid = $('#grid');
  const ticks = $('#ticks');
  [-2, -1, 1, 2, 3, 4, 5].forEach(v => {
    const y = py(v);
    const l = document.createElementNS(NS, 'line');
    l.setAttribute('class', 'grid-line');
    l.setAttribute('x1', G.x0); l.setAttribute('x2', G.x1);
    l.setAttribute('y1', y); l.setAttribute('y2', y);
    grid.appendChild(l);
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('class', 'graph-tick');
    t.setAttribute('x', px(0) - 8); t.setAttribute('y', y + 4);
    t.setAttribute('text-anchor', 'end');
    t.textContent = v;
    ticks.appendChild(t);
  });
  [-1.5, -1, -0.5, 0.5, 1, 1.5].forEach(v => {
    const x = px(v);
    const l = document.createElementNS(NS, 'line');
    l.setAttribute('x1', x); l.setAttribute('x2', x);
    l.setAttribute('y1', py(0) - 4); l.setAttribute('y2', py(0) + 4);
    l.setAttribute('stroke', 'rgba(236, 226, 209, 0.32)');
    ticks.appendChild(l);
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('class', 'graph-tick');
    t.setAttribute('x', x); t.setAttribute('y', py(0) + 20);
    t.setAttribute('text-anchor', 'middle');
    t.textContent = v;
    ticks.appendChild(t);
  });

  // danger zones |x| >= 1
  const zl = $('#zone-left');
  zl.setAttribute('x', G.x0); zl.setAttribute('y', G.yTop);
  zl.setAttribute('width', px(-1) - G.x0); zl.setAttribute('height', G.yBot - G.yTop);
  const zr = $('#zone-right');
  zr.setAttribute('x', px(1)); zr.setAttribute('y', G.yTop);
  zr.setAttribute('width', G.x1 - px(1)); zr.setAttribute('height', G.yBot - G.yTop);
  const bl = $('#border-left');
  bl.setAttribute('x1', px(-1)); bl.setAttribute('x2', px(-1));
  bl.setAttribute('y1', G.yTop); bl.setAttribute('y2', G.yBot);
  const br = $('#border-right');
  br.setAttribute('x1', px(1)); br.setAttribute('x2', px(1));
  br.setAttribute('y1', G.yTop); br.setAttribute('y2', G.yBot);
  $('#danger-text-left').setAttribute('x', (G.x0 + px(-1)) / 2);
  $('#danger-text-left').setAttribute('y', G.yTop + 16);
  $('#danger-text-right').setAttribute('x', (px(1) + G.x1) / 2);
  $('#danger-text-right').setAttribute('y', G.yTop + 16);

  // target: 1/(1-x), drawn in two branches around the blow-up at x = 1
  function buildTarget(x0, x1, id) {
    let d = '';
    let pen = false;
    const N = 400;
    for (let i = 0; i <= N; i++) {
      const x = x0 + (i / N) * (x1 - x0);
      const y = 1 / (1 - x);
      if (y < YMIN - 3 || y > YMAX + 3) { pen = false; continue; }
      d += (pen ? ' L ' : 'M ') + px(x).toFixed(1) + ' ' + py(y).toFixed(1);
      pen = true;
    }
    $(id).setAttribute('d', d);
  }
  buildTarget(XMIN, 0.999, '#target-left');
  buildTarget(1.001, XMAX, '#target-right');

  // ——— State ———
  let terms = 3;       // number of terms in the partial sum
  let xProbe = 0.5;

  function partialSum(x, k) {
    // 1 + x + ... + x^(k-1)
    let s = 0, p = 1;
    for (let i = 0; i < k; i++) { s += p; p *= x; }
    return s;
  }

  function sumLabel(k) {
    if (k === 1) return '1';
    if (k === 2) return '1 + x';
    if (k === 3) return '1 + x + x²';
    if (k === 4) return '1 + x + x² + x³';
    return '1 + x + x² + … + x' + superscript(k - 1);
  }
  function superscript(n) {
    const map = { '0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹' };
    return String(n).split('').map(c => map[c]).join('');
  }

  function render() {
    // partial-sum curve
    let d = '';
    let pen = false;
    const N = 500;
    for (let i = 0; i <= N; i++) {
      const x = XMIN + (i / N) * (XMAX - XMIN);
      const y = partialSum(x, terms);
      if (y < YMIN - 6 || y > YMAX + 6) { pen = false; continue; }
      d += (pen ? ' L ' : 'M ') + px(x).toFixed(1) + ' ' + py(y).toFixed(1);
      pen = true;
    }
    $('#partial-path').setAttribute('d', d);

    // probe
    const pv = partialSum(xProbe, terms);
    const probeLine = $('#probe-line');
    probeLine.setAttribute('x1', px(xProbe)); probeLine.setAttribute('x2', px(xProbe));
    probeLine.setAttribute('y1', G.yTop); probeLine.setAttribute('y2', G.yBot);

    const dotP = $('#probe-dot-partial');
    if (pv >= YMIN && pv <= YMAX) {
      dotP.style.display = '';
      dotP.setAttribute('cx', px(xProbe).toFixed(1));
      dotP.setAttribute('cy', py(pv).toFixed(1));
    } else {
      dotP.style.display = 'none';
    }

    const dotT = $('#probe-dot-target');
    const tv = 1 / (1 - xProbe);
    if (Math.abs(1 - xProbe) > 1e-9 && tv >= YMIN && tv <= YMAX) {
      dotT.style.display = '';
      dotT.setAttribute('cx', px(xProbe).toFixed(1));
      dotT.setAttribute('cy', py(tv).toFixed(1));
    } else {
      dotT.style.display = 'none';
    }

    // readouts
    $('#terms-count').textContent = String(terms);
    $('#partial-display').textContent = Math.abs(pv) > 99999 ? 'enormous' : pv.toFixed(4);
    if (Math.abs(xProbe) < 1) {
      $('#target-display').textContent = tv.toFixed(4);
    } else {
      $('#target-display').textContent = 'the sum runs away';
    }
    $('#sum-display').textContent = sumLabel(terms);
    $('#n-val').textContent = String(terms);
    $('#x-val').textContent = xProbe.toFixed(2);
  }

  // ——— Wire up ———
  $('#n-slider').addEventListener('input', () => { terms = Number($('#n-slider').value); render(); });
  $('#x-slider').addEventListener('input', () => { xProbe = Number($('#x-slider').value); render(); });

  // Init
  render();
})();
</script>

</body>
</html>
