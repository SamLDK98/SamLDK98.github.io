<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compounding Towards e</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311;
    --bg-elev: #1e1a17;
    --bg-card: #221d1a;
    --text: #ece2d1;
    --text-dim: #a89c87;
    --text-faint: #6f6557;
    --rule: rgba(214, 196, 168, 0.12);
    --rule-strong: rgba(214, 196, 168, 0.22);
    --accent: #d4b888;
    --accent-glow: rgba(212, 184, 136, 0.4);
    --sin: #6dd3c4;
    --sin-glow: rgba(109, 211, 196, 0.4);
    --point: #ef7398;
    --point-glow: rgba(239, 115, 152, 0.45);
    --axis: rgba(236, 226, 209, 0.4);
    --grid: rgba(236, 226, 209, 0.045);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 1.5rem 1rem;
    background-image: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.04), transparent 55%);
  }
  .widget {
    max-width: 1080px;
    margin: 0 auto;
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .widget::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 3px);
    pointer-events: none;
  }
  .viz-wrap {
    padding: 1.3rem 1.25rem 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg#canvas {
    width: 100%;
    max-width: 1020px;
    height: auto;
    display: block;
  }
  .readout-bar {
    display: flex;
    justify-content: center;
    gap: 2.6rem;
    padding: 0.2rem 1.6rem 0.9rem;
    flex-wrap: wrap;
  }
  .readout { display: flex; align-items: baseline; gap: 0.55rem; }
  .readout .name {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.95rem;
  }
  .readout .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem;
    font-variant-numeric: tabular-nums;
  }
  .readout .value.amount { color: var(--point); }
  .readout .value.target { color: var(--accent); }
  .controls {
    padding: 1.05rem 1.6rem;
    border-top: 1px solid var(--rule);
    background: var(--bg-card);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1.2rem;
    align-items: center;
  }
  @media (max-width: 820px) {
    .controls { grid-template-columns: 1fr; gap: 0.9rem; }
  }
  .slider-block { display: flex; flex-direction: column; gap: 0.4rem; }
  .slider-head { display: flex; justify-content: space-between; align-items: baseline; }
  .slider-head .lbl {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text);
    font-size: 0.95rem;
  }
  .slider-head .val {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"]:focus { outline: none; }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-moz-range-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    background: var(--point);
    border-radius: 50%;
    margin-top: -7px;
    box-shadow: 0 0 10px var(--point-glow);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--point); border: none; border-radius: 50%;
    box-shadow: 0 0 10px var(--point-glow);
  }
  .btn-group { display: flex; gap: 0.45rem; flex-wrap: wrap; }
  .btn {
    background: rgba(0, 0, 0, 0.18);
    color: var(--text);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 0.5rem 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    min-height: 2.1rem;
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); background: rgba(212, 184, 136, 0.06); color: var(--accent); }
  .btn.active {
    border-color: var(--accent);
    background: rgba(212, 184, 136, 0.14);
    color: var(--accent);
  }
  .footer {
    padding: 0.85rem 1.6rem;
    border-top: 1px solid var(--rule);
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.84rem;
    color: var(--text-faint);
    text-align: center;
  }

  .axis { stroke: var(--axis); stroke-width: 1.4; }
  .grid-line { stroke: var(--grid); stroke-width: 1; }
  .graph-tick {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .stair-path {
    fill: none;
    stroke: var(--point);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 6px var(--point-glow));
  }
  .smooth-ghost {
    fill: none;
    stroke: var(--sin);
    stroke-width: 1.6;
    stroke-dasharray: 4 5;
    opacity: 0.55;
  }
  .e-line {
    stroke: var(--accent);
    stroke-width: 1.4;
    stroke-dasharray: 6 5;
    opacity: 0.8;
  }
  .e-label {
    fill: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .end-dot {
    fill: var(--point);
    stroke: var(--text);
    stroke-width: 2;
    filter: drop-shadow(0 0 8px var(--point-glow));
  }
  .panel-label {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .legend-text {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="viz-wrap">
    <svg id="canvas" viewBox="0 0 1020 440" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="One pound growing over a year at one hundred percent interest, paid in n instalments; the staircase approaches a smooth curve as n grows">
      <defs>
        <marker id="ax-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill="rgba(236,226,209,0.4)" />
        </marker>
      </defs>
      <text class="panel-label" x="48" y="26">£1 at 100% interest, paid in n instalments</text>
      <g id="grid"></g>
      <line class="axis" x1="60" y1="390" x2="995" y2="390" marker-end="url(#ax-arrow)" />
      <line class="axis" x1="60" y1="390" x2="60" y2="44" marker-end="url(#ax-arrow)" />
      <g id="ticks"></g>
      <text class="graph-tick" x="990" y="412" text-anchor="end">one year</text>

      <line id="e-line" class="e-line" />
      <text id="e-label" class="e-label">e = 2.71828…</text>

      <path id="smooth-ghost" class="smooth-ghost" />
      <path id="stair-path" class="stair-path" />
      <circle id="end-dot" class="end-dot" r="7" />
      <text class="legend-text" x="72" y="68" fill="rgba(109,211,196,0.8)">- - continuous growth</text>
    </svg>
  </div>

  <div class="readout-bar">
    <div class="readout"><span class="name">end-of-year amount</span><span class="value amount" id="amount-display">£2.00000</span></div>
    <div class="readout"><span class="name">gap to e</span><span class="value target" id="gap-display">0.71828</span></div>
  </div>

  <div class="controls">
    <div class="slider-block">
      <div class="slider-head">
        <span class="lbl">number of instalments n</span>
        <span class="val" id="n-val">n = 1</span>
      </div>
      <input id="n-slider" type="range" min="0" max="100" value="0" step="1">
    </div>
    <div class="btn-group" id="presets">
      <button class="btn active" data-n="1">yearly</button>
      <button class="btn" data-n="2">half-yearly</button>
      <button class="btn" data-n="4">quarterly</button>
      <button class="btn" data-n="12">monthly</button>
      <button class="btn" data-n="52">weekly</button>
      <button class="btn" data-n="365">daily</button>
    </div>
  </div>

  <div class="footer">
    Each extra instalment lets interest start earning interest sooner — but the gains shrink. The staircase is closing in on a ceiling it can never pass.
  </div>
</div>

<script>
(function () {
  const $ = (s) => document.querySelector(s);
  const NS = 'http://www.w3.org/2000/svg';

  // ——— Layout ———
  const G = { x0: 60, x1: 960, y0: 390, y1: 50 };
  const VMIN = 0.9, VMAX = 3.0;
  const E = Math.E;

  const tx = (t) => G.x0 + t * (G.x1 - G.x0);                       // t in [0,1] years
  const vy = (v) => G.y0 - ((v - VMIN) / (VMAX - VMIN)) * (G.y0 - G.y1);

  // ——— Slider mapping: 0..100 -> 1..365 (roughly exponential so small n gets room) ———
  function sliderToN(s) {
    const n = Math.round(Math.exp(Math.log(365) * (s / 100)));
    return Math.max(1, Math.min(365, n));
  }
  function nToSlider(n) {
    return Math.round(100 * Math.log(n) / Math.log(365));
  }

  // ——— Static decoration ———
  const grid = $('#grid');
  const ticks = $('#ticks');
  [1, 1.5, 2, 2.5, 3].forEach(v => {
    const y = vy(v);
    const l = document.createElementNS(NS, 'line');
    l.setAttribute('class', 'grid-line');
    l.setAttribute('x1', G.x0); l.setAttribute('x2', G.x1);
    l.setAttribute('y1', y); l.setAttribute('y2', y);
    grid.appendChild(l);
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('class', 'graph-tick');
    t.setAttribute('x', G.x0 - 8); t.setAttribute('y', y + 4);
    t.setAttribute('text-anchor', 'end');
    t.textContent = '£' + v.toFixed(1);
    ticks.appendChild(t);
  });
  // quarter ticks on the time axis
  [0.25, 0.5, 0.75, 1].forEach(t => {
    const x = tx(t);
    const l = document.createElementNS(NS, 'line');
    l.setAttribute('x1', x); l.setAttribute('x2', x);
    l.setAttribute('y1', G.y0 - 4); l.setAttribute('y2', G.y0 + 4);
    l.setAttribute('stroke', 'rgba(236, 226, 209, 0.32)');
    ticks.appendChild(l);
  });

  // e reference line
  const eLine = $('#e-line');
  eLine.setAttribute('x1', G.x0); eLine.setAttribute('x2', G.x1);
  eLine.setAttribute('y1', vy(E)); eLine.setAttribute('y2', vy(E));
  const eLabel = $('#e-label');
  eLabel.setAttribute('x', G.x1 - 4);
  eLabel.setAttribute('y', vy(E) - 8);
  eLabel.setAttribute('text-anchor', 'end');

  // smooth continuous-growth ghost: e^t
  (function buildGhost() {
    let d = '';
    const N = 200;
    for (let i = 0; i <= N; i++) {
      const t = i / N;
      d += (i === 0 ? 'M ' : ' L ') + tx(t).toFixed(1) + ' ' + vy(Math.exp(t)).toFixed(1);
    }
    $('#smooth-ghost').setAttribute('d', d);
  })();

  // ——— State ———
  let n = 1;

  function render() {
    // staircase: value jumps by factor (1 + 1/n) at each instalment
    const step = 1 / n;
    let d = 'M ' + tx(0).toFixed(1) + ' ' + vy(1).toFixed(1);
    let v = 1;
    for (let k = 1; k <= n; k++) {
      const tJump = k * step;
      d += ' L ' + tx(tJump).toFixed(1) + ' ' + vy(v).toFixed(1);   // flat until the instalment
      v = v * (1 + 1 / n);                                          // interest paid
      d += ' L ' + tx(tJump).toFixed(1) + ' ' + vy(v).toFixed(1);   // jump
    }
    $('#stair-path').setAttribute('d', d);

    const final = Math.pow(1 + 1 / n, n);
    $('#end-dot').setAttribute('cx', tx(1).toFixed(1));
    $('#end-dot').setAttribute('cy', vy(final).toFixed(1));

    $('#amount-display').textContent = '£' + final.toFixed(5);
    $('#gap-display').textContent = (E - final).toFixed(5);
    $('#n-val').textContent = 'n = ' + n;

    document.querySelectorAll('#presets .btn').forEach(b =>
      b.classList.toggle('active', Number(b.dataset.n) === n));
  }

  // ——— Wire up ———
  $('#n-slider').addEventListener('input', () => {
    n = sliderToN(Number($('#n-slider').value));
    render();
  });
  $('#presets').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    n = Number(btn.dataset.n);
    $('#n-slider').value = String(nToSlider(n));
    render();
  });

  // Init
  render();
})();
</script>

</body>
</html>
