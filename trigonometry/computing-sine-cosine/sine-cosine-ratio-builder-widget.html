<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sine and Cosine Ratio Builder</title>
<style>
  :root {
    --bg: #161311;
    --panel: #1e1a17;
    --rule: rgba(214, 196, 168, 0.14);
    --rule-strong: rgba(214, 196, 168, 0.28);
    --text: #ece2d1;
    --dim: #a89c87;
    --accent: #d4b888;
    --orange: #e8a13b;
    --teal: #6dd3c4;
    --green: #88c97c;
    --pink: #ef7398;
    --red: #ef6a5b;
    --grid: rgba(236, 226, 209, 0.08);
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: transparent;
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
  }

  body { padding: 1rem; }

  .widget {
    width: min(100%, 1060px);
    margin: 0 auto;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background:
      radial-gradient(circle at 48% 32%, rgba(232, 161, 59, 0.05), transparent 42%),
      var(--panel);
    overflow: hidden;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 1rem;
    padding: 1.15rem 1.35rem 0.95rem;
    border-bottom: 1px solid var(--rule);
  }

  h1 {
    margin: 0;
    color: var(--text);
    font-size: clamp(1.25rem, 2.4vw, 1.85rem);
    font-weight: 500;
  }

  .status {
    color: var(--orange);
    font-family: "Courier New", monospace;
    font-size: 0.82rem;
    line-height: 1.35;
    text-align: right;
  }

  .main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
  }

  .stage {
    min-height: 560px;
    padding: 1rem;
    border-right: 1px solid var(--rule);
  }

  svg {
    display: block;
    width: 100%;
    height: 560px;
    user-select: none;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 1.2rem;
    background: rgba(0, 0, 0, 0.13);
  }

  .prompt {
    margin: 0;
    color: var(--text);
    font-size: 1.05rem;
    line-height: 1.45;
  }

  .form-row {
    display: grid;
    gap: 0.45rem;
  }

  label,
  .mini-label {
    color: var(--dim);
    font-family: "Courier New", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  input,
  select {
    width: 100%;
    min-height: 2.45rem;
    border: 1px solid var(--rule-strong);
    border-radius: 3px;
    background: rgba(0, 0, 0, 0.18);
    color: var(--text);
    font: inherit;
    padding: 0.35rem 0.55rem;
  }

  button {
    min-height: 2.65rem;
    border: 1px solid var(--rule-strong);
    border-radius: 3px;
    background: rgba(0, 0, 0, 0.18);
    color: var(--text);
    font: inherit;
    cursor: pointer;
  }

  button:hover,
  button.active {
    border-color: var(--orange);
    color: var(--orange);
    background: rgba(232, 161, 59, 0.08);
  }

  button:disabled,
  input:disabled,
  select:disabled {
    opacity: 0.45;
    cursor: default;
  }

  .answer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.55rem;
  }

  .feedback {
    min-height: 2.8rem;
    padding: 0.75rem;
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: rgba(0, 0, 0, 0.14);
    color: var(--dim);
    font-family: "Courier New", monospace;
    font-size: 0.84rem;
    line-height: 1.45;
  }

  .feedback.good {
    border-color: rgba(136, 201, 124, 0.75);
    color: var(--green);
    background: rgba(136, 201, 124, 0.12);
  }

  .feedback.bad {
    border-color: rgba(239, 106, 91, 0.75);
    color: var(--red);
    background: rgba(239, 106, 91, 0.12);
  }

  .side {
    stroke-width: 6;
    stroke-linecap: round;
    cursor: pointer;
    transition: stroke-width 140ms ease, filter 140ms ease, opacity 140ms ease;
  }

  .side:hover,
  .side.selected {
    stroke-width: 8;
    filter: drop-shadow(0 0 7px rgba(232, 161, 59, 0.42));
  }

  .hyp { stroke: var(--accent); }
  .base { stroke: var(--orange); }
  .height { stroke: var(--teal); }
  .copy { opacity: 0; pointer-events: none; }
  .duplicated .copy { opacity: 1; pointer-events: auto; }
  .muted { opacity: 0.2; }
  .hidden { opacity: 0; pointer-events: none; }

  .label {
    fill: var(--text);
    font-family: "Courier New", monospace;
    font-size: 18px;
    font-weight: 700;
    pointer-events: none;
  }

  .dim-label {
    fill: var(--dim);
    font-size: 15px;
    font-weight: 400;
  }

  .angle-label { fill: var(--pink); }
  .right-box {
    fill: none;
    stroke: var(--pink);
    stroke-width: 2.5;
  }

  .construction {
    stroke: rgba(236, 226, 209, 0.26);
    stroke-width: 1.5;
    stroke-dasharray: 5 7;
  }

  @media (max-width: 820px) {
    body { padding: 0.5rem; }
    .main { grid-template-columns: 1fr; }
    .stage {
      min-height: 470px;
      border-right: 0;
      border-bottom: 1px solid var(--rule);
    }
    svg { height: 470px; }
  }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <h1>Build the 30-60-90 Ratios</h1>
    <div class="status" id="status">Step 1 of 8</div>
  </div>

  <div class="main">
    <div class="stage">
      <svg id="canvas" viewBox="0 0 800 560" aria-label="Interactive 30-60-90 triangle construction">
        <g id="triangleGroup">
          <line class="side base" data-side="base" x1="185" y1="390" x2="465" y2="390" />
          <line class="side height" data-side="height" x1="465" y1="390" x2="465" y2="140" />
          <line class="side hyp" data-side="hypotenuse" x1="185" y1="390" x2="465" y2="140" />
          <rect class="right-box" x="442" y="367" width="23" height="23" />
          <text class="label angle-label" x="203" y="370">30°</text>
          <text class="label angle-label" x="436" y="165">60°</text>
          <text class="label dim-label" id="hypLabel" x="312" y="245" text-anchor="middle">hypotenuse</text>
          <text class="label dim-label" id="baseLabel" x="325" y="422" text-anchor="middle">leg 1</text>
          <text class="label dim-label" id="heightLabel" x="492" y="270">leg 2</text>
        </g>

        <g id="copyGroup" class="copy">
          <line class="side base" data-side="copy-base" x1="465" y1="390" x2="745" y2="390" />
          <line class="side height" data-side="copy-height" x1="465" y1="390" x2="465" y2="140" />
          <line class="side hyp" data-side="copy-hypotenuse" x1="745" y1="390" x2="465" y2="140" />
          <rect class="right-box" x="465" y="367" width="23" height="23" />
          <text class="label angle-label" x="720" y="370">30°</text>
          <text class="label angle-label" x="492" y="165">60°</text>
        </g>

        <line class="construction hidden" id="splitLine" x1="465" y1="390" x2="465" y2="140" />
        <text class="label hidden" id="equilateralLabel" x="465" y="96" text-anchor="middle">equilateral triangle</text>
        <text class="label hidden" id="pythagorasLabel" x="360" y="74" text-anchor="middle">x = √3 / 2</text>
      </svg>
    </div>

    <div class="controls">
      <p class="prompt" id="prompt">Select the hypotenuse.</p>

      <div class="form-row" id="singleAnswer">
        <label for="answer">Set to equal:</label>
        <input id="answer" type="text" autocomplete="off" disabled>
        <button id="submitAnswer" type="button" disabled>Submit</button>
      </div>

      <div class="form-row hidden" id="multiAnswer">
        <div class="answer-grid">
          <div>
            <div class="mini-label">side 1</div>
            <input id="sideOne" type="text" autocomplete="off">
          </div>
          <div>
            <div class="mini-label">side 2</div>
            <input id="sideTwo" type="text" autocomplete="off">
          </div>
          <div>
            <div class="mini-label">angle 1</div>
            <input id="angleOne" type="text" autocomplete="off">
          </div>
          <div>
            <div class="mini-label">angle 2</div>
            <input id="angleTwo" type="text" autocomplete="off">
          </div>
          <div>
            <div class="mini-label">angle 3</div>
            <input id="angleThree" type="text" autocomplete="off">
          </div>
        </div>
        <button id="submitMulti" type="button">Submit lengths and angles</button>
      </div>

      <div class="form-row hidden" id="ratioAnswer">
        <label for="ratioSelect">ratio</label>
        <select id="ratioSelect">
          <option value="sine">sine</option>
          <option value="cosine">cosine</option>
        </select>
        <div class="answer-grid">
          <div>
            <div class="mini-label">numerator</div>
            <input id="numerator" type="text" autocomplete="off">
          </div>
          <div>
            <div class="mini-label">denominator</div>
            <input id="denominator" type="text" autocomplete="off">
          </div>
        </div>
        <button id="submitRatio" type="button">Check ratio</button>
      </div>

      <button id="duplicate" type="button" disabled>Duplicate triangle</button>
      <button id="pythagoras" type="button" class="hidden">Use Pythagoras Theorem to find X</button>
      <button id="reset" type="button">Reset</button>

      <div class="feedback" id="feedback">Click the long slanted side.</div>
    </div>
  </div>
</div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const sides = Array.from(document.querySelectorAll(".side"));
  const answer = $("answer");
  const submitAnswer = $("submitAnswer");
  const duplicate = $("duplicate");
  const multiAnswer = $("multiAnswer");
  const singleAnswer = $("singleAnswer");
  const ratioAnswer = $("ratioAnswer");
  const feedback = $("feedback");
  const prompt = $("prompt");
  const status = $("status");
  const pythagoras = $("pythagoras");
  const reset = $("reset");
  const labels = {
    hyp: $("hypLabel"),
    base: $("baseLabel"),
    height: $("heightLabel")
  };

  let step = 1;
  let selectedSide = null;
  let opposite = null;
  let adjacent = null;

  function normalize(value) {
    return value.trim().toLowerCase().replace(/\s+/g, "").replace("°", "");
  }

  function isOne(value) {
    return normalize(value) === "1";
  }

  function isHalf(value) {
    const v = normalize(value);
    return v === "1/2" || v === "0.5" || v === ".5";
  }

  function isSixty(value) {
    return normalize(value) === "60";
  }

  function isRootThreeOverTwo(value) {
    const v = normalize(value).replace("sqrt", "√");
    return v === "√3/2" || v === "sqrt(3)/2" || v === "0.866" || v === "0.87";
  }

  function setFeedback(text, type = "") {
    feedback.textContent = text;
    feedback.className = `feedback ${type}`.trim();
  }

  function clearSelections() {
    sides.forEach((side) => side.classList.remove("selected", "muted"));
  }

  function selectSide(sideName) {
    selectedSide = sideName;
    clearSelections();
    sides.forEach((side) => {
      if (side.dataset.side === sideName) side.classList.add("selected");
    });
  }

  function setStep(nextStep) {
    step = nextStep;
    status.textContent = `Step ${Math.min(step, 8)} of 8`;
    answer.value = "";
    singleAnswer.classList.toggle("hidden", step === 3 || step === 7 || step === 8);
    multiAnswer.classList.toggle("hidden", step !== 3);
    ratioAnswer.classList.toggle("hidden", step !== 8);
    duplicate.disabled = step !== 2;
    pythagoras.classList.toggle("hidden", step !== 6);
    answer.disabled = !(step === 1 || step === 4);
    submitAnswer.disabled = !(step === 1 || step === 4);

    if (step === 1) {
      prompt.textContent = "Select the hypotenuse.";
      setFeedback("Click the long slanted side.");
    } else if (step === 2) {
      prompt.textContent = "Duplicate the triangle.";
      setFeedback("Good. With h = 1, duplicate the triangle.");
    } else if (step === 3) {
      prompt.textContent = "Enter the two outer side lengths and the three equilateral angles.";
      setFeedback("The duplicated triangles form an equilateral triangle.");
    } else if (step === 4) {
      prompt.textContent = "What is the length of the split side?";
      document.querySelector("label[for='answer']").textContent = "split side length:";
      setFeedback("The full side is 1, split into two equal halves.");
    } else if (step === 5) {
      prompt.textContent = "The original triangle remains. Leg 2 is still unknown.";
      prepareOriginalTriangle();
      setFeedback("Now use Pythagoras to find X.");
      setStep(6);
    } else if (step === 6) {
      prompt.textContent = "Use Pythagoras Theorem to find X.";
      setFeedback("(1/2)^2 + x^2 = 1^2");
    } else if (step === 7) {
      prompt.textContent = "Select an opposite side, then an adjacent side.";
      setFeedback("Choose relative to the 30° angle.");
    } else if (step === 8) {
      prompt.textContent = "Choose sine or cosine and enter the numerator and denominator.";
      setFeedback("For the 30° angle: sine = o/h and cosine = a/h.");
    }
  }

  function prepareOriginalTriangle() {
    document.body.classList.remove("duplicated");
    $("copyGroup").classList.add("hidden");
    $("splitLine").classList.add("hidden");
    $("equilateralLabel").classList.add("hidden");
    labels.hyp.textContent = "1";
    labels.base.textContent = "1/2";
    labels.height.textContent = "X";
  }

  function showPythagorasResult() {
    labels.height.textContent = "√3 / 2";
    $("pythagorasLabel").classList.remove("hidden");
    setStep(7);
  }

  function handleSideClick(event) {
    const sideName = event.currentTarget.dataset.side;
    if (step === 1) {
      if (sideName !== "hypotenuse") {
        setFeedback("That is not the hypotenuse. Select the long slanted side.", "bad");
        return;
      }
      selectSide(sideName);
      answer.disabled = false;
      submitAnswer.disabled = false;
      setFeedback("Set the hypotenuse equal to 1.", "good");
      return;
    }

    if (step === 7) {
      if (sideName === "hypotenuse") {
        setFeedback("The hypotenuse is neither opposite nor adjacent.", "bad");
        return;
      }
      if (!opposite) {
        if (sideName !== "base") {
          setFeedback("For the 30° angle, the opposite side is the shorter leg: 1/2.", "bad");
          return;
        }
        opposite = sideName;
        selectSide(sideName);
        setFeedback("Opposite selected. Now select the adjacent side.", "good");
        return;
      }
      if (sideName === opposite) {
        setFeedback("Choose the other leg as the adjacent side.", "bad");
        return;
      }
      if (sideName !== "height") {
        setFeedback("For the 30° angle, the adjacent side is the √3/2 leg.", "bad");
        return;
      }
      adjacent = sideName;
      clearSelections();
      sides.forEach((side) => {
        if (side.dataset.side === opposite || side.dataset.side === adjacent) side.classList.add("selected");
      });
      setStep(8);
    }
  }

  function checkSingleAnswer() {
    if (step === 1) {
      if (isOne(answer.value)) {
        labels.hyp.textContent = "1";
        setStep(2);
      } else {
        setFeedback("Enter 1.", "bad");
      }
      return;
    }
    if (step === 4) {
      if (isHalf(answer.value)) {
        setStep(5);
      } else {
        setFeedback("The split side is 1/2.", "bad");
      }
    }
  }

  function checkMultiAnswer() {
    const validSides = isOne($("sideOne").value) && isOne($("sideTwo").value);
    const validAngles = isSixty($("angleOne").value) && isSixty($("angleTwo").value) && isSixty($("angleThree").value);
    if (validSides && validAngles) {
      setStep(4);
      return;
    }
    setFeedback("Both outer side lengths must be 1, and all three angles must be 60.", "bad");
  }

  function checkRatio() {
    const ratio = $("ratioSelect").value;
    const numerator = $("numerator").value;
    const denominator = $("denominator").value;
    const sideMap = {
      base: "1/2",
      height: "√3/2"
    };
    const expectedNumerator = ratio === "sine" ? sideMap[opposite] : sideMap[adjacent];
    const numeratorOk = expectedNumerator === "1/2" ? isHalf(numerator) : isRootThreeOverTwo(numerator);
    const denominatorOk = isOne(denominator);
    if (numeratorOk && denominatorOk) {
      const result = ratio === "sine" ? "sine = 0.5" : "cosine = √3 / 2";
      setFeedback(`Correct. ${result}.`, "good");
      status.textContent = "complete";
      return;
    }
    setFeedback("Check the ratio. The denominator should be the hypotenuse: 1.", "bad");
  }

  duplicate.addEventListener("click", () => {
    document.body.classList.add("duplicated");
    $("copyGroup").classList.remove("hidden");
    $("splitLine").classList.remove("hidden");
    $("equilateralLabel").classList.remove("hidden");
    setStep(3);
  });

  pythagoras.addEventListener("click", showPythagorasResult);
  submitAnswer.addEventListener("click", checkSingleAnswer);
  $("submitMulti").addEventListener("click", checkMultiAnswer);
  $("submitRatio").addEventListener("click", checkRatio);
  sides.forEach((side) => side.addEventListener("click", handleSideClick));
  reset.addEventListener("click", () => {
    step = 1;
    selectedSide = null;
    opposite = null;
    adjacent = null;
    clearSelections();
    document.body.classList.remove("duplicated");
    $("copyGroup").classList.remove("hidden");
    $("copyGroup").classList.add("copy");
    $("splitLine").classList.add("hidden");
    $("equilateralLabel").classList.add("hidden");
    $("pythagorasLabel").classList.add("hidden");
    labels.hyp.textContent = "hypotenuse";
    labels.base.textContent = "leg 1";
    labels.height.textContent = "leg 2";
    ["sideOne", "sideTwo", "angleOne", "angleTwo", "angleThree", "numerator", "denominator"].forEach((id) => $(id).value = "");
    document.querySelector("label[for='answer']").textContent = "Set to equal:";
    setStep(1);
  });

  setStep(1);
})();
</script>
</body>
</html>
