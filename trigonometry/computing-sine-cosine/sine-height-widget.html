<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sine as Height</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311;
    --panel: #1e1a17;
    --rule: rgba(214, 196, 168, 0.16);
    --rule-strong: rgba(214, 196, 168, 0.28);
    --text: #ece2d1;
    --dim: #a89c87;
    --faint: #6f6557;
    --accent: #e8a13b;
    --cyan: #6dd3c4;
    --pink: #ef7398;
    --green: #88c97c;
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: transparent;
    color: var(--text);
    font-family: "EB Garamond", Georgia, serif;
  }

  body {
    padding: 0;
  }

  .widget {
    width: min(100%, 860px);
    margin: 0 auto;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background:
      radial-gradient(ellipse at top left, rgba(232, 161, 59, 0.06), transparent 55%),
      linear-gradient(180deg, rgba(34, 29, 25, 0.98), rgba(25, 22, 19, 0.99));
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.15rem 1.25rem 0.95rem;
    border-bottom: 1px solid var(--rule);
  }

  h1 {
    margin: 0;
    color: var(--text);
    font-family: "Fraunces", Georgia, serif;
    font-size: clamp(1.25rem, 3vw, 1.85rem);
    font-weight: 400;
    line-height: 1.05;
  }

  .readout {
    min-width: 10rem;
    color: var(--cyan);
    font-family: "JetBrains Mono", Consolas, monospace;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    text-align: right;
    white-space: nowrap;
  }

  .readout strong {
    color: var(--text);
    font-weight: 500;
  }

  .stage {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 13rem;
    gap: 1rem;
    align-items: center;
    padding: 1.1rem 1.25rem 1.25rem;
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
    min-height: 340px;
  }

  .axis,
  .grid-line {
    stroke: rgba(236, 226, 209, 0.2);
    stroke-width: 1.2;
  }

  .axis {
    stroke: rgba(236, 226, 209, 0.48);
    stroke-width: 1.8;
  }

  .ray {
    stroke: var(--accent);
    stroke-width: 4.8;
    stroke-linecap: round;
    filter: drop-shadow(0 0 8px rgba(232, 161, 59, 0.35));
  }

  .projection {
    stroke: var(--cyan);
    stroke-width: 6;
    stroke-linecap: round;
    filter: drop-shadow(0 0 9px rgba(109, 211, 196, 0.34));
  }

  .guide {
    stroke: rgba(109, 211, 196, 0.36);
    stroke-width: 1.4;
    stroke-dasharray: 4 6;
  }

  .vertical-reference {
    stroke: rgba(236, 226, 209, 0.62);
    stroke-width: 3;
    stroke-dasharray: 6 7;
  }

  .arc {
    fill: none;
    stroke: var(--pink);
    stroke-width: 3;
    stroke-linecap: round;
  }

  .point {
    fill: var(--pink);
    filter: drop-shadow(0 0 7px rgba(239, 115, 152, 0.55));
  }

  .origin {
    fill: var(--text);
  }

  .label {
    fill: var(--dim);
    font-family: "JetBrains Mono", Consolas, monospace;
    font-size: 13px;
  }

  .angle-label {
    fill: var(--pink);
    font-family: "JetBrains Mono", Consolas, monospace;
    font-size: 14px;
  }

  .height-label {
    fill: var(--cyan);
    font-family: "JetBrains Mono", Consolas, monospace;
    font-size: 15px;
  }

  .controls {
    display: grid;
    gap: 0.85rem;
    padding: 0.95rem;
    border: 1px solid var(--rule);
    background: rgba(0, 0, 0, 0.14);
  }

  .control-label {
    display: flex;
    justify-content: space-between;
    gap: 0.75rem;
    color: var(--dim);
    font-family: "JetBrains Mono", Consolas, monospace;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .angle-value {
    color: var(--accent);
    letter-spacing: 0;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  .note {
    margin: 0;
    color: var(--dim);
    font-size: 0.95rem;
    line-height: 1.45;
  }

  @media (max-width: 720px) {
    .header,
    .stage {
      grid-template-columns: 1fr;
    }

    .header {
      display: grid;
    }

    .readout {
      text-align: left;
    }

    .stage {
      padding: 0.95rem;
    }
  }
</style>
</head>
<body>
  <section class="widget" aria-label="Interactive sine height widget">
    <div class="header">
      <h1>Sine as height</h1>
      <div class="readout"><strong>Height</strong> = sin(<span id="thetaReadout">90</span>°) = <span id="heightReadout">1</span></div>
    </div>

    <div class="stage">
      <svg viewBox="0 0 560 380" role="img" aria-labelledby="title desc">
        <title id="title">A unit line rotating from zero to ninety degrees</title>
        <desc id="desc">The vertical projection onto the y-axis updates as the unit line rotates.</desc>

        <line class="grid-line" x1="105" y1="330" x2="105" y2="58"></line>
        <line class="axis" x1="70" y1="330" x2="500" y2="330"></line>
        <line class="axis" x1="105" y1="350" x2="105" y2="50"></line>

        <path id="angleArc" class="arc"></path>
        <line class="vertical-reference" x1="105" y1="330" x2="105" y2="85"></line>
        <line id="projection" class="projection" x1="105" y1="330" x2="105" y2="0"></line>
        <line id="guide" class="guide" x1="0" y1="0" x2="0" y2="0"></line>
        <line id="ray" class="ray" x1="105" y1="330" x2="0" y2="0"></line>
        <circle id="point" class="point" cx="0" cy="0" r="6"></circle>
        <circle class="origin" cx="105" cy="330" r="4"></circle>

        <text class="label" x="494" y="350">x</text>
        <text class="label" x="82" y="58">y</text>
        <text class="label" x="81" y="286">1</text>
        <text id="heightLabel" class="height-label" x="118" y="0">height</text>
        <text id="angleLabel" class="angle-label" x="154" y="308">45°</text>
      </svg>

      <div class="controls">
        <label class="control-label" for="angleSlider">
          <span>Angle</span>
          <span class="angle-value"><span id="angleValue">90</span>°</span>
        </label>
        <input id="angleSlider" type="range" min="0" max="90" step="1" value="90" />
      </div>
    </div>
  </section>

  <script>
    const slider = document.getElementById('angleSlider');
    const angleValue = document.getElementById('angleValue');
    const thetaReadout = document.getElementById('thetaReadout');
    const heightReadout = document.getElementById('heightReadout');
    const ray = document.getElementById('ray');
    const guide = document.getElementById('guide');
    const point = document.getElementById('point');
    const projection = document.getElementById('projection');
    const angleArc = document.getElementById('angleArc');
    const angleLabel = document.getElementById('angleLabel');
    const heightLabel = document.getElementById('heightLabel');

    const origin = { x: 105, y: 330 };
    const radius = 245;

    function polarPoint(thetaDeg, r = radius) {
      const theta = thetaDeg * Math.PI / 180;
      return {
        x: origin.x + Math.cos(theta) * r,
        y: origin.y - Math.sin(theta) * r
      };
    }

    function arcPath(thetaDeg) {
      const arcRadius = 58;
      const end = polarPoint(thetaDeg, arcRadius);
      const largeArc = thetaDeg > 180 ? 1 : 0;
      return `M ${origin.x + arcRadius} ${origin.y} A ${arcRadius} ${arcRadius} 0 ${largeArc} 0 ${end.x} ${end.y}`;
    }

    function formatHeight(value) {
      if (Math.abs(value) < 0.0005) return '0';
      if (Math.abs(value - 1) < 0.0005) return '1';
      return value.toFixed(3);
    }

    function update() {
      const thetaDeg = Number(slider.value);
      const theta = thetaDeg * Math.PI / 180;
      const height = Math.sin(theta);
      const end = polarPoint(thetaDeg);
      const yProjection = origin.y - height * radius;

      ray.setAttribute('x2', end.x);
      ray.setAttribute('y2', end.y);
      guide.setAttribute('x1', origin.x);
      guide.setAttribute('y1', yProjection);
      guide.setAttribute('x2', end.x);
      guide.setAttribute('y2', end.y);
      projection.setAttribute('y1', origin.y);
      projection.setAttribute('y2', yProjection);
      point.setAttribute('cx', end.x);
      point.setAttribute('cy', end.y);
      angleArc.setAttribute('d', arcPath(thetaDeg));
      angleLabel.textContent = `${thetaDeg}°`;
      angleLabel.setAttribute('x', origin.x + 70);
      angleLabel.setAttribute('y', origin.y - Math.max(18, Math.sin(theta / 2) * 56));
      heightLabel.textContent = `sin(${thetaDeg}°) = ${formatHeight(height)}`;
      heightLabel.setAttribute('y', Math.max(64, yProjection - 10));

      angleValue.textContent = thetaDeg;
      thetaReadout.textContent = thetaDeg;
      heightReadout.textContent = formatHeight(height);
    }

    slider.addEventListener('input', update);
    update();
  </script>
</body>
</html>
