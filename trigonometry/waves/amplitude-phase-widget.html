<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplitude and Phase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311;
    --bg-elev: #1e1a17;
    --bg-card: #221d1a;
    --text: #ece2d1;
    --text-dim: #a89c87;
    --text-faint: #6f6557;
    --rule: rgba(214, 196, 168, 0.12);
    --rule-strong: rgba(214, 196, 168, 0.22);
    --accent: #d4b888;
    --accent-glow: rgba(212, 184, 136, 0.4);
    --sin: #6dd3c4;
    --sin-glow: rgba(109, 211, 196, 0.4);
    --cos: #e8a13b;
    --point: #ef7398;
    --point-glow: rgba(239, 115, 152, 0.45);
    --axis: rgba(236, 226, 209, 0.4);
    --circle: rgba(236, 226, 209, 0.68);
    --grid: rgba(236, 226, 209, 0.045);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 1.5rem 1rem;
    background-image: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.04), transparent 55%);
  }
  .widget {
    max-width: 1180px;
    margin: 0 auto;
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .widget::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 3px);
    pointer-events: none;
  }
  .equation-bar {
    padding: 0.95rem 1.6rem 0.75rem;
    border-bottom: 1px solid var(--rule);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.04rem;
    color: var(--text-dim);
  }
  .equation-bar .amp-part { color: var(--point); }
  .equation-bar .phase-part { color: var(--cos); }
  .viz-wrap {
    padding: 1.3rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg#canvas {
    width: 100%;
    max-width: 1100px;
    height: auto;
    display: block;
  }
  .controls {
    padding: 1.1rem 1.6rem;
    border-top: 1px solid var(--rule);
    background: var(--bg-card);
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 1.4rem;
    align-items: center;
  }
  @media (max-width: 820px) {
    .controls { grid-template-columns: 1fr; gap: 0.9rem; }
  }
  .slider-block { display: flex; flex-direction: column; gap: 0.4rem; }
  .slider-head { display: flex; justify-content: space-between; align-items: baseline; }
  .slider-head .lbl {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text);
    font-size: 0.95rem;
  }
  .slider-head .val {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"]:focus { outline: none; }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-moz-range-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    background: var(--point);
    border-radius: 50%;
    margin-top: -7px;
    box-shadow: 0 0 10px var(--point-glow);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--point); border: none; border-radius: 50%;
    box-shadow: 0 0 10px var(--point-glow);
  }
  input[type="range"].phase-slider::-webkit-slider-thumb { background: var(--cos); box-shadow: 0 0 10px rgba(232,161,59,0.4); }
  input[type="range"].phase-slider::-moz-range-thumb { background: var(--cos); box-shadow: 0 0 10px rgba(232,161,59,0.4); }
  .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .btn {
    background: rgba(0, 0, 0, 0.18);
    color: var(--text);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 0.55rem 0.95rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.92rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    min-height: 2.2rem;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); background: rgba(212, 184, 136, 0.06); color: var(--accent); }
  .footer {
    padding: 0.85rem 1.6rem;
    border-top: 1px solid var(--rule);
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.84rem;
    color: var(--text-faint);
    text-align: center;
  }

  /* SVG styling */
  .axis { stroke: var(--axis); stroke-width: 1.4; }
  .grid-line { stroke: var(--grid); stroke-width: 1; }
  .circle-outline {
    stroke: var(--point);
    stroke-width: 2.4;
    fill: rgba(239, 115, 152, 0.03);
    filter: drop-shadow(0 0 6px rgba(239, 115, 152, 0.18));
  }
  .unit-circle-ghost {
    stroke: rgba(236, 226, 209, 0.28);
    stroke-width: 1.2;
    stroke-dasharray: 3 5;
    fill: none;
  }
  .graph-tick {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .radius {
    stroke: var(--accent);
    stroke-width: 2.5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 5px var(--accent-glow));
  }
  .start-pt {
    fill: var(--cos);
    stroke: var(--text);
    stroke-width: 1.8;
    filter: drop-shadow(0 0 8px rgba(232, 161, 59, 0.45));
  }
  .phase-arc {
    stroke: var(--cos);
    stroke-width: 2;
    fill: none;
    opacity: 0.85;
  }
  .main-trace {
    fill: none;
    stroke: var(--sin);
    stroke-width: 2.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 6px var(--sin-glow));
  }
  .ref-trace {
    fill: none;
    stroke: rgba(236, 226, 209, 0.30);
    stroke-width: 1.4;
    stroke-dasharray: 4 5;
  }
  .start-marker-wave {
    fill: var(--cos);
    stroke: var(--text);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 6px rgba(232, 161, 59, 0.45));
  }
  .amp-guide {
    stroke: var(--point);
    stroke-width: 1.4;
    stroke-dasharray: 4 4;
    opacity: 0.7;
  }
  .amp-label {
    fill: var(--point);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .panel-label {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .legend-text {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="equation-bar">
    x(t) = <span class="amp-part" id="eq-amp">1.00</span> · sin(2πt + <span class="phase-part" id="eq-phase">0</span>)
  </div>

  <div class="viz-wrap">
    <svg id="canvas" viewBox="0 0 1100 440" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="A circle whose radius sets the amplitude and whose starting angle sets the phase, beside the resulting wave compared against a plain sine wave">
      <defs>
        <marker id="ax-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill="rgba(236,226,209,0.4)" />
        </marker>
        <marker id="phase-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill="#e8a13b" />
        </marker>
      </defs>

      <!-- ——— LEFT: the circle ——— -->
      <text class="panel-label" x="40" y="30">The circle being traced</text>
      <line class="axis" x1="50"  y1="230" x2="380" y2="230" marker-end="url(#ax-arrow)" />
      <line class="axis" x1="210" y1="400" x2="210" y2="68"  marker-end="url(#ax-arrow)" />
      <circle class="unit-circle-ghost" cx="210" cy="230" r="140" />
      <text class="graph-tick" x="356" y="222">1</text>
      <circle id="amp-circle" class="circle-outline" cx="210" cy="230" r="140" />
      <path id="phase-arc" class="phase-arc" marker-end="url(#phase-arrow)" />
      <line id="radius" class="radius" x1="210" y1="230" x2="350" y2="230" />
      <circle id="start-pt" class="start-pt" r="8" cx="350" cy="230" />
      <text class="legend-text" x="40" y="416" fill="#e8a13b">⬤ starting point at t = 0, angle φ</text>

      <!-- ——— SEPARATOR ——— -->
      <line x1="425" y1="60" x2="425" y2="405" stroke="rgba(214, 196, 168, 0.08)" stroke-width="1" />

      <!-- ——— RIGHT: the wave ——— -->
      <text class="panel-label" x="460" y="30">The resulting wave (f = 1 Hz)</text>
      <g id="wave-grid"></g>
      <line class="axis" x1="450" y1="230" x2="1085" y2="230" marker-end="url(#ax-arrow)" />
      <line class="axis" x1="460" y1="400" x2="460" y2="68"  marker-end="url(#ax-arrow)" />
      <text class="graph-tick" x="455" y="82"  text-anchor="end">1</text>
      <text class="graph-tick" x="455" y="234" text-anchor="end">0</text>
      <text class="graph-tick" x="455" y="394" text-anchor="end">−1</text>
      <g id="time-ticks"></g>

      <line id="amp-guide-top" class="amp-guide" />
      <text id="amp-guide-label" class="amp-label">A</text>

      <path id="ref-trace" class="ref-trace" />
      <path id="main-trace" class="main-trace" />
      <circle id="start-marker-wave" class="start-marker-wave" r="6" />
      <text class="legend-text" x="460" y="416" fill="rgba(236,226,209,0.45)">- - plain sin(2πt) for comparison</text>
    </svg>
  </div>

  <div class="controls">
    <div class="slider-block">
      <div class="slider-head">
        <span class="lbl">amplitude A</span>
        <span class="val" id="amp-val">1.00</span>
      </div>
      <input id="amp" type="range" min="0.2" max="1.4" value="1" step="0.05">
    </div>
    <div class="slider-block">
      <div class="slider-head">
        <span class="lbl">phase φ (starting angle)</span>
        <span class="val" id="phase-val">0° · 0</span>
      </div>
      <input id="phase" class="phase-slider" type="range" min="0" max="360" value="0" step="5">
    </div>
    <div class="btn-group">
      <button class="btn" id="preset-cos">φ = 90° (cosine)</button>
      <button class="btn" id="reset">Reset</button>
    </div>
  </div>

  <div class="footer">
    Amplitude scales the circle. Phase rotates the starting point. The wave's shape never changes — only its size and where in the cycle it begins.
  </div>
</div>

<script>
(function () {
  const $ = (s) => document.querySelector(s);
  const NS = 'http://www.w3.org/2000/svg';

  // ——— Layout ———
  const CIRC = { cx: 210, cy: 230, rUnit: 140 };
  const WAVE = { x0: 460, width: 600, yMid: 230, amp: 145, seconds: 2 };

  const tx = (t) => WAVE.x0 + (t / WAVE.seconds) * WAVE.width;
  const vy = (v) => WAVE.yMid - v * WAVE.amp;

  // ——— Static gridlines + time ticks ———
  const wGrid = $('#wave-grid');
  [-1, -0.5, 0.5, 1].forEach(v => {
    const l = document.createElementNS(NS, 'line');
    l.setAttribute('class', 'grid-line');
    l.setAttribute('x1', WAVE.x0); l.setAttribute('x2', WAVE.x0 + WAVE.width);
    l.setAttribute('y1', vy(v)); l.setAttribute('y2', vy(v));
    wGrid.appendChild(l);
  });
  const tGroup = $('#time-ticks');
  for (let s = 0.5; s <= WAVE.seconds; s += 0.5) {
    const x = tx(s);
    const tick = document.createElementNS(NS, 'line');
    tick.setAttribute('x1', x); tick.setAttribute('x2', x);
    tick.setAttribute('y1', WAVE.yMid - 4); tick.setAttribute('y2', WAVE.yMid + 4);
    tick.setAttribute('stroke', 'rgba(236, 226, 209, 0.32)');
    tGroup.appendChild(tick);
    const txt = document.createElementNS(NS, 'text');
    txt.setAttribute('class', 'graph-tick');
    txt.setAttribute('x', x);
    txt.setAttribute('y', WAVE.yMid + 22);
    txt.setAttribute('text-anchor', 'middle');
    txt.textContent = (s % 1 === 0 ? s.toFixed(0) : s.toFixed(1)) + 's';
    tGroup.appendChild(txt);
  }

  // Reference trace: plain sin(2πt)
  (function buildRef() {
    let d = '';
    const N = 400;
    for (let i = 0; i <= N; i++) {
      const t = (i / N) * WAVE.seconds;
      d += (i === 0 ? 'M ' : ' L ') + tx(t).toFixed(1) + ' ' + vy(Math.sin(2 * Math.PI * t)).toFixed(1);
    }
    $('#ref-trace').setAttribute('d', d);
  })();

  // ——— State ———
  let A = 1;
  let phiDeg = 0;

  function fmtPhase(deg) {
    const fracs = {
      0: '0', 30: 'π/6', 45: 'π/4', 60: 'π/3', 90: 'π/2', 120: '2π/3',
      135: '3π/4', 150: '5π/6', 180: 'π', 210: '7π/6', 225: '5π/4',
      240: '4π/3', 270: '3π/2', 300: '5π/3', 315: '7π/4', 330: '11π/6', 360: '2π'
    };
    return fracs[deg] !== undefined ? fracs[deg] : (deg / 180).toFixed(2) + 'π';
  }

  function render() {
    const phi = phiDeg * Math.PI / 180;
    const r = A * CIRC.rUnit;

    // — Circle panel —
    $('#amp-circle').setAttribute('r', r.toFixed(1));
    const sx = CIRC.cx + r * Math.cos(phi);
    const sy = CIRC.cy - r * Math.sin(phi);
    $('#radius').setAttribute('x2', sx.toFixed(1));
    $('#radius').setAttribute('y2', sy.toFixed(1));
    $('#start-pt').setAttribute('cx', sx.toFixed(1));
    $('#start-pt').setAttribute('cy', sy.toFixed(1));

    // Phase arc from angle 0 to phi at a small radius
    const arc = $('#phase-arc');
    if (phiDeg > 6) {
      const aR = Math.min(54, r * 0.45);
      const ax = CIRC.cx + aR, ay = CIRC.cy;
      const ex = CIRC.cx + aR * Math.cos(phi);
      const ey = CIRC.cy - aR * Math.sin(phi);
      const large = phiDeg > 180 ? 1 : 0;
      arc.setAttribute('d', `M ${ax} ${ay} A ${aR} ${aR} 0 ${large} 0 ${ex.toFixed(1)} ${ey.toFixed(1)}`);
      arc.style.display = '';
    } else {
      arc.style.display = 'none';
    }

    // — Wave panel —
    const fn = (t) => A * Math.sin(2 * Math.PI * t + phi);
    let d = '';
    const N = 400;
    for (let i = 0; i <= N; i++) {
      const t = (i / N) * WAVE.seconds;
      d += (i === 0 ? 'M ' : ' L ') + tx(t).toFixed(1) + ' ' + vy(fn(t)).toFixed(1);
    }
    $('#main-trace').setAttribute('d', d);

    // Starting value marker at t = 0
    $('#start-marker-wave').setAttribute('cx', tx(0).toFixed(1));
    $('#start-marker-wave').setAttribute('cy', vy(fn(0)).toFixed(1));

    // Amplitude guide line at +A
    const g = $('#amp-guide-top');
    g.setAttribute('x1', WAVE.x0); g.setAttribute('x2', WAVE.x0 + WAVE.width);
    g.setAttribute('y1', vy(A)); g.setAttribute('y2', vy(A));
    const gl = $('#amp-guide-label');
    gl.setAttribute('x', WAVE.x0 + WAVE.width - 4);
    gl.setAttribute('y', vy(A) - 7);
    gl.setAttribute('text-anchor', 'end');
    gl.textContent = 'A = ' + A.toFixed(2);

    // — Readouts —
    $('#eq-amp').textContent = A.toFixed(2);
    $('#eq-phase').textContent = fmtPhase(phiDeg);
    $('#amp-val').textContent = A.toFixed(2);
    $('#phase-val').textContent = `${phiDeg}° · ${fmtPhase(phiDeg)}`;
  }

  // ——— Wire up ———
  $('#amp').addEventListener('input', () => { A = Number($('#amp').value); render(); });
  $('#phase').addEventListener('input', () => { phiDeg = Number($('#phase').value); render(); });
  $('#preset-cos').addEventListener('click', () => {
    phiDeg = 90; A = 1;
    $('#phase').value = '90'; $('#amp').value = '1';
    render();
  });
  $('#reset').addEventListener('click', () => {
    phiDeg = 0; A = 1;
    $('#phase').value = '0'; $('#amp').value = '1';
    render();
  });

  // Init
  render();
})();
</script>

</body>
</html>
