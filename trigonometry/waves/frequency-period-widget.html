<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequency and Period</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311;
    --bg-elev: #1e1a17;
    --bg-card: #221d1a;
    --text: #ece2d1;
    --text-dim: #a89c87;
    --text-faint: #6f6557;
    --rule: rgba(214, 196, 168, 0.12);
    --rule-strong: rgba(214, 196, 168, 0.22);
    --accent: #d4b888;
    --accent-glow: rgba(212, 184, 136, 0.4);
    --sin: #6dd3c4;
    --sin-glow: rgba(109, 211, 196, 0.4);
    --point: #ef7398;
    --point-glow: rgba(239, 115, 152, 0.45);
    --axis: rgba(236, 226, 209, 0.4);
    --circle: rgba(236, 226, 209, 0.68);
    --grid: rgba(236, 226, 209, 0.045);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 1.5rem 1rem;
    background-image: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.04), transparent 55%);
  }
  .widget {
    max-width: 1180px;
    margin: 0 auto;
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .widget::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 3px);
    pointer-events: none;
  }
  .viz-wrap {
    padding: 1.4rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg#canvas {
    width: 100%;
    max-width: 1100px;
    height: auto;
    display: block;
  }
  .readout-bar {
    display: flex;
    justify-content: center;
    gap: 2.4rem;
    padding: 0 1.6rem 1rem;
    flex-wrap: wrap;
  }
  .readout {
    display: flex;
    align-items: baseline;
    gap: 0.55rem;
  }
  .readout .name {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text-dim);
    font-size: 0.95rem;
  }
  .readout .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem;
    font-variant-numeric: tabular-nums;
  }
  .readout .value.freq { color: var(--point); }
  .readout .value.period { color: var(--sin); }
  .readout .value.cycles { color: var(--accent); }
  .controls {
    padding: 1.1rem 1.6rem;
    border-top: 1px solid var(--rule);
    background: var(--bg-card);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    align-items: center;
  }
  @media (max-width: 760px) {
    .controls { grid-template-columns: 1fr; }
  }
  .slider-block { display: flex; flex-direction: column; gap: 0.4rem; }
  .slider-head { display: flex; justify-content: space-between; align-items: baseline; }
  .slider-head .lbl {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text);
    font-size: 0.95rem;
  }
  .slider-head .val {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"]:focus { outline: none; }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-moz-range-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    background: var(--point);
    border-radius: 50%;
    margin-top: -7px;
    box-shadow: 0 0 10px var(--point-glow);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--point); border: none; border-radius: 50%;
    box-shadow: 0 0 10px var(--point-glow);
  }
  .btn-group { display: flex; gap: 0.5rem; }
  .btn {
    background: rgba(0, 0, 0, 0.18);
    color: var(--text);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 0.55rem 0.95rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.92rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    min-height: 2.2rem;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); background: rgba(212, 184, 136, 0.06); color: var(--accent); }
  .footer {
    padding: 0.85rem 1.6rem;
    border-top: 1px solid var(--rule);
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.84rem;
    color: var(--text-faint);
    text-align: center;
  }

  /* SVG styling */
  .axis { stroke: var(--axis); stroke-width: 1.4; }
  .grid-line { stroke: var(--grid); stroke-width: 1; }
  .circle-outline { stroke: var(--circle); stroke-width: 2.4; fill: rgba(0, 0, 0, 0.06); }
  .graph-tick {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .radius {
    stroke: var(--accent);
    stroke-width: 2.5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 5px var(--accent-glow));
  }
  .pt-circle {
    fill: var(--point);
    stroke: var(--text);
    stroke-width: 2;
    filter: drop-shadow(0 0 8px var(--point-glow));
  }
  .sin-trace {
    fill: none;
    stroke: var(--sin);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 6px var(--sin-glow));
  }
  .trace-ghost {
    fill: none;
    stroke: var(--sin);
    stroke-width: 1.2;
    opacity: 0.18;
    stroke-dasharray: 2 4;
  }
  .pt-marker {
    fill: var(--sin);
    stroke: var(--text);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 6px var(--sin-glow));
  }
  .connector {
    stroke: var(--sin);
    stroke-width: 1.6;
    stroke-dasharray: 5 5;
    stroke-linecap: round;
    opacity: 0.6;
  }
  .panel-label {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .period-bracket {
    stroke: var(--sin);
    stroke-width: 1.6;
    fill: none;
    opacity: 0.9;
  }
  .period-label {
    fill: var(--sin);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
  }
  .start-marker {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="viz-wrap">
    <svg id="canvas" viewBox="0 0 1100 470" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="A circle spinning at f revolutions per second beside a graph of sine of two pi f t against time in seconds, with the period marked">
      <defs>
        <marker id="ax-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill="rgba(236,226,209,0.4)" />
        </marker>
      </defs>

      <!-- ——— LEFT: spinning circle ——— -->
      <text class="panel-label" x="40" y="30">f revolutions per second</text>
      <line class="axis" x1="50"  y1="245" x2="380" y2="245" marker-end="url(#ax-arrow)" />
      <line class="axis" x1="210" y1="415" x2="210" y2="80"  marker-end="url(#ax-arrow)" />
      <circle class="circle-outline" cx="210" cy="245" r="145" />
      <line id="radius" class="radius" x1="210" y1="245" x2="355" y2="245" />
      <circle id="circle-pt" class="pt-circle" r="8" cx="355" cy="245" />

      <!-- ——— SEPARATOR ——— -->
      <line x1="425" y1="70" x2="425" y2="420" stroke="rgba(214, 196, 168, 0.08)" stroke-width="1" />

      <!-- ——— RIGHT: the wave against time ——— -->
      <text class="panel-label" x="460" y="30">x(t) = sin(2πft) against time in seconds</text>
      <g id="wave-grid"></g>
      <line class="axis" x1="450" y1="245" x2="1085" y2="245" marker-end="url(#ax-arrow)" />
      <line class="axis" x1="460" y1="415" x2="460" y2="80"  marker-end="url(#ax-arrow)" />
      <text class="graph-tick" x="455" y="94"  text-anchor="end">1</text>
      <text class="graph-tick" x="455" y="249" text-anchor="end">0</text>
      <text class="graph-tick" x="455" y="408" text-anchor="end">−1</text>
      <g id="time-ticks"></g>

      <!-- period bracket -->
      <g id="period-group">
        <path id="period-bracket" class="period-bracket" />
        <text id="period-label" class="period-label" text-anchor="middle">T</text>
      </g>

      <line id="connector" class="connector" />
      <path id="sin-ghost" class="trace-ghost" />
      <path id="sin-trace" class="sin-trace" />
      <line id="vline" class="connector" style="opacity:0.35" />
      <circle id="wave-pt" class="pt-marker" r="5.5" />
    </svg>
  </div>

  <div class="readout-bar">
    <div class="readout"><span class="name">frequency</span><span class="value freq" id="f-display">1.0 Hz</span></div>
    <div class="readout"><span class="name">period</span><span class="value period" id="T-display">T = 1.00 s</span></div>
    <div class="readout"><span class="name">full cycles completed</span><span class="value cycles" id="cycle-display">0</span></div>
  </div>

  <div class="controls">
    <div class="slider-block">
      <div class="slider-head">
        <span class="lbl">frequency f (revolutions per second)</span>
        <span class="val" id="f-val">1.0 Hz</span>
      </div>
      <input id="freq" type="range" min="0.5" max="3" value="1" step="0.25">
    </div>
    <div class="btn-group">
      <button class="btn" id="play"><span id="play-icon">▶</span> <span id="play-label">Play</span></button>
      <button class="btn" id="reset">Reset</button>
    </div>
  </div>

  <div class="footer">
    Raise the frequency and watch the period shrink: more cycles per second means less time per cycle.
  </div>
</div>

<script>
(function () {
  const $ = (s) => document.querySelector(s);
  const NS = 'http://www.w3.org/2000/svg';

  // ——— Layout ———
  const CIRC = { cx: 210, cy: 245, r: 145 };
  const WAVE = { x0: 460, width: 600, yMid: 245, amp: 150, seconds: 3 };

  const tx = (t) => WAVE.x0 + (t / WAVE.seconds) * WAVE.width;
  const vy = (v) => WAVE.yMid - v * WAVE.amp;

  // ——— Static: gridlines and time ticks ———
  const wGrid = $('#wave-grid');
  [-1, -0.5, 0.5, 1].forEach(v => {
    const l = document.createElementNS(NS, 'line');
    l.setAttribute('class', 'grid-line');
    l.setAttribute('x1', WAVE.x0); l.setAttribute('x2', WAVE.x0 + WAVE.width);
    l.setAttribute('y1', vy(v)); l.setAttribute('y2', vy(v));
    wGrid.appendChild(l);
  });
  const tGroup = $('#time-ticks');
  for (let s = 0.5; s <= WAVE.seconds; s += 0.5) {
    const x = tx(s);
    const tick = document.createElementNS(NS, 'line');
    tick.setAttribute('x1', x); tick.setAttribute('x2', x);
    tick.setAttribute('y1', WAVE.yMid - 4); tick.setAttribute('y2', WAVE.yMid + 4);
    tick.setAttribute('stroke', 'rgba(236, 226, 209, 0.32)');
    tGroup.appendChild(tick);
    const txt = document.createElementNS(NS, 'text');
    txt.setAttribute('class', 'graph-tick');
    txt.setAttribute('x', x);
    txt.setAttribute('y', WAVE.yMid + 22);
    txt.setAttribute('text-anchor', 'middle');
    txt.textContent = (s % 1 === 0 ? s.toFixed(0) : s.toFixed(1)) + 's';
    tGroup.appendChild(txt);
  }

  // ——— State ———
  let f = 1;
  let t = 0;           // seconds
  let playing = false;
  let lastFrame = null;
  let raf = null;

  function buildPath(fn, t0, t1, N) {
    let d = '';
    for (let i = 0; i <= N; i++) {
      const tt = t0 + (i / N) * (t1 - t0);
      d += (i === 0 ? 'M ' : ' L ') + tx(tt).toFixed(1) + ' ' + vy(fn(tt)).toFixed(1);
    }
    return d;
  }

  function renderStatic() {
    const fn = (tt) => Math.sin(2 * Math.PI * f * tt);
    $('#sin-ghost').setAttribute('d', buildPath(fn, 0, WAVE.seconds, 400));

    // Period bracket from t = 0 to t = T, above the wave
    const T = 1 / f;
    const xa = tx(0), xb = tx(Math.min(T, WAVE.seconds));
    const yB = vy(1) - 18;
    $('#period-bracket').setAttribute('d',
      `M ${xa} ${yB + 8} L ${xa} ${yB} L ${xb} ${yB} L ${xb} ${yB + 8}`);
    const lbl = $('#period-label');
    lbl.setAttribute('x', (xa + xb) / 2);
    lbl.setAttribute('y', yB - 8);
    lbl.textContent = `T = ${T.toFixed(2)} s`;

    $('#f-display').textContent = `${f.toFixed(2).replace(/0$/, '')} Hz`;
    $('#T-display').textContent = `T = 1/${f.toFixed(2).replace(/\.?0+$/, '')} = ${T.toFixed(2)} s`;
    $('#f-val').textContent = `${f.toFixed(2).replace(/0$/, '')} Hz`;
  }

  function render() {
    const theta = 2 * Math.PI * f * t;
    const s = Math.sin(theta), c = Math.cos(theta);

    // Circle panel
    const px = CIRC.cx + c * CIRC.r;
    const py = CIRC.cy - s * CIRC.r;
    $('#radius').setAttribute('x2', px.toFixed(2));
    $('#radius').setAttribute('y2', py.toFixed(2));
    $('#circle-pt').setAttribute('cx', px.toFixed(2));
    $('#circle-pt').setAttribute('cy', py.toFixed(2));

    // Wave panel
    const fn = (tt) => Math.sin(2 * Math.PI * f * tt);
    $('#sin-trace').setAttribute('d', t > 0 ? buildPath(fn, 0, t, Math.max(8, Math.round(t * 160 * f))) : '');
    const xCur = tx(t);
    const pt = $('#wave-pt');
    pt.setAttribute('cx', xCur.toFixed(1));
    pt.setAttribute('cy', vy(s).toFixed(1));

    const vline = $('#vline');
    vline.setAttribute('x1', xCur); vline.setAttribute('x2', xCur);
    vline.setAttribute('y1', vy(1) - 4); vline.setAttribute('y2', vy(-1) + 4);

    const connector = $('#connector');
    connector.setAttribute('x1', px.toFixed(1));
    connector.setAttribute('y1', py.toFixed(1));
    connector.setAttribute('x2', xCur.toFixed(1));
    connector.setAttribute('y2', vy(s).toFixed(1));

    $('#cycle-display').textContent = String(Math.floor(f * t + 1e-9));
  }

  // ——— Animation ———
  function tick(ts) {
    if (!playing) return;
    if (lastFrame === null) lastFrame = ts;
    const dt = Math.min(0.05, (ts - lastFrame) / 1000);
    lastFrame = ts;
    t += dt * 0.6;   // slowed time so the motion is easy to follow
    if (t >= WAVE.seconds) {
      t = WAVE.seconds;
      playing = false;
      updatePlayButton();
    }
    render();
    if (playing) raf = requestAnimationFrame(tick);
  }
  function updatePlayButton() {
    $('#play-icon').textContent = playing ? '❚❚' : '▶';
    $('#play-label').textContent = playing ? 'Pause' : 'Play';
  }
  function play() {
    if (t >= WAVE.seconds) t = 0;
    playing = true;
    lastFrame = null;
    updatePlayButton();
    raf = requestAnimationFrame(tick);
  }
  function pause() {
    playing = false;
    updatePlayButton();
    if (raf) cancelAnimationFrame(raf);
  }

  // ——— Wire up ———
  $('#freq').addEventListener('input', () => {
    f = Number($('#freq').value);
    renderStatic();
    render();
  });
  $('#play').addEventListener('click', () => { if (playing) pause(); else play(); });
  $('#reset').addEventListener('click', () => { pause(); t = 0; render(); });

  document.addEventListener('visibilitychange', () => { if (document.hidden) pause(); });

  // Init
  renderStatic();
  render();
})();
</script>

</body>
</html>
