<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angle Growth Widget</title>
  <style>
    :root {
      --panel: #211a15;
      --text: #ece2d1;
      --muted: rgba(236, 226, 209, 0.54);
      --grid: rgba(236, 226, 209, 0.14);
      --orange: #e8a13b;
      --blue: #6dd3c4;
      --yellow: #f3d36b;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      background: transparent;
      color: var(--text);
      font-family: "Fraunces", Georgia, serif;
    }

    .wrap {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: 1rem;
    }

    .panel {
      display: grid;
      grid-template-columns: minmax(160px, 0.42fr) minmax(320px, 1fr);
      min-height: 280px;
      border: 1px solid rgba(232, 161, 59, 0.22);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 34%), var(--panel);
      overflow: hidden;
    }

    .readout {
      display: grid;
      align-content: center;
      gap: 0.55rem;
      padding: 1.2rem;
      border-right: 1px solid rgba(232, 161, 59, 0.18);
    }

    .theta {
      color: var(--yellow);
      font-size: clamp(2rem, 7vw, 4.2rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .caption {
      color: var(--muted);
      font-family: "JetBrains Mono", Consolas, monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 280px;
    }

    .axis {
      stroke: rgba(236, 226, 209, 0.7);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .grid {
      stroke: var(--grid);
      stroke-width: 1;
    }

    .reset-line {
      stroke: rgba(232, 161, 59, 0.42);
      stroke-width: 1.5;
      stroke-dasharray: 5 6;
    }

    .label {
      fill: var(--muted);
      font-family: "JetBrains Mono", Consolas, monospace;
      font-size: 12px;
    }

    .line {
      fill: none;
      stroke: var(--blue);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px rgba(109, 211, 196, 0.24));
    }

    .dot {
      fill: var(--orange);
      filter: drop-shadow(0 0 8px rgba(232, 161, 59, 0.45));
    }

    @media (max-width: 640px) {
      .panel { grid-template-columns: 1fr; }
      .readout { border-right: 0; border-bottom: 1px solid rgba(232, 161, 59, 0.18); }
      svg { min-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="readout">
        <div class="caption">angle</div>
        <div class="theta">&theta; = <span id="angle">0</span>&deg;</div>
        <div class="caption" id="modeLabel">no reset</div>
      </div>
      <svg viewBox="0 0 560 300" role="img" aria-label="Angle plotted over time">
        <g transform="translate(58 24)">
          <line class="grid" x1="0" y1="238" x2="448" y2="238" />
          <line class="grid" x1="0" y1="138" x2="448" y2="138" />
          <line class="grid" x1="0" y1="38" x2="448" y2="38" />
          <line id="resetA" class="reset-line" x1="149.3" y1="38" x2="149.3" y2="238" />
          <line id="resetB" class="reset-line" x1="298.6" y1="38" x2="298.6" y2="238" />
          <line class="axis" x1="0" y1="238" x2="468" y2="238" />
          <line class="axis" x1="0" y1="238" x2="0" y2="18" />
          <text class="label" x="448" y="268" text-anchor="end">time</text>
          <text class="label" x="-10" y="24" text-anchor="end">theta</text>
          <text class="label" id="topLabel" x="-10" y="42" text-anchor="end">720</text>
          <path id="trace" class="line" d="" />
          <circle id="dot" class="dot" r="5" cx="0" cy="238" />
        </g>
      </svg>
    </div>
  </div>
  <script>
    const mode = new URLSearchParams(location.search).get('mode') === 'sawtooth' ? 'sawtooth' : 'linear';
    const angleEl = document.getElementById('angle');
    const modeLabel = document.getElementById('modeLabel');
    const trace = document.getElementById('trace');
    const dot = document.getElementById('dot');
    const topLabel = document.getElementById('topLabel');
    const resetA = document.getElementById('resetA');
    const resetB = document.getElementById('resetB');
    const width = 448;
    const baseY = 238;
    const topY = 38;
    const turns = mode === 'sawtooth' ? 3 : 2;

    modeLabel.textContent = mode === 'sawtooth' ? 'reset at 360' : 'no reset';
    topLabel.textContent = mode === 'sawtooth' ? '360' : '720';
    resetA.style.display = mode === 'sawtooth' ? 'block' : 'none';
    resetB.style.display = mode === 'sawtooth' ? 'block' : 'none';

    function pointAt(progress) {
      if (mode === 'linear') {
        return {
          x: progress * width,
          y: baseY - progress * (baseY - topY),
          angle: Math.round(progress * 720)
        };
      }
      const total = progress * turns;
      const local = total - Math.floor(total);
      return {
        x: progress * width,
        y: baseY - local * (baseY - topY),
        angle: Math.round(local * 360) % 360
      };
    }

    function draw(time) {
      const cycle = mode === 'linear' ? 5200 : 6200;
      const progress = (time % cycle) / cycle;
      const samples = mode === 'linear' ? 160 : 180;
      let d = '';
      const maxSample = Math.max(1, Math.floor(samples * progress));
      for (let i = 0; i <= maxSample; i++) {
        const p = i / samples;
        if (p > progress) break;
        const pt = pointAt(p);
        d += `${i === 0 ? 'M' : 'L'} ${pt.x.toFixed(2)} ${pt.y.toFixed(2)} `;
      }
      const current = pointAt(progress);
      trace.setAttribute('d', d.trim());
      dot.setAttribute('cx', current.x.toFixed(2));
      dot.setAttribute('cy', current.y.toFixed(2));
      angleEl.textContent = current.angle;
      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>
</body>
</html>
