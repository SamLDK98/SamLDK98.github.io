<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Circle Triangle Side Labels</title>
  <style>
    :root {
      --text: #f1eee7;
      --muted: rgba(241, 238, 231, 0.62);
      --axis: rgba(241, 238, 231, 0.58);
      --circle: rgba(241, 238, 231, 0.78);
      --angle: #56c7ff;
      --hyp: #ef7398;
      --x-side: #f1c66e;
      --y-side: #6dd3c4;
      --point: #ef7398;
      --fill: rgba(239, 115, 152, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      color: var(--text);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    .widget {
      width: min(100%, 860px);
      padding: clamp(16px, 3vw, 28px);
      border: 1px solid rgba(241, 238, 231, 0.14);
      border-radius: 8px;
      background:
        radial-gradient(circle at 28% 22%, rgba(86, 199, 255, 0.08), transparent 32%),
        linear-gradient(180deg, rgba(31, 27, 23, 0.94), rgba(22, 19, 16, 0.98));
    }

    svg {
      display: block;
      width: 100%;
      overflow: visible;
    }

    .axis {
      stroke: var(--axis);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .unit-circle {
      fill: rgba(232, 161, 59, 0.035);
      stroke: var(--circle);
      stroke-width: 2.4;
    }

    .triangle-fill {
      fill: var(--fill);
    }

    .side,
    .angle-arc {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .x-side {
      stroke: var(--x-side);
      stroke-width: 4;
    }

    .y-side {
      stroke: var(--y-side);
      stroke-width: 4;
    }

    .hypotenuse {
      stroke: var(--hyp);
      stroke-width: 4.6;
      filter: drop-shadow(0 0 6px rgba(239, 115, 152, 0.28));
    }

    .angle-arc {
      stroke: var(--angle);
      stroke-width: 4;
    }

    .point {
      fill: var(--point);
      stroke: #171411;
      stroke-width: 3;
    }

    .label {
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: 18px;
      font-weight: 700;
    }

    .x-label {
      fill: var(--x-side);
    }

    .y-label {
      fill: var(--y-side);
    }

    .hyp-label,
    .angle-label {
      fill: var(--hyp);
    }

    .angle-label {
      fill: var(--angle);
      font-size: 15px;
    }

    .axis-label {
      fill: var(--muted);
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Unit circle right triangle labelled x, y, and 1">
    <svg viewBox="0 0 720 390" role="img">
      <line class="axis" x1="160" y1="210" x2="560" y2="210" />
      <line class="axis" x1="360" y1="360" x2="360" y2="30" />
      <circle class="unit-circle" cx="360" cy="210" r="145" />

      <path class="triangle-fill" d="M 360 210 L 486 210 L 486 138 Z" />
      <line class="side x-side" x1="360" y1="210" x2="486" y2="210" />
      <line class="side y-side" x1="486" y1="210" x2="486" y2="138" />
      <line class="side hypotenuse" x1="360" y1="210" x2="486" y2="138" />
      <path class="angle-arc" d="M 420 210 A 60 60 0 0 0 412 180" />
      <circle class="point" cx="486" cy="138" r="8" />

      <text class="label x-label" x="420" y="236" text-anchor="middle">x</text>
      <text class="label y-label" x="510" y="178" text-anchor="middle">y</text>
      <text class="label hyp-label" x="430" y="156" text-anchor="middle">1</text>
      <text class="label angle-label" x="423" y="190">theta</text>
      <text class="axis-label" x="568" y="216">x-axis</text>
      <text class="axis-label" x="372" y="44">y</text>
    </svg>
  </main>
</body>
</html>
