<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinates in Circular Motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311;
    --bg-elev: #1e1a17;
    --bg-card: #221d1a;
    --text: #ece2d1;
    --text-dim: #a89c87;
    --text-faint: #6f6557;
    --rule: rgba(214, 196, 168, 0.12);
    --rule-strong: rgba(214, 196, 168, 0.22);
    --accent: #d4b888;
    --accent-glow: rgba(212, 184, 136, 0.4);
    --cos: #e8a13b;
    --cos-glow: rgba(232, 161, 59, 0.4);
    --sin: #6dd3c4;
    --sin-glow: rgba(109, 211, 196, 0.4);
    --point: #ef7398;
    --point-glow: rgba(239, 115, 152, 0.45);
    --axis: rgba(236, 226, 209, 0.4);
    --circle: rgba(236, 226, 209, 0.68);
    --grid: rgba(236, 226, 209, 0.045);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 1.5rem 1rem;
    background-image:
      radial-gradient(ellipse at top, rgba(212, 184, 136, 0.04), transparent 55%);
  }
  .widget {
    max-width: 1180px;
    margin: 0 auto;
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .widget::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 3px);
    pointer-events: none;
  }
  .viz-wrap {
    padding: 1.4rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg#canvas {
    width: 100%;
    max-width: 1100px;
    height: auto;
    display: block;
  }
  .controls {
    padding: 1.1rem 1.6rem;
    border-top: 1px solid var(--rule);
    background: var(--bg-card);
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 1rem;
    align-items: center;
  }
  @media (max-width: 760px) {
    .controls { grid-template-columns: 1fr; }
  }
  .slider-block {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .slider-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .slider-head .lbl {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--text);
    font-size: 0.95rem;
  }
  .slider-head .val {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"]:focus { outline: none; }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-moz-range-track {
    height: 2px; background: var(--rule-strong); border-radius: 1px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    background: var(--point);
    border-radius: 50%;
    margin-top: -7px;
    box-shadow: 0 0 10px var(--point-glow);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--point); border: none; border-radius: 50%;
    box-shadow: 0 0 10px var(--point-glow);
  }
  .btn-group { display: flex; gap: 0.5rem; }
  .btn {
    background: rgba(0, 0, 0, 0.18);
    color: var(--text);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 0.55rem 0.95rem;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.92rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    min-height: 2.2rem;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); background: rgba(212, 184, 136, 0.06); color: var(--accent); }
  .btn.active {
    border-color: var(--accent);
    background: rgba(212, 184, 136, 0.14);
    color: var(--accent);
  }
  .toggle-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .toggle-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    color: var(--text-faint);
    text-transform: uppercase;
  }
  .toggle-pill {
    display: inline-flex;
    border: 1px solid var(--rule);
    border-radius: 2px;
    overflow: hidden;
  }
  .toggle-pill button {
    padding: 0.45rem 0.7rem;
    background: rgba(0, 0, 0, 0.2);
    color: var(--text-dim);
    border: 0;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
  }
  .toggle-pill button + button { border-left: 1px solid var(--rule); }
  .toggle-pill button.active {
    background: rgba(212, 184, 136, 0.14);
    color: var(--accent);
  }
  .footer {
    padding: 0.85rem 1.6rem;
    border-top: 1px solid var(--rule);
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 0.84rem;
    color: var(--text-faint);
    text-align: center;
  }

  /* SVG styling */
  .axis { stroke: var(--axis); stroke-width: 1.4; }
  .grid-line { stroke: var(--grid); stroke-width: 1; }
  .circle-outline { stroke: var(--circle); stroke-width: 2.4; fill: rgba(0, 0, 0, 0.06); }
  .axis-tick-label, .graph-tick {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .graph-tick.major {
    fill: var(--text-dim);
    font-size: 13px;
  }
  .radius {
    stroke: var(--accent);
    stroke-width: 2.5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 5px var(--accent-glow));
  }
  .cos-leg {
    stroke: var(--cos);
    stroke-width: 4;
    stroke-linecap: round;
    opacity: 0.85;
  }
  .sin-leg {
    stroke: var(--sin);
    stroke-width: 4;
    stroke-linecap: round;
    opacity: 0.85;
  }
  .connector {
    stroke-width: 1.6;
    stroke-dasharray: 5 5;
    stroke-linecap: round;
    opacity: 0.6;
  }
  .connector.sin { stroke: var(--sin); }
  .connector.cos { stroke: var(--cos); }
  .sin-trace {
    fill: none;
    stroke: var(--sin);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 6px var(--sin-glow));
  }
  .cos-trace {
    fill: none;
    stroke: var(--cos);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 6px var(--cos-glow));
  }
  .trace-ghost {
    fill: none;
    stroke-width: 1.2;
    opacity: 0.18;
    stroke-dasharray: 2 4;
  }
  .ghost-sin { stroke: var(--sin); }
  .ghost-cos { stroke: var(--cos); }
  .pt-marker-cos {
    fill: var(--cos);
    stroke: var(--text);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 6px var(--cos-glow));
  }
  .pt-marker-sin {
    fill: var(--sin);
    stroke: var(--text);
    stroke-width: 1.5;
    filter: drop-shadow(0 0 6px var(--sin-glow));
  }
  .pt-circle {
    fill: var(--point);
    stroke: var(--text);
    stroke-width: 2;
    filter: drop-shadow(0 0 8px var(--point-glow));
  }
  .vline-current {
    stroke: var(--text-dim);
    stroke-width: 1.2;
    stroke-dasharray: 4 4;
    opacity: 0.6;
  }
  .axis-arrow { fill: var(--axis); }
  .panel-label {
    fill: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="widget">
  <div class="viz-wrap">
    <svg id="canvas" viewBox="0 0 1100 460" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="Unit circle paired with x and y coordinate graphs; a moving point on the circle traces out coordinate waves">
      <defs>
        <marker id="ax-arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" class="axis-arrow" />
        </marker>
      </defs>

      <!-- ——— LEFT: unit circle ——— -->
      <text class="panel-label" x="40" y="30">Unit circle</text>
      <g id="circle-grid"></g>
      <!-- circle axes -->
      <line class="axis" x1="40"  y1="230" x2="395" y2="230" marker-end="url(#ax-arrow)" />
      <line class="axis" x1="210" y1="410" x2="210" y2="55"  marker-end="url(#ax-arrow)" />
      <text class="axis-tick-label" x="386" y="220" text-anchor="end">1</text>
      <text class="axis-tick-label" x="60"  y="220" text-anchor="start">−1</text>
      <text class="axis-tick-label" x="216" y="65">1</text>
      <text class="axis-tick-label" x="216" y="408">−1</text>
      <circle class="circle-outline" cx="210" cy="230" r="160" />

      <!-- triangle legs on the circle -->
      <line id="cos-leg" class="cos-leg" />
      <line id="sin-leg" class="sin-leg" />
      <line id="radius"  class="radius"  />
      <circle id="circle-pt" class="pt-circle" r="8" />

      <!-- ——— SEPARATOR ——— -->
      <line x1="430" y1="60" x2="430" y2="400" stroke="rgba(214, 196, 168, 0.08)" stroke-width="1" />

      <!-- ——— RIGHT: wave graph ——— -->
      <text class="panel-label" x="460" y="30">Coordinates as functions of θ</text>

      <!-- graph gridlines (horizontal at y = ±1, ±0.5) -->
      <g id="wave-grid"></g>

      <!-- graph axes -->
      <line class="axis" x1="450" y1="230" x2="1085" y2="230" marker-end="url(#ax-arrow)" />
      <line class="axis" x1="460" y1="410" x2="460" y2="55"  marker-end="url(#ax-arrow)" />

      <!-- y-axis tick labels -->
      <text class="axis-tick-label" x="455" y="74"  text-anchor="end">1</text>
      <text class="axis-tick-label" x="455" y="234" text-anchor="end">0</text>
      <text class="axis-tick-label" x="455" y="395" text-anchor="end">−1</text>

      <!-- x-axis tick labels at π/2, π, 3π/2, 2π -->
      <g id="theta-ticks"></g>

      <!-- Connector line (horizontal from circle point to current θ on the wave) -->
      <line id="connector" class="connector sin" />

      <!-- The traces (drawn so far, up to current θ) -->
      <path id="cos-trace" class="cos-trace" />
      <path id="sin-trace" class="sin-trace" />

      <!-- Faint full-period ghost traces so user can see the full shape -->
      <path id="cos-ghost" class="trace-ghost ghost-cos" />
      <path id="sin-ghost" class="trace-ghost ghost-sin" />

      <!-- Current-θ vertical indicator -->
      <line id="vline-current" class="vline-current" />

      <!-- Current-θ dots on each trace -->
      <circle id="cos-marker" class="pt-marker-cos" r="5" />
      <circle id="sin-marker" class="pt-marker-sin" r="5" />
    </svg>
  </div>

  <div class="controls">
    <div class="slider-block">
      <div class="slider-head">
        <span class="lbl">angle θ</span>
        <span class="val" id="angle-display">0°  ·  0</span>
      </div>
      <input id="angle" type="range" min="0" max="720" value="0" step="1">
    </div>
    <div class="toggle-group">
      <span class="toggle-label">Show</span>
      <div class="toggle-pill" id="show-toggle">
        <button data-show="sin">y</button>
        <button data-show="cos">x</button>
        <button data-show="both" class="active">both</button>
      </div>
    </div>
    <div class="btn-group">
      <button class="btn" id="play"><span id="play-icon">▶</span> <span id="play-label">Play</span></button>
      <button class="btn" id="reset">Reset</button>
    </div>
  </div>

  <div class="footer">
    Press play, or drag the slider. The orange trace is the x-coordinate; the blue trace is the y-coordinate.
  </div>
</div>

<script>
(function () {
  const $ = (s) => document.querySelector(s);
  const svg = $('#canvas');

  // ——— Layout constants ———
  // Circle panel
  const CIRC = { cx: 210, cy: 230, r: 160 };
  // Wave panel
  const WAVE = {
    x0: 460,            // x-pixel for θ = 0
    width: 600,         // x-pixel range covering θ ∈ [0, 2π] (so θ=2π is at x0+width)
    yMid: 230,          // y-pixel for value 0
    amp: 160            // y-pixel amplitude (matches CIRC.r for visual coherence)
  };
  // Map θ (rad) → x-pixel in wave panel
  const tx = (theta) => WAVE.x0 + (theta / (2 * Math.PI)) * WAVE.width;
  // Map value v in [-1, 1] → y-pixel
  const vy = (v) => WAVE.yMid - v * WAVE.amp;

  // ——— Static SVG content ———
  // Circle gridlines
  const cGrid = $('#circle-grid');
  for (let i = -1; i <= 1; i += 0.5) {
    if (i === 0) continue;
    const xP = CIRC.cx + i * CIRC.r;
    const yP = CIRC.cy - i * CIRC.r;
    const v = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    v.setAttribute('class', 'grid-line');
    v.setAttribute('x1', xP); v.setAttribute('x2', xP);
    v.setAttribute('y1', CIRC.cy - CIRC.r - 5); v.setAttribute('y2', CIRC.cy + CIRC.r + 5);
    cGrid.appendChild(v);
    const h = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    h.setAttribute('class', 'grid-line');
    h.setAttribute('y1', yP); h.setAttribute('y2', yP);
    h.setAttribute('x1', CIRC.cx - CIRC.r - 5); h.setAttribute('x2', CIRC.cx + CIRC.r + 5);
    cGrid.appendChild(h);
  }
  // Wave gridlines (horizontal lines at y = ±0.5, ±1)
  const wGrid = $('#wave-grid');
  [-1, -0.5, 0.5, 1].forEach(v => {
    const y = vy(v);
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('class', 'grid-line');
    l.setAttribute('x1', WAVE.x0); l.setAttribute('x2', WAVE.x0 + WAVE.width);
    l.setAttribute('y1', y); l.setAttribute('y2', y);
    wGrid.appendChild(l);
  });

  // θ axis ticks (π/2, π, 3π/2, 2π)
  const tGroup = $('#theta-ticks');
  const ticks = [
    { theta: Math.PI / 2,     label: 'π/2' },
    { theta: Math.PI,         label: 'π'   },
    { theta: 3 * Math.PI / 2, label: '3π/2' },
    { theta: 2 * Math.PI,     label: '2π'  }
  ];
  ticks.forEach(({ theta, label }) => {
    const x = tx(theta);
    const tickLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    tickLine.setAttribute('class', 'grid-line');
    tickLine.setAttribute('x1', x); tickLine.setAttribute('x2', x);
    tickLine.setAttribute('y1', WAVE.yMid - 4); tickLine.setAttribute('y2', WAVE.yMid + 4);
    tickLine.setAttribute('stroke', 'rgba(236, 226, 209, 0.32)');
    tGroup.appendChild(tickLine);

    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('class', 'graph-tick');
    txt.setAttribute('x', x);
    txt.setAttribute('y', WAVE.yMid + 20);
    txt.setAttribute('text-anchor', 'middle');
    txt.textContent = label;
    tGroup.appendChild(txt);
  });

  // Pre-compute full-period ghost paths so the user sees the shape
  function buildGhostPath(fn) {
    const N = 200;
    let d = '';
    for (let i = 0; i <= N; i++) {
      const theta = (i / N) * 2 * Math.PI;
      const x = tx(theta);
      const y = vy(fn(theta));
      d += (i === 0 ? 'M ' : ' L ') + x + ' ' + y;
    }
    return d;
  }
  $('#sin-ghost').setAttribute('d', buildGhostPath(Math.sin));
  $('#cos-ghost').setAttribute('d', buildGhostPath(Math.cos));

  // ——— State ———
  let deg = 0;              // current angle in degrees (0..720 to allow seeing wrap-around)
  let playing = false;
  let lastFrame = 0;
  let raf = null;
  let showMode = 'both';     // 'sin' | 'cos' | 'both'

  const slider = $('#angle');

  function setLine(id, p1, p2) {
    const el = document.getElementById(id);
    el.setAttribute('x1', p1.x); el.setAttribute('y1', p1.y);
    el.setAttribute('x2', p2.x); el.setAttribute('y2', p2.y);
  }

  function fmtRad(deg) {
    // Display as a multiple of π, simplified
    if (deg === 0) return '0';
    const sign = deg < 0 ? '−' : '';
    const a = Math.abs(deg);
    // Map to fractions of π
    const fracs = [
      [0,   '0'],
      [30,  'π/6'], [45,  'π/4'], [60,  'π/3'], [90,  'π/2'],
      [120, '2π/3'], [135, '3π/4'], [150, '5π/6'], [180, 'π'],
      [210, '7π/6'], [225, '5π/4'], [240, '4π/3'], [270, '3π/2'],
      [300, '5π/3'], [315, '7π/4'], [330, '11π/6'], [360, '2π'],
      [390, '13π/6'], [405, '9π/4'], [420, '7π/3'], [450, '5π/2'],
      [540, '3π'], [630, '7π/2'], [720, '4π']
    ];
    const match = fracs.find(([d]) => d === a);
    if (match) return sign + match[1];
    // Otherwise, decimal multiple of π
    return sign + (a / 180).toFixed(2) + 'π';
  }

  function buildTracePath(fn, fromDeg, toDeg) {
    if (toDeg <= fromDeg) return '';
    const N = Math.max(8, Math.round((toDeg - fromDeg) * 1.2));
    let d = '';
    for (let i = 0; i <= N; i++) {
      const t = fromDeg + (i / N) * (toDeg - fromDeg);
      const theta = t * Math.PI / 180;
      const x = tx(((t % 360) + 360) % 360 * Math.PI / 180);
      const y = vy(fn(theta));
      d += (i === 0 ? 'M ' : ' L ') + x + ' ' + y;
    }
    return d;
  }

  // Build the trace path supporting wraps past 2π: when θ crosses 360°, jump back to x0
  function buildWrappedTracePath(fn, totalDeg) {
    if (totalDeg <= 0) return '';
    const step = 1.5;
    let d = '';
    let pen = false;
    let prevWrappedDeg = 0;
    for (let t = 0; t <= totalDeg + 0.001; t += step) {
      const wrapped = ((t % 360) + 360) % 360;
      const x = tx(wrapped * Math.PI / 180);
      const theta = t * Math.PI / 180;
      const y = vy(fn(theta));
      if (!pen) {
        d += 'M ' + x + ' ' + y;
        pen = true;
      } else if (wrapped < prevWrappedDeg) {
        // We wrapped: pen up, move
        d += ' M ' + x + ' ' + y;
      } else {
        d += ' L ' + x + ' ' + y;
      }
      prevWrappedDeg = wrapped;
    }
    return d;
  }

  function render() {
    const wrappedDeg = ((deg % 360) + 360) % 360;
    const theta = deg * Math.PI / 180;
    const wrappedTheta = wrappedDeg * Math.PI / 180;
    const c = Math.cos(theta);
    const s = Math.sin(theta);

    // ——— Circle panel updates ———
    const O    = { x: CIRC.cx, y: CIRC.cy };
    const foot = { x: CIRC.cx + c * CIRC.r, y: CIRC.cy };
    const pt   = { x: CIRC.cx + c * CIRC.r, y: CIRC.cy - s * CIRC.r };
    setLine('cos-leg', O, foot);
    setLine('sin-leg', foot, pt);
    setLine('radius',  O, pt);
    const cp = $('#circle-pt');
    cp.setAttribute('cx', pt.x);
    cp.setAttribute('cy', pt.y);

    // ——— Wave panel updates ———
    // Current θ vertical line in wave panel
    const vline = $('#vline-current');
    const xCur = tx(wrappedTheta);
    vline.setAttribute('x1', xCur); vline.setAttribute('x2', xCur);
    vline.setAttribute('y1', WAVE.yMid - WAVE.amp - 4);
    vline.setAttribute('y2', WAVE.yMid + WAVE.amp + 4);

    // Traces — show only what's enabled
    const sinTrace = $('#sin-trace');
    const cosTrace = $('#cos-trace');
    const showSin = (showMode === 'sin' || showMode === 'both');
    const showCos = (showMode === 'cos' || showMode === 'both');
    sinTrace.style.display = showSin ? '' : 'none';
    cosTrace.style.display = showCos ? '' : 'none';
    $('#sin-ghost').style.display = showSin ? '' : 'none';
    $('#cos-ghost').style.display = showCos ? '' : 'none';
    $('#sin-marker').style.display = showSin ? '' : 'none';
    $('#cos-marker').style.display = showCos ? '' : 'none';

    if (showSin) sinTrace.setAttribute('d', buildWrappedTracePath(Math.sin, deg));
    if (showCos) cosTrace.setAttribute('d', buildWrappedTracePath(Math.cos, deg));

    // Markers at the current θ on each trace
    $('#sin-marker').setAttribute('cx', xCur);
    $('#sin-marker').setAttribute('cy', vy(s));
    $('#cos-marker').setAttribute('cx', xCur);
    $('#cos-marker').setAttribute('cy', vy(c));

    // Connector: horizontal dashed line from circle-point to sin marker (only when showing sin)
    const connector = $('#connector');
    if (showSin) {
      connector.classList.remove('cos');
      connector.classList.add('sin');
      connector.setAttribute('x1', pt.x);
      connector.setAttribute('y1', pt.y);
      connector.setAttribute('x2', xCur);
      connector.setAttribute('y2', vy(s));
      connector.style.display = '';
    } else if (showCos) {
      // For cos: a horizontal connector at height vy(c) - shows where cos lands on the wave
      // It runs from the cos-marker over the foot point (cos, 0) at height 0 doesn't make
      // perfect sense, so just hide for cos-only mode (the user can read the wave directly).
      connector.style.display = 'none';
    } else {
      connector.style.display = 'none';
    }

    // Update the angle display
    $('#angle-display').textContent = `${deg}° · ${fmtRad(deg)}`;
    slider.value = String(deg);
  }

  // ——— Animation ———
  function tick(ts) {
    if (!playing) return;
    if (!lastFrame) lastFrame = ts;
    const dt = (ts - lastFrame) / 1000;
    lastFrame = ts;
    // 60 degrees per second by default
    let newDeg = deg + 60 * dt;
    if (newDeg >= 720) {
      newDeg = 720;
      playing = false;
      updatePlayButton();
    }
    deg = newDeg;
    render();
    if (playing) raf = requestAnimationFrame(tick);
  }
  function updatePlayButton() {
    $('#play-icon').textContent = playing ? '❚❚' : '▶';
    $('#play-label').textContent = playing ? 'Pause' : 'Play';
  }
  function play() {
    if (deg >= 720) deg = 0;
    playing = true;
    lastFrame = 0;
    updatePlayButton();
    raf = requestAnimationFrame(tick);
  }
  function pause() {
    playing = false;
    updatePlayButton();
    if (raf) cancelAnimationFrame(raf);
  }
  function reset() {
    pause();
    deg = 0;
    render();
  }

  // ——— Wire up ———
  slider.addEventListener('input', () => {
    pause();
    deg = Number(slider.value);
    render();
  });

  $('#play').addEventListener('click', () => {
    if (playing) pause(); else play();
  });
  $('#reset').addEventListener('click', reset);

  $('#show-toggle').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('#show-toggle button').forEach(b => b.classList.toggle('active', b === btn));
    showMode = btn.dataset.show;
    render();
  });

  // Init
  render();
})();
</script>

</body>
</html>
