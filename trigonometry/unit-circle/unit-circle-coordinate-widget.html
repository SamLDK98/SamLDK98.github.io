<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinates on the Unit Circle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311;
    --bg-elev: #1e1a17;
    --bg-card: #221d1a;
    --text: #ece2d1;
    --text-dim: #a89c87;
    --text-faint: #6f6557;
    --rule: rgba(214, 196, 168, 0.12);
    --rule-strong: rgba(214, 196, 168, 0.22);
    --accent: #d4b888;
    --x-color: #e8a13b;
    --y-color: #6dd3c4;
    --point: #ef7398;
    --point-glow: rgba(239, 115, 152, 0.45);
    --axis: rgba(236, 226, 209, 0.4);
    --circle: rgba(236, 226, 209, 0.68);
    --grid: rgba(236, 226, 209, 0.045);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 1.5rem 1rem;
    background-image:
      radial-gradient(ellipse at top, rgba(212, 184, 136, 0.04), transparent 55%);
  }
  .widget {
    max-width: 1080px;
    margin: 0 auto;
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .widget::before {
    content: ""; position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.005) 2px, rgba(255,255,255,0.005) 3px);
    pointer-events: none;
  }
  .coordinate-top {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.08);
  }
  .coordinate-display {
    min-height: 3.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.38rem;
    font-family: "Courier New", monospace;
    font-size: clamp(1.45rem, 4vw, 2.45rem);
    font-weight: 700;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .coord-paren,
  .coord-comma {
    color: var(--text);
  }
  .coord-x {
    color: var(--x-color);
  }
  .coord-y {
    color: var(--y-color);
  }
  .frac {
    display: inline-grid;
    grid-template-rows: auto auto;
    align-items: center;
    justify-items: center;
    min-width: 1.45em;
    font-size: 0.82em;
    line-height: 1;
    vertical-align: middle;
  }
  .frac > span:first-child {
    width: 100%;
    padding: 0 0.14em 0.12em;
    border-bottom: 0.08em solid currentColor;
    text-align: center;
  }
  .frac > span:last-child {
    padding-top: 0.12em;
    text-align: center;
  }
  .main {
    display: grid;
    grid-template-columns: 1fr 320px;
  }
  @media (max-width: 820px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { border-left: none !important; border-top: 1px solid var(--rule); }
  }
  .viz-wrap {
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg#canvas {
    width: 100%;
    max-width: 600px;
    height: auto;
    display: block;
  }
  .sidebar {
    border-left: 1px solid var(--rule);
    padding: 1.5rem 1.4rem;
    background: var(--bg-card);
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }
  .repr-card {
    padding: 0.85rem 1rem;
    border: 1px solid var(--rule);
    background: rgba(0, 0, 0, 0.22);
    border-radius: 2px;
    transition: border-color 0.18s;
  }
  .repr-card .repr-label {
    font-family: "Courier New", monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }
  .repr-card .repr-value {
    font-family: "Courier New", monospace;
    font-style: normal;
    font-size: 1.55rem;
    color: var(--accent);
    font-variation-settings: "opsz" 144;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .repr-card .repr-value .neg { color: var(--accent); }
  .repr-card .repr-value .pi-sym { font-style: normal; font-family: "Courier New", monospace; }
  .nav-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
    margin-top: 0.3rem;
  }
  .btn {
    background: rgba(0, 0, 0, 0.18);
    color: var(--text);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 0.5rem 0.65rem;
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 0.92rem;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s, color 0.18s;
    min-height: 2.2rem;
  }
  .btn:hover {
    border-color: var(--accent);
    background: rgba(212, 184, 136, 0.06);
    color: var(--accent);
  }
  /* SVG styling */
  .axis { stroke: var(--axis); stroke-width: 1.4; }
  .circle-outline { stroke: var(--circle); stroke-width: 2.5; fill: rgba(0, 0, 0, 0.06); }
  .grid-line { stroke: var(--grid); stroke-width: 1; }
  .axis-tick-label {
    fill: var(--text-faint);
    font-family: "Courier New", monospace;
    font-size: 12px;
  }
  .standard-pt {
    fill: var(--text-dim);
    opacity: 0.55;
    transition: opacity 0.15s, fill 0.15s, r 0.15s;
    cursor: pointer;
  }
  .standard-pt:hover { opacity: 1; fill: var(--accent); }
  .standard-pt.active {
    fill: var(--point);
    opacity: 1;
  }
  .standard-pt-click {
    fill: transparent;
    cursor: pointer;
  }
  .standard-pt-label {
    fill: var(--text-faint);
    font-family: "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    transition: fill 0.15s;
    pointer-events: none;
    user-select: none;
  }
  .standard-pt-label.active { fill: var(--accent); }
  .radius-line {
    stroke: var(--point);
    stroke-width: 2.5;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px var(--point-glow));
  }
  .x-projection { stroke: var(--x-color); stroke-width: 2; stroke-dasharray: 4 4; stroke-linecap: round; opacity: 0.85; }
  .y-projection { stroke: var(--y-color); stroke-width: 2; stroke-dasharray: 4 4; stroke-linecap: round; opacity: 0.85; }
  .current-pt {
    fill: var(--point);
    stroke: var(--text);
    stroke-width: 2;
    filter: drop-shadow(0 0 10px var(--point-glow));
  }
  .axis-arrow { fill: var(--axis); }
</style>
</head>
<body>

<div class="widget">
  <div class="coordinate-top">
    <div class="coordinate-display" id="coord-top" aria-live="polite">
      <span class="coord-paren coord-x">(</span><span class="coord-x">1</span><span class="coord-comma">,</span><span class="coord-y">0</span><span class="coord-paren coord-y">)</span>
    </div>
  </div>

  <div class="main">
    <div class="viz-wrap">
      <svg id="canvas" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img"
           aria-label="Unit circle with 16 standard angle positions; one is highlighted with its coordinates">
        <defs>
          <marker id="ax-arrow" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 Z" class="axis-arrow" />
          </marker>
        </defs>

        <!-- gridlines -->
        <g id="grid"></g>

        <!-- axes -->
        <line class="axis" x1="40" y1="300" x2="555" y2="300" marker-end="url(#ax-arrow)" />
        <line class="axis" x1="300" y1="560" x2="300" y2="45" marker-end="url(#ax-arrow)" />

        <!-- axis tick labels -->
        <text class="axis-tick-label" x="546" y="290" text-anchor="end">1</text>
        <text class="axis-tick-label" x="54" y="290" text-anchor="start">−1</text>
        <text class="axis-tick-label" x="308" y="58">1</text>
        <text class="axis-tick-label" x="308" y="555">−1</text>

        <!-- unit circle -->
        <circle class="circle-outline" cx="300" cy="300" r="240" />

        <!-- standard points + labels (built by JS) -->
        <g id="standard-points"></g>
        <g id="standard-labels"></g>

        <!-- projection lines (subtle dashed cues showing x and y as horizontal/vertical lengths) -->
        <line id="x-proj" class="x-projection" />
        <line id="y-proj" class="y-projection" />

        <!-- radius from origin to current point -->
        <line id="radius" class="radius-line" />

        <!-- current point (overlay) -->
        <circle id="current-pt" class="current-pt" r="9" />
      </svg>
    </div>

    <aside class="sidebar">
      <div class="repr-card">
        <div class="repr-label">Degrees</div>
        <div class="repr-value" id="deg-value">0°</div>
      </div>

      <div class="repr-card">
        <div class="repr-label">Radians</div>
        <div class="repr-value" id="rad-value">0</div>
      </div>

      <div class="nav-row">
        <button class="btn" id="prev">← Previous</button>
        <button class="btn" id="next">Next →</button>
      </div>

    </aside>
  </div>
</div>

<script>
(function () {
  // ——— Data: 16 standard angles, each in all three representations ———
  const ANGLES = [
    { deg: 0,   rad: '0',      coord: '(1, 0)' },
    { deg: 30,  rad: 'π/6',    coord: '(√3/2, 1/2)' },
    { deg: 45,  rad: 'π/4',    coord: '(√2/2, √2/2)' },
    { deg: 60,  rad: 'π/3',    coord: '(1/2, √3/2)' },
    { deg: 90,  rad: 'π/2',    coord: '(0, 1)' },
    { deg: 120, rad: '2π/3',   coord: '(−1/2, √3/2)' },
    { deg: 135, rad: '3π/4',   coord: '(−√2/2, √2/2)' },
    { deg: 150, rad: '5π/6',   coord: '(−√3/2, 1/2)' },
    { deg: 180, rad: 'π',      coord: '(−1, 0)' },
    { deg: 210, rad: '7π/6',   coord: '(−√3/2, −1/2)' },
    { deg: 225, rad: '5π/4',   coord: '(−√2/2, −√2/2)' },
    { deg: 240, rad: '4π/3',   coord: '(−1/2, −√3/2)' },
    { deg: 270, rad: '3π/2',   coord: '(0, −1)' },
    { deg: 300, rad: '5π/3',   coord: '(1/2, −√3/2)' },
    { deg: 315, rad: '7π/4',   coord: '(√2/2, −√2/2)' },
    { deg: 330, rad: '11π/6',  coord: '(√3/2, −1/2)' }
  ];

  // ——— Geometry: SVG layout ———
  const COORDS = [
    ['1', '0'],
    ['<span class="frac"><span>&radic;3</span><span>2</span></span>', '<span class="frac"><span>1</span><span>2</span></span>'],
    ['<span class="frac"><span>&radic;2</span><span>2</span></span>', '<span class="frac"><span>&radic;2</span><span>2</span></span>'],
    ['<span class="frac"><span>1</span><span>2</span></span>', '<span class="frac"><span>&radic;3</span><span>2</span></span>'],
    ['0', '1'],
    ['&minus;<span class="frac"><span>1</span><span>2</span></span>', '<span class="frac"><span>&radic;3</span><span>2</span></span>'],
    ['&minus;<span class="frac"><span>&radic;2</span><span>2</span></span>', '<span class="frac"><span>&radic;2</span><span>2</span></span>'],
    ['&minus;<span class="frac"><span>&radic;3</span><span>2</span></span>', '<span class="frac"><span>1</span><span>2</span></span>'],
    ['&minus;1', '0'],
    ['&minus;<span class="frac"><span>&radic;3</span><span>2</span></span>', '&minus;<span class="frac"><span>1</span><span>2</span></span>'],
    ['&minus;<span class="frac"><span>&radic;2</span><span>2</span></span>', '&minus;<span class="frac"><span>&radic;2</span><span>2</span></span>'],
    ['&minus;<span class="frac"><span>1</span><span>2</span></span>', '&minus;<span class="frac"><span>&radic;3</span><span>2</span></span>'],
    ['0', '&minus;1'],
    ['<span class="frac"><span>1</span><span>2</span></span>', '&minus;<span class="frac"><span>&radic;3</span><span>2</span></span>'],
    ['<span class="frac"><span>&radic;2</span><span>2</span></span>', '&minus;<span class="frac"><span>&radic;2</span><span>2</span></span>'],
    ['<span class="frac"><span>&radic;3</span><span>2</span></span>', '&minus;<span class="frac"><span>1</span><span>2</span></span>']
  ];

  function coordMarkup(i) {
    const [x, y] = COORDS[i];
    return `<span class="coord-paren coord-x">(</span><span class="coord-x">${x}</span><span class="coord-comma">,</span><span class="coord-y">${y}</span><span class="coord-paren coord-y">)</span>`;
  }

  const CX = 300, CY = 300, R = 240;
  const $ = (s) => document.querySelector(s);

  // Compute (x, y) in math units, then SVG pixels
  function svgPoint(deg, radius = R) {
    const t = deg * Math.PI / 180;
    return { x: CX + Math.cos(t) * radius, y: CY - Math.sin(t) * radius };
  }

  // Place a label outside the circle, with text-anchor and offset that look good
  // for each angle's position around the rim.
  function labelGeom(deg) {
    const t = deg * Math.PI / 180;
    const c = Math.cos(t), s = Math.sin(t);
    const r = R + 22;
    const x = CX + c * r;
    const y = CY - s * r;

    // Use text-anchor based on which side of the circle the point is on
    let anchor = 'middle';
    if (c > 0.3) anchor = 'start';
    else if (c < -0.3) anchor = 'end';

    // Vertical baseline tweak based on top/bottom
    let baseline = 'middle';
    if (s > 0.7) baseline = 'baseline';      // near top: push text up via baseline at bottom of text
    else if (s < -0.7) baseline = 'hanging'; // near bottom: push text down via baseline at top of text

    return { x, y, anchor, baseline };
  }

  // ——— Build static SVG content ———
  const grid = $('#grid');
  for (let i = -1; i <= 1; i += 0.5) {
    if (i === 0) continue;
    const xPos = CX + i * R;
    const yPos = CY - i * R;
    const v = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    v.setAttribute('class', 'grid-line');
    v.setAttribute('x1', xPos); v.setAttribute('x2', xPos);
    v.setAttribute('y1', CY - R - 6); v.setAttribute('y2', CY + R + 6);
    grid.appendChild(v);
    const h = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    h.setAttribute('class', 'grid-line');
    h.setAttribute('y1', yPos); h.setAttribute('y2', yPos);
    h.setAttribute('x1', CX - R - 6); h.setAttribute('x2', CX + R + 6);
    grid.appendChild(h);
  }

  // Build standard points + labels (degree numbers) around the rim
  const sp = $('#standard-points');
  const sl = $('#standard-labels');
  ANGLES.forEach((a, i) => {
    const p = svgPoint(a.deg);
    // visible dot
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('class', 'standard-pt');
    dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
    dot.setAttribute('r', a.deg % 90 === 0 ? 6 : 5);
    dot.dataset.idx = i;
    sp.appendChild(dot);
    // wider invisible click target
    const ct = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ct.setAttribute('class', 'standard-pt-click');
    ct.setAttribute('cx', p.x); ct.setAttribute('cy', p.y);
    ct.setAttribute('r', 16);
    ct.dataset.idx = i;
    sp.appendChild(ct);

    // label
    const g = labelGeom(a.deg);
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('class', 'standard-pt-label');
    t.setAttribute('x', g.x); t.setAttribute('y', g.y);
    t.setAttribute('text-anchor', g.anchor);
    t.setAttribute('dominant-baseline', g.baseline);
    t.textContent = `${a.deg}°`;
    t.dataset.idx = i;
    sl.appendChild(t);
  });

  // ——— State & rendering ———
  let index = 0;

  function render() {
    const a = ANGLES[index];
    const p = svgPoint(a.deg);
    const origin = svgPoint(0).y === CY ? { x: CX, y: CY } : { x: CX, y: CY }; // alias
    // (origin is just (CX, CY))

    // Update radius line
    const r = $('#radius');
    r.setAttribute('x1', CX); r.setAttribute('y1', CY);
    r.setAttribute('x2', p.x); r.setAttribute('y2', p.y);

    // Projection lines: from origin to (x, 0), then from (x, 0) to (x, y)
    const foot = { x: p.x, y: CY };
    const xp = $('#x-proj');
    xp.setAttribute('x1', CX); xp.setAttribute('y1', CY);
    xp.setAttribute('x2', foot.x); xp.setAttribute('y2', foot.y);
    const yp = $('#y-proj');
    yp.setAttribute('x1', foot.x); yp.setAttribute('y1', foot.y);
    yp.setAttribute('x2', p.x); yp.setAttribute('y2', p.y);
    // Hide projections when the point lies exactly on an axis (avoid zero-length tile)
    const t = a.deg * Math.PI / 180;
    const c = Math.cos(t), s = Math.sin(t);
    xp.style.display = Math.abs(c) < 0.001 ? 'none' : '';
    yp.style.display = Math.abs(s) < 0.001 ? 'none' : '';

    // Current point
    const cp = $('#current-pt');
    cp.setAttribute('cx', p.x); cp.setAttribute('cy', p.y);

    // Update active state on standard points
    document.querySelectorAll('.standard-pt').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.idx) === index);
    });
    document.querySelectorAll('.standard-pt-label').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.idx) === index);
    });

    // Update sidebar values
    $('#deg-value').textContent = `${a.deg}°`;
    $('#rad-value').textContent = a.rad;
    $('#coord-top').innerHTML = coordMarkup(index);
  }

  function goTo(i) {
    index = ((i % ANGLES.length) + ANGLES.length) % ANGLES.length;
    render();
  }

  // ——— Interaction ———
  $('#prev').addEventListener('click', () => goTo(index - 1));
  $('#next').addEventListener('click', () => goTo(index + 1));

  // Click on any standard point (or label)
  document.querySelector('#standard-points').addEventListener('click', (e) => {
    const idx = e.target.dataset.idx;
    if (idx !== undefined) goTo(Number(idx));
  });
  document.querySelector('#standard-labels').addEventListener('click', (e) => {
    const idx = e.target.dataset.idx;
    if (idx !== undefined) goTo(Number(idx));
  });

  // Click/drag anywhere on the canvas → snap to nearest standard angle
  const svg = $('#canvas');
  let dragging = false;
  function pointToIdx(ev) {
    const rect = svg.getBoundingClientRect();
    const x = ((ev.clientX - rect.left) / rect.width) * 600;
    const y = ((ev.clientY - rect.top) / rect.height) * 600;
    const dx = x - CX, dy = CY - y;
    if (Math.hypot(dx, dy) < 30) return null; // ignore clicks near origin
    let deg = Math.atan2(dy, dx) * 180 / Math.PI;
    if (deg < 0) deg += 360;
    let best = 0, bestD = Infinity;
    ANGLES.forEach((a, i) => {
      const d = Math.min(Math.abs(a.deg - deg), 360 - Math.abs(a.deg - deg));
      if (d < bestD) { bestD = d; best = i; }
    });
    return best;
  }
  svg.addEventListener('pointerdown', (ev) => {
    dragging = true;
    svg.setPointerCapture(ev.pointerId);
    const i = pointToIdx(ev);
    if (i !== null) goTo(i);
  });
  svg.addEventListener('pointermove', (ev) => {
    if (!dragging) return;
    const i = pointToIdx(ev);
    if (i !== null && i !== index) goTo(i);
  });
  svg.addEventListener('pointerup', (ev) => {
    dragging = false;
    try { svg.releasePointerCapture(ev.pointerId); } catch (e) {}
  });

  // Keyboard: left/right arrows step through
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(index - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); goTo(index + 1); }
  });

  render();
})();
</script>

</body>
</html>
