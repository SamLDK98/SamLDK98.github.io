<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Circle Coordinates as Sine and Cosine</title>
  <style>
    :root {
      --text: #f1eee7;
      --muted: rgba(241, 238, 231, 0.62);
      --panel: rgba(0, 0, 0, 0.18);
      --axis: rgba(241, 238, 231, 0.58);
      --circle: rgba(241, 238, 231, 0.78);
      --angle: #56c7ff;
      --hyp: #ef7398;
      --x-side: #f1c66e;
      --y-side: #6dd3c4;
      --fill: rgba(239, 115, 152, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      color: var(--text);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    .widget {
      width: min(100%, 980px);
      padding: clamp(16px, 3vw, 28px);
      border: 1px solid rgba(241, 238, 231, 0.14);
      border-radius: 8px;
      background:
        radial-gradient(circle at 28% 22%, rgba(86, 199, 255, 0.08), transparent 32%),
        linear-gradient(180deg, rgba(31, 27, 23, 0.94), rgba(22, 19, 16, 0.98));
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(220px, 0.8fr);
      gap: clamp(18px, 3vw, 32px);
      align-items: center;
    }

    svg {
      display: block;
      width: 100%;
      overflow: visible;
    }

    .axis {
      stroke: var(--axis);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .unit-circle {
      fill: rgba(232, 161, 59, 0.035);
      stroke: var(--circle);
      stroke-width: 2.4;
    }

    .triangle-fill {
      fill: var(--fill);
    }

    .side,
    .angle-arc {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .x-side {
      stroke: var(--x-side);
      stroke-width: 4;
    }

    .y-side {
      stroke: var(--y-side);
      stroke-width: 4;
    }

    .hypotenuse {
      stroke: var(--hyp);
      stroke-width: 4.6;
      filter: drop-shadow(0 0 6px rgba(239, 115, 152, 0.28));
    }

    .angle-arc {
      stroke: var(--angle);
      stroke-width: 4;
    }

    .point {
      fill: var(--hyp);
      stroke: #171411;
      stroke-width: 3;
      filter: drop-shadow(0 0 8px rgba(239, 115, 152, 0.42));
    }

    .label {
      fill: var(--muted);
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: 13px;
    }

    .tick-label {
      fill: rgba(241, 238, 231, 0.54);
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: 12px;
    }

    .readout {
      padding: 18px;
      border: 1px solid rgba(241, 238, 231, 0.12);
      border-radius: 6px;
      background: var(--panel);
      font-family: "JetBrains Mono", "Consolas", monospace;
    }

    .readout-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .readout-row:last-child {
      margin-bottom: 0;
    }

    .value {
      color: var(--text);
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    .cos-value {
      color: var(--x-side);
    }

    .sin-value {
      color: var(--y-side);
    }

    .coordinate-value {
      color: var(--hyp);
    }

    .controls {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-top: 18px;
      color: var(--muted);
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--angle);
    }

    output {
      min-width: 52px;
      color: var(--angle);
      text-align: right;
    }

    @media (max-width: 720px) {
      .layout,
      .controls {
        grid-template-columns: 1fr;
      }

      output {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Interactive unit circle coordinates shown as cosine and sine">
    <div class="layout">
      <svg viewBox="0 0 620 430" role="img">
        <line class="axis" x1="110" y1="220" x2="520" y2="220" />
        <line class="axis" x1="315" y1="380" x2="315" y2="55" />
        <circle class="unit-circle" cx="315" cy="220" r="145" />
        <path id="triangleFill" class="triangle-fill" d="" />
        <line id="xSide" class="side x-side" x1="315" y1="220" x2="315" y2="220" />
        <line id="ySide" class="side y-side" x1="315" y1="220" x2="315" y2="220" />
        <path id="angleArc" class="angle-arc" d="" />
        <line id="hypotenuse" class="side hypotenuse" x1="315" y1="220" x2="460" y2="220" />
        <circle id="point" class="point" cx="460" cy="220" r="8" />
        <text class="tick-label" x="480" y="246" text-anchor="middle">1</text>
        <text class="tick-label" x="150" y="246" text-anchor="middle">-1</text>
        <text class="tick-label" x="296" y="72" text-anchor="end">1</text>
        <text class="tick-label" x="296" y="376" text-anchor="end">-1</text>
        <text class="label" x="528" y="226">x</text>
        <text class="label" x="327" y="68">y</text>
      </svg>

      <section class="readout" aria-live="polite">
        <p class="readout-row">
          <span>coordinates</span>
          <span id="coordinateValue" class="value coordinate-value">(0.87, 0.50)</span>
        </p>
        <p class="readout-row">
          <span>cos(theta)</span>
          <span id="cosValue" class="value cos-value">0.87</span>
        </p>
        <p class="readout-row">
          <span>sin(theta)</span>
          <span id="sinValue" class="value sin-value">0.50</span>
        </p>
      </section>
    </div>

    <div class="controls">
      <label for="angle">angle</label>
      <input id="angle" type="range" min="0" max="360" value="30" step="1" />
      <output id="angleValue" for="angle">30°</output>
    </div>
  </main>

  <script>
    const cx = 315;
    const cy = 220;
    const radius = 145;
    const angleRadius = 54;

    const slider = document.getElementById("angle");
    const angleValue = document.getElementById("angleValue");
    const coordinateValue = document.getElementById("coordinateValue");
    const cosValue = document.getElementById("cosValue");
    const sinValue = document.getElementById("sinValue");
    const triangleFill = document.getElementById("triangleFill");
    const xSide = document.getElementById("xSide");
    const ySide = document.getElementById("ySide");
    const hypotenuse = document.getElementById("hypotenuse");
    const point = document.getElementById("point");
    const angleArc = document.getElementById("angleArc");

    function pointAt(degrees, r) {
      const radians = degrees * Math.PI / 180;
      return {
        x: cx + Math.cos(radians) * r,
        y: cy - Math.sin(radians) * r
      };
    }

    function signedZero(value) {
      return Math.abs(value) < 0.005 ? 0 : value;
    }

    function format(value) {
      return signedZero(value).toFixed(2);
    }

    function arcPath(degrees) {
      const clamped = Math.max(0.1, Math.min(359.9, degrees));
      const start = pointAt(0, angleRadius);
      const end = pointAt(clamped, angleRadius);
      const largeArc = clamped > 180 ? 1 : 0;
      return `M ${start.x} ${start.y} A ${angleRadius} ${angleRadius} 0 ${largeArc} 0 ${end.x} ${end.y}`;
    }

    function render() {
      const degrees = Number(slider.value);
      const radians = degrees * Math.PI / 180;
      const x = Math.cos(radians);
      const y = Math.sin(radians);
      const p = pointAt(degrees, radius);

      point.setAttribute("cx", p.x);
      point.setAttribute("cy", p.y);
      hypotenuse.setAttribute("x2", p.x);
      hypotenuse.setAttribute("y2", p.y);
      xSide.setAttribute("x2", p.x);
      ySide.setAttribute("x1", p.x);
      ySide.setAttribute("x2", p.x);
      ySide.setAttribute("y2", p.y);
      triangleFill.setAttribute("d", `M ${cx} ${cy} L ${p.x} ${cy} L ${p.x} ${p.y} Z`);
      angleArc.setAttribute("d", arcPath(degrees));

      angleValue.textContent = `${degrees}\u00b0`;
      coordinateValue.textContent = `(${format(x)}, ${format(y)})`;
      cosValue.textContent = format(x);
      sinValue.textContent = format(y);
    }

    slider.addEventListener("input", render);
    render();
  </script>
</body>
</html>
