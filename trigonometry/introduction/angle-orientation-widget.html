<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angle as orientation difference</title>
  <style>
    :root {
      --bg: #17130f;
      --panel: #221d19;
      --rule: rgba(214, 190, 154, 0.22);
      --text: #efe7d8;
      --muted: #a89980;
      --active: #f0ddba;
      --first: #f1c66e;
      --second: #f1c66e;
      --arc: #6dd3c4;
      --button: #33271d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Fraunces", Georgia, serif;
    }

    .angle-widget {
      width: min(860px, calc(100vw - 24px));
      padding: 1.2rem;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255, 244, 220, 0.05), 0 18px 54px rgba(0, 0, 0, 0.24);
    }

    .stage {
      position: relative;
      height: 330px;
      border: 1px solid rgba(240, 221, 186, 0.14);
      border-radius: 5px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(240, 221, 186, 0.1), transparent 0 2px, transparent 3px),
        linear-gradient(rgba(240, 221, 186, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240, 221, 186, 0.04) 1px, transparent 1px);
      background-size: auto, 34px 34px, 34px 34px;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .orientation-line {
      stroke-width: 8;
      stroke-linecap: round;
      transition: x1 140ms ease, y1 140ms ease, x2 140ms ease, y2 140ms ease, opacity 160ms ease;
    }

    .active-line {
      stroke: var(--active);
      opacity: 0.72;
      filter: drop-shadow(0 0 8px rgba(240, 221, 186, 0.18));
    }

    .first-line {
      stroke: var(--first);
      opacity: 0;
      filter: drop-shadow(0 0 8px rgba(109, 211, 196, 0.22));
    }

    .second-line {
      stroke: var(--second);
      opacity: 0;
      filter: drop-shadow(0 0 8px rgba(241, 198, 110, 0.22));
    }

    .has-first .first-line,
    .has-second .second-line {
      opacity: 1;
    }

    .has-second .active-line {
      opacity: 0;
    }

    .angle-ray {
      stroke-width: 8;
      stroke-linecap: round;
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .angle-ray-first { stroke: var(--first); }
    .angle-ray-second { stroke: var(--second); }

    .angle-arc {
      fill: none;
      stroke: var(--arc);
      stroke-width: 4;
      stroke-linecap: round;
      opacity: 0;
      filter: drop-shadow(0 0 7px rgba(109, 211, 196, 0.26));
      transition: opacity 220ms ease;
    }

    .has-second .angle-ray,
    .has-second .angle-arc {
      opacity: 1;
    }

    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 0.85rem;
      padding-top: 1rem;
      border-top: 1px solid var(--rule);
      margin-top: 1rem;
    }

    .slider-label,
    .status {
      color: var(--muted);
      font-family: "JetBrains Mono", Consolas, monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 999px;
      background: rgba(240, 221, 186, 0.18);
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--active);
      box-shadow: 0 0 9px rgba(240, 221, 186, 0.34);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: 0;
      border-radius: 999px;
      background: var(--active);
      box-shadow: 0 0 9px rgba(240, 221, 186, 0.34);
    }

    .button-row {
      grid-column: 1 / -1;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .buttons {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid rgba(232, 202, 151, 0.42);
      border-radius: 5px;
      background: var(--button);
      color: var(--text);
      cursor: pointer;
      font-family: "Fraunces", Georgia, serif;
      font-size: 1rem;
      padding: 0.58rem 0.9rem;
      transition: border-color 150ms ease, color 150ms ease, transform 150ms ease;
    }

    button:hover,
    button:focus-visible {
      border-color: rgba(232, 202, 151, 0.82);
      color: #f3d393;
      outline: none;
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: default;
      opacity: 0.45;
      transform: none;
    }

    @media (max-width: 640px) {
      .angle-widget { padding: 0.85rem; }
      .stage { height: 300px; }
      .controls {
        grid-template-columns: 1fr;
      }
      .button-row {
        display: grid;
        gap: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <main class="angle-widget" aria-label="Angle as a comparison between orientations">
    <div class="stage" id="stage">
      <svg viewBox="0 0 860 330" role="img" aria-label="A rotatable line segment with two stored orientations">
        <line id="firstLine" class="orientation-line first-line" x1="290" y1="165" x2="570" y2="165" />
        <line id="secondLine" class="orientation-line second-line" x1="290" y1="165" x2="570" y2="165" />
        <line id="activeLine" class="orientation-line active-line" x1="290" y1="165" x2="570" y2="165" />
        <line id="rayFirst" class="angle-ray angle-ray-first" x1="430" y1="165" x2="570" y2="165" />
        <line id="raySecond" class="angle-ray angle-ray-second" x1="430" y1="165" x2="570" y2="165" />
        <path id="angleArc" class="angle-arc" d="" />
      </svg>
    </div>
    <div class="controls">
      <span class="slider-label">Rotate</span>
      <input id="angleSlider" type="range" min="0" max="360" value="0" step="1" aria-label="Rotate the line segment" />
      <span class="status" id="angleReadout">0°</span>
      <div class="button-row">
        <div class="buttons">
          <button id="setFirst" type="button">Set 1st Orientation</button>
          <button id="setSecond" type="button" disabled>Set 2nd Orientation</button>
          <button id="reset" type="button">Reset</button>
        </div>
        <span class="status" id="status">Choose the first orientation</span>
      </div>
    </div>
  </main>

  <script>
    const stage = document.getElementById('stage');
    const slider = document.getElementById('angleSlider');
    const angleReadout = document.getElementById('angleReadout');
    const activeLine = document.getElementById('activeLine');
    const firstLine = document.getElementById('firstLine');
    const secondLine = document.getElementById('secondLine');
    const rayFirst = document.getElementById('rayFirst');
    const raySecond = document.getElementById('raySecond');
    const angleArc = document.getElementById('angleArc');
    const setFirst = document.getElementById('setFirst');
    const setSecond = document.getElementById('setSecond');
    const reset = document.getElementById('reset');
    const status = document.getElementById('status');

    const CX = 430;
    const CY = 165;
    const HALF = 140;
    const RAY = 140;
    let firstAngle = null;
    let secondAngle = null;

    function polar(length, degrees) {
      const radians = degrees * Math.PI / 180;
      return {
        x: CX + Math.cos(radians) * length,
        y: CY - Math.sin(radians) * length,
      };
    }

    function setLine(line, degrees, length = HALF) {
      const start = polar(length, degrees + 180);
      const end = polar(length, degrees);
      line.setAttribute('x1', start.x);
      line.setAttribute('y1', start.y);
      line.setAttribute('x2', end.x);
      line.setAttribute('y2', end.y);
    }

    function signedDelta(fromDeg, toDeg) {
      let delta = ((toDeg - fromDeg + 540) % 360) - 180;
      if (Math.abs(delta) > 90) {
        delta = delta > 0 ? delta - 180 : delta + 180;
      }
      return delta;
    }

    function arcPath(radius, fromDeg, toDeg) {
      const delta = signedDelta(fromDeg, toDeg);
      const start = polar(radius, fromDeg);
      const end = polar(radius, fromDeg + delta);
      const sweep = delta < 0 ? 1 : 0;
      return `M ${start.x} ${start.y} A ${radius} ${radius} 0 0 ${sweep} ${end.x} ${end.y}`;
    }

    function setRay(line, degrees) {
      const end = polar(RAY, degrees);
      line.setAttribute('x1', CX);
      line.setAttribute('y1', CY);
      line.setAttribute('x2', end.x);
      line.setAttribute('y2', end.y);
    }

    function render() {
      const currentAngle = Number(slider.value);
      setLine(activeLine, currentAngle);
      angleReadout.textContent = `${currentAngle === 360 ? 0 : currentAngle}°`;

      if (firstAngle !== null) {
        stage.classList.add('has-first');
        setLine(firstLine, firstAngle);
        setRay(rayFirst, firstAngle);
      } else {
        stage.classList.remove('has-first');
      }

      if (secondAngle !== null) {
        stage.classList.add('has-second');
        setLine(secondLine, secondAngle);
        setRay(raySecond, secondAngle);
        angleArc.setAttribute('d', arcPath(58, firstAngle, secondAngle));
      } else {
        stage.classList.remove('has-second');
      }

      setSecond.disabled = firstAngle === null || secondAngle !== null;
      setFirst.disabled = secondAngle !== null;

      if (secondAngle !== null) {
        status.textContent = 'Difference between orientations';
      } else if (firstAngle !== null) {
        status.textContent = 'Choose the second orientation';
      } else {
        status.textContent = 'Choose the first orientation';
      }
    }

    slider.addEventListener('input', render);

    setFirst.addEventListener('click', () => {
      firstAngle = Number(slider.value);
      secondAngle = null;
      render();
    });

    setSecond.addEventListener('click', () => {
      secondAngle = Number(slider.value);
      render();
    });

    reset.addEventListener('click', () => {
      firstAngle = null;
      secondAngle = null;
      slider.value = 0;
      render();
    });

    render();
  </script>
</body>
</html>
