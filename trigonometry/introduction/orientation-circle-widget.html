<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orientations form a circle</title>
  <style>
    :root {
      --bg: #17130f;
      --panel: #221d19;
      --rule: rgba(214,190,154,0.22);
      --text: #efe7d8;
      --muted: #a89980;
      --line: #f0ddba;
      --teal: #6dd3c4;
      --amber: #e8a13b;
      --btn: #33271d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Fraunces", Georgia, serif;
    }
    .widget {
      width: min(860px, calc(100vw - 24px));
      padding: 1.2rem;
      border: 1px solid var(--rule);
      border-radius: 6px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255,244,220,0.05), 0 18px 54px rgba(0,0,0,0.24);
    }
    .stage {
      border: 1px solid rgba(240,221,186,0.14);
      border-radius: 5px;
      overflow: hidden;
      background:
        linear-gradient(rgba(240,221,186,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,221,186,0.04) 1px, transparent 1px);
      background-size: 34px 34px;
    }
    svg { display: block; width: 100%; }
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--rule);
    }
    button {
      font-family: "JetBrains Mono", Consolas, monospace;
      font-size: 0.82rem;
      padding: 0.38rem 0.8rem;
      border: 1px solid rgba(232,202,151,0.35);
      border-radius: 5px;
      background: var(--btn);
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: border-color 140ms ease, color 140ms ease;
    }
    button:hover {
      border-color: rgba(232,202,151,0.72);
      color: var(--text);
    }
    .status {
      font-family: "JetBrains Mono", Consolas, monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Widget B: all orientations form a circle">
    <div class="stage">
      <svg id="svg" viewBox="0 0 720 400"
           aria-label="A line segment rotating around a fixed centre, its endpoint tracing out the full circle of all possible orientations">
        <defs>
          <filter id="seg-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="tip-glow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="6" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="circle-glow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="4" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Faint guide circle — always visible, shows where the trace is headed -->
        <circle cx="360" cy="195" r="140"
                fill="none"
                stroke="rgba(109,211,196,0.12)"
                stroke-width="2"/>

        <!-- Axis hints -->
        <line x1="210" y1="195" x2="510" y2="195"
              stroke="rgba(240,221,186,0.09)" stroke-width="1.5"/>
        <line x1="360" y1="45" x2="360" y2="345"
              stroke="rgba(240,221,186,0.09)" stroke-width="1.5"/>

        <!-- Traced arc: starts at rightmost point, grows clockwise -->
        <!-- The circle element's stroke-dasharray/offset is set by JS -->
        <circle id="trace" cx="360" cy="195" r="140"
                fill="none"
                stroke="#6dd3c4"
                stroke-width="3.5"
                stroke-linecap="round"
                filter="url(#circle-glow)"/>

        <!-- Starting orientation marker (faint dot at angle 0) -->
        <circle id="start-dot" cx="500" cy="195" r="4.5"
                fill="none"
                stroke="rgba(109,211,196,0.45)"
                stroke-width="2"/>

        <!-- The rotating line segment -->
        <line id="seg"
              x1="360" y1="195" x2="500" y2="195"
              stroke="#f0ddba" stroke-width="5.5" stroke-linecap="round"
              filter="url(#seg-glow)"/>

        <!-- Endpoint dot (the tracing tip) -->
        <circle id="tip" cx="500" cy="195" r="8"
                fill="#6dd3c4"
                filter="url(#tip-glow)"/>

        <!-- Centre dot -->
        <circle cx="360" cy="195" r="5" fill="#ece2d1"/>

        <!-- Angle label, shown near the arc -->
        <text id="ang-lbl"
              font-family="JetBrains Mono,Consolas,monospace"
              font-size="14" fill="#6dd3c4"
              text-anchor="middle" dominant-baseline="middle"
              opacity="0"/>

        <!-- "Same orientation" label — fades in on completion -->
        <text id="same-lbl"
              x="360" y="375"
              font-family="Fraunces,Georgia,serif"
              font-size="13.5"
              fill="rgba(240,221,186,0)"
              text-anchor="middle"
              letter-spacing="0.04em">
          0° and 360° are the same orientation
        </text>
      </svg>
    </div>

    <div class="controls">
      <button id="play-btn">Play</button>
      <span class="status" id="status-lbl">Ready to trace all orientations</span>
    </div>
  </main>

  <script>
    const CX = 360, CY = 195, R = 140;
    const PERIOD = 7000;   // ms per full revolution
    const CIRC   = 2 * Math.PI * R;  // circumference ≈ 879.6

    const seg      = document.getElementById('seg');
    const tip      = document.getElementById('tip');
    const trace    = document.getElementById('trace');
    const angLbl   = document.getElementById('ang-lbl');
    const sameLbl  = document.getElementById('same-lbl');
    const playBtn  = document.getElementById('play-btn');
    const statusLbl= document.getElementById('status-lbl');

    // Initialise dash
    trace.style.strokeDasharray  = CIRC;
    trace.style.strokeDashoffset = CIRC;  // fully hidden at start

    let paused   = true;
    let progress = 0;   // 0..1
    let lastTs   = null;
    let loops    = 0;

    function set(el, obj) {
      for (const [k, v] of Object.entries(obj)) el.setAttribute(k, v);
    }

    function frame(ts) {
      if (!paused) {
        if (lastTs !== null) {
          progress += (ts - lastTs) / PERIOD;
        }
        lastTs = ts;

        if (progress >= 1) {
          progress %= 1;
          loops++;
        }

        // --- Geometry ---
        const angle = progress * Math.PI * 2;  // CW in SVG (positive y down)
        const tx    = CX + R * Math.cos(angle);
        const ty    = CY + R * Math.sin(angle);

        // Update line
        set(seg, { x1: CX, y1: CY, x2: tx, y2: ty });
        set(tip, { cx: tx, cy: ty });

        // --- Trace arc ---
        // Dash drawn clockwise from rightmost point
        const drawn = progress * CIRC;
        trace.style.strokeDashoffset = CIRC - drawn;

        // Pulse the trace brighter on loop completion (first second after wrap)
        if (loops > 0 && progress < 0.08) {
          const p = 1 - progress / 0.08;
          trace.setAttribute('stroke-width', 3.5 + p * 2.5);
          trace.setAttribute('stroke', `rgba(109,211,196,${0.82 + p * 0.18})`);
        } else {
          trace.setAttribute('stroke-width', '3.5');
          trace.setAttribute('stroke', '#6dd3c4');
        }

        // --- Angle label ---
        const deg = Math.round(progress * 360);
        const lblR = R + 26;
        const lblX = CX + lblR * Math.cos(angle - 0.15);
        const lblY = CY + lblR * Math.sin(angle - 0.15);
        set(angLbl, { x: lblX, y: lblY, opacity: '0.88' });
        angLbl.textContent = deg + '°';

        // --- "Same orientation" message ---
        // Fade in as we approach / just pass 360°
        let msgAlpha = 0;
        if (loops > 0) {
          if (progress < 0.06) {
            msgAlpha = (1 - progress / 0.06) * 0.72;
          }
        }
        sameLbl.setAttribute('fill', `rgba(240,221,186,${msgAlpha})`);
      }

      requestAnimationFrame(frame);
    }

    playBtn.addEventListener('click', () => {
      paused = !paused;
      playBtn.textContent = paused ? 'Play' : 'Pause';
      statusLbl.textContent = paused
        ? 'Paused — ' + Math.round(progress * 360) + '°'
        : 'Tracing all orientations…';
      if (!paused) lastTs = null;
    });

    requestAnimationFrame(frame);
  </script>
</body>
</html>
