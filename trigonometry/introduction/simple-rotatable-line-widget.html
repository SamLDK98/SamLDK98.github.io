<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotatable line</title>
  <style>
    :root {
      --line: #f1c66e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      font-family: "Fraunces", Georgia, serif;
    }

    .widget {
      width: min(100%, 230px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 24px;
      gap: 0.65rem;
      align-items: center;
    }

    .stage {
      height: 230px;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .rotating-line {
      stroke: var(--line);
      stroke-width: 8;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(241, 198, 110, 0.26));
    }

    .center {
      fill: #efe7d8;
      opacity: 0.88;
    }

    input[type="range"] {
      display: block;
      width: 4px;
      height: 230px;
      -webkit-appearance: none;
      appearance: none;
      writing-mode: vertical-lr;
      direction: rtl;
      border-radius: 999px;
      background: rgba(240, 221, 186, 0.18);
      cursor: pointer;
      justify-self: center;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 17px;
      height: 17px;
      border-radius: 999px;
      background: var(--line);
      box-shadow: 0 0 9px rgba(241, 198, 110, 0.34);
    }

    input[type="range"]::-moz-range-thumb {
      width: 17px;
      height: 17px;
      border: 0;
      border-radius: 999px;
      background: var(--line);
      box-shadow: 0 0 9px rgba(241, 198, 110, 0.34);
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Rotatable line segment">
    <div class="stage">
      <svg viewBox="0 0 320 220" role="img" aria-label="A line segment rotating about its midpoint">
        <line id="line" class="rotating-line" x1="70" y1="110" x2="250" y2="110" />
        <circle class="center" cx="160" cy="110" r="4" />
      </svg>
    </div>
    <input id="slider" type="range" min="0" max="360" value="25" step="1" aria-label="Rotate line segment" />
  </main>

  <script>
    const slider = document.getElementById('slider');
    const line = document.getElementById('line');
    const cx = 160;
    const cy = 110;
    const half = 90;

    function point(angle, radius) {
      const radians = angle * Math.PI / 180;
      return {
        x: cx + Math.cos(radians) * radius,
        y: cy - Math.sin(radians) * radius,
      };
    }

    function render() {
      const angle = Number(slider.value);
      const start = point(angle + 180, half);
      const end = point(angle, half);
      line.setAttribute('x1', start.x);
      line.setAttribute('y1', start.y);
      line.setAttribute('x2', end.x);
      line.setAttribute('y2', end.y);
    }

    slider.addEventListener('input', render);
    render();
  </script>
</body>
</html>
