<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proportional Triangle Scaling</title>
  <style>
    :root {
      --bg: #161311;
      --rule: rgba(214, 196, 168, 0.16);
      --text: #ece2d1;
      --dim: #a89c87;
      --faint: #6f6557;
      --accent: #d4b888;
      --orange: #e8a13b;
      --cyan: #6dd3c4;
      --pink: #ef7398;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      border: 1px solid var(--rule);
      background: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.045), transparent 56%), var(--bg);
    }

    svg {
      display: block;
      width: min(100%, 760px);
      height: auto;
      margin: 0 auto;
      user-select: none;
    }

    .controls {
      padding: 0.6rem 1.25rem 0.4rem;
      border-top: 1px solid var(--rule);
      background: rgba(0, 0, 0, 0.12);
    }

    .scale-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.35rem;
    }

    .scale-head .lbl {
      color: var(--dim);
      font-size: 0.95rem;
      font-style: italic;
    }

    .scale-head .val {
      color: var(--accent);
      font-family: "Courier New", monospace;
      font-size: 0.85rem;
      font-weight: 700;
    }

    input[type="range"] {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 22px;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 2px;
      background: var(--rule);
    }

    input[type="range"]::-moz-range-track {
      height: 2px;
      background: var(--rule);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 9px rgba(212, 184, 136, 0.5);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border: 0;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 9px rgba(212, 184, 136, 0.5);
    }

    .caption {
      padding: 0.1rem 1.25rem 0.8rem;
      color: var(--faint);
      font-size: 0.86rem;
      font-style: italic;
      text-align: center;
    }

    .caption b {
      color: var(--accent);
      font-style: normal;
    }

    .side {
      stroke-linecap: round;
      stroke-width: 6;
      filter: drop-shadow(0 0 7px rgba(212, 184, 136, 0.12));
    }

    .side-a { stroke: var(--orange); }
    .side-b { stroke: var(--cyan); }
    .side-c { stroke: var(--pink); }

    .angle-arc {
      fill: none;
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-width: 3;
    }

    .vertex {
      fill: var(--text);
      opacity: 0.9;
    }

    text {
      font-family: "Courier New", monospace;
      font-weight: 700;
    }

    .angle-label {
      fill: var(--accent);
      font-size: 18px;
    }

    .length-label {
      font-size: 18px;
    }

    .length-a { fill: var(--orange); }
    .length-b { fill: var(--cyan); }
    .length-c { fill: var(--pink); }
  </style>
</head>
<body>
  <section class="widget">
    <svg id="canvas" viewBox="0 0 760 430" role="img" aria-label="A triangle scaling proportionally from side lengths 4, 5, 6 to 8, 10, 12">
      <path class="angle-arc" id="arcA" d="" />
      <path class="angle-arc" id="arcB" d="" />
      <path class="angle-arc" id="arcC" d="" />
      <line class="side side-c" id="sideC" x1="0" y1="0" x2="0" y2="0" />
      <line class="side side-b" id="sideB" x1="0" y1="0" x2="0" y2="0" />
      <line class="side side-a" id="sideA" x1="0" y1="0" x2="0" y2="0" />
      <circle class="vertex" id="vertexA" cx="0" cy="0" r="5" />
      <circle class="vertex" id="vertexB" cx="0" cy="0" r="5" />
      <circle class="vertex" id="vertexC" cx="0" cy="0" r="5" />
      <text class="angle-label" id="angleA" x="0" y="0"></text>
      <text class="angle-label" id="angleB" x="0" y="0"></text>
      <text class="angle-label" id="angleC" x="0" y="0"></text>
      <text class="length-label length-a" id="lengthA" x="0" y="0"></text>
      <text class="length-label length-b" id="lengthB" x="0" y="0"></text>
      <text class="length-label length-c" id="lengthC" x="0" y="0"></text>
    </svg>
    <div class="controls">
      <div class="scale-head">
        <span class="lbl">size</span>
        <span class="val" id="scaleDisp">&times;1.0</span>
      </div>
      <input id="scale" type="range" min="1" max="2" value="1" step="0.01" aria-label="Scale triangle proportionally">
    </div>
    <div class="caption">Same angles, same <b>4 : 5 : 6</b> ratio &mdash; only the size changes.</div>
  </section>

  <script>
    const svg = document.getElementById("canvas");
    const scaleInput = document.getElementById("scale");
    const scaleDisp = document.getElementById("scaleDisp");
    const el = Object.fromEntries([
      "sideA", "sideB", "sideC", "vertexA", "vertexB", "vertexC",
      "arcA", "arcB", "arcC", "angleA", "angleB", "angleC", "lengthA", "lengthB", "lengthC"
    ].map((id) => [id, document.getElementById(id)]));

    const unit = 42;
    const sides = { a: 4, b: 5, c: 6 };
    const baseY = 334;
    const baseX = 128;

    function pointFrom(anchor, radians, length) {
      return {
        x: anchor.x + Math.cos(radians) * length,
        y: anchor.y + Math.sin(radians) * length
      };
    }

    function midpoint(p, q) {
      return { x: (p.x + q.x) / 2, y: (p.y + q.y) / 2 };
    }

    function setLine(line, p, q) {
      line.setAttribute("x1", p.x);
      line.setAttribute("y1", p.y);
      line.setAttribute("x2", q.x);
      line.setAttribute("y2", q.y);
    }

    function setCircle(circle, p) {
      circle.setAttribute("cx", p.x);
      circle.setAttribute("cy", p.y);
    }

    function setText(text, p, value) {
      text.setAttribute("x", p.x);
      text.setAttribute("y", p.y);
      text.textContent = value;
    }

    function angleBetween(vertex, p1, p2) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      const a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      let diff = Math.abs((a2 - a1) * 180 / Math.PI);
      if (diff > 180) diff = 360 - diff;
      return diff;
    }

    function arcPath(vertex, p1, p2, radius) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      let a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      while (a2 < a1) a2 += Math.PI * 2;
      if (a2 - a1 > Math.PI) return arcPath(vertex, p2, p1, radius);
      const start = pointFrom(vertex, a1, radius);
      const end = pointFrom(vertex, a2, radius);
      return `M ${start.x} ${start.y} A ${radius} ${radius} 0 0 1 ${end.x} ${end.y}`;
    }

    function render() {
      const scale = Number(scaleInput.value);
      scaleDisp.textContent = `\u00d7${scale.toFixed(1)}`;
      const sideA = sides.a * unit * scale;
      const sideB = sides.b * unit * scale;
      const sideC = sides.c * unit * scale;
      const A = { x: baseX, y: baseY };
      const B = { x: baseX + sideC, y: baseY };
      const cx = (sideB ** 2 + sideC ** 2 - sideA ** 2) / (2 * sideC);
      const cy = Math.sqrt(Math.max(0, sideB ** 2 - cx ** 2));
      const C = { x: A.x + cx, y: A.y - cy };

      setLine(el.sideC, A, B);
      setLine(el.sideB, A, C);
      setLine(el.sideA, B, C);
      setCircle(el.vertexA, A);
      setCircle(el.vertexB, B);
      setCircle(el.vertexC, C);

      el.arcA.setAttribute("d", arcPath(A, B, C, 34));
      el.arcB.setAttribute("d", arcPath(B, C, A, 34));
      el.arcC.setAttribute("d", arcPath(C, A, B, 34));
      setText(el.angleA, { x: A.x + 18, y: A.y + 40 }, `${angleBetween(A, B, C).toFixed(1)}°`);
      setText(el.angleB, { x: B.x - 86, y: B.y + 40 }, `${angleBetween(B, C, A).toFixed(1)}°`);
      setText(el.angleC, { x: C.x - 24, y: C.y - 28 }, `${angleBetween(C, A, B).toFixed(1)}°`);

      const midA = midpoint(B, C);
      const midB = midpoint(A, C);
      const midC = midpoint(A, B);
      setText(el.lengthA, { x: midA.x + 22, y: midA.y - 6 }, (sides.a * scale).toFixed(1));
      setText(el.lengthB, { x: midB.x - 58, y: midB.y - 8 }, (sides.b * scale).toFixed(1));
      setText(el.lengthC, { x: midC.x - 14, y: midC.y + 34 }, (sides.c * scale).toFixed(1));
    }

    scaleInput.addEventListener("input", render);
    render();
  </script>
</body>
</html>
