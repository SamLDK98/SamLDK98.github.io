<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trig Function Game</title>
  <style>
    :root {
      --bg: #161311;
      --panel: #1e1a17;
      --rule: rgba(214, 196, 168, 0.16);
      --text: #ece2d1;
      --dim: #a89c87;
      --accent: #d4b888;
      --green: #78c884;
      --red: #e06b6b;
      --orange: #e8a13b;
      --cyan: #6dd3c4;
      --yellow: #e7c84f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      border: 1px solid var(--rule);
      background: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.045), transparent 56%), var(--bg);
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      padding: 1rem 1.15rem;
      border-bottom: 1px solid var(--rule);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 1.8rem);
      font-weight: 600;
    }

    .status {
      color: var(--dim);
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      min-height: 720px;
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 720px;
      padding: 1rem;
      border-right: 1px solid var(--rule);
    }

    svg {
      display: block;
      width: min(100%, 680px);
      height: auto;
      user-select: none;
    }

    .panel {
      padding: 1rem;
      background: rgba(0, 0, 0, 0.1);
    }

    .step {
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--rule);
    }

    .step:last-child { border-bottom: 0; }

    label,
    .label {
      display: block;
      margin-bottom: 0.45rem;
      color: var(--dim);
      font-family: "Courier New", monospace;
      font-size: 0.74rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    select,
    input {
      width: 100%;
      min-height: 2.25rem;
      padding: 0.45rem 0.55rem;
      border: 1px solid var(--rule);
      background: #15110f;
      color: var(--text);
      font: inherit;
    }

    .button-row,
    .side-grid,
    .ratio-grid {
      display: grid;
      gap: 0.5rem;
    }

    .button-row {
      grid-template-columns: 1fr 1fr;
    }

    .side-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    .ratio-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    button {
      min-height: 2.25rem;
      padding: 0.45rem 0.6rem;
      border: 1px solid var(--rule);
      background: rgba(0, 0, 0, 0.18);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button:hover,
    button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .side-choice.correct {
      border-color: var(--green);
      color: var(--green);
    }

    .fraction-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0.55rem;
      align-items: center;
    }

    .slash {
      color: var(--dim);
      font-family: "Courier New", monospace;
      font-size: 1.25rem;
    }

    .result {
      min-height: 3.3rem;
      margin-top: 0.8rem;
      padding: 0.8rem;
      border: 1px solid var(--rule);
      color: var(--dim);
      font-family: "Courier New", monospace;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .result.good {
      border-color: var(--green);
      color: var(--green);
      background: rgba(120, 200, 132, 0.08);
    }

    .result.bad {
      border-color: var(--red);
      color: var(--red);
      background: rgba(224, 107, 107, 0.08);
    }

    .triangle-fill { fill: rgba(214, 196, 168, 0.055); }
    .adjacent { stroke: var(--cyan); }
    .opposite { stroke: var(--orange); }
    .hypotenuse { stroke: var(--yellow); }
    .side {
      stroke-linecap: round;
      stroke-width: 6;
    }
    .right-mark,
    .angle-arc {
      fill: none;
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-width: 3;
    }
    .angle-arc.hidden,
    .angle-text.hidden { display: none; }
    .point { fill: var(--text); opacity: 0.9; }
    .label-text {
      fill: var(--text);
      font-family: "Courier New", monospace;
      font-size: 18px;
      font-weight: 700;
    }
    .angle-text {
      fill: var(--green);
      font-family: "Courier New", monospace;
      font-size: 22px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="widget">
    <div class="header">
      <h1>Choosing the Right Function</h1>
      <div class="status">right angle on the right</div>
    </div>
    <div class="layout">
      <div class="stage">
        <svg viewBox="0 0 680 520" role="img" aria-label="Right triangle game with two selectable unknown angles">
          <polygon class="triangle-fill" points="110,390 520,390 520,82" />
          <path class="angle-arc" d="M 172 390 A 62 62 0 0 0 159 352" />
          <path class="angle-arc" d="M 520 165 A 83 83 0 0 1 451 129" />
          <path class="angle-arc hidden" id="solvedArcA" d="M 172 390 A 62 62 0 0 0 159 352" />
          <path class="angle-arc hidden" id="solvedArcC" d="M 520 165 A 83 83 0 0 1 451 129" />
          <path class="right-mark" d="M 488 390 L 488 358 L 520 358" />
          <line class="side adjacent" id="baseSide" x1="110" y1="390" x2="520" y2="390" />
          <line class="side opposite" id="verticalSide" x1="520" y1="390" x2="520" y2="82" />
          <line class="side hypotenuse" id="hypSide" x1="110" y1="390" x2="520" y2="82" />
          <circle class="point" cx="110" cy="390" r="6" />
          <circle class="point" cx="520" cy="390" r="6" />
          <circle class="point" cx="520" cy="82" r="6" />
          <text class="label-text" x="297" y="425">4</text>
          <text class="label-text" x="540" y="245">3</text>
          <text class="label-text" x="286" y="205">5</text>
          <text class="label-text" x="155" y="366">A</text>
          <text class="label-text" x="450" y="142">C</text>
          <text class="angle-text hidden" id="answerA" x="145" y="345">36.9°</text>
          <text class="angle-text hidden" id="answerC" x="426" y="118">53.1°</text>
        </svg>
      </div>

      <div class="panel">
        <div class="step">
          <div class="label">1. Choose angle</div>
          <div class="button-row">
            <button type="button" data-angle="A">Angle A</button>
            <button type="button" data-angle="C">Angle C</button>
          </div>
        </div>

        <div class="step">
          <div class="label">2. Identify sides</div>
          <label for="oppSide">opposite</label>
          <select id="oppSide">
            <option value="">choose</option>
            <option value="base">base length 4</option>
            <option value="vertical">vertical length 3</option>
            <option value="hypotenuse">hypotenuse length 5</option>
          </select>
          <label for="adjSide">adjacent</label>
          <select id="adjSide">
            <option value="">choose</option>
            <option value="base">base length 4</option>
            <option value="vertical">vertical length 3</option>
            <option value="hypotenuse">hypotenuse length 5</option>
          </select>
          <label for="hypSideSelect">hypotenuse</label>
          <select id="hypSideSelect">
            <option value="">choose</option>
            <option value="base">base length 4</option>
            <option value="vertical">vertical length 3</option>
            <option value="hypotenuse">hypotenuse length 5</option>
          </select>
        </div>

        <div class="step">
          <div class="label">3. Choose ratio</div>
          <div class="ratio-grid">
            <button type="button" data-ratio="o/h">o/h</button>
            <button type="button" data-ratio="a/h">a/h</button>
            <button type="button" data-ratio="o/a">o/a</button>
          </div>
        </div>

        <div class="step">
          <div class="label">4. Enter side lengths</div>
          <div class="fraction-row">
            <input id="numerator" inputmode="decimal" placeholder="num">
            <span class="slash">/</span>
            <input id="denominator" inputmode="decimal" placeholder="den">
          </div>
        </div>

        <div class="step">
          <div class="label">5. Choose function</div>
          <div class="button-row">
            <select id="functionName">
              <option value="">function</option>
              <option value="sin">sine</option>
              <option value="cos">cosine</option>
              <option value="tan">tangent</option>
            </select>
            <select id="functionMode">
              <option value="">mode</option>
              <option value="normal">normal</option>
              <option value="inverse">inverse</option>
            </select>
          </div>
        </div>

        <div class="step">
          <label for="ratioValue">6. Enter ratio</label>
          <input id="ratioValue" inputmode="decimal" placeholder="e.g. 0.75">
          <button type="button" id="submit">Enter</button>
          <button type="button" id="reset">Reset</button>
          <div class="result" id="result">Complete each step, then press Enter.</div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const choices = {
      angle: null,
      ratio: null
    };
    const sideValues = {
      base: 4,
      vertical: 3,
      hypotenuse: 5
    };
    const angleData = {
      A: {
        answer: 36.87,
        sides: { opposite: "vertical", adjacent: "base", hypotenuse: "hypotenuse" },
        ratios: {
          "o/h": { fn: "sin", num: 3, den: 5 },
          "a/h": { fn: "cos", num: 4, den: 5 },
          "o/a": { fn: "tan", num: 3, den: 4 }
        },
        answerEl: "answerA",
        arcEl: "solvedArcA"
      },
      C: {
        answer: 53.13,
        sides: { opposite: "base", adjacent: "vertical", hypotenuse: "hypotenuse" },
        ratios: {
          "o/h": { fn: "sin", num: 4, den: 5 },
          "a/h": { fn: "cos", num: 3, den: 5 },
          "o/a": { fn: "tan", num: 4, den: 3 }
        },
        answerEl: "answerC",
        arcEl: "solvedArcC"
      }
    };

    const angleButtons = [...document.querySelectorAll("[data-angle]")];
    const ratioButtons = [...document.querySelectorAll("[data-ratio]")];
    const result = document.getElementById("result");
    const fields = {
      opposite: document.getElementById("oppSide"),
      adjacent: document.getElementById("adjSide"),
      hypotenuse: document.getElementById("hypSideSelect"),
      numerator: document.getElementById("numerator"),
      denominator: document.getElementById("denominator"),
      functionName: document.getElementById("functionName"),
      functionMode: document.getElementById("functionMode"),
      ratioValue: document.getElementById("ratioValue")
    };

    function setActive(buttons, attr, value) {
      buttons.forEach((button) => button.classList.toggle("active", button.dataset[attr] === value));
    }

    function numeric(value) {
      return Number(String(value).trim());
    }

    function closeEnough(a, b, tolerance = 0.015) {
      return Math.abs(a - b) <= tolerance;
    }

    function showResult(kind, message) {
      result.className = `result ${kind}`;
      result.innerHTML = message;
    }

    function check() {
      if (!choices.angle) {
        showResult("bad", "Choose one of the unknown angles first.");
        return;
      }
      const data = angleData[choices.angle];
      const sideOk = fields.opposite.value === data.sides.opposite &&
        fields.adjacent.value === data.sides.adjacent &&
        fields.hypotenuse.value === data.sides.hypotenuse;
      if (!sideOk) {
        showResult("bad", "The side labels are not correct for the selected angle.");
        return;
      }
      if (!choices.ratio) {
        showResult("bad", "Choose one of the three ratios.");
        return;
      }
      const expected = data.ratios[choices.ratio];
      const num = numeric(fields.numerator.value);
      const den = numeric(fields.denominator.value);
      if (num !== expected.num || den !== expected.den) {
        showResult("bad", `For ${choices.ratio}, the side lengths should be ${expected.num}/${expected.den}.`);
        return;
      }
      const ratio = expected.num / expected.den;
      if (fields.functionName.value !== expected.fn || fields.functionMode.value !== "inverse") {
        showResult("bad", "To recover an angle from a side ratio, choose the matching inverse function.");
        return;
      }
      if (!closeEnough(numeric(fields.ratioValue.value), ratio)) {
        showResult("bad", `The ratio should be close to ${ratio.toFixed(3)}.`);
        return;
      }

      document.getElementById(data.answerEl).classList.remove("hidden");
      document.getElementById(data.arcEl).classList.remove("hidden");
      showResult("good", `${expected.fn}<sup>-1</sup>(${ratio.toFixed(3)}) = ${data.answer.toFixed(1)}°`);
    }

    angleButtons.forEach((button) => {
      button.addEventListener("click", () => {
        choices.angle = button.dataset.angle;
        setActive(angleButtons, "angle", choices.angle);
      });
    });

    ratioButtons.forEach((button) => {
      button.addEventListener("click", () => {
        choices.ratio = button.dataset.ratio;
        setActive(ratioButtons, "ratio", choices.ratio);
      });
    });

    document.getElementById("submit").addEventListener("click", check);
    document.getElementById("reset").addEventListener("click", () => {
      choices.angle = null;
      choices.ratio = null;
      setActive(angleButtons, "angle", null);
      setActive(ratioButtons, "ratio", null);
      Object.values(fields).forEach((field) => { field.value = ""; });
      ["answerA", "answerC", "solvedArcA", "solvedArcC"].forEach((id) => {
        document.getElementById(id).classList.add("hidden");
      });
      showResult("", "Complete each step, then press Enter.");
    });
  </script>
</body>
</html>
