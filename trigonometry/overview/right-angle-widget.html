<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Right Angle</title>
  <style>
    :root {
      --bg: #161311;
      --rule: rgba(214, 196, 168, 0.16);
      --text: #ece2d1;
      --accent: #d4b888;
      --orange: #e8a13b;
      --cyan: #6dd3c4;
      --yellow: #e7c84f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      border: 1px solid var(--rule);
      background: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.045), transparent 56%), var(--bg);
    }

    svg {
      display: block;
      width: min(100%, 560px);
      height: auto;
      margin: 0 auto;
      user-select: none;
      touch-action: none;
    }

    .side {
      stroke-linecap: round;
      stroke-width: 6;
    }

    .adjacent { stroke: var(--cyan); cursor: ew-resize; }
    .opposite { stroke: var(--orange); cursor: ns-resize; }
    .hypotenuse { stroke: var(--yellow); }

    .fill {
      fill: rgba(214, 196, 168, 0.055);
    }

    .angle-arc {
      fill: none;
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-width: 3;
    }

    .right-mark {
      fill: none;
      stroke: var(--accent);
      stroke-width: 3;
    }

    .point {
      fill: var(--text);
      opacity: 0.9;
    }

    .handle-a {
      fill: var(--cyan);
      cursor: ew-resize;
    }

    .handle-c {
      fill: var(--orange);
      cursor: ns-resize;
    }

    text {
      font-family: "Courier New", monospace;
      font-weight: 700;
    }

    .angle-label {
      fill: var(--accent);
      font-size: 20px;
    }
  </style>
</head>
<body>
  <section class="widget">
    <svg viewBox="0 0 680 390" role="img" aria-label="Right triangle with fixed right angle and draggable side lengths">
      <polygon class="fill" id="fill" points="" />
      <path class="angle-arc" id="arcA" d="" />
      <path class="angle-arc" id="arcC" d="" />
      <path class="right-mark" id="rightMark" d="" />
      <line class="side adjacent" id="adjacent" x1="0" y1="0" x2="0" y2="0" />
      <line class="side opposite" id="opposite" x1="0" y1="0" x2="0" y2="0" />
      <line class="side hypotenuse" id="hypotenuse" x1="0" y1="0" x2="0" y2="0" />
      <circle class="point handle-a" id="pA" cx="0" cy="0" r="10" />
      <circle class="point" id="pB" cx="0" cy="0" r="5" />
      <circle class="point handle-c" id="pC" cx="0" cy="0" r="10" />
      <text class="angle-label" id="angleA" x="0" y="0"></text>
      <text class="angle-label" id="angleC" x="0" y="0"></text>
    </svg>
  </section>

  <script>
    const svg = document.querySelector("svg");
    const el = Object.fromEntries([
      "fill", "arcA", "arcC", "rightMark", "adjacent", "opposite", "hypotenuse",
      "pA", "pB", "pC", "angleA", "angleC"
    ].map((id) => [id, document.getElementById(id)]));

    let base = 280;
    let height = 190;
    let dragging = null;

    function setLine(line, from, to) {
      line.setAttribute("x1", from.x);
      line.setAttribute("y1", from.y);
      line.setAttribute("x2", to.x);
      line.setAttribute("y2", to.y);
    }

    function setCircle(circle, point) {
      circle.setAttribute("cx", point.x);
      circle.setAttribute("cy", point.y);
    }

    function arcPath(vertex, p1, p2, radius) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      let a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      while (a2 < a1) a2 += Math.PI * 2;
      if (a2 - a1 > Math.PI) return arcPath(vertex, p2, p1, radius);
      const start = { x: vertex.x + Math.cos(a1) * radius, y: vertex.y + Math.sin(a1) * radius };
      const end = { x: vertex.x + Math.cos(a2) * radius, y: vertex.y + Math.sin(a2) * radius };
      return `M ${start.x} ${start.y} A ${radius} ${radius} 0 0 1 ${end.x} ${end.y}`;
    }

    function pointerPoint(event) {
      const point = svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      return point.matrixTransform(svg.getScreenCTM().inverse());
    }

    function render() {
      const B = { x: 150, y: 300 };
      const A = { x: B.x + base, y: B.y };
      const C = { x: B.x, y: B.y - height };
      const angleA = Math.atan2(height, base) * 180 / Math.PI;
      const angleC = 90 - angleA;

      el.fill.setAttribute("points", `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`);
      setLine(el.adjacent, B, A);
      setLine(el.opposite, B, C);
      setLine(el.hypotenuse, A, C);
      [["pA", A], ["pB", B], ["pC", C]].forEach(([id, point]) => setCircle(el[id], point));

      el.arcA.setAttribute("d", arcPath(A, B, C, 38));
      el.arcC.setAttribute("d", arcPath(C, A, B, 38));
      el.rightMark.setAttribute("d", `M ${B.x + 32} ${B.y} L ${B.x + 32} ${B.y - 32} L ${B.x} ${B.y - 32}`);

      el.angleA.setAttribute("x", A.x - 72);
      el.angleA.setAttribute("y", A.y + 42);
      el.angleA.textContent = `${angleA.toFixed(1)}°`;
      el.angleC.setAttribute("x", C.x - 8);
      el.angleC.setAttribute("y", C.y - 24);
      el.angleC.textContent = `${angleC.toFixed(1)}°`;
    }

    function startDrag(which, event) {
      dragging = which;
      event.currentTarget.setPointerCapture(event.pointerId);
    }

    function drag(event) {
      if (!dragging) return;
      const point = pointerPoint(event);
      if (dragging === "base") {
        base = Math.min(360, Math.max(120, point.x - 150));
      } else {
        height = Math.min(270, Math.max(80, 300 - point.y));
      }
      render();
    }

    function stopDrag(event) {
      if (!dragging) return;
      event.currentTarget.releasePointerCapture(event.pointerId);
      dragging = null;
    }

    [
      [el.pA, "base"],
      [el.adjacent, "base"],
      [el.pC, "height"],
      [el.opposite, "height"]
    ].forEach(([node, which]) => {
      node.addEventListener("pointerdown", (event) => startDrag(which, event));
      node.addEventListener("pointermove", drag);
      node.addEventListener("pointerup", stopDrag);
      node.addEventListener("pointercancel", stopDrag);
    });

    render();
  </script>
</body>
</html>
