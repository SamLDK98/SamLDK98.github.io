<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Right Angle</title>
  <style>
    :root {
      --bg: #161311;
      --panel: #1e1a17;
      --rule: rgba(214, 196, 168, 0.16);
      --text: #ece2d1;
      --dim: #a89c87;
      --accent: #d4b888;
      --orange: #e8a13b;
      --cyan: #6dd3c4;
      --yellow: #e7c84f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 230px;
      border: 1px solid var(--rule);
      background: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.045), transparent 56%), var(--bg);
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
    }

    .stage {
      min-height: 470px;
      border-right: 1px solid var(--rule);
    }

    .controls {
      padding: 1rem;
      background: rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin: 0 0 0.5rem;
      color: var(--dim);
      font-family: "Courier New", monospace;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      margin: 0 0 1rem;
      accent-color: var(--accent);
    }

    .side {
      stroke-linecap: round;
      stroke-width: 6;
    }

    .adjacent { stroke: var(--cyan); }
    .opposite { stroke: var(--orange); }
    .hypotenuse { stroke: var(--yellow); }

    .fill {
      fill: rgba(214, 196, 168, 0.055);
    }

    .angle-arc {
      fill: none;
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-width: 3;
    }

    .right-mark {
      fill: none;
      stroke: var(--accent);
      stroke-width: 3;
    }

    .point {
      fill: var(--text);
      opacity: 0.9;
    }

    text {
      font-family: "Courier New", monospace;
      font-weight: 700;
    }

    .angle-label {
      fill: var(--accent);
      font-size: 20px;
    }

    .readout {
      padding: 0.75rem;
      border: 1px solid var(--rule);
      background: rgba(0, 0, 0, 0.14);
      color: var(--text);
      font-family: "Courier New", monospace;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .widget { grid-template-columns: 1fr; }
      .stage {
        min-height: 390px;
        border-right: 0;
        border-bottom: 1px solid var(--rule);
      }
    }
  </style>
</head>
<body>
  <section class="widget">
    <div class="stage">
      <svg viewBox="0 0 680 470" role="img" aria-label="Right triangle with fixed right angle and changing acute angles">
        <polygon class="fill" id="fill" points="" />
        <path class="angle-arc" id="arcA" d="" />
        <path class="angle-arc" id="arcC" d="" />
        <path class="right-mark" id="rightMark" d="" />
        <line class="side adjacent" id="adjacent" x1="0" y1="0" x2="0" y2="0" />
        <line class="side opposite" id="opposite" x1="0" y1="0" x2="0" y2="0" />
        <line class="side hypotenuse" id="hypotenuse" x1="0" y1="0" x2="0" y2="0" />
        <circle class="point" id="pA" cx="0" cy="0" r="5" />
        <circle class="point" id="pB" cx="0" cy="0" r="5" />
        <circle class="point" id="pC" cx="0" cy="0" r="5" />
        <text class="angle-label" id="angleA" x="0" y="0"></text>
        <text class="angle-label" id="angleB" x="0" y="0">90°</text>
        <text class="angle-label" id="angleC" x="0" y="0"></text>
      </svg>
    </div>
    <aside class="controls">
      <label for="base">base length</label>
      <input id="base" type="range" min="120" max="360" value="280">

      <label for="height">height</label>
      <input id="height" type="range" min="90" max="300" value="190">

      <div class="readout" id="readout"></div>
    </aside>
  </section>

  <script>
    const el = Object.fromEntries([
      "fill", "arcA", "arcC", "rightMark", "adjacent", "opposite", "hypotenuse",
      "pA", "pB", "pC", "angleA", "angleB", "angleC", "readout"
    ].map((id) => [id, document.getElementById(id)]));
    const baseInput = document.getElementById("base");
    const heightInput = document.getElementById("height");

    function setLine(line, from, to) {
      line.setAttribute("x1", from.x);
      line.setAttribute("y1", from.y);
      line.setAttribute("x2", to.x);
      line.setAttribute("y2", to.y);
    }

    function setCircle(circle, point) {
      circle.setAttribute("cx", point.x);
      circle.setAttribute("cy", point.y);
    }

    function arcPath(vertex, p1, p2, radius) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      let a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      while (a2 < a1) a2 += Math.PI * 2;
      if (a2 - a1 > Math.PI) return arcPath(vertex, p2, p1, radius);
      const start = { x: vertex.x + Math.cos(a1) * radius, y: vertex.y + Math.sin(a1) * radius };
      const end = { x: vertex.x + Math.cos(a2) * radius, y: vertex.y + Math.sin(a2) * radius };
      return `M ${start.x} ${start.y} A ${radius} ${radius} 0 0 1 ${end.x} ${end.y}`;
    }

    function render() {
      const base = Number(baseInput.value);
      const height = Number(heightInput.value);
      const B = { x: 170, y: 360 };
      const A = { x: B.x + base, y: B.y };
      const C = { x: B.x, y: B.y - height };
      const hyp = Math.hypot(base, height);
      const angleA = Math.atan2(height, base) * 180 / Math.PI;
      const angleC = 90 - angleA;

      el.fill.setAttribute("points", `${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`);
      setLine(el.adjacent, B, A);
      setLine(el.opposite, B, C);
      setLine(el.hypotenuse, A, C);
      [["pA", A], ["pB", B], ["pC", C]].forEach(([id, point]) => setCircle(el[id], point));

      el.arcA.setAttribute("d", arcPath(A, B, C, 40));
      el.arcC.setAttribute("d", arcPath(C, A, B, 40));
      el.rightMark.setAttribute("d", `M ${B.x + 34} ${B.y} L ${B.x + 34} ${B.y - 34} L ${B.x} ${B.y - 34}`);

      el.angleA.setAttribute("x", A.x - 72);
      el.angleA.setAttribute("y", A.y - 18);
      el.angleA.textContent = `${angleA.toFixed(1)}°`;
      el.angleB.setAttribute("x", B.x + 42);
      el.angleB.setAttribute("y", B.y - 42);
      el.angleC.setAttribute("x", C.x + 18);
      el.angleC.setAttribute("y", C.y + 58);
      el.angleC.textContent = `${angleC.toFixed(1)}°`;

      el.readout.innerHTML = `
        base: ${(base / 70).toFixed(2)}<br>
        height: ${(height / 70).toFixed(2)}<br>
        hypotenuse: ${(hyp / 70).toFixed(2)}
      `;
    }

    baseInput.addEventListener("input", render);
    heightInput.addEventListener("input", render);
    render();
  </script>
</body>
</html>
