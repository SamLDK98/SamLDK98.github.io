<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Degree Circle</title>
  <style>
    :root {
      --bg: #161311;
      --panel: #1e1a17;
      --rule: rgba(214, 196, 168, 0.14);
      --text: #ece2d1;
      --dim: #a89c87;
      --accent: #d4b888;
      --blue: #6ea7ff;
      --yellow: #f1d84d;
      --green: #7ea35f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      min-height: 720px;
      border: 1px solid var(--rule);
      background:
        radial-gradient(ellipse at top, rgba(212, 184, 136, 0.045), transparent 55%),
        var(--bg);
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: end;
      padding: 1.3rem 1.6rem;
      border-bottom: 1px solid var(--rule);
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.45rem, 3vw, 2.2rem);
      font-weight: 500;
      letter-spacing: 0;
    }

    .readout {
      min-width: 130px;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--rule);
      background: rgba(0, 0, 0, 0.14);
      color: var(--blue);
      font-family: "Courier New", monospace;
      font-size: 1.35rem;
      text-align: center;
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 620px;
      padding: 1rem;
    }

    svg {
      display: block;
      width: min(100%, 760px);
      height: auto;
      touch-action: none;
      user-select: none;
    }

    .circle {
      fill: rgba(0, 0, 0, 0.08);
      stroke: rgba(236, 226, 209, 0.66);
      stroke-width: 2.5;
    }

    .axis {
      stroke: rgba(168, 156, 135, 0.45);
      stroke-width: 1.4;
      stroke-dasharray: 4 5;
    }

    .axis-arrow {
      fill: rgba(168, 156, 135, 0.55);
    }

    .quadrant {
      fill: rgba(236, 226, 209, 0.62);
      font-size: 70px;
      font-style: italic;
      font-weight: 700;
      opacity: 0.52;
    }

    .degree-label {
      fill: var(--green);
      font-family: "Courier New", monospace;
      font-size: 23px;
      font-weight: 700;
    }

    .tick-point {
      fill: rgba(212, 184, 136, 0.62);
      stroke: rgba(0, 0, 0, 0.5);
      stroke-width: 2;
    }

    .tick-point.angle-45 {
      fill: var(--yellow);
      stroke: rgba(0, 0, 0, 0.62);
      stroke-width: 2.4;
    }

    .angle-sector {
      fill: rgba(110, 167, 255, 0.16);
      stroke: none;
    }

    .angle-arc,
    .angle-ray,
    .base-ray {
      fill: none;
      stroke: var(--blue);
      stroke-linecap: round;
      stroke-width: 4;
    }

    .angle-ray {
      filter: drop-shadow(0 0 5px rgba(110, 167, 255, 0.36));
    }

    .handle {
      fill: var(--blue);
      stroke: var(--text);
      stroke-width: 2.5;
      cursor: grab;
    }

    .handle:active {
      cursor: grabbing;
    }

    .angle-text {
      fill: var(--blue);
      font-family: "Courier New", monospace;
      font-size: 21px;
      font-weight: 700;
    }

    .hint {
      position: absolute;
      left: 1.2rem;
      bottom: 1rem;
      margin: 0;
      color: var(--dim);
      font-family: "Courier New", monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
    }

    @media (max-width: 720px) {
      .widget {
        min-height: 650px;
      }

      header {
        grid-template-columns: 1fr;
      }

      .readout {
        justify-self: start;
      }

      .stage {
        min-height: 540px;
      }

      .quadrant {
        font-size: 52px;
      }

      .degree-label {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <section class="widget">
    <header>
      <h1>Degrees Around a Circle</h1>
      <div class="readout" id="readout">30&deg;</div>
    </header>

    <div class="stage">
      <svg id="circleSvg" viewBox="0 0 760 620" role="img" aria-label="Interactive degree circle with a movable angle ray">
        <defs>
          <marker id="blueArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M 0 0 L 8 4 L 0 8 Z" fill="#6ea7ff"></path>
          </marker>
          <marker id="axisArrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
            <path d="M 0 0 L 7 3.5 L 0 7 Z" class="axis-arrow"></path>
          </marker>
        </defs>

        <line class="axis" x1="70" y1="310" x2="690" y2="310" marker-start="url(#axisArrow)" marker-end="url(#axisArrow)" />
        <line class="axis" x1="380" y1="600" x2="380" y2="20" marker-start="url(#axisArrow)" marker-end="url(#axisArrow)" />
        <circle class="circle" cx="380" cy="310" r="260" />

        <text class="quadrant" x="485" y="240">I</text>
        <text class="quadrant" x="260" y="240">II</text>
        <text class="quadrant" x="260" y="435">III</text>
        <text class="quadrant" x="470" y="435">IV</text>

        <g id="ticks"></g>
        <path class="angle-sector" id="sector"></path>
        <line class="base-ray" x1="380" y1="310" x2="660" y2="310" marker-end="url(#blueArrow)" />
        <path class="angle-arc" id="arc"></path>
        <line class="angle-ray" id="ray" x1="380" y1="310" x2="0" y2="0" marker-end="url(#blueArrow)" />
        <circle class="handle" id="handle" cx="0" cy="0" r="10" tabindex="0" aria-label="Drag or use arrow keys to change the angle" />
        <text class="angle-text" id="angleText" x="0" y="0">30&deg;</text>
      </svg>
    </div>
  </section>

  <script>
    const svg = document.getElementById("circleSvg");
    const ticks = document.getElementById("ticks");
    const sector = document.getElementById("sector");
    const arc = document.getElementById("arc");
    const ray = document.getElementById("ray");
    const handle = document.getElementById("handle");
    const angleText = document.getElementById("angleText");
    const readout = document.getElementById("readout");

    const cx = 380;
    const cy = 310;
    const radius = 260;
    const rayRadius = 290;
    const arcRadius = 82;
    let angle = 30;
    let dragging = false;

    function toRad(degrees) {
      return degrees * Math.PI / 180;
    }

    function pointAt(degrees, r = radius) {
      const radians = toRad(degrees);
      return {
        x: cx + Math.cos(radians) * r,
        y: cy - Math.sin(radians) * r
      };
    }

    function describeArc(startAngle, endAngle, r) {
      const start = pointAt(startAngle, r);
      const end = pointAt(endAngle, r);
      const largeArc = Math.abs(endAngle - startAngle) > 180 ? 1 : 0;
      return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y}`;
    }

    function describeSector(degrees) {
      const start = pointAt(0, arcRadius);
      const end = pointAt(degrees, arcRadius);
      const largeArc = degrees > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${start.x} ${start.y} A ${arcRadius} ${arcRadius} 0 ${largeArc} 0 ${end.x} ${end.y} Z`;
    }

    function normalize(degrees) {
      return ((Math.round(degrees / 5) * 5) % 360 + 360) % 360;
    }

    function labelAnchor(degrees) {
      const p = pointAt(degrees, radius + 30);
      const anchor = degrees > 90 && degrees < 270 ? "end" : "start";
      return { ...p, anchor };
    }

    function buildTicks() {
      const marks = [0, 30, 45, 60, 90, 120, 135, 150, 180, 210, 225, 240, 270, 300, 315, 330];
      marks.forEach((degrees) => {
        const point = pointAt(degrees);
        const label = labelAnchor(degrees);
        const isFortyFiveMultiple = degrees % 45 === 0;
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("class", isFortyFiveMultiple ? "tick-point angle-45" : "tick-point");
        dot.setAttribute("cx", point.x);
        dot.setAttribute("cy", point.y);
        dot.setAttribute("r", isFortyFiveMultiple ? "9" : "6");
        ticks.appendChild(dot);

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("class", "degree-label");
        text.setAttribute("x", label.x);
        text.setAttribute("y", label.y + 7);
        text.setAttribute("text-anchor", label.anchor);
        text.textContent = `${degrees}\u00b0`;
        ticks.appendChild(text);
      });
    }

    function setAngle(degrees) {
      angle = normalize(degrees);
      const end = pointAt(angle, rayRadius);
      const handlePoint = pointAt(angle, radius);
      const label = pointAt(angle / 2, arcRadius + 32);

      ray.setAttribute("x2", end.x);
      ray.setAttribute("y2", end.y);
      handle.setAttribute("cx", handlePoint.x);
      handle.setAttribute("cy", handlePoint.y);
      sector.setAttribute("d", describeSector(angle));
      arc.setAttribute("d", describeArc(0, angle, arcRadius));
      angleText.setAttribute("x", label.x + 6);
      angleText.setAttribute("y", label.y + 7);
      angleText.textContent = `${angle}\u00b0`;
      readout.innerHTML = `${angle}&deg;`;
    }

    function angleFromEvent(event) {
      const rect = svg.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * 760;
      const y = ((event.clientY - rect.top) / rect.height) * 620;
      const radians = Math.atan2(cy - y, x - cx);
      return radians * 180 / Math.PI;
    }

    svg.addEventListener("pointerdown", (event) => {
      dragging = true;
      svg.setPointerCapture(event.pointerId);
      setAngle(angleFromEvent(event));
    });

    svg.addEventListener("pointermove", (event) => {
      if (dragging) {
        setAngle(angleFromEvent(event));
      }
    });

    svg.addEventListener("pointerup", (event) => {
      dragging = false;
      svg.releasePointerCapture(event.pointerId);
    });

    handle.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "ArrowUp") {
        event.preventDefault();
        setAngle(angle + 5);
      }
      if (event.key === "ArrowLeft" || event.key === "ArrowDown") {
        event.preventDefault();
        setAngle(angle - 5);
      }
    });

    buildTicks();
    setAngle(angle);
  </script>
</body>
</html>
