<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixed Triangle</title>
  <style>
    :root {
      --bg: #161311;
      --rule: rgba(214, 196, 168, 0.16);
      --text: #ece2d1;
      --dim: #a89c87;
      --accent: #d4b888;
      --orange: #e8a13b;
      --cyan: #6dd3c4;
      --pink: #ef7398;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      border: 1px solid var(--rule);
      background: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.045), transparent 56%), var(--bg);
    }

    .stage { min-height: 430px; }

    svg {
      display: block;
      width: min(100%, 760px);
      height: auto;
      margin: 0 auto;
      user-select: none;
      touch-action: none;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      border-top: 1px solid var(--rule);
      background: rgba(0, 0, 0, 0.1);
    }

    .side-key {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      font-family: "Courier New", monospace;
      font-size: 1rem;
      font-weight: 700;
    }

    button {
      min-height: 2.25rem;
      padding: 0 0.9rem;
      border: 1px solid var(--rule);
      background: rgba(0, 0, 0, 0.18);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .key-a { color: var(--orange); }
    .key-b { color: var(--cyan); }
    .key-c { color: var(--pink); }

    .side {
      stroke-linecap: round;
      stroke-width: 6;
      cursor: grab;
      filter: drop-shadow(0 0 7px rgba(212, 184, 136, 0.12));
    }

    .side:active { cursor: grabbing; }
    .side-a { stroke: var(--orange); }
    .side-b { stroke: var(--cyan); }
    .side-c { stroke: var(--pink); }

    .angle-arc {
      fill: none;
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-width: 3;
    }

    .handle {
      stroke: var(--bg);
      stroke-width: 2;
      cursor: grab;
    }

    .handle-a { fill: var(--orange); }
    .handle-b { fill: var(--cyan); }
    .handle-c { fill: var(--pink); }

    text {
      font-family: "Courier New", monospace;
      font-weight: 700;
    }

    .angle-label {
      fill: var(--accent);
      font-size: 18px;
    }

    .hint {
      fill: var(--dim);
      font-size: 14px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <section class="widget">
    <div class="stage">
      <svg id="canvas" viewBox="0 0 760 430" role="img" aria-label="Disconnected fixed side lengths that can only form one triangle">
        <path class="angle-arc" id="arc0" d="" />
        <path class="angle-arc" id="arc1" d="" />
        <path class="angle-arc" id="arc2" d="" />
        <line class="side side-c" id="sideC" x1="0" y1="0" x2="0" y2="0" />
        <line class="side side-b" id="sideB" x1="0" y1="0" x2="0" y2="0" />
        <line class="side side-a" id="sideA" x1="0" y1="0" x2="0" y2="0" />
        <circle class="handle handle-a" id="a1" cx="0" cy="0" r="9" />
        <circle class="handle handle-a" id="a2" cx="0" cy="0" r="9" />
        <circle class="handle handle-b" id="b1" cx="0" cy="0" r="9" />
        <circle class="handle handle-b" id="b2" cx="0" cy="0" r="9" />
        <circle class="handle handle-c" id="c1" cx="0" cy="0" r="9" />
        <circle class="handle handle-c" id="c2" cx="0" cy="0" r="9" />
        <text class="angle-label" id="angle0" x="0" y="0"></text>
        <text class="angle-label" id="angle1" x="0" y="0"></text>
        <text class="angle-label" id="angle2" x="0" y="0"></text>
        <text class="hint" id="hint" x="80" y="54">drag lines to move them; drag endpoints to rotate and snap them together</text>
      </svg>
    </div>
    <div class="controls">
      <div class="side-key" aria-label="Fixed side lengths">
        <span class="key-a">a = 4</span>
        <span class="key-b">b = 5</span>
        <span class="key-c">c = 6</span>
      </div>
      <button type="button" id="reset">Reset</button>
    </div>
  </section>

  <script>
    const svg = document.getElementById("canvas");
    const reset = document.getElementById("reset");
    const ids = ["sideA", "sideB", "sideC", "a1", "a2", "b1", "b2", "c1", "c2", "arc0", "arc1", "arc2", "angle0", "angle1", "angle2", "hint"];
    const el = Object.fromEntries(ids.map((id) => [id, document.getElementById(id)]));

    const scale = 50;
    const lengths = { a: 4 * scale, b: 5 * scale, c: 6 * scale };
    const segments = {};
    let connections = [];
    let dragging = null;
    let locked = false;

    function resetState() {
      segments.a = { p1: { x: 420, y: 122 }, p2: { x: 420 + lengths.a, y: 122 }, length: lengths.a };
      segments.b = { p1: { x: 120, y: 138 }, p2: { x: 120 + lengths.b, y: 138 }, length: lengths.b };
      segments.c = { p1: { x: 170, y: 330 }, p2: { x: 170 + lengths.c, y: 330 }, length: lengths.c };
      connections = [];
      dragging = null;
      locked = false;
      el.hint.textContent = "drag lines to move them; drag endpoints to rotate and snap them together";
      render();
    }

    function distance(p, q) {
      return Math.hypot(p.x - q.x, p.y - q.y);
    }

    function pointFrom(anchor, radians, length) {
      return {
        x: anchor.x + Math.cos(radians) * length,
        y: anchor.y + Math.sin(radians) * length
      };
    }

    function setLine(line, p, q) {
      line.setAttribute("x1", p.x);
      line.setAttribute("y1", p.y);
      line.setAttribute("x2", q.x);
      line.setAttribute("y2", q.y);
    }

    function setCircle(circle, p) {
      circle.setAttribute("cx", p.x);
      circle.setAttribute("cy", p.y);
    }

    function setText(text, p, value) {
      text.setAttribute("x", p.x);
      text.setAttribute("y", p.y);
      text.textContent = value;
    }

    function pointerPoint(event) {
      const point = svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      return point.matrixTransform(svg.getScreenCTM().inverse());
    }

    function endpointKey(endpoint) {
      return `${endpoint.segment}.${endpoint.end}`;
    }

    function parseEndpoint(key) {
      const [segment, end] = key.split(".");
      return { segment, end };
    }

    function endpointPoint(endpoint) {
      return segments[endpoint.segment][endpoint.end];
    }

    function otherEnd(end) {
      return end === "p1" ? "p2" : "p1";
    }

    function allEndpoints() {
      return ["a", "b", "c"].flatMap((segment) => [
        { segment, end: "p1" },
        { segment, end: "p2" }
      ]);
    }

    function removeConnectionsFor(key) {
      connections = connections.filter((connection) => !connection.includes(key));
    }

    function isConnected(key) {
      return connections.some((connection) => connection.includes(key));
    }

    function translateSegment(segment, dx, dy) {
      segment.p1 = { x: segment.p1.x + dx, y: segment.p1.y + dy };
      segment.p2 = { x: segment.p2.x + dx, y: segment.p2.y + dy };
    }

    function connectedSegments(startSegment) {
      const connected = new Set([startSegment]);
      let changed = true;
      while (changed) {
        changed = false;
        connections.forEach(([leftKey, rightKey]) => {
          const left = parseEndpoint(leftKey).segment;
          const right = parseEndpoint(rightKey).segment;
          if (connected.has(left) && !connected.has(right)) {
            connected.add(right);
            changed = true;
          }
          if (connected.has(right) && !connected.has(left)) {
            connected.add(left);
            changed = true;
          }
        });
      }
      return connected;
    }

    function translateConnectedSegments(segmentName, dx, dy) {
      connectedSegments(segmentName).forEach((name) => translateSegment(segments[name], dx, dy));
    }

    function rotateSegment(segmentName, anchorEnd, point) {
      const segment = segments[segmentName];
      const anchor = segment[anchorEnd];
      const movingEnd = otherEnd(anchorEnd);
      const angle = Math.atan2(point.y - anchor.y, point.x - anchor.x);
      segment[movingEnd] = pointFrom(anchor, angle, segment.length);
    }

    function alignEndpointTo(endpoint, target) {
      const key = endpointKey(endpoint);
      const anchorEnd = otherEnd(endpoint.end);
      const anchorKey = `${endpoint.segment}.${anchorEnd}`;
      if (isConnected(anchorKey)) {
        rotateSegment(endpoint.segment, anchorEnd, target);
        return;
      }
      const current = endpointPoint(endpoint);
      translateSegment(segments[endpoint.segment], target.x - current.x, target.y - current.y);
    }

    function snapToExactTriangle() {
      const vertexConnections = connections.map((pair) => pair.map(parseEndpoint));
      const currentPoints = vertexConnections.flat().map(endpointPoint);
      const center = currentPoints.reduce((sum, point) => ({
        x: sum.x + point.x / currentPoints.length,
        y: sum.y + point.y / currentPoints.length
      }), { x: 0, y: 0 });

      const vertices = vertexConnections.map((pair) => ({
        pair,
        key: pair.map(endpointKey).join("|"),
        segments: pair.map((endpoint) => endpoint.segment)
      }));
      const vertexForSegmentPair = (first, second) => vertices.find((vertex) =>
        vertex.segments.includes(first) && vertex.segments.includes(second)
      );
      const vertexAB = vertexForSegmentPair("a", "b");
      const vertexAC = vertexForSegmentPair("a", "c");
      const vertexBC = vertexForSegmentPair("b", "c");
      if (!vertexAB || !vertexAC || !vertexBC) return;

      const base = lengths.c;
      const sideA = lengths.a;
      const sideB = lengths.b;
      const heightX = (sideB ** 2 + base ** 2 - sideA ** 2) / (2 * base);
      const heightY = Math.sqrt(Math.max(0, sideB ** 2 - heightX ** 2));
      const positions = new Map([
        [vertexBC.key, { x: 0, y: 0 }],
        [vertexAC.key, { x: base, y: 0 }],
        [vertexAB.key, { x: heightX, y: -heightY }]
      ]);
      const rawCenter = [...positions.values()].reduce((sum, point) => ({
        x: sum.x + point.x / 3,
        y: sum.y + point.y / 3
      }), { x: 0, y: 0 });
      const offset = { x: center.x - rawCenter.x, y: center.y - rawCenter.y };

      vertices.forEach((vertex) => {
        const raw = positions.get(vertex.key);
        const position = { x: raw.x + offset.x, y: raw.y + offset.y };
        vertex.pair.forEach((endpoint) => {
          segments[endpoint.segment][endpoint.end] = { ...position };
        });
      });
      dragging = null;
      locked = true;
      el.hint.textContent = "closed: these three lengths force this exact set of angles";
    }

    function maybeSnap() {
      if (locked) return;
      const snap = 24;
      const endpoints = allEndpoints();
      for (let i = 0; i < endpoints.length; i += 1) {
        for (let j = i + 1; j < endpoints.length; j += 1) {
          const left = endpoints[i];
          const right = endpoints[j];
          if (left.segment === right.segment) continue;
          const leftKey = endpointKey(left);
          const rightKey = endpointKey(right);
          if (isConnected(leftKey) || isConnected(rightKey)) continue;
          if (distance(endpointPoint(left), endpointPoint(right)) >= snap) continue;
          const target = endpointPoint(left);
          alignEndpointTo(right, target);
          connections.push([leftKey, rightKey]);
          el.hint.textContent = "connected endpoints create fixed corner angles; keep trying to close the triangle";
          if (connections.length === 3) snapToExactTriangle();
          return;
        }
      }
    }

    function degreesAt(vertex, p1, p2) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      const a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      let diff = Math.abs((a2 - a1) * 180 / Math.PI);
      if (diff > 180) diff = 360 - diff;
      return diff;
    }

    function arcPath(vertex, p1, p2, radius) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      let a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      while (a2 < a1) a2 += Math.PI * 2;
      if (a2 - a1 > Math.PI) return arcPath(vertex, p2, p1, radius);
      const start = { x: vertex.x + Math.cos(a1) * radius, y: vertex.y + Math.sin(a1) * radius };
      const end = { x: vertex.x + Math.cos(a2) * radius, y: vertex.y + Math.sin(a2) * radius };
      return `M ${start.x} ${start.y} A ${radius} ${radius} 0 0 1 ${end.x} ${end.y}`;
    }

    function renderAngles() {
      ["arc0", "arc1", "arc2"].forEach((id) => el[id].setAttribute("d", ""));
      ["angle0", "angle1", "angle2"].forEach((id) => el[id].textContent = "");
      connections.slice(0, 3).forEach(([leftKey, rightKey], index) => {
        const left = parseEndpoint(leftKey);
        const right = parseEndpoint(rightKey);
        const vertex = endpointPoint(left);
        const leftOther = segments[left.segment][otherEnd(left.end)];
        const rightOther = segments[right.segment][otherEnd(right.end)];
        const angle = degreesAt(vertex, leftOther, rightOther);
        el[`arc${index}`].setAttribute("d", arcPath(vertex, leftOther, rightOther, 32));
        setText(el[`angle${index}`], { x: vertex.x - 22, y: vertex.y - 24 }, `${angle.toFixed(1)}°`);
      });
      if (connections.length === 3) {
        el.hint.textContent = "closed: these three lengths force this exact set of angles";
      }
    }

    function render() {
      setLine(el.sideA, segments.a.p1, segments.a.p2);
      setLine(el.sideB, segments.b.p1, segments.b.p2);
      setLine(el.sideC, segments.c.p1, segments.c.p2);
      ["a", "b", "c"].forEach((segment) => {
        setCircle(el[`${segment}1`], segments[segment].p1);
        setCircle(el[`${segment}2`], segments[segment].p2);
      });
      renderAngles();
    }

    function startDrag(part, event) {
      if (locked) return;
      const [segment, end] = part.split(".");
      dragging = {
        segment,
        end,
        endpoint: Boolean(end),
        last: pointerPoint(event)
      };
      if (dragging.endpoint) removeConnectionsFor(part);
      event.currentTarget.setPointerCapture(event.pointerId);
    }

    function drag(event) {
      if (!dragging || locked) return;
      const point = pointerPoint(event);
      const dx = point.x - dragging.last.x;
      const dy = point.y - dragging.last.y;
      dragging.last = point;
      if (dragging.endpoint) {
        rotateSegment(dragging.segment, otherEnd(dragging.end), point);
      } else {
        translateConnectedSegments(dragging.segment, dx, dy);
      }
      maybeSnap();
      render();
    }

    function stopDrag(event) {
      if (!dragging) return;
      event.currentTarget.releasePointerCapture(event.pointerId);
      dragging = null;
      maybeSnap();
      render();
    }

    [
      [el.sideA, "a"], [el.a1, "a.p1"], [el.a2, "a.p2"],
      [el.sideB, "b"], [el.b1, "b.p1"], [el.b2, "b.p2"],
      [el.sideC, "c"], [el.c1, "c.p1"], [el.c2, "c.p2"]
    ].forEach(([node, part]) => {
      node.addEventListener("pointerdown", (event) => startDrag(part, event));
      node.addEventListener("pointermove", drag);
      node.addEventListener("pointerup", stopDrag);
      node.addEventListener("pointercancel", stopDrag);
    });

    reset.addEventListener("click", resetState);
    resetState();
  </script>
</body>
</html>
