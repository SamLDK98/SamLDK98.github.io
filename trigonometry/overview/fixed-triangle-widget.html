<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixed Triangle</title>
  <style>
    :root {
      --bg: #161311;
      --rule: rgba(214, 196, 168, 0.16);
      --text: #ece2d1;
      --dim: #a89c87;
      --accent: #d4b888;
      --orange: #e8a13b;
      --cyan: #6dd3c4;
      --pink: #ef7398;
      --green: #78c884;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      border: 1px solid var(--rule);
      background: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.045), transparent 56%), var(--bg);
    }

    .stage {
      min-height: 520px;
      border-right: 1px solid var(--rule);
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      touch-action: none;
    }

    .controls {
      padding: 1rem;
      background: rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin: 0 0 0.45rem;
      color: var(--dim);
      font-family: "Courier New", monospace;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      accent-color: var(--accent);
    }

    .side-key {
      display: grid;
      gap: 0.65rem;
      margin-top: 1.1rem;
      padding: 0.85rem;
      border: 1px solid var(--rule);
      background: rgba(0, 0, 0, 0.14);
      font-family: "Courier New", monospace;
      font-size: 1rem;
      font-weight: 700;
    }

    .key-a { color: var(--orange); }
    .key-b { color: var(--cyan); }
    .key-c { color: var(--pink); }

    .side {
      stroke-linecap: round;
      stroke-width: 6;
      cursor: grab;
      filter: drop-shadow(0 0 7px rgba(212, 184, 136, 0.12));
    }

    .side:active { cursor: grabbing; }
    .side-a { stroke: var(--orange); }
    .side-b { stroke: var(--cyan); }
    .side-c { stroke: var(--pink); cursor: default; }
    .is-snapped .side { filter: drop-shadow(0 0 9px rgba(120, 200, 132, 0.35)); }

    .gap-line {
      stroke: rgba(236, 226, 209, 0.28);
      stroke-dasharray: 7 9;
      stroke-linecap: round;
      stroke-width: 2;
    }

    .angle-arc {
      fill: none;
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-width: 3;
      opacity: 0.85;
    }

    .vertex {
      fill: var(--text);
      opacity: 0.9;
    }

    .handle {
      stroke: var(--bg);
      stroke-width: 2;
      cursor: grab;
    }

    .handle-a { fill: var(--orange); }
    .handle-b { fill: var(--cyan); }

    .target {
      fill: none;
      stroke: var(--green);
      stroke-width: 2;
      opacity: 0.35;
    }

    text {
      font-family: "Courier New", monospace;
      font-weight: 700;
    }

    .angle-label {
      fill: var(--accent);
      font-size: 18px;
    }

    @media (max-width: 760px) {
      .widget { grid-template-columns: 1fr; }
      .stage {
        min-height: 420px;
        border-right: 0;
        border-bottom: 1px solid var(--rule);
      }
    }
  </style>
</head>
<body>
  <section class="widget">
    <div class="stage">
      <svg id="canvas" viewBox="0 0 720 520" role="img" aria-label="Fixed side lengths forming one possible triangle">
        <g id="triangleGroup">
          <circle class="target" id="snapTarget" cx="0" cy="0" r="18" />
          <path class="angle-arc" id="arcA" d="" />
          <path class="angle-arc" id="arcB" d="" />
          <path class="angle-arc" id="arcC" d="" />
          <line class="gap-line" id="gapLine" x1="0" y1="0" x2="0" y2="0" />
          <line class="side side-a" id="sideA" x1="0" y1="0" x2="0" y2="0" />
          <line class="side side-b" id="sideB" x1="0" y1="0" x2="0" y2="0" />
          <line class="side side-c" id="sideC" x1="0" y1="0" x2="0" y2="0" />
          <circle class="vertex" id="va" cx="0" cy="0" r="5" />
          <circle class="vertex" id="vb" cx="0" cy="0" r="5" />
          <circle class="handle handle-a" id="handleA" cx="0" cy="0" r="10" />
          <circle class="handle handle-b" id="handleB" cx="0" cy="0" r="10" />
          <text class="angle-label" id="angleA" x="0" y="0"></text>
          <text class="angle-label" id="angleB" x="0" y="0"></text>
          <text class="angle-label" id="angleC" x="0" y="0"></text>
        </g>
      </svg>
    </div>
    <aside class="controls">
      <label for="size">size</label>
      <input id="size" type="range" min="34" max="50" value="42">

      <div class="side-key" aria-label="Fixed side lengths">
        <span class="key-a">a = 4</span>
        <span class="key-b">b = 6</span>
        <span class="key-c">c = 9</span>
      </div>
    </aside>
  </section>

  <script>
    const svg = document.getElementById("canvas");
    const group = document.getElementById("triangleGroup");
    const sizeInput = document.getElementById("size");
    const el = Object.fromEntries([
      "snapTarget", "gapLine", "sideA", "sideB", "sideC", "va", "vb", "handleA", "handleB",
      "angleA", "angleB", "angleC", "arcA", "arcB", "arcC"
    ].map((id) => [id, document.getElementById(id)]));

    const sideUnits = { a: 4, b: 6, c: 9 };
    let angleA = null;
    let angleB = null;
    let dragging = null;
    let snapped = false;

    function geometry() {
      const scale = Number(sizeInput.value);
      const lengths = {
        a: sideUnits.a * scale,
        b: sideUnits.b * scale,
        c: sideUnits.c * scale
      };
      const A = { x: 110, y: 360 };
      const B = { x: A.x + lengths.c, y: A.y };
      const x = (lengths.b ** 2 + lengths.c ** 2 - lengths.a ** 2) / (2 * lengths.c);
      const y = Math.sqrt(Math.max(0, lengths.b ** 2 - x ** 2));
      return {
        lengths,
        A,
        B,
        targets: {
          upper: { x: A.x + x, y: A.y - y },
          lower: { x: A.x + x, y: A.y + y }
        }
      };
    }

    function initializeAngles() {
      const { A, B, targets } = geometry();
      angleA = Math.atan2(targets.upper.y - A.y, targets.upper.x - A.x) - 0.5;
      angleB = Math.atan2(targets.upper.y - B.y, targets.upper.x - B.x) + 0.58;
    }

    function pointFrom(anchor, radians, length) {
      return {
        x: anchor.x + Math.cos(radians) * length,
        y: anchor.y + Math.sin(radians) * length
      };
    }

    function setLine(line, from, to) {
      line.setAttribute("x1", from.x);
      line.setAttribute("y1", from.y);
      line.setAttribute("x2", to.x);
      line.setAttribute("y2", to.y);
    }

    function setCircle(circle, point) {
      circle.setAttribute("cx", point.x);
      circle.setAttribute("cy", point.y);
    }

    function distance(p, q) {
      return Math.hypot(p.x - q.x, p.y - q.y);
    }

    function nearestTarget(point, targets) {
      return distance(point, targets.upper) <= distance(point, targets.lower)
        ? targets.upper
        : targets.lower;
    }

    function degreesAt(vertex, p1, p2) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      const a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      let diff = Math.abs((a2 - a1) * 180 / Math.PI);
      if (diff > 180) diff = 360 - diff;
      return diff;
    }

    function arcPath(vertex, p1, p2, radius) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      let a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      while (a2 < a1) a2 += Math.PI * 2;
      if (a2 - a1 > Math.PI) return arcPath(vertex, p2, p1, radius);
      const start = { x: vertex.x + Math.cos(a1) * radius, y: vertex.y + Math.sin(a1) * radius };
      const end = { x: vertex.x + Math.cos(a2) * radius, y: vertex.y + Math.sin(a2) * radius };
      return `M ${start.x} ${start.y} A ${radius} ${radius} 0 0 1 ${end.x} ${end.y}`;
    }

    function setText(text, point, value) {
      text.setAttribute("x", point.x);
      text.setAttribute("y", point.y);
      text.textContent = value;
    }

    function pointerPoint(event) {
      const point = svg.createSVGPoint();
      point.x = event.clientX;
      point.y = event.clientY;
      return point.matrixTransform(svg.getScreenCTM().inverse());
    }

    function render() {
      const { lengths, A, B, targets } = geometry();
      if (snapped && !dragging) {
        const target = nearestTarget(pointFrom(A, angleA, lengths.b), targets);
        angleA = Math.atan2(target.y - A.y, target.x - A.x);
        angleB = Math.atan2(target.y - B.y, target.x - B.x);
      }

      let freeA = pointFrom(B, angleB, lengths.a);
      let freeB = pointFrom(A, angleA, lengths.b);
      const gap = distance(freeA, freeB);

      if (gap < 26) {
        const target = nearestTarget({
          x: (freeA.x + freeB.x) / 2,
          y: (freeA.y + freeB.y) / 2
        }, targets);
        freeA = { ...target };
        freeB = { ...target };
        angleA = Math.atan2(target.y - A.y, target.x - A.x);
        angleB = Math.atan2(target.y - B.y, target.x - B.x);
        snapped = true;
      } else if (dragging) {
        snapped = false;
      }

      const joined = distance(freeA, freeB) < 1;
      group.classList.toggle("is-snapped", snapped);
      setCircle(el.snapTarget, nearestTarget(freeB, targets));
      setLine(el.sideA, B, freeA);
      setLine(el.sideB, A, freeB);
      setLine(el.sideC, A, B);
      setLine(el.gapLine, freeA, freeB);
      el.gapLine.style.display = joined ? "none" : "block";
      setCircle(el.va, A);
      setCircle(el.vb, B);
      setCircle(el.handleA, freeA);
      setCircle(el.handleB, freeB);

      const angleAtA = degreesAt(A, B, freeB);
      const angleAtB = degreesAt(B, freeA, A);
      el.arcA.setAttribute("d", arcPath(A, B, freeB, 34));
      el.arcB.setAttribute("d", arcPath(B, freeA, A, 34));
      setText(el.angleA, { x: A.x + 24, y: A.y + 42 }, `${angleAtA.toFixed(1)}°`);
      setText(el.angleB, { x: B.x - 96, y: B.y + 42 }, `${angleAtB.toFixed(1)}°`);

      if (joined) {
        const angleAtC = degreesAt(freeB, A, B);
        el.arcC.style.display = "block";
        el.angleC.style.display = "block";
        el.arcC.setAttribute("d", arcPath(freeB, A, B, 34));
        setText(el.angleC, { x: freeB.x - 24, y: freeB.y - 28 }, `${angleAtC.toFixed(1)}°`);
      } else {
        el.arcC.style.display = "none";
        el.angleC.style.display = "none";
      }
    }

    function startDrag(which, event) {
      dragging = which;
      snapped = false;
      event.currentTarget.setPointerCapture(event.pointerId);
    }

    function drag(event) {
      if (!dragging) return;
      const { A, B } = geometry();
      const point = pointerPoint(event);
      if (dragging === "a") {
        angleB = Math.atan2(point.y - B.y, point.x - B.x);
      } else {
        angleA = Math.atan2(point.y - A.y, point.x - A.x);
      }
      render();
    }

    function stopDrag(event) {
      if (!dragging) return;
      event.currentTarget.releasePointerCapture(event.pointerId);
      dragging = null;
      render();
    }

    [
      [el.sideA, "a"],
      [el.handleA, "a"],
      [el.sideB, "b"],
      [el.handleB, "b"]
    ].forEach(([node, which]) => {
      node.addEventListener("pointerdown", (event) => startDrag(which, event));
      node.addEventListener("pointermove", drag);
      node.addEventListener("pointerup", stopDrag);
      node.addEventListener("pointercancel", stopDrag);
    });

    sizeInput.addEventListener("input", render);
    initializeAngles();
    render();
  </script>
</body>
</html>
