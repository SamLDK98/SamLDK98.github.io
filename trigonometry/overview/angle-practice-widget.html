<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angle Practice</title>
  <style>
    :root {
      --bg: #161311;
      --panel: #1e1a17;
      --rule: rgba(214, 196, 168, 0.14);
      --text: #ece2d1;
      --dim: #a89c87;
      --accent: #d4b888;
      --yellow: #f1d84d;
      --blue: #6ea7ff;
      --green: #57c884;
      --red: #ef6a5b;
      --axis: rgba(236, 226, 209, 0.36);
      --circle: rgba(236, 226, 209, 0.68);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      min-height: 780px;
      border: 1px solid var(--rule);
      background: radial-gradient(ellipse at top, rgba(212, 184, 136, 0.045), transparent 55%), var(--bg);
    }

    header {
      padding: 1.3rem 1.6rem;
      border-bottom: 1px solid var(--rule);
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.45rem, 3vw, 2.2rem);
      font-weight: 500;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--rule);
      background: var(--panel);
      color: var(--dim);
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
      color: #ffe7b2;
    }

    button.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(212, 184, 136, 0.08);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      min-height: 680px;
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 680px;
      padding: 1rem;
      border-right: 1px solid var(--rule);
    }

    svg {
      display: block;
      width: min(100%, 760px);
      height: auto;
      user-select: none;
    }

    .circle {
      fill: rgba(0, 0, 0, 0.08);
      stroke: var(--circle);
      stroke-width: 2.6;
      transition: stroke 180ms ease, filter 180ms ease;
    }

    .circle.complete {
      stroke: var(--green);
      filter: drop-shadow(0 0 8px rgba(87, 200, 132, 0.45));
    }

    .axis {
      stroke: var(--axis);
      stroke-width: 1.4;
      stroke-dasharray: 4 5;
    }

    .point {
      fill: var(--yellow);
      stroke: rgba(0, 0, 0, 0.55);
      stroke-width: 2;
      cursor: pointer;
      transition: fill 150ms ease, r 150ms ease, filter 150ms ease;
    }

    .point:hover,
    .point.active {
      fill: var(--blue);
      filter: drop-shadow(0 0 8px rgba(110, 167, 255, 0.65));
    }

    .point.correct {
      fill: var(--green);
      filter: none;
    }

    .controls {
      padding: 1.25rem;
      background: rgba(0, 0, 0, 0.1);
    }

    .prompt {
      margin: 0 0 1rem;
      color: var(--text);
      font-size: 1.1rem;
      line-height: 1.45;
    }

    .hint {
      margin: 0 0 1.25rem;
      color: var(--dim);
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.45rem;
      color: var(--dim);
      font-family: "Courier New", monospace;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 46px;
      margin-bottom: 0.75rem;
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--rule);
      background: #161311;
      color: var(--text);
      font: inherit;
    }

    .answer-box {
      padding: 0.8rem;
      border: 1px solid var(--rule);
      background: rgba(0, 0, 0, 0.13);
      transition: border-color 150ms ease, background 150ms ease;
    }

    .answer-box.correct {
      border-color: rgba(87, 200, 132, 0.75);
      background: rgba(87, 200, 132, 0.14);
    }

    .answer-box.incorrect {
      border-color: rgba(239, 106, 91, 0.75);
      background: rgba(239, 106, 91, 0.12);
    }

    .reset-row {
      margin-top: 0.85rem;
    }

    .reset-row button {
      width: 100%;
    }

    .progress {
      margin: 1rem 0 0;
      color: var(--accent);
      font-family: "Courier New", monospace;
      font-size: 0.9rem;
    }

    @media (max-width: 850px) {
      .widget { min-height: 980px; }

      .layout {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 560px;
        border-right: 0;
        border-bottom: 1px solid var(--rule);
      }

      .mode-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="widget">
    <header>
      <h1>Angle Practice</h1>
    </header>

    <div class="layout">
      <div class="stage">
        <svg viewBox="0 0 760 640" role="img" aria-label="Angle practice circle with unlabeled standard points">
          <line class="axis" x1="90" y1="320" x2="670" y2="320" />
          <line class="axis" x1="380" y1="610" x2="380" y2="30" />
          <circle class="circle" id="circle" cx="380" cy="320" r="250" />
          <g id="points"></g>
        </svg>
      </div>

      <aside class="controls">
        <div class="mode-row" aria-label="Practice mode">
          <button type="button" id="nameMode">Name selected point</button>
          <button type="button" id="findMode">Find radian point</button>
        </div>

        <p class="prompt" id="prompt">Select a point on the circle.</p>
        <p class="hint" id="hint">Enter degrees, such as 225, or radians, such as 5p/4. You can use p for pi.</p>

        <div class="answer-box" id="answerBox">
          <label for="answer">Your answer</label>
          <input id="answer" type="text" autocomplete="off" disabled>
          <button type="button" id="submit" disabled>Check</button>
        </div>

        <div class="reset-row">
          <button type="button" id="reset">Reset</button>
        </div>

        <p class="progress" id="progress">0 / 16 correct</p>
      </aside>
    </div>
  </section>

  <script>
    const pointRoot = document.getElementById("points");
    const circle = document.getElementById("circle");
    const prompt = document.getElementById("prompt");
    const hint = document.getElementById("hint");
    const answerBox = document.getElementById("answerBox");
    const answer = document.getElementById("answer");
    const submit = document.getElementById("submit");
    const reset = document.getElementById("reset");
    const progress = document.getElementById("progress");
    const nameModeButton = document.getElementById("nameMode");
    const findModeButton = document.getElementById("findMode");

    const cx = 380;
    const cy = 320;
    const radius = 250;
    let mode = "name";
    let active = null;
    let target = null;
    let currentPrompt = "";
    let completed = new Set();

    const angles = [
      { degrees: 0, pi: ["0", "2pi", "2p"], prompts: ["0", "0\u03c0", "0\u03c0/6", "0\u03c0/4"] },
      { degrees: 30, pi: ["pi/6", "p/6"], prompts: ["\u03c0/6", "1\u03c0/6"] },
      { degrees: 45, pi: ["pi/4", "p/4"], prompts: ["\u03c0/4", "1\u03c0/4"] },
      { degrees: 60, pi: ["pi/3", "p/3"], prompts: ["\u03c0/3", "2\u03c0/6"] },
      { degrees: 90, pi: ["pi/2", "p/2"], prompts: ["\u03c0/2", "3\u03c0/6", "2\u03c0/4"] },
      { degrees: 120, pi: ["2pi/3", "2p/3"], prompts: ["2\u03c0/3", "4\u03c0/6"] },
      { degrees: 135, pi: ["3pi/4", "3p/4"], prompts: ["3\u03c0/4"] },
      { degrees: 150, pi: ["5pi/6", "5p/6"], prompts: ["5\u03c0/6"] },
      { degrees: 180, pi: ["pi", "p"], prompts: ["\u03c0", "6\u03c0/6", "4\u03c0/4"] },
      { degrees: 210, pi: ["7pi/6", "7p/6"], prompts: ["7\u03c0/6"] },
      { degrees: 225, pi: ["5pi/4", "5p/4"], prompts: ["5\u03c0/4"] },
      { degrees: 240, pi: ["4pi/3", "4p/3"], prompts: ["4\u03c0/3", "8\u03c0/6"] },
      { degrees: 270, pi: ["3pi/2", "3p/2"], prompts: ["3\u03c0/2", "9\u03c0/6", "6\u03c0/4"] },
      { degrees: 300, pi: ["5pi/3", "5p/3"], prompts: ["5\u03c0/3", "10\u03c0/6"] },
      { degrees: 315, pi: ["7pi/4", "7p/4"], prompts: ["7\u03c0/4"] },
      { degrees: 330, pi: ["11pi/6", "11p/6"], prompts: ["11\u03c0/6"] }
    ];

    function pointAt(degrees) {
      const radians = degrees * Math.PI / 180;
      return {
        x: cx + Math.cos(radians) * radius,
        y: cy - Math.sin(radians) * radius
      };
    }

    function normalizePi(value) {
      return value
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/π/g, "pi")
        .replace(/pie/g, "pi")
        .replace(/p(?!i)/g, "pi")
        .replace(/^1pi/, "pi");
    }

    function normalizeDegree(value) {
      const cleaned = value.replace(/[°\s]/g, "");
      const number = Number(cleaned);
      if (!Number.isFinite(number)) return null;
      return ((number % 360) + 360) % 360;
    }

    function buildPoints() {
      angles.forEach((angle) => {
        const point = pointAt(angle.degrees);
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("class", "point");
        dot.setAttribute("cx", point.x);
        dot.setAttribute("cy", point.y);
        dot.setAttribute("r", "7");
        dot.dataset.degrees = angle.degrees;
        dot.addEventListener("click", () => handlePointClick(angle));
        pointRoot.appendChild(dot);
      });
    }

    function updatePoints() {
      document.querySelectorAll(".point").forEach((dot) => {
        const degrees = Number(dot.dataset.degrees);
        dot.classList.toggle("active", active?.degrees === degrees);
        dot.classList.toggle("correct", completed.has(degrees));
        dot.setAttribute("r", active?.degrees === degrees ? "12" : "7");
      });

      progress.textContent = `${completed.size} / ${angles.length} correct`;
      circle.classList.toggle("complete", completed.size === angles.length);
      nameModeButton.classList.toggle("active", mode === "name");
      findModeButton.classList.toggle("active", mode === "find");
    }

    function handlePointClick(angle) {
      if (mode === "find") {
        checkPointSelection(angle);
      } else {
        selectPoint(angle);
      }
    }

    function selectPoint(angle) {
      if (mode !== "name") return;
      if (completed.has(angle.degrees)) return;
      active = angle;
      prompt.textContent = "Enter this point in degrees or radians.";
      answerBox.style.display = "";
      answer.value = "";
      answer.disabled = false;
      submit.disabled = false;
      answerBox.classList.remove("correct", "incorrect");
      updatePoints();
      answer.focus();
    }

    function completeIfFinished() {
      if (completed.size === angles.length) {
        active = null;
        target = null;
        prompt.textContent = "Complete. Every point is correct.";
        answer.disabled = true;
        submit.disabled = true;
        updatePoints();
      }
    }

    function isCorrect() {
      if (!active) return false;
      if (normalizeDegree(answer.value) === active.degrees) return true;
      const candidate = normalizePi(answer.value);
      return active.pi.map(normalizePi).includes(candidate);
    }

    function checkAnswer() {
      if (mode !== "name" || !active) return;
      if (isCorrect()) {
        completed.add(active.degrees);
        answerBox.classList.add("correct");
        answerBox.classList.remove("incorrect");
        prompt.textContent = "Correct. Select another point.";
        active = null;
        answer.value = "";
        answer.disabled = true;
        submit.disabled = true;
        completeIfFinished();
      } else {
        prompt.textContent = "Not quite. Try again.";
        answerBox.classList.add("incorrect");
        answerBox.classList.remove("correct");
      }
      updatePoints();
    }

    function targetLabel(angle) {
      return currentPrompt || angle.pi[0].replace("pi", "\u03c0");
    }

    function chooseTarget() {
      const remaining = angles.filter((angle) => !completed.has(angle.degrees));
      target = remaining[Math.floor(Math.random() * remaining.length)] ?? null;
      active = null;
      if (!target) {
        completeIfFinished();
        return;
      }
      currentPrompt = target.prompts[Math.floor(Math.random() * target.prompts.length)];
      prompt.textContent = `Select the point for ${targetLabel(target)}.`;
      answerBox.style.display = "none";
      answer.value = "";
      answer.disabled = true;
      submit.disabled = true;
      answerBox.classList.remove("correct", "incorrect");
      updatePoints();
    }

    function checkPointSelection(angle) {
      if (mode !== "find" || !target) return;
      active = angle;
      if (angle.degrees === target.degrees) {
        completed.add(angle.degrees);
        answerBox.classList.remove("incorrect");
        answerBox.classList.add("correct");
        prompt.textContent = "Correct. Select the next radian point.";
        updatePoints();
        setTimeout(() => {
          if (mode === "find") chooseTarget();
        }, 450);
      } else {
        prompt.textContent = `Not quite. Select the point for ${targetLabel(target)}.`;
        answerBox.classList.add("incorrect");
        answerBox.classList.remove("correct");
        updatePoints();
      }
    }

    function setMode(nextMode) {
      mode = nextMode;
      resetGame();
    }

    function resetGame() {
      completed = new Set();
      active = null;
      target = null;
      currentPrompt = "";
      answer.value = "";
      answer.disabled = true;
      submit.disabled = true;
      answerBox.classList.remove("correct", "incorrect");
      answerBox.style.display = mode === "name" ? "" : "none";
      prompt.textContent = mode === "name"
        ? "Select a point on the circle."
        : "Select the point for the radian prompt.";
      hint.textContent = mode === "name"
        ? "Enter degrees, such as 225, or radians, such as 5p/4. You can use p for pi."
        : "A radian fraction will be shown. Click the matching point on the circle.";
      updatePoints();
      if (mode === "find") chooseTarget();
    }

    nameModeButton.addEventListener("click", () => setMode("name"));
    findModeButton.addEventListener("click", () => setMode("find"));
    reset.addEventListener("click", resetGame);
    submit.addEventListener("click", checkAnswer);
    answer.addEventListener("keydown", (event) => {
      if (event.key === "Enter") checkAnswer();
    });

    buildPoints();
    resetGame();
  </script>
</body>
</html>
