<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radians Around a Circle</title>
  <style>
    :root {
      --text: #ece2d1;
      --dim: #a89c87;
      --blue: #6dd3c4;
      --orange: #e8a13b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 0;
      background: transparent;
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      min-height: 380px;
      border: 0;
      background: transparent;
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 380px;
      padding: 0.6rem;
    }

    svg {
      display: block;
      width: min(100%, 430px);
      height: auto;
      touch-action: none;
      user-select: none;
    }

    .circle {
      fill: rgba(0, 0, 0, 0.08);
      stroke: var(--orange);
      stroke-width: 3;
    }

    .axis {
      stroke: rgba(168, 156, 135, 0.45);
      stroke-width: 1.4;
      stroke-dasharray: 4 5;
    }

    .radian-label {
      fill: var(--text);
      font-family: "Courier New", monospace;
      font-size: 21px;
      font-weight: 700;
    }

    .fraction-bar {
      stroke: var(--text);
      stroke-width: 1.6;
      stroke-linecap: round;
    }

    .tick-point {
      fill: var(--blue);
      stroke: rgba(0, 0, 0, 0.42);
      stroke-width: 1.8;
    }

    .tick-point.angle-45 {
      stroke: rgba(0, 0, 0, 0.56);
      stroke-width: 2.2;
    }

    .angle-sector {
      fill: rgba(110, 167, 255, 0.16);
      stroke: none;
    }

    .angle-arc,
    .angle-ray,
    .base-ray {
      fill: none;
      stroke: var(--blue);
      stroke-linecap: round;
      stroke-width: 2.6;
    }

    .angle-ray {
      filter: drop-shadow(0 0 5px rgba(110, 167, 255, 0.36));
    }

    .handle {
      fill: var(--blue);
      stroke: var(--text);
      stroke-width: 2;
      cursor: grab;
    }

    .handle:active {
      cursor: grabbing;
    }

    @media (max-width: 720px) {
      .widget {
        min-height: 380px;
      }

      .stage {
        min-height: 365px;
      }

      .radian-label {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <section class="widget">
    <div class="stage">
      <svg id="circleSvg" viewBox="0 0 430 390" role="img" aria-label="Interactive circle labelled with radians">
        <defs>
          <marker id="blueArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M 0 0 L 8 4 L 0 8 Z" fill="#6dd3c4"></path>
          </marker>
        </defs>

        <line class="axis" x1="86" y1="185" x2="364" y2="185" />
        <line class="axis" x1="225" y1="324" x2="225" y2="46" />
        <circle class="circle" cx="225" cy="185" r="139" />

        <g id="ticks"></g>
        <path class="angle-sector" id="sector"></path>
        <line class="base-ray" x1="225" y1="185" x2="380" y2="185" marker-end="url(#blueArrow)" />
        <path class="angle-arc" id="arc"></path>
        <line class="angle-ray" id="ray" x1="225" y1="185" x2="0" y2="0" marker-end="url(#blueArrow)" />
        <circle class="handle" id="handle" cx="0" cy="0" r="10" tabindex="0" aria-label="Drag or use arrow keys to change the angle" />
      </svg>
    </div>
  </section>

  <script>
    const svg = document.getElementById("circleSvg");
    const ticks = document.getElementById("ticks");
    const sector = document.getElementById("sector");
    const arc = document.getElementById("arc");
    const ray = document.getElementById("ray");
    const handle = document.getElementById("handle");
    const cx = 225;
    const cy = 185;
    const radius = 139;
    const rayRadius = 155;
    const arcRadius = 45;
    let angle = 30;
    let dragging = false;

    const marks = [
      { degrees: 0, label: "0" },
      { degrees: 30, top: "π", bottom: "6" },
      { degrees: 45, top: "π", bottom: "4" },
      { degrees: 60, top: "π", bottom: "3" },
      { degrees: 90, top: "π", bottom: "2" },
      { degrees: 120, top: "2π", bottom: "3" },
      { degrees: 135, top: "3π", bottom: "4" },
      { degrees: 150, top: "5π", bottom: "6" },
      { degrees: 180, label: "π" },
      { degrees: 210, top: "7π", bottom: "6" },
      { degrees: 225, top: "5π", bottom: "4" },
      { degrees: 240, top: "4π", bottom: "3" },
      { degrees: 270, top: "3π", bottom: "2" },
      { degrees: 300, top: "5π", bottom: "3" },
      { degrees: 315, top: "7π", bottom: "4" },
      { degrees: 330, top: "11π", bottom: "6" }
    ];

    function toRad(degrees) {
      return degrees * Math.PI / 180;
    }

    function pointAt(degrees, r = radius) {
      const radians = toRad(degrees);
      return {
        x: cx + Math.cos(radians) * r,
        y: cy - Math.sin(radians) * r
      };
    }

    function describeArc(startAngle, endAngle, r) {
      const start = pointAt(startAngle, r);
      const end = pointAt(endAngle, r);
      const largeArc = Math.abs(endAngle - startAngle) > 180 ? 1 : 0;
      return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y}`;
    }

    function describeSector(degrees) {
      const start = pointAt(0, arcRadius);
      const end = pointAt(degrees, arcRadius);
      const largeArc = degrees > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${start.x} ${start.y} A ${arcRadius} ${arcRadius} 0 ${largeArc} 0 ${end.x} ${end.y} Z`;
    }

    function normalize(degrees) {
      return ((Math.round(degrees / 5) * 5) % 360 + 360) % 360;
    }

    function labelAnchor(degrees) {
      const p = pointAt(degrees, radius + 34);
      if (degrees === 90 || degrees === 270) {
        return { x: p.x - 2, y: p.y, anchor: "middle" };
      }
      const anchor = degrees > 90 && degrees < 270 ? "end" : "start";
      return { ...p, anchor };
    }

    function addPlainLabel(mark, label) {
      const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
      text.setAttribute("class", "radian-label");
      text.setAttribute("x", label.x);
      text.setAttribute("y", label.y + 7);
      text.setAttribute("text-anchor", label.anchor);
      text.textContent = mark.label;
      ticks.appendChild(text);
    }

    function addFractionLabel(mark, label) {
      const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
      group.setAttribute("class", "radian-label");

      const numerator = document.createElementNS("http://www.w3.org/2000/svg", "text");
      numerator.setAttribute("x", label.x);
      numerator.setAttribute("y", label.y - 7);
      numerator.setAttribute("text-anchor", label.anchor);
      numerator.textContent = mark.top;

      const denominator = document.createElementNS("http://www.w3.org/2000/svg", "text");
      denominator.setAttribute("x", label.x);
      denominator.setAttribute("y", label.y + 19);
      denominator.setAttribute("text-anchor", label.anchor);
      denominator.textContent = mark.bottom;

      const width = Math.max(mark.top.length, mark.bottom.length) * 11 + 8;
      const offset = label.anchor === "end" ? -width : label.anchor === "middle" ? -width / 2 : 0;
      const bar = document.createElementNS("http://www.w3.org/2000/svg", "line");
      bar.setAttribute("class", "fraction-bar");
      bar.setAttribute("x1", label.x + offset);
      bar.setAttribute("x2", label.x + offset + width);
      bar.setAttribute("y1", label.y + 2);
      bar.setAttribute("y2", label.y + 2);

      group.appendChild(numerator);
      group.appendChild(bar);
      group.appendChild(denominator);
      ticks.appendChild(group);
    }

    function buildTicks() {
      marks.forEach((mark) => {
        const point = pointAt(mark.degrees);
        const label = labelAnchor(mark.degrees);
        const isNewFortyFivePoint = mark.degrees % 45 === 0 && mark.degrees % 90 !== 0;
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("class", isNewFortyFivePoint ? "tick-point angle-45" : "tick-point");
        dot.setAttribute("cx", point.x);
        dot.setAttribute("cy", point.y);
        dot.setAttribute("r", isNewFortyFivePoint ? "8" : "6");
        ticks.appendChild(dot);

        if (mark.label) {
          addPlainLabel(mark, label);
        } else {
          addFractionLabel(mark, label);
        }
      });
    }

    function setAngle(degrees) {
      angle = normalize(degrees);
      const end = pointAt(angle, rayRadius);
      const handlePoint = pointAt(angle, radius);
      ray.setAttribute("x1", cx);
      ray.setAttribute("y1", cy);
      ray.setAttribute("x2", end.x);
      ray.setAttribute("y2", end.y);
      handle.setAttribute("cx", handlePoint.x);
      handle.setAttribute("cy", handlePoint.y);
      sector.setAttribute("d", describeSector(angle));
      arc.setAttribute("d", describeArc(0, angle, arcRadius));
    }

    function angleFromEvent(event) {
      const rect = svg.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * 430;
      const y = ((event.clientY - rect.top) / rect.height) * 390;
      const radians = Math.atan2(cy - y, x - cx);
      return radians * 180 / Math.PI;
    }

    svg.addEventListener("pointerdown", (event) => {
      dragging = true;
      svg.setPointerCapture(event.pointerId);
      setAngle(angleFromEvent(event));
    });

    svg.addEventListener("pointermove", (event) => {
      if (dragging) {
        setAngle(angleFromEvent(event));
      }
    });

    svg.addEventListener("pointerup", (event) => {
      dragging = false;
      svg.releasePointerCapture(event.pointerId);
    });

    handle.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "ArrowUp") {
        event.preventDefault();
        setAngle(angle + 5);
      }
      if (event.key === "ArrowLeft" || event.key === "ArrowDown") {
        event.preventDefault();
        setAngle(angle - 5);
      }
    });

    buildTicks();
    setAngle(angle);
  </script>
</body>
</html>
