<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pointwise addition landscapes</title>
<style>
  :root {
    --bg: #f5f1e8;
    --paper: #fbf8f0;
    --ink: #1a1a1a;
    --soft-ink: #3a3a3a;
    --muted: #7a7468;
    --rule: #d6cdb7;
    --rule-soft: #e6dfcd;
    --f: #b85a3a;
    --g: #2a5e58;
    --sum: #57478c;
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
  }

  body {
    padding: 18px 18px 22px;
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .widget {
    max-width: 880px;
    margin: 0 auto;
  }

  .main {
    display: grid;
    grid-template-columns: minmax(280px, 0.72fr) minmax(340px, 1fr);
    background: var(--paper);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .panel {
    min-width: 0;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 17px;
  }

  .panel-label,
  button {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    text-transform: uppercase;
  }

  .panel-label {
    margin-bottom: 7px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.22em;
  }

  .equation-list {
    display: grid;
    gap: 10px;
  }

  .equation-row {
    display: grid;
    grid-template-columns: 0.85rem minmax(0, 1fr);
    gap: 0.65rem;
    align-items: baseline;
  }

  .swatch {
    width: 0.72rem;
    aspect-ratio: 1;
    border-radius: 50%;
    transform: translateY(-0.08rem);
  }

  .swatch-f { background: var(--f); }
  .swatch-g { background: var(--g); }
  .swatch-sum { background: var(--sum); }

  .equation {
    font-size: 20px;
    line-height: 1.28;
    font-variant-numeric: tabular-nums;
  }

  .equation em { font-style: italic; }

  .controls {
    display: grid;
    gap: 14px;
  }

  .control-set {
    border-top: 1px solid var(--rule-soft);
    padding-top: 12px;
  }

  .control-title {
    margin-bottom: 10px;
    color: var(--soft-ink);
    font-size: 15px;
    line-height: 1.3;
  }

  .control-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 9px;
  }

  .control-name {
    display: block;
    margin-bottom: 8px;
    color: var(--ink);
    font-size: 20px;
    font-style: italic;
    line-height: 1;
  }

  .button-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  button {
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.08em;
    min-height: 34px;
  }

  button:hover { opacity: 0.82; }

  .step-btn {
    min-width: 0;
    padding: 0;
    font-size: 15px;
    letter-spacing: 0;
  }

  .reset-btn {
    width: fit-content;
    min-width: 88px;
    padding: 10px 16px;
    background: transparent;
    color: var(--ink);
    font-size: 12px;
  }

  .reset-btn:hover {
    background: var(--ink);
    color: var(--paper);
    opacity: 1;
  }

  .canvas-wrap {
    position: relative;
    min-height: 610px;
    border-left: 1px solid var(--rule-soft);
  }

  #landscape {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 610px;
  }

  .note {
    max-width: 720px;
    margin: 16px auto 0;
    color: var(--soft-ink);
    font-size: 15px;
    line-height: 1.55;
    text-align: center;
  }

  @media (max-width: 840px) {
    body { padding: 16px 14px 20px; }

    .main { grid-template-columns: 1fr; }

    .canvas-wrap {
      border-left: 0;
      border-top: 1px solid var(--rule-soft);
      min-height: 740px;
    }

    #landscape { min-height: 740px; }

    .panel { padding: 18px; }
  }

  @media (max-width: 480px) {
    .equation { font-size: 18px; }
    .control-grid { gap: 8px; }
  }
</style>
</head>
<body>
<div class="widget">
  <div class="main">
    <div class="panel">
      <div class="equation-list">
        <div>
          <div class="panel-label">Functions</div>
          <div class="equation-row">
            <span class="swatch swatch-f" aria-hidden="true"></span>
            <div class="equation" id="f-equation"></div>
          </div>
          <div class="equation-row">
            <span class="swatch swatch-g" aria-hidden="true"></span>
            <div class="equation" id="g-equation"></div>
          </div>
        </div>
        <div>
          <div class="panel-label">Pointwise sum</div>
          <div class="equation-row">
            <span class="swatch swatch-sum" aria-hidden="true"></span>
            <div class="equation" id="sum-equation"></div>
          </div>
        </div>
      </div>

      <div class="controls" aria-label="Function controls">
        <div class="control-set">
          <div class="control-title">f coefficients</div>
          <div class="control-grid">
            <div>
              <span class="control-name">x</span>
              <div class="button-row">
                <button class="step-btn" data-fn="f" data-param="a" data-delta="1" aria-label="Increase f x coefficient">+</button>
                <button class="step-btn" data-fn="f" data-param="a" data-delta="-1" aria-label="Decrease f x coefficient">-</button>
              </div>
            </div>
            <div>
              <span class="control-name">y</span>
              <div class="button-row">
                <button class="step-btn" data-fn="f" data-param="b" data-delta="1" aria-label="Increase f y coefficient">+</button>
                <button class="step-btn" data-fn="f" data-param="b" data-delta="-1" aria-label="Decrease f y coefficient">-</button>
              </div>
            </div>
            <div>
              <span class="control-name">c</span>
              <div class="button-row">
                <button class="step-btn" data-fn="f" data-param="c" data-delta="1" aria-label="Increase f constant">+</button>
                <button class="step-btn" data-fn="f" data-param="c" data-delta="-1" aria-label="Decrease f constant">-</button>
              </div>
            </div>
          </div>
        </div>

        <div class="control-set">
          <div class="control-title">g coefficients</div>
          <div class="control-grid">
            <div>
              <span class="control-name">x</span>
              <div class="button-row">
                <button class="step-btn" data-fn="g" data-param="a" data-delta="1" aria-label="Increase g x coefficient">+</button>
                <button class="step-btn" data-fn="g" data-param="a" data-delta="-1" aria-label="Decrease g x coefficient">-</button>
              </div>
            </div>
            <div>
              <span class="control-name">y</span>
              <div class="button-row">
                <button class="step-btn" data-fn="g" data-param="b" data-delta="1" aria-label="Increase g y coefficient">+</button>
                <button class="step-btn" data-fn="g" data-param="b" data-delta="-1" aria-label="Decrease g y coefficient">-</button>
              </div>
            </div>
            <div>
              <span class="control-name">c</span>
              <div class="button-row">
                <button class="step-btn" data-fn="g" data-param="c" data-delta="1" aria-label="Increase g constant">+</button>
                <button class="step-btn" data-fn="g" data-param="c" data-delta="-1" aria-label="Decrease g constant">-</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="reset-btn" id="reset-btn">Reset</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="landscape" aria-label="Isometric landscapes for pointwise function addition"></canvas>
    </div>
  </div>

  <p class="note">Each surface is a landscape over the same input plane. The purple surface adds the matching heights from f and g, and its dark zero-height contour is the line where f + g equals 0.</p>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('landscape');
  const ctx = canvas.getContext('2d');
  const fEl = document.getElementById('f-equation');
  const gEl = document.getElementById('g-equation');
  const sumEl = document.getElementById('sum-equation');
  const resetBtn = document.getElementById('reset-btn');

  const INITIAL = {
    f: { a: 1, b: 1, c: 0 },
    g: { a: 1, b: -1, c: 0 }
  };
  const RANGE = 4;
  const STEP = 1;
  const Z_SCALE = 8;

  let state = {
    f: { ...INITIAL.f },
    g: { ...INITIAL.g }
  };
  let dpr = 1;
  let w = 0;
  let h = 0;

  function formatNumber(n) {
    if (Object.is(n, -0)) return '0';
    return String(n);
  }

  function formatTerm(coef, variable, first) {
    const sign = coef < 0 ? '-' : '+';
    const abs = Math.abs(coef);
    const body = abs === 1 ? `<em>${variable}</em>` : `${formatNumber(abs)}<em>${variable}</em>`;
    if (first) return coef < 0 ? `-${body}` : body;
    return ` ${sign} ${body}`;
  }

  function functionHTML(name, fn) {
    const terms = [];
    if (fn.a !== 0) terms.push(formatTerm(fn.a, 'x', terms.length === 0));
    if (fn.b !== 0) terms.push(formatTerm(fn.b, 'y', terms.length === 0));
    if (fn.c !== 0 || terms.length === 0) {
      const sign = fn.c < 0 ? '-' : '+';
      const abs = Math.abs(fn.c);
      terms.push(terms.length === 0 ? formatNumber(fn.c) : ` ${sign} ${formatNumber(abs)}`);
    }
    return `${name}(x,y) = ${terms.join('')}`;
  }

  function sumFunction() {
    return {
      a: state.f.a + state.g.a,
      b: state.f.b + state.g.b,
      c: state.f.c + state.g.c
    };
  }

  function value(fn, x, y) {
    return fn.a * x + fn.b * y + fn.c;
  }

  function updatePanel() {
    fEl.innerHTML = functionHTML('f', state.f);
    gEl.innerHTML = functionHTML('g', state.g);
    sumEl.innerHTML = functionHTML('f+g', sumFunction());
  }

  function project(x, y, z, cx, cy, scale) {
    return {
      x: cx + (x - y) * scale,
      y: cy + (x + y) * scale * 0.48 - z * Z_SCALE
    };
  }

  function mixColor(hex, amount) {
    const n = parseInt(hex.slice(1), 16);
    const r = (n >> 16) & 255;
    const g = (n >> 8) & 255;
    const b = n & 255;
    const target = amount > 0 ? 255 : 0;
    const t = Math.abs(amount);
    const nr = Math.round(r + (target - r) * t);
    const ng = Math.round(g + (target - g) * t);
    const nb = Math.round(b + (target - b) * t);
    return `rgb(${nr}, ${ng}, ${nb})`;
  }

  function drawPanel(title, fn, color, bounds) {
    const scale = Math.min(bounds.width / 13, bounds.height / 10.5);
    const cx = bounds.x + bounds.width / 2;
    const cy = bounds.y + bounds.height * 0.56;

    ctx.fillStyle = '#fbf8f0';
    ctx.fillRect(bounds.x, bounds.y, bounds.width, bounds.height);

    ctx.strokeStyle = '#d6cdb7';
    ctx.lineWidth = 1;
    ctx.strokeRect(bounds.x + 0.5, bounds.y + 0.5, bounds.width - 1, bounds.height - 1);

    for (let x = -RANGE; x < RANGE; x += STEP) {
      for (let y = -RANGE; y < RANGE; y += STEP) {
        const z00 = value(fn, x, y);
        const z10 = value(fn, x + STEP, y);
        const z11 = value(fn, x + STEP, y + STEP);
        const z01 = value(fn, x, y + STEP);
        const avg = (z00 + z10 + z11 + z01) / 4;
        const shade = Math.max(-0.2, Math.min(0.32, avg / 24));
        const p00 = project(x, y, z00, cx, cy, scale);
        const p10 = project(x + STEP, y, z10, cx, cy, scale);
        const p11 = project(x + STEP, y + STEP, z11, cx, cy, scale);
        const p01 = project(x, y + STEP, z01, cx, cy, scale);

        ctx.beginPath();
        ctx.moveTo(p00.x, p00.y);
        ctx.lineTo(p10.x, p10.y);
        ctx.lineTo(p11.x, p11.y);
        ctx.lineTo(p01.x, p01.y);
        ctx.closePath();
        ctx.fillStyle = mixColor(color, shade);
        ctx.globalAlpha = 0.38;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = 'rgba(26, 26, 26, 0.16)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }

    drawZeroContour(fn, cx, cy, scale, color);

    ctx.fillStyle = '#1a1a1a';
    ctx.font = '13px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(title, bounds.x + 12, bounds.y + 10);
  }

  function drawZeroContour(fn, cx, cy, scale, color) {
    const points = [];
    if (fn.b !== 0) {
      points.push({ x: -RANGE, y: -(fn.a * -RANGE + fn.c) / fn.b });
      points.push({ x: RANGE, y: -(fn.a * RANGE + fn.c) / fn.b });
    }
    if (fn.a !== 0) {
      points.push({ x: -(fn.b * -RANGE + fn.c) / fn.a, y: -RANGE });
      points.push({ x: -(fn.b * RANGE + fn.c) / fn.a, y: RANGE });
    }
    const visible = points.filter((p) => p.x >= -RANGE && p.x <= RANGE && p.y >= -RANGE && p.y <= RANGE);
    const unique = [];
    visible.forEach((p) => {
      if (!unique.some((q) => Math.abs(q.x - p.x) < 0.001 && Math.abs(q.y - p.y) < 0.001)) {
        unique.push(p);
      }
    });
    if (unique.length < 2) return;

    const p1 = project(unique[0].x, unique[0].y, 0, cx, cy, scale);
    const p2 = project(unique[1].x, unique[1].y, 0, cx, cy, scale);
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  function draw() {
    ctx.fillStyle = '#fbf8f0';
    ctx.fillRect(0, 0, w, h);

    const gap = 12;
    if (w >= 520) {
      const panelH = (h - gap * 4) / 3;
      drawPanel('f landscape', state.f, '#b85a3a', { x: gap, y: gap, width: w - gap * 2, height: panelH });
      drawPanel('g landscape', state.g, '#2a5e58', { x: gap, y: gap * 2 + panelH, width: w - gap * 2, height: panelH });
      drawPanel('(f + g) landscape', sumFunction(), '#57478c', { x: gap, y: gap * 3 + panelH * 2, width: w - gap * 2, height: panelH });
    } else {
      const panelH = (h - gap * 4) / 3;
      drawPanel('f landscape', state.f, '#b85a3a', { x: gap, y: gap, width: w - gap * 2, height: panelH });
      drawPanel('g landscape', state.g, '#2a5e58', { x: gap, y: gap * 2 + panelH, width: w - gap * 2, height: panelH });
      drawPanel('(f + g) landscape', sumFunction(), '#57478c', { x: gap, y: gap * 3 + panelH * 2, width: w - gap * 2, height: panelH });
    }
  }

  function render() {
    updatePanel();
    draw();
  }

  function resize() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    const rect = canvas.getBoundingClientRect();
    w = rect.width;
    h = rect.height;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
  }

  document.querySelectorAll('.step-btn').forEach((button) => {
    button.addEventListener('click', () => {
      const fn = state[button.dataset.fn];
      fn[button.dataset.param] += Number(button.dataset.delta);
      render();
    });
  });

  resetBtn.addEventListener('click', () => {
    state = {
      f: { ...INITIAL.f },
      g: { ...INITIAL.g }
    };
    render();
  });

  window.addEventListener('resize', resize);
  resize();
})();
</script>
</body>
</html>
