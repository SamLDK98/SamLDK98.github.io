<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Adding multiples of an equation</title>
<style>
  :root {
    --bg: #f5f1e8;
    --paper: #fbf8f0;
    --ink: #1a1a1a;
    --soft-ink: #3a3a3a;
    --muted: #7a7468;
    --rule: #d6cdb7;
    --rule-soft: #e6dfcd;
    --fixed: #b85a3a;
    --multiple: #2a5e58;
    --sum: #57478c;
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
  }

  body {
    padding: 18px 18px 22px;
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .widget {
    max-width: 820px;
    margin: 0 auto;
  }

  .main {
    display: grid;
    grid-template-columns: minmax(320px, 1fr) minmax(280px, 390px);
    background: var(--paper);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .panel {
    min-width: 0;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .panel-label,
  button {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    text-transform: uppercase;
  }

  .panel-label {
    margin-bottom: 7px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.22em;
  }

  .equation-list {
    display: grid;
    gap: 12px;
  }

  .equation-row {
    display: grid;
    grid-template-columns: 0.85rem minmax(0, 1fr);
    gap: 0.7rem;
    align-items: baseline;
  }

  .swatch {
    width: 0.72rem;
    aspect-ratio: 1;
    border-radius: 50%;
    transform: translateY(-0.08rem);
  }

  .swatch-fixed { background: var(--fixed); }
  .swatch-multiple { background: var(--multiple); }
  .swatch-sum { background: var(--sum); }

  .equation {
    font-size: 22px;
    line-height: 1.28;
    font-variant-numeric: tabular-nums;
  }

  .equation em { font-style: italic; }

  .equation.muted {
    color: var(--soft-ink);
    font-size: 19px;
  }

  .control-set {
    border-top: 1px solid var(--rule-soft);
    padding-top: 13px;
  }

  .multiplier-readout {
    margin-bottom: 10px;
    font-size: 25px;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }

  .button-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
  }

  button {
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.08em;
    min-height: 34px;
  }

  button:hover { opacity: 0.82; }

  .step-btn {
    min-width: 0;
    padding: 0 6px;
    font-size: 13px;
    letter-spacing: 0;
  }

  .reset-btn {
    width: fit-content;
    min-width: 88px;
    padding: 10px 16px;
    background: transparent;
    color: var(--ink);
    font-size: 12px;
  }

  .reset-btn:hover {
    background: var(--ink);
    color: var(--paper);
    opacity: 1;
  }

  .plot-wrap {
    position: relative;
    aspect-ratio: 1;
    border-left: 1px solid var(--rule-soft);
  }

  #plane {
    display: block;
    width: 100%;
    height: 100%;
  }

  .note {
    max-width: 690px;
    margin: 16px auto 0;
    color: var(--soft-ink);
    font-size: 15px;
    line-height: 1.55;
    text-align: center;
  }

  @media (max-width: 800px) {
    body { padding: 16px 14px 20px; }

    .main { grid-template-columns: 1fr; }

    .plot-wrap {
      border-left: 0;
      border-top: 1px solid var(--rule-soft);
    }

    .panel { padding: 18px; }
  }

  @media (max-width: 480px) {
    .equation { font-size: 19px; }
    .equation.muted { font-size: 17px; }
    .button-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
</style>
</head>
<body>
<div class="widget">
  <div class="main">
    <div class="panel">
      <div class="equation-list">
        <div>
          <div class="panel-label">Fixed equation</div>
          <div class="equation-row">
            <span class="swatch swatch-fixed" aria-hidden="true"></span>
            <div class="equation" id="fixed-equation"></div>
          </div>
        </div>
        <div>
          <div class="panel-label">Equation multiplied by k</div>
          <div class="equation-row">
            <span class="swatch swatch-multiple" aria-hidden="true"></span>
            <div class="equation muted" id="multiple-equation"></div>
          </div>
        </div>
        <div>
          <div class="panel-label">Fixed + multiplied equation</div>
          <div class="equation-row">
            <span class="swatch swatch-sum" aria-hidden="true"></span>
            <div class="equation" id="sum-equation"></div>
          </div>
        </div>
      </div>

      <div class="control-set" aria-label="Multiplier controls">
        <div class="panel-label">Multiplier</div>
        <div class="multiplier-readout" id="multiplier-readout"></div>
        <div class="button-row">
          <button class="step-btn" data-delta="-5" aria-label="Decrease multiplier by 5">-5</button>
          <button class="step-btn" data-delta="-1" aria-label="Decrease multiplier by 1">-1</button>
          <button class="step-btn" data-delta="1" aria-label="Increase multiplier by 1">+1</button>
          <button class="step-btn" data-delta="5" aria-label="Increase multiplier by 5">+5</button>
        </div>
      </div>

      <button class="reset-btn" id="reset-btn">Reset</button>
    </div>

    <div class="plot-wrap">
      <canvas id="plane" aria-label="Coordinate plane showing a fixed equation, a multiplied equation, and their sum"></canvas>
    </div>
  </div>

  <p class="note" id="note"></p>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('plane');
  const ctx = canvas.getContext('2d');
  const fixedEl = document.getElementById('fixed-equation');
  const multipleEl = document.getElementById('multiple-equation');
  const sumEl = document.getElementById('sum-equation');
  const multiplierEl = document.getElementById('multiplier-readout');
  const noteEl = document.getElementById('note');
  const resetBtn = document.getElementById('reset-btn');

  const X_MIN = -6;
  const X_MAX = 6;
  const Y_MIN = -6;
  const Y_MAX = 6;
  const FIXED = { a: 4, b: -2, c: 2 };
  const MOVING = { a: 1, b: 1, c: 4 };
  const INITIAL_K = 1;

  let k = INITIAL_K;
  let dpr = 1;
  let w = 0;
  let h = 0;

  function nearlyZero(n) {
    return Math.abs(n) < 0.0001;
  }

  function formatNumber(n) {
    if (Object.is(n, -0)) return '0';
    return String(n);
  }

  function formatTerm(coef, variable, first) {
    const sign = coef < 0 ? '-' : '+';
    const abs = Math.abs(coef);
    const body = `${formatNumber(abs)}<em>${variable}</em>`;
    if (first) return coef < 0 ? `-${body}` : body;
    return ` ${sign} ${body}`;
  }

  function equationHTML(eq) {
    const terms = [];
    if (!nearlyZero(eq.a)) terms.push(formatTerm(eq.a, 'x', terms.length === 0));
    if (!nearlyZero(eq.b)) terms.push(formatTerm(eq.b, 'y', terms.length === 0));
    if (terms.length === 0) terms.push('0');
    return `${terms.join('')} = ${formatNumber(eq.c)}`;
  }

  function scaleEquation(eq, scalar) {
    return {
      a: eq.a * scalar,
      b: eq.b * scalar,
      c: eq.c * scalar
    };
  }

  function addEquations(one, two) {
    return {
      a: one.a + two.a,
      b: one.b + two.b,
      c: one.c + two.c
    };
  }

  function scaledEquation() {
    return scaleEquation(MOVING, k);
  }

  function sumEquation() {
    return addEquations(FIXED, scaledEquation());
  }

  function updatePanel() {
    const scaled = scaledEquation();
    const sum = sumEquation();
    fixedEl.innerHTML = equationHTML(FIXED);
    multipleEl.innerHTML = `${formatNumber(k)} * (${equationHTML(MOVING)}) gives ${equationHTML(scaled)}`;
    sumEl.innerHTML = equationHTML(sum);
    multiplierEl.innerHTML = `k = ${formatNumber(k)}`;

    if (k === 0) {
      noteEl.innerHTML = 'At k = 0, the multiplied equation contributes 0 = 0. The added equation is just the fixed equation.';
    } else {
      noteEl.innerHTML = 'Changing k adds a larger or smaller multiple of the second equation to the fixed equation. The resulting line turns around the shared solution point.';
    }
  }

  function worldToScreen(x, y) {
    return [
      ((x - X_MIN) / (X_MAX - X_MIN)) * w,
      h - ((y - Y_MIN) / (Y_MAX - Y_MIN)) * h
    ];
  }

  function getLineIntersections(eq) {
    const points = [];

    if (!nearlyZero(eq.b)) {
      points.push({ x: X_MIN, y: (eq.c - eq.a * X_MIN) / eq.b });
      points.push({ x: X_MAX, y: (eq.c - eq.a * X_MAX) / eq.b });
    }

    if (!nearlyZero(eq.a)) {
      points.push({ x: (eq.c - eq.b * Y_MIN) / eq.a, y: Y_MIN });
      points.push({ x: (eq.c - eq.b * Y_MAX) / eq.a, y: Y_MAX });
    }

    const visible = points.filter((p) =>
      p.x >= X_MIN - 0.0001 &&
      p.x <= X_MAX + 0.0001 &&
      p.y >= Y_MIN - 0.0001 &&
      p.y <= Y_MAX + 0.0001
    );

    const unique = [];
    visible.forEach((p) => {
      if (!unique.some((q) => Math.abs(q.x - p.x) < 0.001 && Math.abs(q.y - p.y) < 0.001)) {
        unique.push(p);
      }
    });

    return unique.slice(0, 2);
  }

  function intersection(one, two) {
    const determinant = one.a * two.b - two.a * one.b;
    if (nearlyZero(determinant)) return null;
    return {
      x: (one.c * two.b - two.c * one.b) / determinant,
      y: (one.a * two.c - two.a * one.c) / determinant
    };
  }

  function drawGrid() {
    ctx.strokeStyle = '#e6dfcd';
    ctx.lineWidth = 1;

    for (let x = Math.ceil(X_MIN); x <= X_MAX; x++) {
      const [sx] = worldToScreen(x, 0);
      ctx.beginPath();
      ctx.moveTo(sx, 0);
      ctx.lineTo(sx, h);
      ctx.stroke();
    }

    for (let y = Math.ceil(Y_MIN); y <= Y_MAX; y++) {
      const [, sy] = worldToScreen(0, y);
      ctx.beginPath();
      ctx.moveTo(0, sy);
      ctx.lineTo(w, sy);
      ctx.stroke();
    }
  }

  function drawAxes() {
    const [sx0] = worldToScreen(0, 0);
    const [, sy0] = worldToScreen(0, 0);

    ctx.strokeStyle = '#7a7468';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, sy0);
    ctx.lineTo(w, sy0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx0, 0);
    ctx.lineTo(sx0, h);
    ctx.stroke();

    ctx.fillStyle = '#7a7468';
    ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    for (let x = Math.ceil(X_MIN); x <= X_MAX; x++) {
      if (x === 0) continue;
      const [sx] = worldToScreen(x, 0);
      ctx.fillText(x, sx, sy0 + 4);
    }

    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let y = Math.ceil(Y_MIN); y <= Y_MAX; y++) {
      if (y === 0) continue;
      const [, sy] = worldToScreen(0, y);
      ctx.fillText(y, sx0 - 5, sy);
    }
  }

  function drawLine(eq, color, width, dash, alpha) {
    const ends = getLineIntersections(eq);
    if (ends.length < 2) return;

    const [p1, p2] = ends;
    const [x1, y1] = worldToScreen(p1.x, p1.y);
    const [x2, y2] = worldToScreen(p2.x, p2.y);

    ctx.save();
    ctx.globalAlpha = alpha === undefined ? 1 : alpha;
    ctx.lineCap = 'round';
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.setLineDash(dash || []);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  function drawTrail() {
    for (let trial = -8; trial <= 8; trial += 2) {
      if (trial === k) continue;
      drawLine(addEquations(FIXED, scaleEquation(MOVING, trial)), '#57478c', 1.1, [2, 7], 0.22);
    }
  }

  function drawPoint(p) {
    if (!p) return;
    const [sx, sy] = worldToScreen(p.x, p.y);
    ctx.fillStyle = '#fbf8f0';
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sx, sy, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }

  function drawLegend() {
    const items = [
      ['#b85a3a', [], 'fixed'],
      ['#2a5e58', [7, 6], 'k times equation'],
      ['#57478c', [2, 5], 'sum']
    ];

    ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

    items.forEach((item, index) => {
      const y = 20 + index * 22;
      ctx.strokeStyle = item[0];
      ctx.lineWidth = 3;
      ctx.setLineDash(item[1]);
      ctx.beginPath();
      ctx.moveTo(16, y);
      ctx.lineTo(42, y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillText(item[2], 50, y);
    });
  }

  function draw() {
    ctx.fillStyle = '#fbf8f0';
    ctx.fillRect(0, 0, w, h);
    drawGrid();
    drawAxes();
    drawTrail();

    drawLine(FIXED, 'rgba(184, 90, 58, 0.18)', 11);
    drawLine(FIXED, '#b85a3a', 3);

    if (k !== 0) {
      drawLine(scaledEquation(), '#2a5e58', 2.8, [7, 6]);
    }

    drawLine(sumEquation(), '#57478c', 3.2, [2, 5]);
    drawPoint(intersection(FIXED, MOVING));
    drawLegend();
  }

  function render() {
    updatePanel();
    draw();
  }

  function resize() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    const rect = canvas.getBoundingClientRect();
    w = rect.width;
    h = rect.height;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
  }

  document.querySelectorAll('.step-btn').forEach((button) => {
    button.addEventListener('click', () => {
      k += Number(button.dataset.delta);
      render();
    });
  });

  resetBtn.addEventListener('click', () => {
    k = INITIAL_K;
    render();
  });

  window.addEventListener('resize', resize);
  resize();
})();
</script>
</body>
</html>
