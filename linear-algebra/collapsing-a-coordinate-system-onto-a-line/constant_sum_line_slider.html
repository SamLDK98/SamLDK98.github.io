<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constant sum line slider</title>
<style>
:root {
  --ink: #1a1a1a;
  --muted: #6f6b60;
  --card: #ffffff;
  --soft: #f7f5ef;
  --line: #e5e3dc;
  --purple: #7c3aed;
  --green: #16a34a;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
}
html, body { margin: 0; padding: 0; background: #fdfcf8; }
body { padding: 0 1rem 1rem; color: var(--ink); font-family: Georgia, "Cambria", "Times New Roman", serif; }
button {
  border: 1px solid #d7d3c8;
  border-radius: 6px;
  background: var(--soft);
  color: var(--ink);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  padding: 0.42rem 0.62rem;
}
button:hover,
button:focus-visible,
button.is-active {
  border-color: var(--ink);
  background: #ffffff;
}
button.is-active {
  box-shadow: inset 0 0 0 1px rgba(26,26,26,0.16);
}
.csl { max-width: 720px; margin: 0 auto; padding: 1rem 0; }
.csl-card {
  background: var(--card);
  border: 0.5px solid var(--line);
  border-radius: 8px;
  padding: 0.95rem 1.15rem;
  margin-bottom: 0.55rem;
}
.csl-label {
  margin-bottom: 0.55rem;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.csl-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 0.85rem;
}
.csl-control {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 0.65rem;
  align-items: center;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 13px;
}
.csl-control strong { color: var(--ink); }
.csl-control input[type=range] { min-width: 0; }
.csl-value {
  min-width: 4rem;
  text-align: right;
  color: var(--ink);
  font-family: var(--mono);
}
.csl-delta {
  margin-top: 0.75rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.55;
}
.csl-delta strong {
  color: var(--ink);
  font-family: var(--mono);
  font-weight: 650;
}
.csl-plane-wrap {
  display: flex;
  justify-content: center;
  padding: 0.5rem 0;
  background: var(--card);
  border: 0.5px solid var(--line);
  border-radius: 8px;
}
.csl-plane { width: 100%; max-width: 560px; height: auto; display: block; color: var(--ink); touch-action: none; }
.csl-axis { stroke: var(--ink); stroke-width: 1.2; stroke-opacity: 0.58; }
.csl-sum-line {
  stroke: #9ca3af;
  stroke-width: 1.25;
  stroke-opacity: 0.45;
  stroke-dasharray: 5 4;
}
.csl-sum-line.is-active {
  stroke: var(--green);
  stroke-width: 2.4;
  stroke-opacity: 0.86;
  stroke-dasharray: none;
}
.csl-line-label {
  fill: var(--muted);
  font-family: var(--mono);
  font-size: 10.5px;
  paint-order: stroke;
  stroke: #ffffff;
  stroke-width: 4px;
  stroke-linejoin: round;
}
.csl-guide {
  stroke: var(--purple);
  stroke-width: 1;
  stroke-opacity: 0.34;
  stroke-dasharray: 3 4;
}
.csl-dot {
  fill: var(--purple);
  stroke: #ffffff;
  stroke-width: 1.5;
  cursor: grab;
}
.csl-dot:active { cursor: grabbing; }
.csl-readout {
  fill: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  paint-order: stroke;
  stroke: #ffffff;
  stroke-width: 4px;
  stroke-linejoin: round;
}
.csl-status {
  margin-top: 0.55rem;
  padding: 0.7rem 0.95rem;
  border-radius: 6px;
  background: var(--soft);
  color: var(--muted);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.65;
}
.csl-status em { color: var(--ink); font-style: italic; }
@media (max-width: 520px) {
  .csl-control { grid-template-columns: 1fr; }
  .csl-value { text-align: left; }
}
</style>
</head>
<body>
<div class="csl" id="csl-root" role="region" aria-label="Constant sum line slider widget">
  <div class="csl-card">
    <div class="csl-label">Move along one equal-sum line</div>
    <div class="csl-buttons">
      <button class="csl-sum-btn" data-sum="-4">sum = -4</button>
      <button class="csl-sum-btn" data-sum="-2">sum = -2</button>
      <button class="csl-sum-btn" data-sum="0">sum = 0</button>
      <button class="csl-sum-btn" data-sum="2">sum = 2</button>
      <button class="csl-sum-btn" data-sum="4">sum = 4</button>
    </div>
    <label class="csl-control">
      <strong>Position on selected line</strong>
      <input id="csl-slider" type="range" min="-4" max="4" step="1" value="0">
      <span class="csl-value" id="csl-slider-value">x = 0</span>
    </label>
    <div class="csl-delta" id="csl-delta">Move the point to compare coordinate changes.</div>
  </div>

  <div class="csl-plane-wrap">
    <svg class="csl-plane" id="csl-svg" viewBox="0 0 560 500" aria-label="Coordinate plane with selectable equal-sum lines">
      <line id="csl-axis-x" class="csl-axis"/>
      <line id="csl-axis-y" class="csl-axis"/>
      <g id="csl-ticks" font-family="system-ui, sans-serif" font-size="10" fill="currentColor" fill-opacity="0.52"></g>
      <g id="csl-lines"></g>
      <line id="csl-x-guide" class="csl-guide"/>
      <line id="csl-y-guide" class="csl-guide"/>
      <circle id="csl-dot" class="csl-dot" r="7"/>
      <text id="csl-readout" class="csl-readout"></text>
    </svg>
  </div>

  <div class="csl-status" id="csl-status"></div>
</div>

<script>
(function(){
  const X_MIN = -5, X_MAX = 5, Y_MIN = -5, Y_MAX = 5;
  const PA = { x: 42, y: 32, w: 476, h: 396 };
  const SUMS = [-4, -2, 0, 2, 4];
  let selectedSum = 0;
  let xValue = 0;
  let previousX = 0;
  let dragging = false;
  const $ = id => document.getElementById(id);
  const sx = x => PA.x + (x - X_MIN) / (X_MAX - X_MIN) * PA.w;
  const sy = y => PA.y + (Y_MAX - y) / (Y_MAX - Y_MIN) * PA.h;
  const invX = px => X_MIN + (px - PA.x) / PA.w * (X_MAX - X_MIN);

  function fmt(n){ return Number.isInteger(n) ? String(n) : (Math.round(n * 100) / 100).toString(); }
  function signedPart(n){ return n < 0 ? `- ${fmt(Math.abs(n))}` : `+ ${fmt(n)}`; }
  function yFor(x){ return selectedSum - x; }
  function clampXForSum(x){
    return Math.max(X_MIN, Math.min(X_MAX, Math.max(selectedSum - Y_MAX, Math.min(selectedSum - Y_MIN, x))));
  }
  function lineSegment(sum){
    const candidates = [
      { x: X_MIN, y: sum - X_MIN },
      { x: X_MAX, y: sum - X_MAX },
      { x: sum - Y_MIN, y: Y_MIN },
      { x: sum - Y_MAX, y: Y_MAX }
    ].filter(point =>
      point.x >= X_MIN - 1e-9 &&
      point.x <= X_MAX + 1e-9 &&
      point.y >= Y_MIN - 1e-9 &&
      point.y <= Y_MAX + 1e-9
    );
    const unique = [];
    candidates.forEach(point => {
      if (!unique.some(other => Math.abs(other.x - point.x) < 1e-9 && Math.abs(other.y - point.y) < 1e-9)) unique.push(point);
    });
    return unique.slice(0, 2);
  }
  function drawBase(){
    $('csl-axis-x').setAttribute('x1', sx(X_MIN));
    $('csl-axis-x').setAttribute('y1', sy(0));
    $('csl-axis-x').setAttribute('x2', sx(X_MAX));
    $('csl-axis-x').setAttribute('y2', sy(0));
    $('csl-axis-y').setAttribute('x1', sx(0));
    $('csl-axis-y').setAttribute('y1', sy(Y_MIN));
    $('csl-axis-y').setAttribute('x2', sx(0));
    $('csl-axis-y').setAttribute('y2', sy(Y_MAX));
    let ticks = '';
    for (let x = -4; x <= 4; x += 2) if (x !== 0) ticks += `<text x="${sx(x)}" y="${sy(0)+14}" text-anchor="middle">${x}</text>`;
    for (let y = -4; y <= 4; y += 2) if (y !== 0) ticks += `<text x="${sx(0)-7}" y="${sy(y)+3.5}" text-anchor="end">${y}</text>`;
    $('csl-ticks').innerHTML = ticks;
  }
  function drawLines(){
    $('csl-lines').innerHTML = SUMS.map(sum => {
      const segment = lineSegment(sum);
      const active = sum === selectedSum ? ' is-active' : '';
      const labelPoint = segment[0].y < segment[1].y ? segment[0] : segment[1];
      return `
        <line class="csl-sum-line${active}" x1="${sx(segment[0].x)}" y1="${sy(segment[0].y)}" x2="${sx(segment[1].x)}" y2="${sy(segment[1].y)}"/>
        <text class="csl-line-label" x="${sx(labelPoint.x)}" y="${sy(labelPoint.y)+16}" text-anchor="middle">${sum}</text>
      `;
    }).join('');
  }
  function setSliderBounds(){
    const min = Math.ceil(Math.max(X_MIN, selectedSum - Y_MAX));
    const max = Math.floor(Math.min(X_MAX, selectedSum - Y_MIN));
    const slider = $('csl-slider');
    slider.min = min;
    slider.max = max;
    xValue = Math.max(min, Math.min(max, Math.round(xValue)));
    slider.value = xValue;
  }
  function update(){
    setSliderBounds();
    const yValue = yFor(xValue);
    const previousY = yFor(previousX);
    const dx = xValue - previousX;
    const dy = yValue - previousY;
    const px = sx(xValue);
    const py = sy(yValue);
    $('csl-dot').setAttribute('cx', px);
    $('csl-dot').setAttribute('cy', py);
    $('csl-x-guide').setAttribute('x1', sx(xValue));
    $('csl-x-guide').setAttribute('y1', sy(0));
    $('csl-x-guide').setAttribute('x2', px);
    $('csl-x-guide').setAttribute('y2', py);
    $('csl-y-guide').setAttribute('x1', sx(0));
    $('csl-y-guide').setAttribute('y1', sy(yValue));
    $('csl-y-guide').setAttribute('x2', px);
    $('csl-y-guide').setAttribute('y2', py);
    $('csl-readout').setAttribute('x', px + 11);
    $('csl-readout').setAttribute('y', py - 13);
    $('csl-readout').textContent = `(${fmt(xValue)}, ${fmt(yValue)})  ${fmt(xValue)} ${signedPart(yValue)} = ${fmt(selectedSum)}`;
    $('csl-slider-value').textContent = `x = ${fmt(xValue)}`;
    $('csl-delta').innerHTML = dx === 0 && dy === 0
      ? 'Move the point to compare coordinate changes.'
      : `Change from previous position: <strong>x ${dx > 0 ? '+' : ''}${fmt(dx)}</strong>, <strong>y ${dy > 0 ? '+' : ''}${fmt(dy)}</strong>.`;
    $('csl-status').innerHTML = `Along <em>x + y = ${fmt(selectedSum)}</em>, the sum is fixed. Moving right increases <em>x</em>, so <em>y</em> decreases by the same amount. The coordinate changes, but <em>x + y</em> remains <em>${fmt(selectedSum)}</em>.`;
    document.querySelectorAll('.csl-sum-btn').forEach(button => {
      button.classList.toggle('is-active', Number(button.dataset.sum) === selectedSum);
    });
    drawLines();
    previousX = xValue;
    resizeFrame();
  }
  function pointerToSvgX(event){
    const rect = $('csl-svg').getBoundingClientRect();
    const viewX = (event.clientX - rect.left) / rect.width * 560;
    return invX(viewX);
  }
  function moveFromPointer(event){
    xValue = Math.round(clampXForSum(pointerToSvgX(event)));
    $('csl-slider').value = xValue;
    update();
  }
  function resizeFrame(){
    if (!window.frameElement) return;
    const height = Math.ceil($('csl-root').getBoundingClientRect().bottom + 16);
    window.frameElement.style.height = `${height + 12}px`;
  }

  drawBase();
  document.querySelectorAll('.csl-sum-btn').forEach(button => {
    button.addEventListener('click', () => {
      selectedSum = Number(button.dataset.sum);
      xValue = Math.round(selectedSum / 2);
      previousX = xValue;
      update();
    });
  });
  $('csl-slider').addEventListener('input', () => {
    xValue = Number($('csl-slider').value);
    update();
  });
  $('csl-dot').addEventListener('pointerdown', event => {
    dragging = true;
    $('csl-dot').setPointerCapture(event.pointerId);
  });
  $('csl-dot').addEventListener('pointermove', event => {
    if (!dragging) return;
    moveFromPointer(event);
  });
  $('csl-dot').addEventListener('pointerup', event => {
    dragging = false;
    $('csl-dot').releasePointerCapture(event.pointerId);
  });
  $('csl-svg').addEventListener('pointerdown', event => {
    if (event.target.id === 'csl-dot') return;
    moveFromPointer(event);
  });
  update();
  window.addEventListener('load', resizeFrame);
  window.addEventListener('resize', resizeFrame);
})();
</script>
</body>
</html>
