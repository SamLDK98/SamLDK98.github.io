<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinate sums by coefficient scaling</title>
<style>
:root {
  --ink: #1a1a1a;
  --muted: #6f6b60;
  --card: #ffffff;
  --soft: #f7f5ef;
  --line: #e5e3dc;
  --blue: #2563eb;
  --orange: #ea580c;
  --green: #16a34a;
  --purple: #7c3aed;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
}
html, body { margin: 0; padding: 0; background: #fdfcf8; }
body { padding: 0 1rem 1rem; color: var(--ink); font-family: Georgia, "Cambria", "Times New Roman", serif; }
button {
  border: 1px solid #d7d3c8;
  border-radius: 6px;
  background: var(--soft);
  color: var(--ink);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  padding: 0.42rem 0.62rem;
}
button:hover,
button:focus-visible {
  border-color: var(--ink);
  background: #ffffff;
}
button.is-active {
  border-color: var(--ink);
  background: #ffffff;
  box-shadow: inset 0 0 0 1px rgba(26,26,26,0.16);
}
.ewb6 { max-width: 720px; margin: 0 auto; padding: 1rem 0; }
.ewb6-card {
  background: var(--card);
  border: 0.5px solid var(--line);
  border-radius: 8px;
  padding: 0.95rem 1.15rem;
  margin-bottom: 0.55rem;
}
.ewb6-label {
  margin-bottom: 0.45rem;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.ewb6-eq {
  min-height: 1.4em;
  margin-bottom: 0.7rem;
  font-family: Georgia, serif;
  font-size: 24px;
  font-style: italic;
  line-height: 1.4;
}
.ewb6-eq .x { color: var(--blue); font-style: normal; font-weight: 500; }
.ewb6-eq .y { color: var(--orange); font-style: normal; font-weight: 500; }
.ewb6-eq .op { color: var(--muted); margin: 0 0.12em; font-style: normal; }
.ewb6-eq .var { font-style: italic; }
.ewb6-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 22px;
}
.ewb6-ctrl { display: flex; align-items: center; gap: 8px; }
.ewb6-ctrl .name {
  min-width: 16px;
  font-family: Georgia, serif;
  font-size: 16px;
  font-style: italic;
}
.ewb6-ctrl .name.x { color: var(--blue); }
.ewb6-ctrl .name.y { color: var(--orange); }
.ewb6-ctrl input[type=range] { flex: 1; min-width: 0; }
.ewb6-ctrl input[type=number] {
  width: 60px;
  font-family: var(--mono);
  font-size: 13px;
}
.ewb6-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 0.7rem;
}
.ewb6-stage {
  color: var(--muted);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.6;
}
.ewb6-stage strong { color: var(--ink); font-weight: 600; }
.ewb6-plane-wrap {
  display: flex;
  justify-content: center;
  padding: 0.5rem 0;
  background: var(--card);
  border: 0.5px solid var(--line);
  border-radius: 8px;
}
.ewb6-plane { width: 100%; max-width: 560px; height: auto; display: block; color: var(--ink); }
.ewb6-status {
  margin-top: 0.55rem;
  padding: 0.7rem 0.95rem;
  border-radius: 6px;
  background: var(--soft);
  color: var(--muted);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.65;
}
.ewb6-status em { color: var(--ink); font-style: italic; }
.ewb6-label-text {
  font-family: var(--mono);
  font-size: 11px;
  paint-order: stroke;
  stroke: #ffffff;
  stroke-width: 4px;
  stroke-linejoin: round;
}
.ewb6-patch-line {
  stroke: #7c3aed;
  stroke-width: 1.15;
  stroke-opacity: 0.2;
}
.ewb6-value-line {
  stroke: #16a34a;
  stroke-width: 1.6;
  stroke-opacity: 0.58;
  stroke-dasharray: 5 4;
}
@media (max-width: 520px) {
  .ewb6-controls { grid-template-columns: 1fr; }
  .ewb6-label-text { font-size: 9px; }
}
</style>
</head>
<body>
<div class="ewb6" id="ewb6-root" role="region" aria-label="Coordinate sum stages widget">
  <div class="ewb6-card">
    <div class="ewb6-label">Equation coefficients</div>
    <div class="ewb6-eq" id="ewb6-eq"></div>
    <div class="ewb6-controls">
      <div class="ewb6-ctrl">
        <span class="name x">x</span>
        <input type="range" id="ewb6-a" min="-4" max="4" step="0.5" value="4">
        <input type="number" id="ewb6-aNum" min="-4" max="4" step="0.5" value="4">
      </div>
      <div class="ewb6-ctrl">
        <span class="name y">y</span>
        <input type="range" id="ewb6-b" min="-4" max="4" step="0.5" value="-2">
        <input type="number" id="ewb6-bNum" min="-4" max="4" step="0.5" value="-2">
      </div>
    </div>
    <div class="ewb6-buttons">
      <button class="ewb6-stage-btn" data-stage="0">Scaled coordinates</button>
      <button class="ewb6-stage-btn" data-stage="1">Signed operations</button>
      <button class="ewb6-stage-btn" data-stage="2">Sum</button>
      <button class="ewb6-stage-btn" data-stage="3">Equal-value lines</button>
      <span class="ewb6-stage" id="ewb6-stage"></span>
    </div>
  </div>

  <div class="ewb6-plane-wrap">
    <svg class="ewb6-plane" viewBox="0 0 560 500" aria-label="Transformed coordinate plane with coordinate labels">
      <defs>
        <clipPath id="ewb6-clip"><rect x="42" y="32" width="476" height="396"/></clipPath>
      </defs>
      <g clip-path="url(#ewb6-clip)" id="ewb6-patchGrid"></g>
      <line id="ewb6-axisX" stroke="currentColor" stroke-opacity="0.5" stroke-width="1.2"/>
      <line id="ewb6-axisY" stroke="currentColor" stroke-opacity="0.5" stroke-width="1.2"/>
      <g id="ewb6-ticks" font-family="system-ui, sans-serif" font-size="10" fill="currentColor" fill-opacity="0.52"></g>
      <g id="ewb6-valueLines" clip-path="url(#ewb6-clip)"></g>
      <g id="ewb6-points" clip-path="url(#ewb6-clip)"></g>
      <g id="ewb6-labels"></g>
    </svg>
  </div>

  <div class="ewb6-status" id="ewb6-status"></div>
</div>

<script>
(function(){
  const X_MIN = -10, X_MAX = 11, Y_MIN = -5.5, Y_MAX = 5.5;
  const PA = { x: 42, y: 32, w: 476, h: 396 };
  const SAMPLES = [];
  for (let x = -2; x <= 2; x++) {
    for (let y = -2; y <= 2; y++) {
      SAMPLES.push({ x, y });
    }
  }
  const STAGES = [
    'Scaled coordinates',
    'Replace the comma with the signed operation',
    'Evaluate the sum',
    'Draw equal-value lines'
  ];
  let stage = 0;
  let lastA = null;
  let lastB = null;

  const $ = id => document.getElementById(id);
  const sx = mx => PA.x + (mx - X_MIN)/(X_MAX - X_MIN) * PA.w;
  const sy = my => PA.y + (Y_MAX - my)/(Y_MAX - Y_MIN) * PA.h;
  function setAttrs(el, attrs){ for (const key in attrs) el.setAttribute(key, attrs[key]); }
  function fmt(n){ return Number.isInteger(n) ? String(n) : (Math.round(n * 100) / 100).toString(); }
  function signedPart(n){ return n < 0 ? `- ${fmt(Math.abs(n))}` : `+ ${fmt(n)}`; }
  function labelFor(tx, ty){
    if (stage === 0) return `(${fmt(tx)}, ${fmt(ty)})`;
    if (stage === 1) return `(${fmt(tx)} ${signedPart(ty)})`;
    return `(${fmt(tx + ty)})`;
  }
  function lineSegmentForSum(sum){
    const candidates = [
      { x: X_MIN, y: sum - X_MIN },
      { x: X_MAX, y: sum - X_MAX },
      { x: sum - Y_MIN, y: Y_MIN },
      { x: sum - Y_MAX, y: Y_MAX }
    ].filter(point =>
      point.x >= X_MIN - 1e-9 &&
      point.x <= X_MAX + 1e-9 &&
      point.y >= Y_MIN - 1e-9 &&
      point.y <= Y_MAX + 1e-9
    );
    const unique = [];
    candidates.forEach(point => {
      if (!unique.some(other => Math.abs(other.x - point.x) < 1e-9 && Math.abs(other.y - point.y) < 1e-9)) {
        unique.push(point);
      }
    });
    return unique.length >= 2 ? unique.slice(0, 2) : null;
  }
  function term(coef, varName, first){
    const cls = varName === 'x' ? 'x' : 'y';
    if (coef === 0) return first ? `<span class="${cls}">0<span class="var">${varName}</span></span>` : `<span class="op">+</span><span class="${cls}">0<span class="var">${varName}</span></span>`;
    const sign = coef < 0 ? '\u2212' : (first ? '' : '+');
    const mag = Math.abs(coef);
    const num = mag === 1 ? '' : fmt(mag);
    if (first) return `<span class="${cls}">${sign}${num}<span class="var">${varName}</span></span>`;
    return `<span class="op">${sign}</span><span class="${cls}">${num}<span class="var">${varName}</span></span>`;
  }
  function buildBase(){
    setAttrs($('ewb6-axisX'), { x1: sx(X_MIN), y1: sy(0), x2: sx(X_MAX), y2: sy(0) });
    setAttrs($('ewb6-axisY'), { x1: sx(0), y1: sy(Y_MIN), x2: sx(0), y2: sy(Y_MAX) });
    let ticks = '';
    for (let x = -8; x <= 8; x += 4) if (x !== 0) ticks += `<text x="${sx(x)}" y="${sy(0)+14}" text-anchor="middle">${x}</text>`;
    for (let y = -4; y <= 4; y += 2) if (y !== 0) ticks += `<text x="${sx(0)-7}" y="${sy(y)+3.5}" text-anchor="end">${y}</text>`;
    $('ewb6-ticks').innerHTML = ticks;
  }
  function renderSpace(a, b){
    let patchGrid = '';
    for (let y = -2; y <= 2; y++) {
      patchGrid += `<line class="ewb6-patch-line" x1="${sx(a * -2)}" y1="${sy(b * y)}" x2="${sx(a * 2)}" y2="${sy(b * y)}"/>`;
    }
    for (let x = -2; x <= 2; x++) {
      patchGrid += `<line class="ewb6-patch-line" x1="${sx(a * x)}" y1="${sy(b * -2)}" x2="${sx(a * x)}" y2="${sy(b * 2)}"/>`;
    }
    $('ewb6-patchGrid').innerHTML = patchGrid;

    let points = '';
    SAMPLES.forEach(sample => {
      const tx = a * sample.x;
      const ty = b * sample.y;
      const cx = sx(tx);
      const cy = sy(ty);
      points += `<circle class="ewb6-point" cx="${cx}" cy="${cy}" r="4.4" fill="#7c3aed" fill-opacity="0.74" stroke="#fff" stroke-width="0.8"/>`;
    });
    $('ewb6-points').innerHTML = points;
  }

  function renderLabels(a, b){
    let labels = '';
    SAMPLES.forEach(sample => {
      const tx = a * sample.x;
      const ty = b * sample.y;
      const cx = sx(tx);
      const cy = sy(ty);
      const labelX = cx + 8;
      const labelY = cy - 9;
      labels += `<text class="ewb6-label-text" x="${labelX}" y="${labelY}" text-anchor="start" fill="#312e81">${labelFor(tx, ty)}</text>`;
    });
    $('ewb6-labels').innerHTML = labels;
  }

  function renderValueLines(a, b){
    if (stage !== 3) {
      $('ewb6-valueLines').innerHTML = '';
      return;
    }
    const sums = Array.from(new Set(SAMPLES.map(sample => fmt(a * sample.x + b * sample.y))));
    const lines = sums.map(sumText => {
      const segment = lineSegmentForSum(Number(sumText));
      if (!segment) return '';
      return `<line class="ewb6-value-line" x1="${sx(segment[0].x)}" y1="${sy(segment[0].y)}" x2="${sx(segment[1].x)}" y2="${sy(segment[1].y)}"/>`;
    }).join('');
    $('ewb6-valueLines').innerHTML = lines;
  }

  function update(options = {}){
    const a = +$('ewb6-a').value;
    const b = +$('ewb6-b').value;
    const geometryChanged = options.forceGeometry || a !== lastA || b !== lastB;
    $('ewb6-aNum').value = a;
    $('ewb6-bNum').value = b;
    $('ewb6-eq').innerHTML = term(a, 'x', true) + ' ' + term(b, 'y', false);
    $('ewb6-stage').innerHTML = `<strong>${stage + 1}/${STAGES.length}</strong> ${STAGES[stage]}`;
    document.querySelectorAll('.ewb6-stage-btn').forEach(button => {
      button.classList.toggle('is-active', Number(button.dataset.stage) === stage);
    });

    if (geometryChanged) {
      renderSpace(a, b);
      lastA = a;
      lastB = b;
    }
    renderLabels(a, b);
    renderValueLines(a, b);

    const exX = 3 * a;
    const exY = 4 * b;
    const message = stage === 0
      ? `This shows every coordinate in a small 5-by-5 patch of the original space after scaling. Separately, the article example <em>(3, 4)</em> would become <em>(${fmt(exX)}, ${fmt(exY)})</em>.`
      : stage === 1
        ? `The transformed space has not changed. Only the notation changes: the comma is replaced by the signed operation, so <em>(${fmt(exX)}, ${fmt(exY)})</em> becomes <em>(${fmt(exX)} ${signedPart(exY)})</em>.`
        : stage === 2
          ? `The transformed space still has not changed. Now each displayed expression is evaluated as one number. For <em>(3, 4)</em>, <em>${fmt(exX)} ${signedPart(exY)} = ${fmt(exX + exY)}</em>.`
          : `The green dashed lines connect coordinates with the same output value. Points on the same line have the same signed sum <em>x + y</em> in this transformed space.`;
    $('ewb6-status').innerHTML = message;
    resizeFrame();
  }
  function setVals(a, b){
    $('ewb6-a').value = a;
    $('ewb6-b').value = b;
    stage = 0;
    update({ forceGeometry: true });
  }
  function resizeFrame(){
    if (!window.frameElement) return;
    const height = Math.ceil($('ewb6-root').getBoundingClientRect().bottom + 16);
    window.frameElement.style.height = `${height + 12}px`;
  }

  buildBase();
  $('ewb6-a').addEventListener('input', () => update());
  $('ewb6-b').addEventListener('input', () => update());
  $('ewb6-aNum').addEventListener('input', () => { $('ewb6-a').value = $('ewb6-aNum').value; update(); });
  $('ewb6-bNum').addEventListener('input', () => { $('ewb6-b').value = $('ewb6-bNum').value; update(); });
  document.querySelectorAll('.ewb6-stage-btn').forEach(button => {
    button.addEventListener('click', () => {
      stage = Number(button.dataset.stage);
      update();
    });
  });
  update({ forceGeometry: true });
  window.addEventListener('load', resizeFrame);
  window.addEventListener('resize', resizeFrame);
})();
</script>
</body>
</html>
