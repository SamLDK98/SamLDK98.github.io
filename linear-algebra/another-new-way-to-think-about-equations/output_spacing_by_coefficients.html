<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Output spacing by coefficient scaling</title>
<style>
:root {
  --ink: #1a1a1a;
  --muted: #6f6b60;
  --card: #ffffff;
  --soft: #f7f5ef;
  --line: #e5e3dc;
  --blue: #2563eb;
  --green: #16a34a;
  --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
}
html, body { margin: 0; padding: 0; background: #fdfcf8; }
body { padding: 0 1rem 1rem; color: var(--ink); font-family: Georgia, "Cambria", "Times New Roman", serif; }
button {
  border: 1px solid #d7d3c8;
  border-radius: 6px;
  background: var(--soft);
  color: var(--ink);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  padding: 0.42rem 0.62rem;
}
button:hover,
button:focus-visible {
  border-color: var(--ink);
  background: #ffffff;
}
.ews { max-width: 720px; margin: 0 auto; padding: 1rem 0; }
.ews-card {
  background: var(--card);
  border: 0.5px solid var(--line);
  border-radius: 8px;
  padding: 0.95rem 1.15rem;
  margin-bottom: 0.55rem;
}
.ews-label {
  margin-bottom: 0.45rem;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.ews-eq-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.ews-eq {
  min-height: 2.7rem;
  padding: 0.58rem 0.7rem;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #fbfaf6;
  font-size: 22px;
  font-style: italic;
  line-height: 1.25;
}
.ews-eq span {
  display: block;
  margin-top: 0.1rem;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 12px;
  font-style: normal;
}
.ews-control {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) 54px;
  gap: 0.55rem;
  align-items: center;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--muted);
}
.ews-control strong { color: var(--ink); }
.ews-control input[type=range] { min-width: 0; }
.ews-control input[type=number] {
  width: 54px;
  font-family: var(--mono);
  font-size: 13px;
}
.ews-figure {
  background: var(--card);
  border: 0.5px solid var(--line);
  border-radius: 8px;
  padding: 0.55rem 0;
}
.ews-svg { width: 100%; height: auto; display: block; }
.ews-axis { stroke: var(--ink); stroke-width: 1.2; stroke-opacity: 0.74; }
.ews-tick { stroke: var(--ink); stroke-width: 1; stroke-opacity: 0.45; }
.ews-tick-label {
  fill: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
}
.ews-row-label {
  fill: var(--ink);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 650;
}
.ews-row-note {
  fill: var(--muted);
  font-family: var(--sans);
  font-size: 11px;
}
.ews-dot { stroke: #fff; stroke-width: 1.1; }
.ews-output-label {
  font-family: var(--mono);
  font-size: 11px;
  fill: var(--ink);
  paint-order: stroke;
  stroke: #ffffff;
  stroke-width: 4px;
  stroke-linejoin: round;
}
.ews-connector {
  stroke: #b8b2a4;
  stroke-width: 1;
  stroke-opacity: 0.5;
}
.ews-status {
  margin-top: 0.55rem;
  padding: 0.7rem 0.95rem;
  border-radius: 6px;
  background: var(--soft);
  color: var(--muted);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.65;
}
.ews-status em { color: var(--ink); font-style: italic; }
@media (max-width: 560px) {
  .ews-eq-row { grid-template-columns: 1fr; }
  .ews-control { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="ews" id="ews-root" role="region" aria-label="Output spacing comparison widget">
  <div class="ews-card">
    <div class="ews-label">Same collapse, different spacing</div>
    <div class="ews-eq-row">
      <div class="ews-eq">x - y<span>base equation</span></div>
      <div class="ews-eq" id="ews-scaled-eq">4x - 4y<span>scaled equation</span></div>
    </div>
    <label class="ews-control">
      <strong>Scale factor</strong>
      <input id="ews-scale" type="range" min="0.5" max="5" step="0.5" value="4">
      <input id="ews-scale-num" type="number" min="0.5" max="5" step="0.5" value="4">
    </label>
  </div>

  <div class="ews-figure">
    <svg class="ews-svg" viewBox="0 0 640 360" aria-label="Two number lines comparing base and scaled outputs">
      <g id="ews-connectors"></g>
      <g id="ews-base-line"></g>
      <g id="ews-scaled-line"></g>
      <g id="ews-dots"></g>
      <text class="ews-row-label" x="36" y="94">x - y</text>
      <text class="ews-row-note" x="36" y="112">outputs spaced by 1</text>
      <text class="ews-row-label" id="ews-scaled-label" x="36" y="244">4x - 4y</text>
      <text class="ews-row-note" id="ews-scaled-note" x="36" y="262">same order, spacing x4</text>
    </svg>
  </div>

  <div class="ews-status" id="ews-status"></div>
</div>

<script>
(function(){
  const VALUES = [-2, -1, 0, 1, 2];
  const COLORS = ['#2563eb', '#0891b2', '#16a34a', '#f59e0b', '#dc2626'];
  const BASE_Y = 130;
  const SCALED_Y = 280;
  const LINE_LEFT = 126;
  const LINE_RIGHT = 602;
  const CENTER_X = (LINE_LEFT + LINE_RIGHT) / 2;
  const $ = id => document.getElementById(id);

  function fmt(n){
    if (Number.isInteger(n)) return String(n);
    return (Math.round(n * 100) / 100).toString();
  }
  function unitFor(k){
    return Math.min(42, (LINE_RIGHT - CENTER_X - 18) / (2 * Math.max(1, k)));
  }
  function xFor(v, k){
    return CENTER_X + v * unitFor(k);
  }
  function term(k){
    const val = fmt(k);
    return `${val}x - ${val}y<span>scaled equation</span>`;
  }
  function axisTicksBase(k){
    let html = `<line class="ews-axis" x1="${LINE_LEFT}" y1="${BASE_Y}" x2="${LINE_RIGHT}" y2="${BASE_Y}"/>`;
    VALUES.forEach(v => {
      const x = xFor(v, k);
      html += `<line class="ews-tick" x1="${x}" y1="${BASE_Y - 5}" x2="${x}" y2="${BASE_Y + 5}"/>`;
      html += `<text class="ews-tick-label" x="${x}" y="${BASE_Y + 23}" text-anchor="middle">${v}</text>`;
    });
    return html;
  }
  function axisTicksScaled(k){
    const outputs = VALUES.map(v => k * v);
    const tickValues = outputs.filter((v, i, arr) => arr.indexOf(v) === i);
    let html = `<line class="ews-axis" x1="${LINE_LEFT}" y1="${SCALED_Y}" x2="${LINE_RIGHT}" y2="${SCALED_Y}"/>`;
    tickValues.forEach(v => {
      const x = xFor(v, k);
      html += `<line class="ews-tick" x1="${x}" y1="${SCALED_Y - 5}" x2="${x}" y2="${SCALED_Y + 5}"/>`;
      html += `<text class="ews-tick-label" x="${x}" y="${SCALED_Y + 23}" text-anchor="middle">${fmt(v)}</text>`;
    });
    return html;
  }
  function update(){
    const rawK = +$('ews-scale').value;
    const k = Math.min(5, Math.max(0.5, rawK || 4));
    $('ews-scale').value = k;
    $('ews-scale-num').value = k;
    $('ews-scaled-eq').innerHTML = term(k);
    $('ews-scaled-label').textContent = `${fmt(k)}x - ${fmt(k)}y`;
    $('ews-scaled-note').textContent = `same order, spacing x${fmt(k)}`;
    $('ews-base-line').innerHTML = axisTicksBase(k);
    $('ews-scaled-line').innerHTML = axisTicksScaled(k);

    let connectors = '';
    let dots = '';
    VALUES.forEach((v, i) => {
      const scaledValue = k * v;
      const baseX = xFor(v, k);
      const scaledX = xFor(scaledValue, k);
      const color = COLORS[i];
      connectors += `<line class="ews-connector" x1="${baseX}" y1="${BASE_Y + 7}" x2="${scaledX}" y2="${SCALED_Y - 7}"/>`;
      dots += `<circle class="ews-dot" cx="${baseX}" cy="${BASE_Y}" r="6" fill="${color}"/>`;
      dots += `<text class="ews-output-label" x="${baseX}" y="${BASE_Y - 15}" text-anchor="middle">${v}</text>`;
      dots += `<circle class="ews-dot" cx="${scaledX}" cy="${SCALED_Y}" r="6" fill="${color}"/>`;
      dots += `<text class="ews-output-label" x="${scaledX}" y="${SCALED_Y - 15}" text-anchor="middle">${fmt(scaledValue)}</text>`;
    });
    $('ews-connectors').innerHTML = connectors;
    $('ews-dots').innerHTML = dots;

    $('ews-status').innerHTML = `The colors track the same collapse groups across both equations. Their order is preserved, but each output is multiplied by <em>${fmt(k)}</em>: 1 becomes <em>${fmt(k)}</em>, and 2 becomes <em>${fmt(2 * k)}</em>.`;
    resizeFrame();
  }
  function resizeFrame(){
    if (!window.frameElement) return;
    const height = Math.ceil($('ews-root').getBoundingClientRect().bottom + 16);
    window.frameElement.style.height = `${height + 12}px`;
  }

  $('ews-scale').addEventListener('input', update);
  $('ews-scale-num').addEventListener('input', () => {
    $('ews-scale').value = $('ews-scale-num').value;
    update();
  });
  update();
  window.addEventListener('load', resizeFrame);
  window.addEventListener('resize', resizeFrame);
})();
</script>
</body>
</html>
