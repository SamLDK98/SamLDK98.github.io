<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Determinant Transformations</title>
  <style>
    :root {
      --bg: #17130f;
      --panel: #211b16;
      --panel-2: #292119;
      --line: #473a2d;
      --text: #f3ead8;
      --muted: #a89a84;
      --gold: #f2b044;
      --cyan: #64d8cf;
      --rose: #ef7398;
      --green: #86d37d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .widget {
      min-height: 720px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(0,0,0,0.08)), var(--bg);
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1.25rem;
      align-items: end;
      padding: 1.35rem 1.55rem;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.15rem);
      font-weight: 500;
      letter-spacing: 0;
    }

    .det-readout {
      min-width: 220px;
      padding-left: 1.2rem;
      border-left: 1px solid var(--line);
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .det-readout strong {
      color: var(--gold);
      font-weight: 500;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      min-height: 610px;
    }

    .stage {
      position: relative;
      min-height: 610px;
      border-right: 1px solid var(--line);
    }

    canvas {
      display: block;
      width: 100%;
      height: 610px;
    }

    .controls {
      padding: 1.25rem 1.45rem;
      background: rgba(0, 0, 0, 0.1);
    }

    .label {
      margin: 0 0 0.75rem;
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 0.78rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
      margin-bottom: 1.35rem;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button:hover,
    button.active {
      border-color: #d8b374;
      background: var(--panel-2);
      color: #ffe7b2;
    }

    .matrix-card,
    .meaning-card {
      margin-top: 1rem;
      padding: 1rem;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.13);
    }

    .matrix {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.45rem 1.1rem;
      width: 150px;
      margin: 0.2rem auto 0;
      color: var(--text);
      font-family: "Courier New", monospace;
      font-size: 1.35rem;
      text-align: center;
    }

    .matrix-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 3rem;
      line-height: 1;
    }

    .meaning-card p {
      margin: 0;
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .legend {
      display: grid;
      gap: 0.55rem;
      margin-top: 1.1rem;
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
    }

    .swatch {
      display: inline-block;
      width: 0.8rem;
      height: 0.8rem;
      margin-right: 0.45rem;
      vertical-align: -0.08rem;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .gold { background: var(--gold); }
    .cyan { background: var(--cyan); }
    .rose { background: var(--rose); }

    @media (max-width: 820px) {
      header,
      .layout {
        grid-template-columns: 1fr;
      }

      .det-readout {
        padding-left: 0;
        border-left: 0;
      }

      .stage {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .widget {
        min-height: 980px;
      }
    }
  </style>
</head>
<body>
  <section class="widget">
    <header>
      <h1>Determinants and Space Transformations</h1>
      <div class="det-readout">
        det(A) = <strong id="detValue">1</strong><br>
        area scale = <strong id="scaleValue">1</strong>
      </div>
    </header>

    <div class="layout">
      <div class="stage">
        <canvas id="canvas" width="900" height="610" aria-label="Canvas showing transformed basis vectors and the transformed unit square"></canvas>
      </div>

      <aside class="controls">
        <p class="label">Transformation</p>
        <div class="preset-grid" id="presets"></div>

        <div class="matrix-card">
          <p class="label">Matrix</p>
          <div class="matrix-wrap">
            [
            <div class="matrix" id="matrix"></div>
            ]
          </div>
        </div>

        <div class="meaning-card">
          <p id="meaning">The unit square is unchanged. Area and orientation are preserved.</p>
        </div>

        <div class="legend">
          <div><span class="swatch gold"></span>transformed x basis direction</div>
          <div><span class="swatch cyan"></span>transformed y basis direction</div>
          <div><span class="swatch rose"></span>transformed unit square</div>
        </div>
      </aside>
    </div>
  </section>

  <script>
    const presets = [
      { name: "Identity", matrix: [1, 0, 0, 1], note: "The unit square is unchanged. Area and orientation are preserved." },
      { name: "Area x2", matrix: [2, 0, 0, 1], note: "The parallelogram has twice the original area. Orientation is preserved." },
      { name: "Half area", matrix: [1, 0, 0, 0.5], note: "The area is reduced to half of the original unit square." },
      { name: "Flip", matrix: [1, 0, 0, -1], note: "The area scale is 1, but the negative sign shows that orientation is reversed." },
      { name: "Shear", matrix: [1, 1.4, 0, 1], note: "The square slants into a parallelogram, but its area stays the same." },
      { name: "Collapse", matrix: [1, 2, 0.5, 1], note: "The determinant is zero, so the plane collapses toward a lower-dimensional shape." },
      { name: "Example", matrix: [4, -2, 3, 5], note: "This is the section's example matrix. It scales area by a factor of 26." }
    ];

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const presetRoot = document.getElementById("presets");
    const matrixRoot = document.getElementById("matrix");
    const detValue = document.getElementById("detValue");
    const scaleValue = document.getElementById("scaleValue");
    const meaning = document.getElementById("meaning");
    let active = 0;

    function determinant([a, b, c, d]) {
      return a * d - b * c;
    }

    function fmt(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    }

    function setupButtons() {
      presets.forEach((preset, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = preset.name;
        button.addEventListener("click", () => {
          active = index;
          render();
        });
        presetRoot.appendChild(button);
      });
    }

    function point(x, y, scale, origin) {
      return {
        x: origin.x + x * scale,
        y: origin.y - y * scale
      };
    }

    function drawArrow(from, to, color, label) {
      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(to.x, to.y);
      ctx.lineTo(to.x - 12 * Math.cos(angle - Math.PI / 6), to.y - 12 * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(to.x - 12 * Math.cos(angle + Math.PI / 6), to.y - 12 * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
      ctx.font = "18px Courier New";
      ctx.fillText(label, to.x + 10, to.y - 10);
    }

    function drawGrid(origin, scale) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#17130f";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(243, 234, 216, 0.09)";
      ctx.lineWidth = 1;

      for (let x = -10; x <= 10; x += 1) {
        const p1 = point(x, -7, scale, origin);
        const p2 = point(x, 7, scale, origin);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }

      for (let y = -7; y <= 7; y += 1) {
        const p1 = point(-10, y, scale, origin);
        const p2 = point(10, y, scale, origin);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(243, 234, 216, 0.45)";
      ctx.lineWidth = 2;
      let p1 = point(-10, 0, scale, origin);
      let p2 = point(10, 0, scale, origin);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
      p1 = point(0, -7, scale, origin);
      p2 = point(0, 7, scale, origin);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }

    function drawParallelogram(matrix, origin, scale) {
      const [a, b, c, d] = matrix;
      const o = point(0, 0, scale, origin);
      const xBasis = point(a, c, scale, origin);
      const yBasis = point(b, d, scale, origin);
      const sum = point(a + b, c + d, scale, origin);

      ctx.fillStyle = "rgba(239, 115, 152, 0.22)";
      ctx.strokeStyle = "rgba(239, 115, 152, 0.85)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(o.x, o.y);
      ctx.lineTo(xBasis.x, xBasis.y);
      ctx.lineTo(sum.x, sum.y);
      ctx.lineTo(yBasis.x, yBasis.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      drawArrow(o, xBasis, "#f2b044", "x");
      drawArrow(o, yBasis, "#64d8cf", "y");
    }

    function render() {
      const preset = presets[active];
      const det = determinant(preset.matrix);
      const scale = preset.name === "Example" ? 18 : 62;
      const origin = { x: canvas.width / 2, y: canvas.height / 2 + 25 };

      document.querySelectorAll("#presets button").forEach((button, index) => {
        button.classList.toggle("active", index === active);
      });

      matrixRoot.innerHTML = "";
      preset.matrix.forEach((value) => {
        const cell = document.createElement("div");
        cell.textContent = fmt(value);
        matrixRoot.appendChild(cell);
      });

      detValue.textContent = fmt(det);
      scaleValue.textContent = fmt(Math.abs(det));
      meaning.textContent = preset.note;

      drawGrid(origin, scale);
      drawParallelogram(preset.matrix, origin, scale);
    }

    setupButtons();
    render();
  </script>
</body>
</html>
