<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weighted basis comparison</title>
<style>
  :root {
    --bg: #161311;
    --card: #1e1a17;
    --panel: #221d1a;
    --ink: #ece2d1;
    --muted: #a89c87;
    --faint: #6f6557;
    --line: rgba(214, 196, 168, 0.14);
    --soft: rgba(0, 0, 0, 0.18);
    --blue: #e8a13b;
    --orange: #6dd3c4;
    --green: #d4b888;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
  }

  body {
    padding: 0;
  }

  .comparison {
    max-width: 1040px;
    margin: 0 auto;
    padding: 1rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--card);
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.75rem;
    margin-bottom: 0.85rem;
  }

  .system-strip {
    display: grid;
    gap: 0.2rem;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.85rem;
    padding: 0.72rem 0.85rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: rgba(0, 0, 0, 0.16);
    color: var(--ink);
    font-size: 1rem;
    line-height: 1.35;
  }

  .system-term {
    display: block;
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    white-space: nowrap;
  }

  .system-brace {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.45rem;
    align-items: center;
  }

  .system-brace::before {
    content: "{";
    color: var(--muted);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 2.55rem;
    line-height: 0.9;
  }

  .control-card {
    padding: 0.8rem 0.85rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--soft);
  }

  label {
    display: grid;
    grid-template-columns: auto 3rem 1fr;
    gap: 0.65rem;
    align-items: center;
    color: var(--muted);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .slider-value {
    display: inline-grid;
    place-items: center;
    min-width: 2.5rem;
    padding: 0.3rem 0.42rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: rgba(0, 0, 0, 0.22);
    color: var(--ink);
    font: 0.94rem/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
    text-align: center;
  }

  input[type="range"] {
    width: 100%;
    accent-color: #d4b888;
  }

  input:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(212, 184, 136, 0.08);
  }

  .readout {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.75rem;
    margin-bottom: 0.85rem;
  }

  .readout-card {
    padding: 0.72rem 0.8rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--panel);
    font-size: 1rem;
    line-height: 1.45;
  }

  .readout-card strong {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .blue {
    color: var(--blue);
    font-weight: 700;
  }

  .orange {
    color: var(--orange);
    font-weight: 700;
  }

  .green {
    color: var(--green);
    font-weight: 700;
  }

  .stage {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: rgba(0, 0, 0, 0.14);
    overflow: hidden;
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .axis-label {
    fill: var(--ink);
    font: italic 17px Georgia, "Times New Roman", serif;
  }

  .small-label {
    fill: var(--muted);
    font: 12px Arial, Helvetica, sans-serif;
  }

  .mono-label {
    fill: var(--ink);
    font: 12px ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  .grid-line {
    stroke: rgba(214, 196, 168, 0.16);
  }

  .axis-line {
    stroke: rgba(238, 224, 200, 0.48);
    stroke-width: 1.25;
  }

  .vector-line,
  .vector-dot,
  .vector-label {
    transition: x2 180ms ease, y2 180ms ease, cx 180ms ease, cy 180ms ease;
  }

  @media (max-width: 760px) {
    .controls,
    .readout {
      grid-template-columns: 1fr;
    }

    label {
      grid-template-columns: auto 3rem 1fr;
    }
  }
</style>
</head>
<body>
<div class="comparison" role="region" aria-label="Input and output weighted basis comparison">
  <div class="system-strip" aria-label="System terms">
    <div class="system-brace">
      <div>
        <span class="system-term">4x - 2y</span>
        <span class="system-term">3x + 5y</span>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-card">
      <label>
        x steps
        <span class="slider-value" id="xValue">3</span>
        <input id="xRange" type="range" min="-6" max="6" step="1" value="3" aria-label="x step slider">
      </label>
    </div>
    <div class="control-card">
      <label>
        y steps
        <span class="slider-value" id="yValue">3</span>
        <input id="yRange" type="range" min="-6" max="6" step="1" value="3" aria-label="y step slider">
      </label>
    </div>
  </div>

  <div class="readout" aria-live="polite">
    <div class="readout-card" id="xReadout"></div>
    <div class="readout-card" id="yReadout"></div>
  </div>

  <div class="stage">
    <svg viewBox="0 0 1040 560" aria-label="Input space and output space weighted basis vectors">
      <defs>
        <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8a13b"></path>
        </marker>
        <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#6dd3c4"></path>
        </marker>
      </defs>

      <text x="255" y="32" text-anchor="middle" class="axis-label">input space</text>
      <text x="785" y="32" text-anchor="middle" class="axis-label">output space</text>

      <rect x="50" y="80" width="410" height="410" fill="rgba(0,0,0,0.12)" stroke="rgba(214,196,168,0.14)"></rect>
      <rect x="580" y="80" width="410" height="410" fill="rgba(0,0,0,0.12)" stroke="rgba(214,196,168,0.14)"></rect>
      <g id="inputGrid"></g>
      <g id="outputGrid"></g>
      <g id="vectors"></g>
    </svg>
  </div>
</div>

<script>
(function () {
  const inputBox = { x: 50, y: 80, w: 410, h: 410 };
  const outputBox = { x: 580, y: 80, w: 410, h: 410 };
  const inputLimit = 6;
  const outputLimit = 36;
  const xRange = document.getElementById("xRange");
  const yRange = document.getElementById("yRange");
  const xValue = document.getElementById("xValue");
  const yValue = document.getElementById("yValue");
  const xReadout = document.getElementById("xReadout");
  const yReadout = document.getElementById("yReadout");
  const inputGrid = document.getElementById("inputGrid");
  const outputGrid = document.getElementById("outputGrid");
  const vectors = document.getElementById("vectors");

  function clamp(value, limit) {
    return Math.max(-limit, Math.min(limit, value));
  }

  function read(input) {
    const value = Number(input.value);
    return Number.isFinite(value) ? clamp(value, inputLimit) : 0;
  }

  function fmt(value) {
    if (Math.abs(value) < 1e-10) value = 0;
    return Number.isInteger(value) ? String(value) : String(Math.round(value * 100) / 100);
  }

  function sx(box, value, limit) {
    return box.x + ((value + limit) / (2 * limit)) * box.w;
  }

  function sy(box, value, limit) {
    return box.y + ((limit - value) / (2 * limit)) * box.h;
  }

  function line(x1, y1, x2, y2, attrs) {
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" ${attrs}></line>`;
  }

  function text(x, y, value, attrs) {
    return `<text x="${x}" y="${y}" ${attrs}>${value}</text>`;
  }

  function drawGrid(target, box, limit, step, labels) {
    let html = "";
    for (let i = -limit; i <= limit; i += step) {
      const strong = i === 0;
      const cls = strong ? "axis-line" : "grid-line";
      html += line(sx(box, i, limit), box.y, sx(box, i, limit), box.y + box.h, `class="${cls}"`);
      html += line(box.x, sy(box, i, limit), box.x + box.w, sy(box, i, limit), `class="${cls}"`);

      if (i !== 0 && i % (step * 2) === 0) {
        html += text(sx(box, i, limit), sy(box, 0, limit) + 16, i, 'text-anchor="middle" class="small-label"');
        html += text(sx(box, 0, limit) - 8, sy(box, i, limit) + 4, i, 'text-anchor="end" class="small-label"');
      }
    }

    html += text(box.x + box.w - 14, sy(box, 0, limit) - 9, labels[0], 'text-anchor="end" class="axis-label" fill="#e8a13b"');
    html += text(sx(box, 0, limit) + 10, box.y + 20, labels[1], 'class="axis-label" fill="#6dd3c4"');
    target.innerHTML = html;
  }

  function vector(box, limit, x, y, color, arrowId, label, offsetX, offsetY) {
    const originX = sx(box, 0, limit);
    const originY = sy(box, 0, limit);
    const tipX = sx(box, x, limit);
    const tipY = sy(box, y, limit);
    return line(originX, originY, tipX, tipY, `class="vector-line" stroke="${color}" stroke-width="3" stroke-linecap="round" marker-end="url(#${arrowId})"`) +
      `<circle class="vector-dot" cx="${tipX}" cy="${tipY}" r="5.5" fill="${color}" stroke="#161311" stroke-width="1.5"></circle>` +
      text(tipX + offsetX, tipY + offsetY, label, `class="mono-label vector-label" fill="${color}" font-weight="700"`);
  }

  function syncRange(rangeInput, valueEl) {
    const value = read(rangeInput);
    rangeInput.value = fmt(value);
    valueEl.textContent = fmt(value);
    return value;
  }

  function render() {
    const x = syncRange(xRange, xValue);
    const y = syncRange(yRange, yValue);
    const xOut = { x: 4 * x, y: 3 * x };
    const yOut = { x: -2 * y, y: 5 * y };

    xReadout.innerHTML = `<strong>x basis vector</strong><br><span class="blue">input:</span> (${fmt(x)}, 0) &nbsp; <span class="green">output:</span> (${fmt(xOut.x)}, ${fmt(xOut.y)})`;
    yReadout.innerHTML = `<strong>y basis vector</strong><br><span class="orange">input:</span> (0, ${fmt(y)}) &nbsp; <span class="green">output:</span> (${fmt(yOut.x)}, ${fmt(yOut.y)})`;

    let html = "";
    html += vector(inputBox, inputLimit, x, 0, "#e8a13b", "arrowBlue", `(${fmt(x)},0)`, x >= 0 ? 10 : -54, 18);
    html += vector(inputBox, inputLimit, 0, y, "#6dd3c4", "arrowOrange", `(0,${fmt(y)})`, 10, y >= 0 ? -10 : 22);
    html += vector(outputBox, outputLimit, xOut.x, xOut.y, "#e8a13b", "arrowBlue", `(${fmt(xOut.x)},${fmt(xOut.y)})`, xOut.x >= 0 ? 10 : -74, xOut.y >= 0 ? -10 : 22);
    html += vector(outputBox, outputLimit, yOut.x, yOut.y, "#6dd3c4", "arrowOrange", `(${fmt(yOut.x)},${fmt(yOut.y)})`, yOut.x >= 0 ? 10 : -74, yOut.y >= 0 ? -10 : 22);
    vectors.innerHTML = html;
  }

  xRange.addEventListener("input", render);
  yRange.addEventListener("input", render);

  drawGrid(inputGrid, inputBox, inputLimit, 1, ["x", "y"]);
  drawGrid(outputGrid, outputBox, outputLimit, 6, ["c1", "c2"]);
  render();
})();
</script>
</body>
</html>
