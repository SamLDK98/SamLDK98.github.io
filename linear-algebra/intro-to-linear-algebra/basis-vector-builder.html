<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basis vector coordinate builder</title>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    svg: { fontCache: 'global' }
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
  :root {
    --bg: #fdfcf8;
    --card: #fffefa;
    --ink: #1a1a18;
    --muted: #706a5f;
    --line: #e3ded2;
    --soft: #f8f4ec;
    --blue: #2563eb;
    --orange: #c2410c;
    --green: #047857;
    --purple: #7c3aed;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
  }

  body {
    padding: 1rem;
  }

  .builder {
    max-width: 900px;
    margin: 0 auto;
    padding: 1rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
  }

  .top-row {
    display: grid;
    grid-template-columns: minmax(15rem, 1fr) minmax(18rem, 1.15fr);
    gap: 0.85rem;
    align-items: start;
    margin-bottom: 0.85rem;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.65rem;
  }

  label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    padding: 0.7rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--soft);
    color: var(--muted);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  input {
    width: 5rem;
    padding: 0.38rem 0.45rem;
    border: 1px solid #c9c2b3;
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    font: 0.95rem/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
    text-align: center;
  }

  input:focus {
    outline: 2px solid rgba(37, 99, 235, 0.18);
    border-color: var(--blue);
  }

  .formula {
    margin: 0;
    padding: 0.78rem 0.85rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    font-size: 1.12rem;
    line-height: 1.45;
  }

  .steps {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0.65rem;
    margin-bottom: 0.85rem;
  }

  .step {
    min-height: 4.4rem;
    padding: 0.72rem 0.78rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }

  .step-label {
    display: block;
    margin-bottom: 0.3rem;
    color: var(--muted);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .step-value {
    display: block;
    color: var(--ink);
    font-size: 1.08rem;
    line-height: 1.4;
  }

  .step.is-hidden {
    opacity: 0.28;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-bottom: 0.85rem;
  }

  button {
    cursor: pointer;
    padding: 0.48rem 0.72rem;
    border: 1px solid #c8c4b5;
    border-radius: 7px;
    background: #fff;
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.84rem;
    transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
  }

  button:hover {
    background: #f5f3eb;
    border-color: #a8a496;
  }

  button:active {
    transform: scale(0.985);
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.42;
  }

  .primary {
    border-color: var(--blue);
    background: var(--blue);
    color: #fff;
  }

  .stage {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    overflow: hidden;
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .axis-label {
    fill: var(--ink);
    font: italic 17px Georgia, "Times New Roman", serif;
  }

  .small-label {
    fill: var(--muted);
    font: 12px Arial, Helvetica, sans-serif;
  }

  .mono-label {
    fill: #3d3932;
    font: 12px ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  .grid-line {
    stroke: var(--ink);
    stroke-opacity: 0.08;
  }

  .axis-line {
    stroke: var(--ink);
    stroke-opacity: 0.45;
    stroke-width: 1.35;
  }

  .vector-line,
  .vector-dot,
  .vector-label {
    transition: x1 240ms ease, y1 240ms ease, x2 240ms ease, y2 240ms ease, cx 240ms ease, cy 240ms ease, opacity 180ms ease;
  }

  @media (max-width: 720px) {
    body {
      padding: 0.7rem;
    }

    .top-row,
    .steps {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="builder" role="region" aria-label="Input space basis vector builder">
  <div class="top-row">
    <p class="formula" id="formula"></p>
    <div class="controls">
      <label>
        x
        <input id="xInput" type="number" min="-8" max="8" step="1" value="5">
      </label>
      <label>
        y
        <input id="yInput" type="number" min="-8" max="8" step="1" value="3">
      </label>
    </div>
  </div>

  <div class="steps">
    <div class="step" id="basisStep">
      <span class="step-label">Basis expression</span>
      <span class="step-value" id="basisText"></span>
    </div>
    <div class="step is-hidden" id="componentStep">
      <span class="step-label">Compute each scaled vector</span>
      <span class="step-value" id="componentText"></span>
    </div>
    <div class="step is-hidden" id="sumStep">
      <span class="step-label">Add the vectors</span>
      <span class="step-value" id="sumText"></span>
    </div>
  </div>

  <div class="buttons">
    <button id="computeButton" class="primary" type="button">Compute next step</button>
    <button id="addButton" type="button" disabled>Add x and y vectors</button>
    <button id="drawButton" type="button" disabled>Add new vector</button>
    <button id="resetButton" type="button">Reset</button>
  </div>

  <div class="stage">
    <svg viewBox="0 0 860 560" aria-label="Input space grid showing basis vectors">
      <defs>
        <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"></path>
        </marker>
        <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"></path>
        </marker>
        <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"></path>
        </marker>
      </defs>

      <text x="430" y="34" text-anchor="middle" class="axis-label">input space</text>
      <text x="430" y="54" text-anchor="middle" class="small-label">coordinates are built from x-steps and y-steps</text>
      <rect x="90" y="80" width="680" height="420" fill="#fff" stroke="#e3ded2"></rect>
      <g id="grid"></g>
      <g id="vectors"></g>
    </svg>
  </div>
</div>

<script>
(function () {
  const box = { x: 90, y: 80, w: 680, h: 420 };
  const limit = 8;
  let stage = 0;

  const xInput = document.getElementById("xInput");
  const yInput = document.getElementById("yInput");
  const formula = document.getElementById("formula");
  const basisText = document.getElementById("basisText");
  const componentText = document.getElementById("componentText");
  const sumText = document.getElementById("sumText");
  const componentStep = document.getElementById("componentStep");
  const sumStep = document.getElementById("sumStep");
  const computeButton = document.getElementById("computeButton");
  const addButton = document.getElementById("addButton");
  const drawButton = document.getElementById("drawButton");
  const resetButton = document.getElementById("resetButton");
  const grid = document.getElementById("grid");
  const vectors = document.getElementById("vectors");

  function read(input) {
    const value = Number(input.value);
    return Number.isFinite(value) ? Math.max(-limit, Math.min(limit, value)) : 0;
  }

  function fmt(value) {
    if (Math.abs(value) < 1e-10) value = 0;
    return Number.isInteger(value) ? String(value) : String(Math.round(value * 100) / 100);
  }

  function sx(value) {
    return box.x + ((value + limit) / (2 * limit)) * box.w;
  }

  function sy(value) {
    return box.y + ((limit - value) / (2 * limit)) * box.h;
  }

  function line(x1, y1, x2, y2, attrs) {
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" ${attrs}></line>`;
  }

  function text(x, y, value, attrs) {
    return `<text x="${x}" y="${y}" ${attrs}>${value}</text>`;
  }

  function drawGrid() {
    let html = "";
    for (let i = -limit; i <= limit; i++) {
      const strong = i === 0;
      const cls = strong ? "axis-line" : "grid-line";
      html += line(sx(i), box.y, sx(i), box.y + box.h, `class="${cls}"`);
      html += line(box.x, sy(i), box.x + box.w, sy(i), `class="${cls}"`);

      if (i !== 0 && i % 2 === 0) {
        html += text(sx(i), sy(0) + 16, i, 'text-anchor="middle" class="small-label"');
        html += text(sx(0) - 8, sy(i) + 4, i, 'text-anchor="end" class="small-label"');
      }
    }

    html += text(box.x + box.w - 14, sy(0) - 9, "x", 'text-anchor="end" class="axis-label" fill="#2563eb"');
    html += text(sx(0) + 10, box.y + 20, "y", 'class="axis-label" fill="#c2410c"');
    grid.innerHTML = html;
  }

  function vector(x1, y1, x2, y2, color, arrowId, label, labelOffsetX, labelOffsetY) {
    const startX = sx(x1);
    const startY = sy(y1);
    const endX = sx(x2);
    const endY = sy(y2);
    return line(startX, startY, endX, endY, `class="vector-line" stroke="${color}" stroke-width="3" stroke-linecap="round" marker-end="url(#${arrowId})"`) +
      `<circle class="vector-dot" cx="${endX}" cy="${endY}" r="5" fill="${color}" stroke="#fff" stroke-width="1.5"></circle>` +
      text(endX + labelOffsetX, endY + labelOffsetY, label, `class="mono-label vector-label" fill="${color}" font-weight="700"`);
  }

  function renderMath() {
    if (window.MathJax?.typesetPromise) {
      window.MathJax.typesetPromise([formula, basisText, componentText, sumText]);
    }
  }

  function render() {
    const x = read(xInput);
    const y = read(yInput);
    xInput.value = fmt(x);
    yInput.value = fmt(y);

    formula.innerHTML = `$${fmt(x)}(1,0) + ${fmt(y)}(0,1)$`;
    basisText.innerHTML = `$${fmt(x)}(1,0) + ${fmt(y)}(0,1)$`;
    componentText.innerHTML = `$(${fmt(x)},0) + (0,${fmt(y)})$`;
    sumText.innerHTML = `$(${fmt(x)},${fmt(y)})$`;

    componentStep.classList.toggle("is-hidden", stage < 1);
    sumStep.classList.toggle("is-hidden", stage < 2);
    computeButton.disabled = stage >= 1;
    addButton.disabled = stage < 1 || stage >= 2;
    drawButton.disabled = stage < 2 || stage >= 3;

    let html = "";
    if (stage >= 1) {
      html += vector(0, 0, x, 0, "#2563eb", "arrowBlue", `(${fmt(x)},0)`, x >= 0 ? 10 : -58, 18);
      const yStartX = stage >= 2 ? x : 0;
      const yEndX = stage >= 2 ? x : 0;
      html += vector(yStartX, 0, yEndX, y, "#c2410c", "arrowOrange", `(0,${fmt(y)})`, 10, y >= 0 ? -10 : 20);
    }

    if (stage >= 3) {
      html += vector(0, 0, x, y, "#047857", "arrowGreen", `(${fmt(x)},${fmt(y)})`, x >= 0 ? 10 : -66, y >= 0 ? -12 : 22);
    } else if (stage >= 2) {
      html += `<circle class="vector-dot" cx="${sx(x)}" cy="${sy(y)}" r="6" fill="#7c3aed" stroke="#fff" stroke-width="1.5"></circle>`;
      html += text(sx(x) + (x >= 0 ? 10 : -58), sy(y) + (y >= 0 ? -12 : 22), `(${fmt(x)},${fmt(y)})`, 'class="mono-label vector-label" fill="#7c3aed" font-weight="700"');
    }

    vectors.innerHTML = html;
    renderMath();
  }

  computeButton.addEventListener("click", () => {
    stage = 1;
    render();
  });

  addButton.addEventListener("click", () => {
    stage = 2;
    render();
  });

  drawButton.addEventListener("click", () => {
    stage = 3;
    render();
  });

  resetButton.addEventListener("click", () => {
    stage = 0;
    render();
  });

  xInput.addEventListener("input", () => {
    stage = 0;
    render();
  });

  yInput.addEventListener("input", () => {
    stage = 0;
    render();
  });

  drawGrid();
  render();
})();
</script>
</body>
</html>
