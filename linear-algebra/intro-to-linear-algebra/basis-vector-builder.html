<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basis vector coordinate builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311;
    --panel: #1e1a17;
    --card: #221d1a;
    --rule: rgba(214, 196, 168, 0.14);
    --text: #ece2d1;
    --dim: #a89c87;
    --faint: #6f6557;
    --accent: #d4b888;
    --x: #e8a13b;
    --y: #6dd3c4;
    --sum: #86d48f;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: var(--text);
    font-family: "EB Garamond", Georgia, serif;
  }

  .builder {
    max-width: 920px;
    margin: 0 auto;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background:
      radial-gradient(ellipse at top left, rgba(212, 184, 136, 0.05), transparent 55%),
      var(--panel);
    overflow: hidden;
  }

  .top-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 350px;
    gap: 1rem;
    align-items: stretch;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--rule);
  }

  .coordinate-panel {
    display: grid;
    grid-template-columns: minmax(12rem, 0.78fr) minmax(0, 1fr);
    gap: 0.75rem;
  }

  .coordinate-card {
    display: flex;
    align-items: center;
    min-height: 6rem;
    padding: 0.9rem 1rem;
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: rgba(0, 0, 0, 0.16);
  }

  .coordinate {
    font-family: "Fraunces", Georgia, serif;
    font-size: clamp(1.8rem, 4vw, 3.2rem);
    line-height: 1;
    letter-spacing: 0;
  }

  .x {
    color: var(--x);
  }

  .y {
    color: var(--y);
  }

  .controls {
    display: grid;
    gap: 0.8rem;
    padding: 0.85rem;
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: var(--card);
  }

  label {
    display: grid;
    gap: 0.35rem;
    color: var(--dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input {
    width: 100%;
    height: 2.45rem;
    padding: 0.5rem 2.35rem 0.5rem 0.62rem;
    border: 1px solid var(--rule);
    border-radius: 2px;
    background: rgba(0, 0, 0, 0.22);
    color: var(--text);
    font: 0.95rem/1.2 "JetBrains Mono", monospace;
  }

  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
  }

  input[type="number"] {
    appearance: textfield;
    -moz-appearance: textfield;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(212, 184, 136, 0.08);
  }

  .number-control {
    position: relative;
  }

  .stepper {
    position: absolute;
    right: 0.35rem;
    top: 50%;
    width: 1.45rem;
    display: grid;
    gap: 0.14rem;
    transform: translateY(-50%);
  }

  .stepper button {
    width: 1.45rem;
    height: 0.92rem;
    margin: 0;
    padding: 0;
    display: grid;
    place-items: center;
    border: 1px solid rgba(214, 196, 168, 0.18);
    border-radius: 2px;
    background: rgba(212, 184, 136, 0.06);
    color: var(--accent);
    font: 0.7rem/1 "JetBrains Mono", monospace;
    text-align: center;
  }

  .stepper button:hover {
    background: rgba(212, 184, 136, 0.14);
    border-color: rgba(212, 184, 136, 0.36);
  }

  .calculation-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.6rem;
  }

  .calc-card {
    min-height: 0;
    padding: 0.72rem 0.78rem;
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: var(--card);
  }

  .calc-label {
    display: block;
    margin-bottom: 0.32rem;
    color: var(--faint);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .calc-value {
    display: block;
    color: var(--text);
    font: 0.95rem/1.35 "JetBrains Mono", monospace;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 0 1.25rem 1rem;
    border-bottom: 1px solid var(--rule);
  }

  .action-button {
    cursor: pointer;
    padding: 0.6rem 0.82rem;
    border: 1px solid var(--accent);
    border-radius: 2px;
    background: rgba(212, 184, 136, 0.1);
    color: var(--text);
    font-family: "EB Garamond", Georgia, serif;
    font-size: 1rem;
    text-align: left;
    transition: background 0.15s ease, transform 0.08s ease, opacity 0.15s ease;
  }

  .action-button:hover:not(:disabled) {
    background: rgba(212, 184, 136, 0.16);
  }

  button:active {
    transform: scale(0.985);
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.42;
  }

  .stage {
    background: rgba(0, 0, 0, 0.14);
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .axis-label {
    fill: var(--text);
    font: italic 17px "EB Garamond", Georgia, serif;
  }

  .small-label {
    fill: var(--dim);
    font: 12px Arial, Helvetica, sans-serif;
  }

  .mono-label {
    fill: var(--text);
    font: 12px "JetBrains Mono", monospace;
  }

  .grid-line {
    stroke: rgba(214, 196, 168, 0.16);
  }

  .axis-line {
    stroke: rgba(238, 224, 200, 0.48);
    stroke-width: 1.35;
  }

  .vector-line,
  .vector-dot,
  .vector-label {
    transition: x1 240ms ease, y1 240ms ease, x2 240ms ease, y2 240ms ease, cx 240ms ease, cy 240ms ease, opacity 180ms ease;
  }

  @media (max-width: 720px) {
    .top-row,
    .coordinate-panel {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="builder" role="region" aria-label="Input space basis vector builder">
  <div class="top-row">
    <div class="coordinate-panel">
      <div class="coordinate-card" aria-live="polite">
        <div class="coordinate" id="coordinateText"></div>
      </div>

      <div class="calculation-row">
        <div class="calc-card">
          <span class="calc-label">x basis direction</span>
          <span class="calc-value" id="xText"></span>
        </div>
        <div class="calc-card">
          <span class="calc-label">y basis direction</span>
          <span class="calc-value" id="yText"></span>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>
        x value
        <span class="number-control">
          <input id="xInput" type="number" min="-8" max="8" step="1" value="5">
          <span class="stepper">
            <button type="button" data-target="xInput" data-step="1" aria-label="Increase x value">+</button>
            <button type="button" data-target="xInput" data-step="-1" aria-label="Decrease x value">-</button>
          </span>
        </span>
      </label>
      <label>
        y value
        <span class="number-control">
          <input id="yInput" type="number" min="-8" max="8" step="1" value="3">
          <span class="stepper">
            <button type="button" data-target="yInput" data-step="1" aria-label="Increase y value">+</button>
            <button type="button" data-target="yInput" data-step="-1" aria-label="Decrease y value">-</button>
          </span>
        </span>
      </label>
    </div>
  </div>

  <div class="buttons">
    <button class="action-button" id="addButton" type="button">Add x and y vectors</button>
    <button class="action-button" id="drawButton" type="button" disabled>Add to make input vector</button>
  </div>

  <div class="stage">
    <svg viewBox="0 0 860 560" aria-label="Input space grid showing basis vectors">
      <defs>
        <marker id="arrowX" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8a13b"></path>
        </marker>
        <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#6dd3c4"></path>
        </marker>
        <marker id="arrowSum" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#86d48f"></path>
        </marker>
      </defs>

      <text x="430" y="34" text-anchor="middle" class="axis-label">input space</text>
      <text x="430" y="54" text-anchor="middle" class="small-label">coordinates are built from x-steps and y-steps</text>
      <rect x="90" y="80" width="680" height="420" fill="rgba(0,0,0,0.12)" stroke="rgba(214,196,168,0.14)"></rect>
      <g id="grid"></g>
      <g id="vectors"></g>
    </svg>
  </div>
</div>

<script>
(function () {
  const box = { x: 90, y: 80, w: 680, h: 420 };
  const limit = 8;
  let mode = "separate";

  const xInput = document.getElementById("xInput");
  const yInput = document.getElementById("yInput");
  const coordinateText = document.getElementById("coordinateText");
  const xText = document.getElementById("xText");
  const yText = document.getElementById("yText");
  const addButton = document.getElementById("addButton");
  const drawButton = document.getElementById("drawButton");
  const grid = document.getElementById("grid");
  const vectors = document.getElementById("vectors");

  function read(input) {
    const value = Number(input.value);
    return Number.isFinite(value) ? Math.max(-limit, Math.min(limit, value)) : 0;
  }

  function fmt(value) {
    if (Math.abs(value) < 1e-10) value = 0;
    return Number.isInteger(value) ? String(value) : String(Math.round(value * 100) / 100);
  }

  function sx(value) {
    return box.x + ((value + limit) / (2 * limit)) * box.w;
  }

  function sy(value) {
    return box.y + ((limit - value) / (2 * limit)) * box.h;
  }

  function line(x1, y1, x2, y2, attrs) {
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" ${attrs}></line>`;
  }

  function text(x, y, value, attrs) {
    return `<text x="${x}" y="${y}" ${attrs}>${value}</text>`;
  }

  function labelOffset(x, y) {
    return {
      x: x >= 0 ? 10 : -64,
      y: y >= 0 ? -10 : 22
    };
  }

  function drawGrid() {
    let html = "";
    for (let i = -limit; i <= limit; i++) {
      const cls = i === 0 ? "axis-line" : "grid-line";
      html += line(sx(i), box.y, sx(i), box.y + box.h, `class="${cls}"`);
      html += line(box.x, sy(i), box.x + box.w, sy(i), `class="${cls}"`);

      if (i !== 0 && i % 2 === 0) {
        html += text(sx(i), sy(0) + 16, i, 'text-anchor="middle" class="small-label"');
        html += text(sx(0) - 8, sy(i) + 4, i, 'text-anchor="end" class="small-label"');
      }
    }

    html += text(box.x + box.w - 14, sy(0) - 9, "x", 'text-anchor="end" class="axis-label" fill="#e8a13b"');
    html += text(sx(0) + 10, box.y + 20, "y", 'class="axis-label" fill="#6dd3c4"');
    grid.innerHTML = html;
  }

  function vector(x1, y1, x2, y2, color, arrowId, label) {
    const startX = sx(x1);
    const startY = sy(y1);
    const endX = sx(x2);
    const endY = sy(y2);
    const offset = labelOffset(x2 - x1, y2 - y1);

    return line(startX, startY, endX, endY, `class="vector-line" stroke="${color}" stroke-width="3" stroke-linecap="round" marker-end="url(#${arrowId})"`) +
      `<circle class="vector-dot" cx="${endX}" cy="${endY}" r="5" fill="${color}" stroke="#161311" stroke-width="1.5"></circle>` +
      text(endX + offset.x, endY + offset.y, label, `class="mono-label vector-label" fill="${color}" font-weight="700"`);
  }

  function clampInputs() {
    const x = read(xInput);
    const y = read(yInput);
    xInput.value = fmt(x);
    yInput.value = fmt(y);
    return { x, y };
  }

  function render() {
    const { x, y } = clampInputs();

    coordinateText.innerHTML = '(<span class="x">' + fmt(x) + '</span>, <span class="y">' + fmt(y) + '</span>)';
    xText.innerHTML = '<span class="x">' + fmt(x) + '(1,0) = (' + fmt(x) + ', 0)</span>';
    yText.innerHTML = '<span class="y">' + fmt(y) + '(0,1) = (0, ' + fmt(y) + ')</span>';

    let html = "";
    html += vector(0, 0, x, 0, "#e8a13b", "arrowX", `(${fmt(x)}, 0)`);

    if (mode === "separate") {
      html += vector(0, 0, 0, y, "#6dd3c4", "arrowY", `(0, ${fmt(y)})`);
    } else {
      html += vector(x, 0, x, y, "#6dd3c4", "arrowY", `(0, ${fmt(y)})`);
      if (mode === "added") {
        html += `<circle class="vector-dot" cx="${sx(x)}" cy="${sy(y)}" r="6" fill="#ece2d1" stroke="#161311" stroke-width="1.5"></circle>`;
        html += text(sx(x) + (x >= 0 ? 10 : -64), sy(y) + (y >= 0 ? -12 : 22), `(${fmt(x)}, ${fmt(y)})`, 'class="mono-label vector-label" fill="#ece2d1" font-weight="700"');
      }
    }

    if (mode === "result") {
      html += vector(0, 0, x, y, "#86d48f", "arrowSum", `(${fmt(x)}, ${fmt(y)})`);
    }

    vectors.innerHTML = html;
    addButton.disabled = mode !== "separate";
    drawButton.disabled = mode === "separate" || mode === "result";
  }

  addButton.addEventListener("click", () => {
    mode = "added";
    render();
  });

  drawButton.addEventListener("click", () => {
    mode = "result";
    render();
  });

  function updateValue(input, delta) {
    const next = read(input) + delta;
    input.value = fmt(Math.max(-limit, Math.min(limit, next)));
    input.focus();
    render();
  }

  document.querySelectorAll(".stepper button").forEach((button) => {
    button.addEventListener("click", () => {
      const input = document.getElementById(button.dataset.target);
      updateValue(input, Number(button.dataset.step));
    });
  });

  xInput.addEventListener("input", render);
  yInput.addEventListener("input", render);

  drawGrid();
  render();
})();
</script>
</body>
</html>
