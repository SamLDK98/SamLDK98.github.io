<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basis vector coordinate builder</title>
<style>
  :root {
    --bg: #161311;
    --card: #1e1a17;
    --panel: #221d1a;
    --ink: #ece2d1;
    --muted: #a89c87;
    --faint: #6f6557;
    --line: rgba(214, 196, 168, 0.14);
    --soft: rgba(0, 0, 0, 0.18);
    --blue: #e8a13b;
    --orange: #6dd3c4;
    --green: #d4b888;
    --purple: #ece2d1;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
  }

  body {
    padding: 0;
  }

  .builder {
    max-width: 900px;
    margin: 0 auto;
    padding: 1rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--card);
  }

  .top-row {
    display: grid;
    grid-template-columns: minmax(15rem, 1fr) minmax(18rem, 1.15fr);
    gap: 0.85rem;
    align-items: start;
    margin-bottom: 0.85rem;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.65rem;
  }

  label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    padding: 0.7rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--soft);
    color: var(--muted);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  input {
    width: 5rem;
    padding: 0.38rem 0.45rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: rgba(0, 0, 0, 0.22);
    color: var(--ink);
    font: 0.95rem/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
    text-align: center;
  }

  input:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(212, 184, 136, 0.08);
  }

  .formula {
    margin: 0;
    padding: 0.78rem 0.85rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: rgba(0, 0, 0, 0.16);
    font: 0.98rem/1.45 ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  .steps {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.65rem;
    margin-bottom: 0.85rem;
  }

  .step {
    min-height: 4rem;
    padding: 0.72rem 0.78rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: var(--panel);
  }

  .step-label {
    display: block;
    margin-bottom: 0.3rem;
    color: var(--muted);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .step-value {
    display: block;
    color: var(--ink);
    font: 0.92rem/1.35 ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  .step.is-hidden {
    opacity: 0.28;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-bottom: 0.85rem;
  }

  button {
    cursor: pointer;
    padding: 0.48rem 0.72rem;
    border: 1px solid var(--line);
    border-radius: 2px;
    background: transparent;
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.84rem;
    transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
  }

  button:hover {
    background: rgba(212, 184, 136, 0.08);
    border-color: var(--green);
  }

  button:active {
    transform: scale(0.985);
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.42;
  }

  .primary {
    border-color: var(--green);
    background: rgba(212, 184, 136, 0.12);
    color: var(--ink);
  }

  .blue {
    color: var(--blue);
    font-weight: 700;
  }

  .orange {
    color: var(--orange);
    font-weight: 700;
  }

  .green {
    color: var(--green);
    font-weight: 700;
  }

  .stage {
    border: 1px solid var(--line);
    border-radius: 2px;
    background: rgba(0, 0, 0, 0.14);
    overflow: hidden;
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .axis-label {
    fill: var(--ink);
    font: italic 17px Georgia, "Times New Roman", serif;
  }

  .small-label {
    fill: var(--muted);
    font: 12px Arial, Helvetica, sans-serif;
  }

  .mono-label {
    fill: var(--ink);
    font: 12px ui-monospace, SFMono-Regular, Consolas, monospace;
  }

  .grid-line {
    stroke: rgba(214, 196, 168, 0.16);
  }

  .axis-line {
    stroke: rgba(238, 224, 200, 0.48);
    stroke-width: 1.35;
  }

  .vector-line,
  .vector-dot,
  .vector-label {
    transition: x1 240ms ease, y1 240ms ease, x2 240ms ease, y2 240ms ease, cx 240ms ease, cy 240ms ease, opacity 180ms ease;
  }

  @media (max-width: 720px) {
    .top-row,
    .steps {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="builder" role="region" aria-label="Input space basis vector builder">
  <div class="top-row">
    <p class="formula" id="formula"></p>
    <div class="controls">
      <label>
        x
        <input id="xInput" type="number" min="-8" max="8" step="1" value="5">
      </label>
      <label>
        y
        <input id="yInput" type="number" min="-8" max="8" step="1" value="3">
      </label>
    </div>
  </div>

  <div class="steps">
    <div class="step" id="basisStep">
      <span class="step-label">Start</span>
      <span class="step-value" id="basisText"></span>
    </div>
    <div class="step is-hidden" id="xStep">
      <span class="step-label">x part</span>
      <span class="step-value" id="xText"></span>
    </div>
    <div class="step is-hidden" id="yStep">
      <span class="step-label">y part</span>
      <span class="step-value" id="yText"></span>
    </div>
    <div class="step is-hidden" id="sumStep">
      <span class="step-label">Together</span>
      <span class="step-value" id="sumText"></span>
    </div>
  </div>

  <div class="buttons">
    <button id="xButton" class="primary" type="button">Show x vector</button>
    <button id="yButton" type="button" disabled>Show y vector</button>
    <button id="addButton" type="button" disabled>Add x and y vectors</button>
    <button id="drawButton" type="button" disabled>Add new vector</button>
    <button id="resetButton" type="button">Reset</button>
  </div>

  <div class="stage">
    <svg viewBox="0 0 860 560" aria-label="Input space grid showing basis vectors">
      <defs>
        <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8a13b"></path>
        </marker>
        <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#6dd3c4"></path>
        </marker>
        <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#d4b888"></path>
        </marker>
      </defs>

      <text x="430" y="34" text-anchor="middle" class="axis-label">input space</text>
      <text x="430" y="54" text-anchor="middle" class="small-label">coordinates are built from x-steps and y-steps</text>
      <rect x="90" y="80" width="680" height="420" fill="rgba(0,0,0,0.12)" stroke="rgba(214,196,168,0.14)"></rect>
      <g id="grid"></g>
      <g id="vectors"></g>
    </svg>
  </div>
</div>

<script>
(function () {
  const box = { x: 90, y: 80, w: 680, h: 420 };
  const limit = 8;
  let stage = 0;

  const xInput = document.getElementById("xInput");
  const yInput = document.getElementById("yInput");
  const formula = document.getElementById("formula");
  const basisText = document.getElementById("basisText");
  const xText = document.getElementById("xText");
  const yText = document.getElementById("yText");
  const sumText = document.getElementById("sumText");
  const xStep = document.getElementById("xStep");
  const yStep = document.getElementById("yStep");
  const sumStep = document.getElementById("sumStep");
  const xButton = document.getElementById("xButton");
  const yButton = document.getElementById("yButton");
  const addButton = document.getElementById("addButton");
  const drawButton = document.getElementById("drawButton");
  const resetButton = document.getElementById("resetButton");
  const grid = document.getElementById("grid");
  const vectors = document.getElementById("vectors");

  function read(input) {
    const value = Number(input.value);
    return Number.isFinite(value) ? Math.max(-limit, Math.min(limit, value)) : 0;
  }

  function fmt(value) {
    if (Math.abs(value) < 1e-10) value = 0;
    return Number.isInteger(value) ? String(value) : String(Math.round(value * 100) / 100);
  }

  function sx(value) {
    return box.x + ((value + limit) / (2 * limit)) * box.w;
  }

  function sy(value) {
    return box.y + ((limit - value) / (2 * limit)) * box.h;
  }

  function line(x1, y1, x2, y2, attrs) {
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" ${attrs}></line>`;
  }

  function text(x, y, value, attrs) {
    return `<text x="${x}" y="${y}" ${attrs}>${value}</text>`;
  }

  function drawGrid() {
    let html = "";
    for (let i = -limit; i <= limit; i++) {
      const strong = i === 0;
      const cls = strong ? "axis-line" : "grid-line";
      html += line(sx(i), box.y, sx(i), box.y + box.h, `class="${cls}"`);
      html += line(box.x, sy(i), box.x + box.w, sy(i), `class="${cls}"`);

      if (i !== 0 && i % 2 === 0) {
        html += text(sx(i), sy(0) + 16, i, 'text-anchor="middle" class="small-label"');
        html += text(sx(0) - 8, sy(i) + 4, i, 'text-anchor="end" class="small-label"');
      }
    }

    html += text(box.x + box.w - 14, sy(0) - 9, "x", 'text-anchor="end" class="axis-label" fill="#e8a13b"');
    html += text(sx(0) + 10, box.y + 20, "y", 'class="axis-label" fill="#6dd3c4"');
    grid.innerHTML = html;
  }

  function vector(x1, y1, x2, y2, color, arrowId, label, labelOffsetX, labelOffsetY) {
    const startX = sx(x1);
    const startY = sy(y1);
    const endX = sx(x2);
    const endY = sy(y2);
    return line(startX, startY, endX, endY, `class="vector-line" stroke="${color}" stroke-width="3" stroke-linecap="round" marker-end="url(#${arrowId})"`) +
      `<circle class="vector-dot" cx="${endX}" cy="${endY}" r="5" fill="${color}" stroke="#161311" stroke-width="1.5"></circle>` +
      text(endX + labelOffsetX, endY + labelOffsetY, label, `class="mono-label vector-label" fill="${color}" font-weight="700"`);
  }

  function render() {
    const x = read(xInput);
    const y = read(yInput);
    xInput.value = fmt(x);
    yInput.value = fmt(y);

    formula.innerHTML = `<span class="blue">${fmt(x)}(1,0)</span> + <span class="orange">${fmt(y)}(0,1)</span>`;
    basisText.innerHTML = `<span class="blue">${fmt(x)} x-steps</span> + <span class="orange">${fmt(y)} y-steps</span>`;
    xText.innerHTML = `<span class="blue">${fmt(x)}(1,0) = (${fmt(x)},0)</span>`;
    yText.innerHTML = `<span class="orange">${fmt(y)}(0,1) = (0,${fmt(y)})</span>`;
    sumText.innerHTML = `<span class="blue">(${fmt(x)},0)</span> + <span class="orange">(0,${fmt(y)})</span> = <span class="green">(${fmt(x)},${fmt(y)})</span>`;

    xStep.classList.toggle("is-hidden", stage < 1);
    yStep.classList.toggle("is-hidden", stage < 2);
    sumStep.classList.toggle("is-hidden", stage < 3);
    xButton.disabled = stage >= 1;
    yButton.disabled = stage < 1 || stage >= 2;
    addButton.disabled = stage < 2 || stage >= 3;
    drawButton.disabled = stage < 3 || stage >= 4;

    let html = "";
    if (stage >= 1) {
      html += vector(0, 0, x, 0, "#e8a13b", "arrowBlue", `(${fmt(x)},0)`, x >= 0 ? 10 : -58, 18);
    }

    if (stage >= 2) {
      const yStartX = stage >= 3 ? x : 0;
      const yEndX = stage >= 3 ? x : 0;
      html += vector(yStartX, 0, yEndX, y, "#6dd3c4", "arrowOrange", `(0,${fmt(y)})`, 10, y >= 0 ? -10 : 20);
    }

    if (stage >= 4) {
      html += vector(0, 0, x, y, "#d4b888", "arrowGreen", `(${fmt(x)},${fmt(y)})`, x >= 0 ? 10 : -66, y >= 0 ? -12 : 22);
    } else if (stage >= 3) {
      html += `<circle class="vector-dot" cx="${sx(x)}" cy="${sy(y)}" r="6" fill="#ece2d1" stroke="#161311" stroke-width="1.5"></circle>`;
      html += text(sx(x) + (x >= 0 ? 10 : -58), sy(y) + (y >= 0 ? -12 : 22), `(${fmt(x)},${fmt(y)})`, 'class="mono-label vector-label" fill="#ece2d1" font-weight="700"');
    }

    vectors.innerHTML = html;
  }

  xButton.addEventListener("click", () => {
    stage = 1;
    render();
  });

  yButton.addEventListener("click", () => {
    stage = 2;
    render();
  });

  addButton.addEventListener("click", () => {
    stage = 3;
    render();
  });

  drawButton.addEventListener("click", () => {
    stage = 4;
    render();
  });

  resetButton.addEventListener("click", () => {
    stage = 0;
    render();
  });

  xInput.addEventListener("input", () => {
    stage = 0;
    render();
  });

  yInput.addEventListener("input", () => {
    stage = 0;
    render();
  });

  drawGrid();
  render();
})();
</script>
</body>
</html>
