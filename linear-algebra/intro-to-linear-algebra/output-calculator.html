<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear system output calculator</title>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    svg: { fontCache: 'global' }
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
  :root {
    --bg: #fdfcf8;
    --card: #fffefa;
    --ink: #1a1a18;
    --muted: #706a5f;
    --line: #e3ded2;
    --soft: #f8f4ec;
    --blue: #2563eb;
    --orange: #c2410c;
    --green: #047857;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
  }

  body {
    padding: 1rem;
  }

  .calculator {
    max-width: 900px;
    margin: 0 auto;
    padding: 1rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
  }

  .calculator-layout {
    display: grid;
    grid-template-columns: minmax(18rem, 1fr) minmax(18rem, 0.9fr);
    gap: 1rem;
    align-items: center;
  }

  .system {
    margin: 0;
    font-size: 1.34rem;
    line-height: 1.45;
    text-align: center;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.75rem;
  }

  label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    padding: 0.72rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--soft);
    color: var(--muted);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.84rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  input {
    width: 5.5rem;
    padding: 0.38rem 0.45rem;
    border: 1px solid #c9c2b3;
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    font: 0.95rem/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
    text-align: center;
  }

  input:focus {
    outline: 2px solid rgba(37, 99, 235, 0.18);
    border-color: var(--blue);
  }

  @media (max-width: 700px) {
    body {
      padding: 0.7rem;
    }

    .calculator-layout {
      grid-template-columns: 1fr;
    }

    .controls {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="calculator" role="region" aria-label="Linear system output calculator">
  <div class="calculator-layout">
    <p class="system" id="systemDisplay">$$\begin{cases}4x - 2y = \ ?\\3x + 5y = \ ?\end{cases}$$</p>

    <div class="controls">
      <label>
        x
        <input id="xInput" type="number" step="1" placeholder="x">
      </label>
      <label>
        y
        <input id="yInput" type="number" step="1" placeholder="y">
      </label>
    </div>
  </div>
</div>

<script>
(function () {
  const xInput = document.getElementById("xInput");
  const yInput = document.getElementById("yInput");
  const systemDisplay = document.getElementById("systemDisplay");

  function read(input) {
    const value = Number(input.value);
    return input.value.trim() !== "" && Number.isFinite(value) ? value : null;
  }

  function fmt(value) {
    if (Math.abs(value) < 1e-10) value = 0;
    return Number.isInteger(value) ? String(value) : String(Math.round(value * 100) / 100);
  }

  function render() {
    const x = read(xInput);
    const y = read(yInput);

    if (x === null || y === null) {
      systemDisplay.innerHTML = "$$\\begin{cases}4x - 2y = \\ ?\\\\3x + 5y = \\ ?\\end{cases}$$";
    } else {
      const c1 = 4 * x - 2 * y;
      const c2 = 3 * x + 5 * y;
      systemDisplay.innerHTML = `$$\\begin{cases}4(${fmt(x)}) - 2(${fmt(y)}) = ${fmt(c1)}\\\\3(${fmt(x)}) + 5(${fmt(y)}) = ${fmt(c2)}\\end{cases}$$`;
    }

    if (window.MathJax?.typesetPromise) {
      window.MathJax.typesetPromise([systemDisplay]);
    }
  }

  xInput.addEventListener("input", render);
  yInput.addEventListener("input", render);
  render();
})();
</script>
</body>
</html>
