<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear system output calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311;
    --panel: #1e1a17;
    --card: #221d1a;
    --rule: rgba(214, 196, 168, 0.14);
    --text: #ece2d1;
    --dim: #a89c87;
    --faint: #6f6557;
    --accent: #d4b888;
    --x: #e8a13b;
    --y: #6dd3c4;
    --out: #ece2d1;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: var(--text);
    font-family: "EB Garamond", Georgia, serif;
  }

  body {
    padding: 0;
  }

  .calculator {
    max-width: 920px;
    margin: 0 auto;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background:
      radial-gradient(ellipse at top left, rgba(212, 184, 136, 0.05), transparent 55%),
      var(--panel);
    overflow: hidden;
  }

  .calculator-header {
    display: block;
    padding: 1.1rem 1.25rem 0.9rem;
    border-bottom: 1px solid var(--rule);
  }

  .eyebrow {
    margin: 0 0 0.2rem;
    color: var(--faint);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.64rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  h1 {
    margin: 0;
    color: var(--text);
    font-family: "Fraunces", Georgia, serif;
    font-size: 1.35rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  .calculator-body {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 230px;
    min-height: 225px;
  }

  .system-panel {
    display: grid;
    place-items: center;
    padding: 1.4rem 1.25rem;
  }

  .system-card {
    width: min(100%, 440px);
    padding: 1.1rem 1.2rem;
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: rgba(0, 0, 0, 0.16);
  }

  .equation {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.9rem;
    align-items: baseline;
    padding: 0.48rem 0;
    border-bottom: 1px solid rgba(214, 196, 168, 0.08);
    color: var(--text);
    font-size: 1.18rem;
    line-height: 1.3;
  }

  .equation:last-child {
    border-bottom: 0;
  }

  .expr {
    white-space: nowrap;
  }

  .result {
    color: var(--out);
    font-family: "JetBrains Mono", monospace;
    font-size: 1.05rem;
    font-variant-numeric: tabular-nums;
  }

  .x {
    color: var(--x);
  }

  .y {
    color: var(--y);
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    padding: 1.25rem;
    border-left: 1px solid var(--rule);
    background: var(--card);
  }

  .section-label {
    margin-bottom: -0.2rem;
    padding-bottom: 0.42rem;
    border-bottom: 1px solid var(--rule);
    color: var(--faint);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  label {
    display: grid;
    gap: 0.35rem;
    color: var(--dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input {
    width: 100%;
    height: 2.7rem;
    padding: 0.58rem 2.35rem 0.58rem 0.62rem;
    border: 1px solid var(--rule);
    border-radius: 2px;
    background: rgba(0, 0, 0, 0.2);
    color: var(--text);
    font: 0.95rem/1.2 "JetBrains Mono", monospace;
  }

  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
  }

  input[type="number"] {
    appearance: textfield;
    -moz-appearance: textfield;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(212, 184, 136, 0.08);
  }

  .number-control {
    position: relative;
  }

  .stepper {
    position: absolute;
    right: 0.35rem;
    top: 50%;
    width: 1.45rem;
    display: grid;
    gap: 0.14rem;
    transform: translateY(-50%);
  }

  .stepper button {
    width: 1.45rem;
    height: 1rem;
    margin: 0;
    padding: 0;
    display: grid;
    place-items: center;
    border: 1px solid rgba(214, 196, 168, 0.18);
    border-radius: 2px;
    background: rgba(212, 184, 136, 0.06);
    color: var(--accent);
    font: 0.72rem/1 "JetBrains Mono", monospace;
    text-align: center;
  }

  .stepper button:hover {
    background: rgba(212, 184, 136, 0.14);
    border-color: rgba(212, 184, 136, 0.36);
  }

  button {
    cursor: pointer;
    margin-top: 0.15rem;
    padding: 0.68rem 0.78rem;
    border: 1px solid var(--accent);
    border-radius: 2px;
    background: rgba(212, 184, 136, 0.1);
    color: var(--text);
    font-family: "EB Garamond", Georgia, serif;
    font-size: 1rem;
    text-align: left;
    transition: background 0.15s ease, transform 0.08s ease;
  }

  button:hover {
    background: rgba(212, 184, 136, 0.16);
  }

  button:active {
    transform: scale(0.985);
  }

  @media (max-width: 660px) {
    .calculator-header {
      display: block;
    }

    .calculator-body {
      grid-template-columns: 1fr;
    }

    .controls {
      border-left: 0;
      border-top: 1px solid var(--rule);
    }

    .equation {
      grid-template-columns: 1fr;
      gap: 0.2rem;
    }
  }
</style>
</head>
<body>
<div class="calculator" role="region" aria-label="Linear system output calculator">
  <div class="calculator-header">
    <div>
      <h1>Row by row calculation of outputs</h1>
    </div>
  </div>

  <div class="calculator-body">
    <div class="system-panel">
      <div class="system-card" aria-live="polite">
        <div class="equation">
          <span class="expr" id="eqOneExpr">4<span class="x">x</span> - 2<span class="y">y</span></span>
          <span class="result" id="eqOneResult">= ?</span>
        </div>
        <div class="equation">
          <span class="expr" id="eqTwoExpr">3<span class="x">x</span> + 5<span class="y">y</span></span>
          <span class="result" id="eqTwoResult">= ?</span>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="section-label">Coordinate</div>
      <label>
        x value
        <span class="number-control">
          <input id="xInput" type="number" step="1" placeholder="x">
          <span class="stepper">
            <button type="button" data-target="xInput" data-step="1" aria-label="Increase x value">+</button>
            <button type="button" data-target="xInput" data-step="-1" aria-label="Decrease x value">-</button>
          </span>
        </span>
      </label>
      <label>
        y value
        <span class="number-control">
          <input id="yInput" type="number" step="1" placeholder="y">
          <span class="stepper">
            <button type="button" data-target="yInput" data-step="1" aria-label="Increase y value">+</button>
            <button type="button" data-target="yInput" data-step="-1" aria-label="Decrease y value">-</button>
          </span>
        </span>
      </label>
      <button id="enterButton" type="button">Set</button>
    </div>
  </div>
</div>

<script>
(function () {
  const xInput = document.getElementById("xInput");
  const yInput = document.getElementById("yInput");
  const enterButton = document.getElementById("enterButton");
  const eqOneExpr = document.getElementById("eqOneExpr");
  const eqTwoExpr = document.getElementById("eqTwoExpr");
  const eqOneResult = document.getElementById("eqOneResult");
  const eqTwoResult = document.getElementById("eqTwoResult");

  function read(input) {
    const value = Number(input.value);
    return input.value.trim() !== "" && Number.isFinite(value) ? value : null;
  }

  function fmt(value) {
    if (Math.abs(value) < 1e-10) value = 0;
    return Number.isInteger(value) ? String(value) : String(Math.round(value * 100) / 100);
  }

  function resetGeneric() {
    eqOneExpr.innerHTML = '4<span class="x">x</span> - 2<span class="y">y</span>';
    eqTwoExpr.innerHTML = '3<span class="x">x</span> + 5<span class="y">y</span>';
    eqOneResult.textContent = "= ?";
    eqTwoResult.textContent = "= ?";
  }

  function submit() {
    const x = read(xInput);
    const y = read(yInput);

    if (x === null || y === null) {
      resetGeneric();
      return;
    }

    eqOneExpr.innerHTML = `4(<span class="x">${fmt(x)}</span>) - 2(<span class="y">${fmt(y)}</span>)`;
    eqTwoExpr.innerHTML = `3(<span class="x">${fmt(x)}</span>) + 5(<span class="y">${fmt(y)}</span>)`;
    eqOneResult.textContent = `= ${fmt(4 * x - 2 * y)}`;
    eqTwoResult.textContent = `= ${fmt(3 * x + 5 * y)}`;
  }

  enterButton.addEventListener("click", submit);
  xInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") submit();
  });
  yInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") submit();
  });
  document.querySelectorAll(".stepper button").forEach((button) => {
    button.addEventListener("click", () => {
      const input = document.getElementById(button.dataset.target);
      const current = read(input) ?? 0;
      input.value = fmt(current + Number(button.dataset.step));
      input.focus();
    });
  });

  resetGeneric();
})();
</script>
</body>
</html>
