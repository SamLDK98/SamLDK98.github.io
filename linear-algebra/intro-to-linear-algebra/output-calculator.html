<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear system output calculator</title>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    svg: { fontCache: 'global' }
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
  :root {
    --bg: #fdfcf8;
    --card: #fffefa;
    --ink: #1a1a18;
    --muted: #706a5f;
    --line: #e3ded2;
    --soft: #f8f4ec;
    --blue: #2563eb;
    --orange: #c2410c;
    --green: #047857;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
  }

  body {
    padding: 1rem;
  }

  .calculator {
    max-width: 820px;
    margin: 0 auto;
    padding: 1rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
  }

  .system {
    margin: 0 0 0.85rem;
    font-size: 1.28rem;
    line-height: 1.45;
    text-align: center;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.75rem;
    margin-bottom: 0.9rem;
  }

  label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.45rem;
    padding: 0.72rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--soft);
    color: var(--muted);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.84rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  input {
    width: 5.5rem;
    padding: 0.38rem 0.45rem;
    border: 1px solid #c9c2b3;
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    font: 0.95rem/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
    text-align: center;
  }

  input:focus {
    outline: 2px solid rgba(37, 99, 235, 0.18);
    border-color: var(--blue);
  }

  .rows {
    display: grid;
    gap: 0.65rem;
  }

  .row {
    padding: 0.8rem 0.9rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }

  .row-title {
    display: block;
    margin-bottom: 0.35rem;
    color: var(--muted);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .math-line {
    color: var(--ink);
    font-size: 1.12rem;
    line-height: 1.5;
  }

  .blue {
    color: var(--blue);
    font-weight: 700;
  }

  .orange {
    color: var(--orange);
    font-weight: 700;
  }

  .result {
    color: var(--green);
    font-weight: 700;
  }

  .summary {
    margin: 0.75rem 0 0;
    padding: 0.72rem 0.85rem;
    border-radius: 8px;
    background: var(--soft);
    font-size: 1.05rem;
    text-align: center;
  }

  @media (max-width: 620px) {
    body {
      padding: 0.7rem;
    }

    .controls {
      grid-template-columns: 1fr;
    }

    .math-line {
      font-size: 0.98rem;
    }
  }
</style>
</head>
<body>
<div class="calculator" role="region" aria-label="Linear system output calculator">
  <p class="system">$$\begin{cases}4x - 2y = \ ?\\3x + 5y = \ ?\end{cases}$$</p>

  <div class="controls">
    <label>
      x
      <input id="xInput" type="number" step="1" value="7">
    </label>
    <label>
      y
      <input id="yInput" type="number" step="1" value="6">
    </label>
  </div>

  <div class="rows">
    <div class="row">
      <span class="row-title">First row</span>
      <div class="math-line" id="rowOne"></div>
    </div>
    <div class="row">
      <span class="row-title">Second row</span>
      <div class="math-line" id="rowTwo"></div>
    </div>
  </div>

  <p class="summary" id="summary"></p>
</div>

<script>
(function () {
  const xInput = document.getElementById("xInput");
  const yInput = document.getElementById("yInput");
  const rowOne = document.getElementById("rowOne");
  const rowTwo = document.getElementById("rowTwo");
  const summary = document.getElementById("summary");

  function read(input) {
    const value = Number(input.value);
    return Number.isFinite(value) ? value : 0;
  }

  function fmt(value) {
    if (Math.abs(value) < 1e-10) value = 0;
    return Number.isInteger(value) ? String(value) : String(Math.round(value * 100) / 100);
  }

  function render() {
    const x = read(xInput);
    const y = read(yInput);
    const c1 = 4 * x - 2 * y;
    const c2 = 3 * x + 5 * y;

    rowOne.innerHTML = `<span class="blue">4(${fmt(x)})</span> - <span class="orange">2(${fmt(y)})</span> = ${fmt(4 * x)} - ${fmt(2 * y)} = <span class="result">${fmt(c1)}</span>`;
    rowTwo.innerHTML = `<span class="blue">3(${fmt(x)})</span> + <span class="orange">5(${fmt(y)})</span> = ${fmt(3 * x)} + ${fmt(5 * y)} = <span class="result">${fmt(c2)}</span>`;
    summary.innerHTML = `So the input $(x,y) = (${fmt(x)}, ${fmt(y)})$ produces $(c_{1}, c_{2}) = <span class="result">(${fmt(c1)}, ${fmt(c2)})</span>.`;

    if (window.MathJax?.typesetPromise) {
      window.MathJax.typesetPromise([summary]);
    }
  }

  xInput.addEventListener("input", render);
  yInput.addEventListener("input", render);
  render();
})();
</script>
</body>
</html>
