<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Equation multiplier</title>
<style>
  :root {
    --bg: #f5f1e8;
    --paper: #fbf8f0;
    --ink: #1a1a1a;
    --soft-ink: #3a3a3a;
    --muted: #7a7468;
    --rule: #d6cdb7;
    --rule-soft: #e6dfcd;
    --line: #b85a3a;
    --line-2: #2a5e58;
    --fill: rgba(42, 94, 88, 0.1);
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
  }

  body {
    padding: 18px 18px 22px;
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .widget {
    max-width: 760px;
    margin: 0 auto;
  }

  .main {
    display: grid;
    grid-template-columns: minmax(290px, 1fr) minmax(280px, 390px);
    background: var(--paper);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .panel {
    min-width: 0;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .panel-label,
  button {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    text-transform: uppercase;
  }

  .panel-label {
    margin-bottom: 7px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.22em;
  }

  .equation-group {
    display: grid;
    gap: 12px;
  }

  .equation {
    font-size: 25px;
    line-height: 1.25;
    font-variant-numeric: tabular-nums;
  }

  .equation em { font-style: italic; }

  .equation.muted {
    color: var(--soft-ink);
    font-size: 21px;
  }

  .control-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .control {
    min-width: 0;
    border-top: 1px solid var(--rule-soft);
    padding-top: 12px;
  }

  .control-name {
    display: block;
    margin-bottom: 9px;
    color: var(--ink);
    font-size: 20px;
    font-style: italic;
    line-height: 1;
  }

  .button-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  button {
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.08em;
    min-height: 34px;
  }

  button:hover { opacity: 0.82; }

  .step-btn {
    min-width: 0;
    padding: 0;
    font-size: 15px;
    letter-spacing: 0;
  }

  .flip-btn,
  .reset-btn {
    width: 100%;
    margin-top: 6px;
    padding: 0 8px;
    background: transparent;
    color: var(--ink);
    font-size: 10px;
  }

  .flip-btn:hover,
  .reset-btn:hover {
    background: var(--ink);
    color: var(--paper);
    opacity: 1;
  }

  .reset-btn {
    width: fit-content;
    min-width: 88px;
    margin-top: 0;
    padding: 10px 16px;
    font-size: 12px;
  }

  .plot-wrap {
    position: relative;
    aspect-ratio: 1;
    border-left: 1px solid var(--rule-soft);
  }

  #plane {
    display: block;
    width: 100%;
    height: 100%;
  }

  .note {
    max-width: 650px;
    margin: 16px auto 0;
    color: var(--soft-ink);
    font-size: 15px;
    line-height: 1.55;
    text-align: center;
  }

  @media (max-width: 760px) {
    body { padding: 16px 14px 20px; }

    .main { grid-template-columns: 1fr; }

    .plot-wrap {
      border-left: 0;
      border-top: 1px solid var(--rule-soft);
    }

    .panel { padding: 18px; }
  }

  @media (max-width: 520px) {
    .control-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .equation { font-size: 22px; }
    .equation.muted { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="widget">
  <div class="main">
    <div class="panel">
      <div class="equation-group">
        <div>
          <div class="panel-label">Constructed equation</div>
          <div class="equation" id="base-equation"></div>
        </div>
        <div>
          <div class="panel-label">After multiplying</div>
          <div class="equation muted" id="multiplied-equation"></div>
        </div>
      </div>

      <div class="control-grid" aria-label="Equation controls">
        <div class="control">
          <span class="control-name">x</span>
          <div class="button-row">
            <button class="step-btn" data-param="a" data-delta="1" aria-label="Increase x coefficient">+</button>
            <button class="step-btn" data-param="a" data-delta="-1" aria-label="Decrease x coefficient">-</button>
          </div>
          <button class="flip-btn" data-flip="a" aria-label="Flip x coefficient sign">Flip sign</button>
        </div>

        <div class="control">
          <span class="control-name">y</span>
          <div class="button-row">
            <button class="step-btn" data-param="b" data-delta="1" aria-label="Increase y coefficient">+</button>
            <button class="step-btn" data-param="b" data-delta="-1" aria-label="Decrease y coefficient">-</button>
          </div>
          <button class="flip-btn" data-flip="b" aria-label="Flip y coefficient sign">Flip sign</button>
        </div>

        <div class="control">
          <span class="control-name">c</span>
          <div class="button-row">
            <button class="step-btn" data-param="c" data-delta="1" aria-label="Increase constant">+</button>
            <button class="step-btn" data-param="c" data-delta="-1" aria-label="Decrease constant">-</button>
          </div>
        </div>

        <div class="control">
          <span class="control-name">m</span>
          <div class="button-row">
            <button class="step-btn" data-param="m" data-delta="1" aria-label="Increase multiplier">+</button>
            <button class="step-btn" data-param="m" data-delta="-1" aria-label="Decrease multiplier">-</button>
          </div>
        </div>
      </div>

      <button class="reset-btn" id="reset-btn">Reset</button>
    </div>

    <div class="plot-wrap">
      <canvas id="plane" aria-label="Coordinate plane comparing the original and multiplied equations"></canvas>
    </div>
  </div>

  <p class="note" id="note"></p>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('plane');
  const ctx = canvas.getContext('2d');
  const baseEl = document.getElementById('base-equation');
  const multipliedEl = document.getElementById('multiplied-equation');
  const noteEl = document.getElementById('note');
  const resetBtn = document.getElementById('reset-btn');

  const X_MIN = -5;
  const X_MAX = 5;
  const Y_MIN = -5;
  const Y_MAX = 5;
  const INITIAL = { a: 4, b: -2, c: 2, m: 2 };

  let state = { ...INITIAL };
  let dpr = 1;
  let w = 0;
  let h = 0;

  function nearlyZero(n) {
    return Math.abs(n) < 0.0001;
  }

  function formatNumber(n) {
    if (Object.is(n, -0)) return '0';
    return String(n);
  }

  function formatTerm(coef, variable, first) {
    const sign = coef < 0 ? '-' : '+';
    const abs = Math.abs(coef);
    const body = `${formatNumber(abs)}<em>${variable}</em>`;
    if (first) return coef < 0 ? `-${body}` : body;
    return ` ${sign} ${body}`;
  }

  function equationHTML(a, b, c) {
    const terms = [];
    if (!nearlyZero(a)) terms.push(formatTerm(a, 'x', terms.length === 0));
    if (!nearlyZero(b)) terms.push(formatTerm(b, 'y', terms.length === 0));
    if (terms.length === 0) terms.push('0');
    return `${terms.join('')} = ${formatNumber(c)}`;
  }

  function sanitizeState() {
    state.a = Math.round(state.a);
    state.b = Math.round(state.b);
    state.c = Math.round(state.c);
    state.m = Math.round(state.m);

    if (state.a === 0 && state.b === 0) {
      state.a = 1;
    }
  }

  function multiplied() {
    return {
      a: state.a * state.m,
      b: state.b * state.m,
      c: state.c * state.m
    };
  }

  function updatePanel() {
    sanitizeState();
    const next = multiplied();
    baseEl.innerHTML = equationHTML(state.a, state.b, state.c);
    multipliedEl.innerHTML = `${state.m} * (${equationHTML(state.a, state.b, state.c)}) gives ${equationHTML(next.a, next.b, next.c)}`;

    if (state.m === 0) {
      noteEl.innerHTML = 'A multiplier of 0 collapses the equation to 0 = 0, so every point satisfies it. Any non-zero multiplier keeps the same line.';
    } else if (state.m < 0) {
      noteEl.innerHTML = 'A negative multiplier flips every sign at once. The equation looks different, but the line is unchanged.';
    } else {
      noteEl.innerHTML = 'Multiplying every term by the same non-zero number changes the scale of the equation, not the relationship between <em>x</em> and <em>y</em>.';
    }
  }

  function worldToScreen(x, y) {
    return [
      ((x - X_MIN) / (X_MAX - X_MIN)) * w,
      h - ((y - Y_MIN) / (Y_MAX - Y_MIN)) * h
    ];
  }

  function getLineIntersections(a, b, c) {
    const points = [];

    if (!nearlyZero(b)) {
      points.push({ x: X_MIN, y: (c - a * X_MIN) / b });
      points.push({ x: X_MAX, y: (c - a * X_MAX) / b });
    }

    if (!nearlyZero(a)) {
      points.push({ x: (c - b * Y_MIN) / a, y: Y_MIN });
      points.push({ x: (c - b * Y_MAX) / a, y: Y_MAX });
    }

    const visible = points.filter((p) =>
      p.x >= X_MIN - 0.0001 &&
      p.x <= X_MAX + 0.0001 &&
      p.y >= Y_MIN - 0.0001 &&
      p.y <= Y_MAX + 0.0001
    );

    const unique = [];
    visible.forEach((p) => {
      if (!unique.some((q) => Math.abs(q.x - p.x) < 0.001 && Math.abs(q.y - p.y) < 0.001)) {
        unique.push(p);
      }
    });

    return unique.slice(0, 2);
  }

  function drawGrid() {
    ctx.strokeStyle = '#e6dfcd';
    ctx.lineWidth = 1;

    for (let x = Math.ceil(X_MIN); x <= X_MAX; x++) {
      const [sx] = worldToScreen(x, 0);
      ctx.beginPath();
      ctx.moveTo(sx, 0);
      ctx.lineTo(sx, h);
      ctx.stroke();
    }

    for (let y = Math.ceil(Y_MIN); y <= Y_MAX; y++) {
      const [, sy] = worldToScreen(0, y);
      ctx.beginPath();
      ctx.moveTo(0, sy);
      ctx.lineTo(w, sy);
      ctx.stroke();
    }
  }

  function drawAxes() {
    const [sx0] = worldToScreen(0, 0);
    const [, sy0] = worldToScreen(0, 0);

    ctx.strokeStyle = '#7a7468';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, sy0);
    ctx.lineTo(w, sy0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx0, 0);
    ctx.lineTo(sx0, h);
    ctx.stroke();

    ctx.fillStyle = '#7a7468';
    ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    for (let x = Math.ceil(X_MIN); x <= X_MAX; x++) {
      if (x === 0) continue;
      const [sx] = worldToScreen(x, 0);
      ctx.fillText(x, sx, sy0 + 4);
    }

    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let y = Math.ceil(Y_MIN); y <= Y_MAX; y++) {
      if (y === 0) continue;
      const [, sy] = worldToScreen(0, y);
      ctx.fillText(y, sx0 - 5, sy);
    }
  }

  function drawLine(a, b, c, color, width, dash) {
    const ends = getLineIntersections(a, b, c);
    if (ends.length < 2) return;

    const [p1, p2] = ends;
    const [x1, y1] = worldToScreen(p1.x, p1.y);
    const [x2, y2] = worldToScreen(p2.x, p2.y);

    ctx.save();
    ctx.lineCap = 'round';
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.setLineDash(dash || []);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();
  }

  function drawAllPoints() {
    ctx.fillStyle = 'rgba(42, 94, 88, 0.1)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#2a5e58';
    ctx.font = '14px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('0 = 0', w / 2, h / 2 - 8);
    ctx.fillText('every point satisfies', w / 2, h / 2 + 16);
    ctx.fillText('the multiplied equation', w / 2, h / 2 + 38);
  }

  function drawLegend() {
    ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

    ctx.strokeStyle = '#b85a3a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(16, 20);
    ctx.lineTo(42, 20);
    ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.fillText('constructed', 50, 20);

    ctx.strokeStyle = '#2a5e58';
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 5]);
    ctx.beginPath();
    ctx.moveTo(16, 42);
    ctx.lineTo(42, 42);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillText('multiplied', 50, 42);
  }

  function draw() {
    ctx.fillStyle = '#fbf8f0';
    ctx.fillRect(0, 0, w, h);
    drawGrid();
    drawAxes();

    drawLine(state.a, state.b, state.c, 'rgba(184, 90, 58, 0.18)', 13);
    drawLine(state.a, state.b, state.c, '#b85a3a', 3);

    const next = multiplied();
    if (state.m === 0) {
      drawAllPoints();
    } else {
      drawLine(next.a, next.b, next.c, '#2a5e58', 3, [7, 6]);
    }

    drawLegend();
  }

  function render() {
    updatePanel();
    draw();
  }

  function resize() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    const rect = canvas.getBoundingClientRect();
    w = rect.width;
    h = rect.height;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
  }

  document.querySelectorAll('.step-btn').forEach((button) => {
    button.addEventListener('click', () => {
      const param = button.dataset.param;
      const delta = Number(button.dataset.delta);
      state[param] += delta;
      sanitizeState();
      render();
    });
  });

  document.querySelectorAll('.flip-btn').forEach((button) => {
    button.addEventListener('click', () => {
      const param = button.dataset.flip;
      if (state[param] === 0) {
        state[param] = -1;
      } else {
        state[param] *= -1;
      }
      sanitizeState();
      render();
    });
  });

  resetBtn.addEventListener('click', () => {
    state = { ...INITIAL };
    render();
  });

  window.addEventListener('resize', resize);
  resize();
})();
</script>
</body>
</html>
