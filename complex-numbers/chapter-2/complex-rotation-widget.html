<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complex Numbers &mdash; Rotation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161311; --panel: #1e1a17;
    --text: #ece2d1; --dim: #a89c87; --faint: #6f6557;
    --rule: rgba(214,196,168,0.14);
    --accent: #d4b888;       /* gold = the number / vector */
    --re: #e8a13b;           /* orange = real axis */
    --im: #6dd3c4;           /* teal = imaginary axis */
    --pink: #ef7398;         /* the rotation */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'EB Garamond', Georgia, serif; font-size: 17px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { padding: 1.4rem 1rem; background-image: radial-gradient(ellipse at top, rgba(212,184,136,0.045), transparent 56%); }
  .widget { max-width: 560px; margin: 0 auto; background: var(--panel); border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; }
  .header { padding: 1.15rem 1.5rem 0.95rem; border-bottom: 1px solid var(--rule); }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint); margin-bottom: 0.3rem; }
  h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 1.4rem; line-height: 1.05; }
  h1 em { font-style: italic; color: var(--accent); }
  h1 .i { color: var(--pink); font-style: italic; }

  .stage { padding: 0.5rem; display: flex; justify-content: center; }
  svg#plane { width: 100%; max-width: 440px; height: auto; display: block; touch-action: none; cursor: grab; }
  svg#plane:active { cursor: grabbing; }

  .panel { padding: 0.4rem 1.5rem 1.2rem; }
  .buttons { display: flex; gap: 0.6rem; justify-content: center; margin-bottom: 0.9rem; flex-wrap: wrap; }
  .btn { font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; padding: 0.55rem 1.15rem; border-radius: 3px; cursor: pointer; background: rgba(212,184,136,0.12); border: 1px solid var(--accent); color: var(--accent); transition: background 0.16s, opacity 0.16s; }
  .btn:hover { background: rgba(212,184,136,0.22); }
  .btn.ghost { border-color: var(--rule); color: var(--dim); background: transparent; }
  .btn.ghost:hover { border-color: var(--dim); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  .status { text-align: center; font-style: italic; color: var(--dim); font-size: 0.95rem; min-height: 1.5em; }
  .status .hot { color: var(--pink); font-style: normal; font-family: 'JetBrains Mono', monospace; }
  .readout { display: flex; justify-content: center; align-items: baseline; gap: 1.2rem; margin-top: 0.55rem; padding-top: 0.7rem; border-top: 1px solid var(--rule); }
  .readout .z { font-family: 'JetBrains Mono', monospace; font-size: 1.7rem; color: var(--accent); font-variant-numeric: tabular-nums; }
  .readout .z .lead { color: var(--faint); font-size: 1rem; }
  .readout .meta { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--dim); text-align: left; line-height: 1.5; }
  .readout .meta .ang { color: var(--pink); }

  .footer { padding: 0.8rem 1.5rem; border-top: 1px solid var(--rule); font-style: italic; font-size: 0.82rem; color: var(--faint); text-align: center; }

  .grid { stroke: rgba(214,196,168,0.07); stroke-width: 1; }
  .axis-re { stroke: rgba(232,161,59,0.4); stroke-width: 1.2; }
  .axis-im { stroke: rgba(109,211,196,0.4); stroke-width: 1.2; }
  .axis-tip-re { fill: rgba(232,161,59,0.55); }
  .axis-tip-im { fill: rgba(109,211,196,0.55); }
  .axislab { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; }
  .axislab-re { fill: rgba(232,161,59,0.7); }
  .axislab-im { fill: rgba(109,211,196,0.7); }
  .modcircle { fill: none; stroke: rgba(214,196,168,0.18); stroke-width: 1; stroke-dasharray: 3 5; }
  .landmark { fill: rgba(236,226,209,0.5); }
  .lm-lab { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .lm-pow { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: var(--faint); }
  .ghosttip { fill: var(--accent); opacity: 0.28; }
  .ghostline { stroke: var(--accent); stroke-width: 1; opacity: 0.16; }
  .sweep { fill: none; stroke: var(--pink); stroke-width: 2.4; stroke-linecap: round; }
  .vec { stroke: var(--accent); stroke-width: 3; stroke-linecap: round; filter: drop-shadow(0 0 6px rgba(212,184,136,0.45)); }
  .vechead { fill: var(--accent); }
  .vectip { fill: var(--pink); stroke: var(--bg); stroke-width: 2; filter: drop-shadow(0 0 7px rgba(239,115,152,0.6)); }
  .sweeplab { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: var(--pink); }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="eyebrow">Widget · Complex Numbers</div>
    <h1>Multiplying by <span class="i">i</span> is a quarter&#8209;turn</h1>
  </div>

  <div class="stage">
    <svg id="plane" viewBox="0 0 460 460" role="img" aria-label="The complex plane. Multiplying a number by i rotates it 90 degrees about the origin; by -1 rotates 180 degrees."></svg>
  </div>

  <div class="panel">
    <div class="buttons">
      <button class="btn" id="byI" type="button">&times; i</button>
      <button class="btn" id="byNeg" type="button">&times; (&minus;1)</button>
      <button class="btn ghost" id="reset" type="button">reset</button>
    </div>
    <div class="status" id="status">Drag the point, or multiply. <span class="hot">&times; i</span> turns it 90&deg;.</div>
    <div class="readout">
      <div class="z"><span class="lead">z =&nbsp;</span><span id="zval">1</span></div>
      <div class="meta">|z| = <span id="modv">1.00</span><br>angle = <span class="ang" id="argv">0&deg;</span></div>
    </div>
  </div>

  <div class="footer">Two quarter&#8209;turns make a half&#8209;turn: <em>i &times; i = &minus;1</em>.</div>
</div>

<script>
(function () {
  var $ = function (s) { return document.getElementById(s); };
  var NS = 'http://www.w3.org/2000/svg';
  var svg = $('plane');
  var CX = 230, CY = 230, RANGE = 2.3, S = (230 - 30) / RANGE;
  var MAXR = 2.15;

  var zx = 1, zy = 0, ghosts = [], animating = false;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function add(tag, attrs, parent) {
    var e = document.createElementNS(NS, tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    (parent || svg).appendChild(e); return e;
  }
  function sx(wx) { return CX + wx * S; }
  function sy(wy) { return CY - wy * S; }
  function uni(n) { return ('' + n).replace('-', '\u2212'); }

  // ---- static layer ----
  var stat = add('g', {});
  for (var i = -2; i <= 2; i++) {
    if (i === 0) continue;
    add('line', { class: 'grid', x1: sx(i), y1: sy(-RANGE), x2: sx(i), y2: sy(RANGE) }, stat);
    add('line', { class: 'grid', x1: sx(-RANGE), y1: sy(i), x2: sx(RANGE), y2: sy(i) }, stat);
  }
  add('line', { class: 'axis-re', x1: sx(-RANGE), y1: sy(0), x2: sx(RANGE), y2: sy(0) }, stat);
  add('line', { class: 'axis-im', x1: sx(0), y1: sy(-RANGE), x2: sx(0), y2: sy(RANGE) }, stat);
  add('path', { class: 'axis-tip-re', d: 'M ' + sx(RANGE) + ' ' + sy(0) + ' l -8 -4 l 0 8 z' }, stat);
  add('path', { class: 'axis-tip-im', d: 'M ' + sx(0) + ' ' + sy(RANGE) + ' l -4 8 l 8 0 z' }, stat);
  var reL = add('text', { class: 'axislab axislab-re', x: sx(RANGE) - 4, y: sy(0) - 8, 'text-anchor': 'end' }, stat); reL.textContent = 'real';
  var imL = add('text', { class: 'axislab axislab-im', x: sx(0) + 8, y: sy(RANGE) + 12, 'text-anchor': 'start' }, stat); imL.textContent = 'imaginary';

  // powers-of-i landmarks
  function landmark(wx, wy, lab, pow, cls, lx, ly, anchor) {
    add('circle', { class: 'landmark', cx: sx(wx), cy: sy(wy), r: 2.6 }, stat);
    var t = add('text', { class: 'lm-lab ' + cls, x: sx(wx) + lx, y: sy(wy) + ly, 'text-anchor': anchor }, stat); t.textContent = lab;
    var p = add('text', { class: 'lm-pow', x: sx(wx) + lx, y: sy(wy) + ly + 13, 'text-anchor': anchor }, stat); p.textContent = pow;
  }
  landmark(1, 0, '1', 'i\u2074', 'axislab-re', 7, 18, 'start');
  landmark(0, 1, 'i', 'i\u00b9', 'axislab-im', 9, -6, 'start');
  landmark(-1, 0, '\u22121', 'i\u00b2', 'axislab-re', -7, 18, 'end');
  landmark(0, -1, '\u2212i', 'i\u00b3', 'axislab-im', 9, 16, 'start');

  // ---- dynamic layer ----
  var dyn = add('g', {});

  function drawVector(ax, ay, sweepFrom) {
    while (dyn.firstChild) dyn.removeChild(dyn.firstChild);
    var m = Math.hypot(ax, ay);
    // modulus circle (rotation path)
    if (m > 0.05) add('circle', { class: 'modcircle', cx: sx(0), cy: sy(0), r: m * S }, dyn);
    // ghosts (previous resting tips)
    ghosts.forEach(function (g) {
      add('line', { class: 'ghostline', x1: sx(0), y1: sy(0), x2: sx(g.x), y2: sy(g.y) }, dyn);
      add('circle', { class: 'ghosttip', cx: sx(g.x), cy: sy(g.y), r: 4 }, dyn);
    });
    // sweep arc (during/after a rotation)
    if (sweepFrom != null && m > 0.05) {
      var a0 = sweepFrom, a1 = Math.atan2(ay, ax);
      // unwrap so the arc goes the short rotation direction actually taken
      var dirCCW = sweepDir;
      var pts = [], steps = 28;
      var span = a1 - a0;
      // normalize span to match intended direction
      if (dirCCW > 0) { while (span < 0) span += Math.PI * 2; } else { while (span > 0) span -= Math.PI * 2; }
      for (var k = 0; k <= steps; k++) {
        var a = a0 + span * k / steps, rr = m * 0.46;
        pts.push(sx(rr * Math.cos(a)) + ',' + sy(rr * Math.sin(a)));
      }
      add('polyline', { class: 'sweep', points: pts.join(' '), fill: 'none' }, dyn);
    }
    // the vector + arrowhead + tip
    if (m > 0.05) {
      var P = { x: sx(ax), y: sy(ay) }, O = { x: sx(0), y: sy(0) };
      add('line', { class: 'vec', x1: O.x, y1: O.y, x2: P.x, y2: P.y }, dyn);
      var ux = (P.x - O.x) / (m * S), uy = (P.y - O.y) / (m * S);
      var hb = { x: P.x - ux * 12, y: P.y - uy * 12 }, pxv = -uy, pyv = ux;
      add('path', { class: 'vechead', d: 'M ' + P.x + ' ' + P.y + ' L ' + (hb.x + pxv * 6) + ' ' + (hb.y + pyv * 6) + ' L ' + (hb.x - pxv * 6) + ' ' + (hb.y - pyv * 6) + ' z' }, dyn);
      add('circle', { class: 'vectip', cx: P.x, cy: P.y, r: 4 }, dyn);
    } else {
      add('circle', { class: 'vectip', cx: sx(0), cy: sy(0), r: 4 }, dyn);
    }
  }

  function fmtComplex(a, b) {
    var EPS = 0.005;
    var ra = Math.round(a * 100) / 100, rb = Math.round(b * 100) / 100;
    if (Math.abs(ra - Math.round(ra)) < EPS) ra = Math.round(ra);
    if (Math.abs(rb - Math.round(rb)) < EPS) rb = Math.round(rb);
    var za = Math.abs(ra) < EPS, zb = Math.abs(rb) < EPS;
    if (za && zb) return '0';
    var s = '';
    if (!za) s += uni(ra);
    if (!zb) {
      var mag = Math.abs(rb), magS = Math.abs(mag - 1) < EPS ? '' : ('' + mag);
      if (s) s += (rb < 0 ? ' \u2212 ' : ' + ') + magS + 'i';
      else s += (rb < 0 ? '\u2212' : '') + magS + 'i';
    }
    return s;
  }

  function updateReadout() {
    $('zval').innerHTML = fmtComplex(zx, zy);
    var m = Math.hypot(zx, zy);
    $('modv').textContent = m.toFixed(2);
    var deg = Math.round(Math.atan2(zy, zx) * 180 / Math.PI); if (deg < 0) deg += 360;
    $('argv').innerHTML = uni(deg) + '\u00b0';
  }

  var sweepDir = 1;
  function multiply(deltaDeg, label) {
    if (animating) return;
    var m = Math.hypot(zx, zy);
    if (m < 0.05) { setStatus(label + ' &middot; nothing to rotate at the origin'); return; }
    ghosts.push({ x: zx, y: zy }); if (ghosts.length > 8) ghosts.shift();
    sweepDir = 1; // i and -1 are CCW turns
    var a0 = Math.atan2(zy, zx);
    var d = deltaDeg * Math.PI / 180;
    // exact target (avoid drift)
    var tx, ty;
    if (deltaDeg === 90) { tx = -zy; ty = zx; } else { tx = -zx; ty = -zy; }
    setStatus(label);
    if (reduce) { zx = tx; zy = ty; drawVector(zx, zy, a0); updateReadout(); return; }
    animating = true; setButtons(false);
    var T = deltaDeg === 180 ? 720 : 520, start = null;
    function frame(ts) {
      if (start == null) start = ts;
      var p = Math.min(1, (ts - start) / T);
      var e = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; // easeInOut
      var a = a0 + d * e;
      drawVector(m * Math.cos(a), m * Math.sin(a), a0);
      if (p < 1) requestAnimationFrame(frame);
      else { zx = tx; zy = ty; drawVector(zx, zy, a0); updateReadout(); animating = false; setButtons(true); }
    }
    requestAnimationFrame(frame);
  }

  function setStatus(html) { $('status').innerHTML = html; }
  function setButtons(on) { $('byI').disabled = !on; $('byNeg').disabled = !on; $('reset').disabled = !on; }

  $('byI').addEventListener('click', function () {
    multiply(90, '<span class="hot">&times; i</span> &mdash; a 90&deg; turn');
  });
  $('byNeg').addEventListener('click', function () {
    multiply(180, '<span class="hot">&times; (&minus;1)</span> &mdash; a 180&deg; turn = <span class="hot">i &times; i</span>');
  });
  $('reset').addEventListener('click', function () {
    if (animating) return; zx = 1; zy = 0; ghosts = [];
    setStatus('Drag the point, or multiply. <span class="hot">&times; i</span> turns it 90&deg;.');
    drawVector(zx, zy, null); updateReadout();
  });

  function fromPointer(ev) {
    if (animating) return;
    var pt = svg.createSVGPoint(); pt.x = ev.clientX; pt.y = ev.clientY;
    var p = pt.matrixTransform(svg.getScreenCTM().inverse());
    var wx = (p.x - CX) / S, wy = (CY - p.y) / S;
    var m = Math.hypot(wx, wy);
    if (m > MAXR) { wx = wx / m * MAXR; wy = wy / m * MAXR; }
    zx = wx; zy = wy; ghosts = [];
    drawVector(zx, zy, null); updateReadout();
  }
  var dragging = false;
  svg.addEventListener('pointerdown', function (e) { if (animating) return; dragging = true; svg.setPointerCapture(e.pointerId); setStatus('Drag to choose any number, then multiply.'); fromPointer(e); });
  svg.addEventListener('pointermove', function (e) { if (dragging) fromPointer(e); });
  svg.addEventListener('pointerup', function (e) { dragging = false; try { svg.releasePointerCapture(e.pointerId); } catch (x) {} });
  svg.addEventListener('pointercancel', function () { dragging = false; });

  drawVector(zx, zy, null); updateReadout();
})();
</script>
</body>
</html>
