<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extending the Number System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:    #05060c;
      --text:   #eaf2ff;
      --muted:  rgba(234, 242, 255, 0.6);
      --faint:  rgba(234, 242, 255, 0.32);
      --line:   rgba(255, 255, 255, 0.88);
      --accent: #b6ff5a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--ink);
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 0.6rem;
    }

    .widget {
      width: min(100%, 940px);
      border-radius: 16px;
      border: 1px solid rgba(234, 242, 255, 0.12);
      background:
        radial-gradient(120% 120% at 50% 0%, rgba(182,255,90,0.08), transparent 55%),
        linear-gradient(160deg, #0a0c18, #06070f);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: clamp(1rem, 3vw, 1.7rem);
      position: relative;
      overflow: hidden;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }
    .kicker {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.66rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dots { display: flex; gap: 0.5rem; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      border: 1px solid rgba(234,242,255,0.3);
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

    .equation {
      font-family: "JetBrains Mono", monospace;
      font-size: clamp(1.6rem, 5.5vw, 2.6rem);
      font-weight: 500;
      letter-spacing: 0.02em;
      text-align: center;
      margin: 0.3rem 0 0.1rem;
      min-height: 1.3em;
    }
    .equation .ans,
    .equation .unknown {
      color: var(--accent);
      text-shadow: 0 0 16px var(--accent);
    }
    .equation .ans {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .equation .ans.show { opacity: 1; }

    .stage { width: 100%; }
    svg { display: block; width: 100%; height: auto; overflow: visible; }

    .nl { stroke: var(--line); stroke-width: 2.3; stroke-linecap: round; }
    .nl.new { stroke: var(--accent); }
    .nl.continuous { stroke: #ffd45a; filter: drop-shadow(0 0 8px rgba(255, 212, 90, 0.72)); }
    .tk { stroke: rgba(255,255,255,0.58); stroke-width: 1.4; stroke-linecap: round; }
    .tk.minor { stroke: rgba(234,242,255,0.16); }
    .tk.acc { stroke: var(--accent); }
    .tklab { fill: rgba(234,242,255,0.74); font-family: "JetBrains Mono", monospace; font-size: 13px; text-anchor: middle; }

    .rev { opacity: 0; transition: opacity 0.7s ease; }
    .rev.show { opacity: 1; }
    .hide-line-on-reveal { transition: opacity 0.45s ease; }
    .hide-line-on-reveal.hidden { opacity: 0; }

    .band rect { fill: var(--accent); }
    .tag {
      fill: var(--accent);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-anchor: middle;
    }

    .marker { transition: transform 0.95s cubic-bezier(.3,.85,.25,1); }
    .marker circle { fill: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
    .marker text { fill: var(--text); font-family: "JetBrains Mono", monospace; font-size: 14px; font-weight: 500; text-anchor: middle; }

    .foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .caption {
      font-size: clamp(0.86rem, 2vw, 0.98rem);
      color: var(--muted);
      line-height: 1.45;
      max-width: 60ch;
      min-height: 2.6em;
    }
    .caption b { color: var(--text); font-weight: 500; }
    .caption .system-focus {
      color: #ffd45a;
      text-shadow: 0 0 14px rgba(255, 212, 90, 0.78);
    }
    .nav { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .nav button {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--text);
      background: rgba(234,242,255,0.04);
      border: 1px solid rgba(234,242,255,0.18);
      border-radius: 999px;
      padding: 0.5rem 0.95rem;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    .nav button:hover:not(:disabled) { border-color: var(--accent); box-shadow: 0 0 16px -4px var(--accent); }
    .nav button:disabled { opacity: 0.35; cursor: default; }

    .nav .action {
      color: #06070e;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
      box-shadow: 0 0 18px -4px var(--accent);
    }
    .nav .action:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 0 22px -2px var(--accent); }

    @media (max-width: 620px) {
      .foot { flex-direction: column-reverse; align-items: stretch; }
      .nav { justify-content: space-between; }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Extending the number system">
    <div class="head">
      <div class="dots" id="dots" role="tablist"></div>
    </div>

    <div class="equation" id="equation"></div>

    <div class="stage" id="stage">
      <svg viewBox="0 0 900 190" role="img" aria-label="A number line that extends with each new kind of number">
        <g id="dyn"></g>
      </svg>
    </div>

    <div class="foot">
      <p class="caption" id="caption"></p>
      <div class="nav">
        <button id="action" class="action" type="button">Include negative numbers</button>
      </div>
    </div>
  </main>

  <script>
    const NS = 'http://www.w3.org/2000/svg';
    const el = (t, a) => { const e = document.createElementNS(NS, t); for (const k in a) e.setAttribute(k, a[k]); return e; };

    const ox = 450, oy = 105, ppu = 82;
    const lineMin = -4.35;
    const lineMax = 4.35;
    const xOf = (u) => ox + u * ppu;

    const dyn = document.getElementById('dyn');
    const equationEl = document.getElementById('equation');
    const captionEl = document.getElementById('caption');
    const dotsEl = document.getElementById('dots');
    const stage = document.getElementById('stage');

    const steps = [
      {
        accent: '#b6ff5a',
        kind: 'extend-left',
        action: 'Include negative numbers',
        problemHTML: '3 − 5 = <span class="ans" id="ansSpan">−2</span>',
        problemPlain: '3 &minus; 5 = <span class="unknown">?</span>',
        pose: '<span class="system-focus">&#8469;</span> &rarr; &#8484;',
        reveal: '&#8469; &rarr; <span class="system-focus">&#8484;</span>',
        baseInts: [0, 4], newInts: [-4, -1],
        markerStart: 3, markerEnd: -2
      },
      {
        accent: '#b6ff5a',
        kind: 'subdivide',
        action: 'Include fractions',
        problemHTML: '4 ÷ 8 = <span class="ans" id="ansSpan">1/2</span>',
        problemPlain: '4 &divide; 8 = <span class="unknown">?</span>',
        pose: '<span class="system-focus">&#8484;</span> &rarr; &#8474;',
        reveal: '&#8484; &rarr; <span class="system-focus">&#8474;</span>',
        baseInts: [-4, 4],
        markerStart: 1, markerEnd: 0.5
      },
      {
        accent: '#b6ff5a',
        kind: 'fill-line',
        action: 'Include irrational numbers',
        problemHTML: '&pi; = <span class="ans" id="ansSpan">3.14159&hellip;</span>',
        problemPlain: '&pi; = <span class="unknown">?</span>',
        pose: '<span class="system-focus">&#8474;</span> &rarr; &#8477;',
        reveal: '&#8474; &rarr; <span class="system-focus">&#8477;</span>',
        baseInts: [-4, 4],
        markerValue: Math.PI,
        markerLabel: 'π',
        tag: 'all real numbers'
      }
    ];

    let cur = 0;
    let revealed = false;
    const actionBtn = document.getElementById('action');

    // build dots
    steps.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'dot';
      d.type = 'button';
      d.setAttribute('aria-label', 'step ' + (i + 1));
      d.addEventListener('click', () => go(i));
      dotsEl.appendChild(d);
    });

    function tick(u, cls, label) {
      const x = xOf(u);
      const big = Number.isInteger(u) || cls.includes('halfTick');
      const h = big ? 9 : 6;
      const g = el('g', { class: cls });
      g.appendChild(el('line', { class: 'tk' + (big ? '' : ' minor') + (cls.includes('accTick') ? ' acc' : ''), x1: x, y1: oy - h, x2: x, y2: oy + h }));
      if (label !== undefined) {
        const t = el('text', { class: 'tklab', x: x, y: oy + 28 });
        t.textContent = label;
        g.appendChild(t);
      }
      return g;
    }

    function render(i) {
      const s = steps[i];
      document.documentElement.style.setProperty('--accent', s.accent);
      dyn.innerHTML = '';

      // step dots
      [...dotsEl.children].forEach((d, k) => d.classList.toggle('active', k === i));

      // equation starts unsolved
      equationEl.innerHTML = s.problemPlain;
      captionEl.innerHTML = s.pose;

      // ----- base number line -----
      if (s.kind === 'extend-left') {
        dyn.appendChild(el('line', { class: 'nl', x1: xOf(0), y1: oy, x2: xOf(lineMax), y2: oy }));
        // new (negative) segment, revealable
        const seg = el('line', { class: 'nl rev', x1: xOf(0), y1: oy, x2: xOf(lineMin), y2: oy });
        dyn.appendChild(seg);
      } else {
        dyn.appendChild(el('line', { class: 'nl', x1: xOf(lineMin), y1: oy, x2: xOf(lineMax), y2: oy }));
      }

      // ----- ticks -----
      if (s.kind === 'extend-left') {
        for (let u = s.baseInts[0]; u <= s.baseInts[1]; u++) dyn.appendChild(tick(u, 'base', String(u)));
        // negatives revealable
        for (let u = s.newInts[0]; u <= s.newInts[1]; u++) {
          dyn.appendChild(tick(u, 'rev', fmt(u)));
        }
      } else if (s.kind === 'subdivide') {
        for (let u = s.baseInts[0]; u <= s.baseInts[1]; u++) dyn.appendChild(tick(u, 'base', fmt(u)));
        // fractional subdivisions revealable
        for (let u = s.baseInts[0]; u < s.baseInts[1]; u++) {
          const half = u + 0.5;
          dyn.appendChild(tick(half, 'rev halfTick' + (half === 0.5 ? ' accTick' : ''), half === 0.5 ? '1/2' : undefined));
        }
      } else { // fill-line
        for (let u = s.baseInts[0]; u <= s.baseInts[1]; u++) {
          const g = tick(u, 'base', fmt(u));
          const line = g.querySelector('line');
          if (line) line.classList.add('hide-line-on-reveal');
          dyn.appendChild(g);
        }
        if (s.kind === 'fill-line') {
          const full = el('line', { class: 'nl continuous rev', x1: xOf(lineMin), y1: oy, x2: xOf(lineMax), y2: oy });
          full.setAttribute('stroke-width', '5');
          dyn.appendChild(full);

          const piMarker = el('g', { class: 'rev marker' });
          piMarker.appendChild(el('circle', { cx: xOf(s.markerValue), cy: oy, r: 7 }));
          const piText = el('text', { x: xOf(s.markerValue), y: oy - 16 });
          piText.textContent = s.markerLabel;
          piMarker.appendChild(piText);
          dyn.appendChild(piMarker);
        }
      }

      // ----- highlight band + tag (revealable) -----
      if (s.band) {
        const x1 = xOf(s.band[0]), x2 = xOf(s.band[1]);
        const bg = el('g', { class: 'rev band' });
        const grad = 'b' + i;
        const defs = el('defs', {});
        const lg = el('linearGradient', { id: grad, x1: '0', y1: '0', x2: '0', y2: '1' });
        lg.appendChild(el('stop', { offset: '0', 'stop-color': s.accent, 'stop-opacity': '0.18' }));
        lg.appendChild(el('stop', { offset: '1', 'stop-color': s.accent, 'stop-opacity': '0' }));
        defs.appendChild(lg); dyn.appendChild(defs);
        bg.appendChild(el('rect', { x: Math.min(x1, x2), y: oy - 46, width: Math.abs(x2 - x1), height: 46, fill: 'url(#' + grad + ')' }));
        const tg = el('text', { class: 'tag', x: (x1 + x2) / 2, y: oy - 54 });
        tg.textContent = s.tag;
        bg.appendChild(tg);
        dyn.appendChild(bg);
      }

      // ----- marker (horizontal steps) -----
      if (s.kind !== 'fill-line') {
        const m = el('g', { class: 'marker rev', id: 'marker' });
        m.style.transform = 'translateX(' + xOf(s.markerEnd) + 'px)';
        m.appendChild(el('circle', { cx: 0, cy: oy, r: 7 }));
        const vt = el('text', { x: 0, y: oy - 16, id: 'mval' });
        vt.textContent = fmt(s.markerEnd);
        m.appendChild(vt);
        dyn.appendChild(m);
      }

      // arm the action button — the reveal waits for a click
      revealed = false;
      actionBtn.textContent = s.action;
    }

    function reveal(i) {
      const s = steps[i];
      revealed = true;
      dyn.querySelectorAll('.rev').forEach((n) => n.classList.add('show'));
      actionBtn.textContent = i < steps.length - 1 ? 'Next' : 'Reset';
      if (s.kind === 'fill-line') dyn.querySelectorAll('.hide-line-on-reveal').forEach((n) => n.classList.add('hidden'));
      // swap the equation to its solved form and glow the answer in
      equationEl.innerHTML = s.problemHTML;
      const ans = document.getElementById('ansSpan');
      if (ans) requestAnimationFrame(() => ans.classList.add('show'));
      captionEl.innerHTML = s.reveal;

    }

    function fmt(u) {
      if (u === 0.5) return '1/2';
      if (u === -0.5) return '−1/2';
      return (u < 0 ? '−' + Math.abs(u) : String(u));
    }

    function go(i) {
      cur = Math.max(0, Math.min(steps.length - 1, i));
      render(cur);
    }

    actionBtn.addEventListener('click', () => {
      if (!revealed) {
        reveal(cur);
      } else if (cur < steps.length - 1) {
        go(cur + 1);
      } else {
        go(0);
      }
    });

    go(0);
  </script>
</body>
</html>
