<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extending the Number System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:    #05060c;
      --text:   #eaf2ff;
      --muted:  rgba(234, 242, 255, 0.6);
      --faint:  rgba(234, 242, 255, 0.32);
      --line:   rgba(234, 242, 255, 0.5);
      --accent: #b6ff5a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--ink);
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 0.6rem;
    }

    .widget {
      width: min(100%, 940px);
      border-radius: 16px;
      border: 1px solid rgba(234, 242, 255, 0.12);
      background:
        radial-gradient(120% 120% at 50% 0%, rgba(182,255,90,0.08), transparent 55%),
        linear-gradient(160deg, #0a0c18, #06070f);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: clamp(1rem, 3vw, 1.7rem);
      position: relative;
      overflow: hidden;
    }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }
    .kicker {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.66rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dots { display: flex; gap: 0.5rem; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      border: 1px solid rgba(234,242,255,0.3);
      background: transparent;
      cursor: pointer;
      padding: 0;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

    .equation {
      font-family: "JetBrains Mono", monospace;
      font-size: clamp(1.6rem, 5.5vw, 2.6rem);
      font-weight: 500;
      letter-spacing: 0.02em;
      text-align: center;
      margin: 0.3rem 0 0.1rem;
      min-height: 1.3em;
    }
    .equation .ans {
      color: var(--accent);
      text-shadow: 0 0 16px var(--accent);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .equation .ans.show { opacity: 1; }

    .stage { width: 100%; cursor: pointer; }
    svg { display: block; width: 100%; height: auto; overflow: visible; }

    .nl { stroke: var(--line); stroke-width: 2; stroke-linecap: round; }
    .nl.new { stroke: var(--accent); }
    .tk { stroke: rgba(234,242,255,0.3); stroke-width: 1.5; stroke-linecap: round; }
    .tk.minor { stroke: rgba(234,242,255,0.16); }
    .tk.acc { stroke: var(--accent); }
    .tklab { fill: var(--faint); font-family: "JetBrains Mono", monospace; font-size: 13px; text-anchor: middle; }

    .rev { opacity: 0; transition: opacity 0.7s ease; }
    .rev.show { opacity: 1; }

    .band rect { fill: var(--accent); }
    .tag {
      fill: var(--accent);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-anchor: middle;
    }

    .marker { transition: transform 0.95s cubic-bezier(.3,.85,.25,1); }
    .marker circle { fill: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
    .marker text { fill: var(--text); font-family: "JetBrains Mono", monospace; font-size: 14px; font-weight: 500; text-anchor: middle; }

    .vax { stroke: var(--accent); stroke-width: 2; stroke-linecap: round; }
    .lift { transition: transform 0.9s cubic-bezier(.3,.85,.25,1), opacity 0.6s ease; }
    .lift circle { fill: var(--accent); filter: drop-shadow(0 0 10px var(--accent)); }
    .lift text { fill: var(--text); font-family: "JetBrains Mono", monospace; font-size: 15px; font-weight: 600; text-anchor: middle; }

    .foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .caption {
      font-size: clamp(0.86rem, 2vw, 0.98rem);
      color: var(--muted);
      line-height: 1.45;
      max-width: 60ch;
      min-height: 2.6em;
    }
    .caption b { color: var(--text); font-weight: 500; }
    .nav { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .nav button {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--text);
      background: rgba(234,242,255,0.04);
      border: 1px solid rgba(234,242,255,0.18);
      border-radius: 999px;
      padding: 0.5rem 0.95rem;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    .nav button:hover:not(:disabled) { border-color: var(--accent); box-shadow: 0 0 16px -4px var(--accent); }
    .nav button:disabled { opacity: 0.35; cursor: default; }

    @media (max-width: 620px) {
      .foot { flex-direction: column-reverse; align-items: stretch; }
      .nav { justify-content: space-between; }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Extending the number system">
    <div class="head">
      <span class="kicker">Extending the number system</span>
      <div class="dots" id="dots" role="tablist"></div>
    </div>

    <div class="equation" id="equation"></div>

    <div class="stage" id="stage" title="click to replay">
      <svg viewBox="0 0 900 340" role="img" aria-label="A number line that extends with each new kind of number">
        <g id="dyn"></g>
      </svg>
    </div>

    <div class="foot">
      <p class="caption" id="caption"></p>
      <div class="nav">
        <button id="prev" type="button">‹ back</button>
        <button id="next" type="button">next ›</button>
      </div>
    </div>
  </main>

  <script>
    const NS = 'http://www.w3.org/2000/svg';
    const el = (t, a) => { const e = document.createElementNS(NS, t); for (const k in a) e.setAttribute(k, a[k]); return e; };

    const ox = 450, oy = 250, ppu = 60;
    const xOf = (u) => ox + u * ppu;

    const dyn = document.getElementById('dyn');
    const equationEl = document.getElementById('equation');
    const captionEl = document.getElementById('caption');
    const dotsEl = document.getElementById('dots');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const stage = document.getElementById('stage');

    const steps = [
      {
        accent: '#b6ff5a',
        kind: 'extend-left',
        problemHTML: '3 − 5 = <span class="ans" id="ansSpan">−2</span>',
        problemPlain: '3 − 5 = ?',
        pose: 'Start with the counting numbers. Step back 5 from 3 and you run off the end of the line…',
        reveal: 'So the line grows the other way. <b>Negative numbers</b> let 3 − 5 = −2.',
        baseInts: [0, 6], newInts: [-6, -1],
        markerStart: 3, markerEnd: -2,
        band: [-6, 0], tag: 'negatives'
      },
      {
        accent: '#ffd45a',
        kind: 'subdivide',
        problemHTML: '4 ÷ 8 = <span class="ans" id="ansSpan">1/2</span>',
        problemPlain: '4 ÷ 8 = ?',
        pose: 'Now the whole integers. But 4 ÷ 8 lands between 0 and 1 — and no integer lives there…',
        reveal: 'So the gaps fill in. <b>Fractions</b> let 4 ÷ 8 = 1/2.',
        baseInts: [-6, 6],
        markerStart: 1, markerEnd: 0.5,
        band: [0, 1], tag: 'fractions'
      },
      {
        accent: '#b6ff5a',
        kind: 'lift-off',
        problemHTML: '√−9 = <span class="ans" id="ansSpan">?</span>',
        problemPlain: '√−9 = ?',
        pose: 'Now every rational number. We need a value that squares to −9 — but every point on the line squares to something positive…',
        reveal: 'This time the line itself is not enough. The answer <b>lifts off it</b>, into a new direction.',
        baseInts: [-6, 6], dense: true,
        liftHeight: 3, liftLabel: '?', tag: 'a new direction'
      }
    ];

    let cur = 0;
    let revealTimer = null;

    // build dots
    steps.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'dot';
      d.type = 'button';
      d.setAttribute('aria-label', 'step ' + (i + 1));
      d.addEventListener('click', () => go(i));
      dotsEl.appendChild(d);
    });

    function tick(u, cls, label) {
      const x = xOf(u);
      const big = Number.isInteger(u);
      const h = big ? 9 : 6;
      const g = el('g', { class: cls });
      g.appendChild(el('line', { class: 'tk' + (big ? '' : ' minor') + (cls.includes('accTick') ? ' acc' : ''), x1: x, y1: oy - h, x2: x, y2: oy + h }));
      if (label !== undefined) {
        const t = el('text', { class: 'tklab', x: x, y: oy + 28 });
        t.textContent = label;
        g.appendChild(t);
      }
      return g;
    }

    function render(i) {
      clearTimeout(revealTimer);
      const s = steps[i];
      document.documentElement.style.setProperty('--accent', s.accent);
      dyn.innerHTML = '';

      // step dots
      [...dotsEl.children].forEach((d, k) => d.classList.toggle('active', k === i));

      // equation (posed)
      equationEl.innerHTML = s.problemHTML;
      captionEl.innerHTML = s.pose;

      // ----- base number line -----
      if (s.kind === 'extend-left') {
        dyn.appendChild(el('line', { class: 'nl', x1: xOf(0), y1: oy, x2: xOf(6.4), y2: oy }));
        // new (negative) segment, revealable
        const seg = el('line', { class: 'nl new rev', x1: xOf(0), y1: oy, x2: xOf(-6.4), y2: oy });
        dyn.appendChild(seg);
      } else {
        dyn.appendChild(el('line', { class: 'nl', x1: xOf(-6.4), y1: oy, x2: xOf(6.4), y2: oy }));
      }

      // ----- ticks -----
      if (s.kind === 'extend-left') {
        for (let u = s.baseInts[0]; u <= s.baseInts[1]; u++) dyn.appendChild(tick(u, 'base', (u === 0 || u === 3 || u === 6) ? String(u) : undefined));
        // negatives revealable
        for (let u = s.newInts[0]; u <= s.newInts[1]; u++) {
          dyn.appendChild(tick(u, 'rev', (u === -2) ? '−2' : (u % 3 === 0 ? String(u) : undefined)));
        }
      } else if (s.kind === 'subdivide') {
        for (let u = s.baseInts[0]; u <= s.baseInts[1]; u++) dyn.appendChild(tick(u, 'base', (u === 0 || u === 1) ? String(u) : (u % 3 === 0 ? String(u) : undefined)));
        // halves revealable
        for (let u = s.baseInts[0]; u <= s.baseInts[1] - 1; u++) {
          const hv = u + 0.5;
          const isHalf = Math.abs(hv - 0.5) < 1e-9;
          dyn.appendChild(tick(hv, 'rev' + (isHalf ? ' accTick' : ''), isHalf ? '1/2' : undefined));
        }
      } else { // lift-off
        for (let u = s.baseInts[0]; u <= s.baseInts[1]; u++) dyn.appendChild(tick(u, 'base', (u % 3 === 0) ? String(u) : undefined));
        if (s.dense) for (let u = s.baseInts[0]; u <= s.baseInts[1] - 1; u++) dyn.appendChild(tick(u + 0.5, 'base'));
      }

      // ----- highlight band + tag (revealable) -----
      if (s.band) {
        const x1 = xOf(s.band[0]), x2 = xOf(s.band[1]);
        const bg = el('g', { class: 'rev band' });
        const grad = 'b' + i;
        const defs = el('defs', {});
        const lg = el('linearGradient', { id: grad, x1: '0', y1: '0', x2: '0', y2: '1' });
        lg.appendChild(el('stop', { offset: '0', 'stop-color': s.accent, 'stop-opacity': '0.18' }));
        lg.appendChild(el('stop', { offset: '1', 'stop-color': s.accent, 'stop-opacity': '0' }));
        defs.appendChild(lg); dyn.appendChild(defs);
        bg.appendChild(el('rect', { x: Math.min(x1, x2), y: oy - 46, width: Math.abs(x2 - x1), height: 46, fill: 'url(#' + grad + ')' }));
        const tg = el('text', { class: 'tag', x: (x1 + x2) / 2, y: oy - 54 });
        tg.textContent = s.tag;
        bg.appendChild(tg);
        dyn.appendChild(bg);
      }

      // ----- marker (horizontal steps) -----
      if (s.kind !== 'lift-off') {
        const m = el('g', { class: 'marker', id: 'marker' });
        m.style.transform = 'translateX(' + xOf(s.markerStart) + 'px)';
        m.appendChild(el('circle', { cx: 0, cy: oy, r: 7 }));
        const vt = el('text', { x: 0, y: oy - 16, id: 'mval' });
        vt.textContent = fmt(s.markerStart);
        m.appendChild(vt);
        dyn.appendChild(m);
      }

      // ----- lift-off apparatus (revealable) -----
      if (s.kind === 'lift-off') {
        const topY = oy - s.liftHeight * ppu;
        const vline = el('line', { class: 'vax', x1: xOf(0), y1: oy, x2: xOf(0), y2: topY, id: 'vax' });
        const len = s.liftHeight * ppu;
        vline.style.strokeDasharray = len;
        vline.style.strokeDashoffset = len;
        vline.style.transition = 'stroke-dashoffset 0.9s ease';
        dyn.appendChild(vline);

        const tg = el('text', { class: 'tag rev', x: xOf(0) + 64, y: (oy + topY) / 2 });
        tg.textContent = s.tag;
        dyn.appendChild(tg);

        const lift = el('g', { class: 'lift', id: 'lift', opacity: 0 });
        lift.style.transform = 'translateY(0px)';
        lift.appendChild(el('circle', { cx: xOf(0), cy: oy, r: 7 }));
        const lt = el('text', { x: xOf(0) + 18, y: oy + 5 });
        lt.textContent = s.liftLabel;
        lift.appendChild(lt);
        dyn.appendChild(lift);
      }

      // nav state
      prevBtn.disabled = i === 0;
      nextBtn.disabled = i === steps.length - 1;

      // schedule the reveal
      revealTimer = setTimeout(() => reveal(i), 750);
    }

    function reveal(i) {
      const s = steps[i];
      dyn.querySelectorAll('.rev').forEach((n) => n.classList.add('show'));
      const ans = document.getElementById('ansSpan');
      if (ans) ans.classList.add('show');
      captionEl.innerHTML = s.reveal;

      if (s.kind !== 'lift-off') {
        const m = document.getElementById('marker');
        const mval = document.getElementById('mval');
        if (m) m.style.transform = 'translateX(' + xOf(s.markerEnd) + 'px)';
        if (mval) setTimeout(() => { mval.textContent = fmt(s.markerEnd); }, 500);
      } else {
        const vax = document.getElementById('vax');
        const lift = document.getElementById('lift');
        if (vax) vax.style.strokeDashoffset = '0';
        if (lift) {
          setTimeout(() => {
            lift.style.transform = 'translateY(' + (-s.liftHeight * ppu) + 'px)';
            lift.setAttribute('opacity', 1);
          }, 350);
        }
      }
    }

    function fmt(u) {
      if (u === 0.5) return '1/2';
      if (u === -0.5) return '−1/2';
      return (u < 0 ? '−' + Math.abs(u) : String(u));
    }

    function go(i) {
      cur = Math.max(0, Math.min(steps.length - 1, i));
      render(cur);
    }

    prevBtn.addEventListener('click', () => go(cur - 1));
    nextBtn.addEventListener('click', () => go(cur + 1));
    stage.addEventListener('click', () => render(cur)); // replay

    go(0);
  </script>
</body>
</html>
